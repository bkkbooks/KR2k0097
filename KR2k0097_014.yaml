body:
  text: 汴京遺迹志卷十四明李濓撰藝文一奏議上仁宗論修固京城宋范仲淹臣危言孤立久荷聖知當此旰昃之憂豈可循默自守雖以言而取罪亦以盡臣子之心臣先於景祐三年五月初在開封府曾進劄子言西洛帝王之宅絶無儲備乞聖慈以將有朝陵為名使東道有餘則運而西上西道有餘則運而東下數年之間庶幾有備太平則居東京舟車輻輳之地以便天下急難則守西洛山河之宅以保中原當時臣言西洛可營者以備急難也今北事既動營洛已晚臣今别有愚見請一一陳之竊聞修建北京以禦大敵以臣料之可張虛聲未可為倚何哉河朔地平去邊千里敵馬豪健晝夜兼馳不十數日可及澶淵陛下乘輿一動千乘萬騎非數日可辦倉卒之間敵馬已近欲進北京其可及乎此未可一也又承平已久人不知戰聞寇大至羣情憂恐陛下引憂恐之師進涉危地或有驚潰在瓜牙之臣誰能制之此未可二也又北京四面盡平絶無險厄儻乘輿安然到彼而敵馬旁過直趨河南於澶淵四面乘凍而渡京師無備將何以支宗廟社稷宫禁府庫皇宗戚里之屬千官百辟之家六軍萬民血屬盡在無金城湯池可恃無堅甲利兵可禦陛下行在河朔心存京師豈無回顧之大憂乎此未可三也假使大河未凍寇不得渡而直圍守澶淵聲言向闕以割地會盟為請當此之時京師無備邊塵俯逼陛下能堅守不動而拒請乎唐明皇時祿山為亂舊將哥舒翰以四十萬兵屯守潼關請不出戰且以困賊楊國忠促令進討一戰大敗遂陷長安今京師無備寇或南牧朝廷必促河朔諸將出兵截戰萬一不勝則有天寶之患朝廷將安往乎昔煬帝盤遊淮甸違逺關中唐祖據之隋室遂傾明皇出幸西蜀非肅宗立于朔方天下不復為唐矣德宗欲幸益郡李晟纍奏乞且幸山南以繫人心乃知朝廷萬邦根本今陜西河北聚天下之重兵如京師搖動違逺衆兵則姦雄奮飛禍患四起臣聞天有九閽帝居九重是以王公法天設險以安萬國易曰天險不可升地險山川丘陵王公設險以守其國正在今日矣臣請陛下速修東京高城深池軍民百萬足以為九重之備乘輿不出則聖人坐鎮四海而無煩動之勞鑾輿或出則大臣居守九重而無回顧之憂矣彼或謀曰邊城堅牢不可卒攻京師坦平而可深犯我若修固京師使不可犯則伐彼之謀而沮南牧之志矣寇入之淺則邊壘已堅寇入之深則都城已固彼請割地我可弗許也彼請決戰我可弗出也進不能為患退不能忘歸然後因而撓之返則追之縱有鈔掠可邀可奪彼衰我振未必不大勝豈非陛下保社稷安四海之全䇿哉或曰京師王者之居高城深池恐失其體臣聞後唐末契丹以四十萬衆送石高祖入朝而京城無備閔宗遂亡石晉時叛臣張彥澤引契丹犯闕而京城無備少主乃陷此皆無備而亡何言其失體哉臣但憂國家之患而不暇顧其失體也若以修築城隍為失體不猶愈於播遷之禍哉朝廷大臣百官必曉此事但懼議者謂其失體而不敢言臣任在西陲非當請間而言此事誠罪人也然臣子之心豈敢忘君親之憂况臣素愚拙惟知報國不知避謗昔奉春君負販之夫勸高祖都關中而張良贊之翌日命駕臣叨預近列而輒建言比之奉春君之僣未甚為過至於西洛帝王之宅太祖營修有意在子孫表裏山河接應東京之事勢連屬關陜之形勝又河陽據大川之險當河東之會要為西洛之北門又長安自古興王之都天下勝地皆願朝廷留意常委才謀重臣天下幸甚慶歷二年八月上時為陜西四路安撫沿邊招討使上仁宗乞罷修京城余靖臣竊聞大臣建議內有修京城置府兵二事者伏以廟堂謀議天下具瞻帝王言動萬世為法安危所繫舉措非輕事之幾微不可不謹難與慮始人之常情臣願陛下深思逺圖以安民為本臣請縷陳二事伏望陛下擇其可否臣聞西賊僣號之初宋庠請修函谷此時關中動搖謂朝廷棄關西而自守今無故而修京城乃是捨天下之大而為嬰城自守之計四方聞之豈不動搖強弱之勢正在此矣無戎而城春秋所譏守在四夷義不如此又前嵗以邊鄙之警而河北諸路揀點鄉兵其利未集而先致其害况今北敵之賂既厚西戎之好既講雖知信誓不可卒保嗸嗸蒼生咸望帖泰而都畿之下先自擾之根本不寧四方何望哉昔魏侯恃險吳起以為失詞宣王料民山甫談其害政惟是二者皆古今之所重而安危之所起乞陛下捨此二䇿别議逺圖之術慶歷四年五月上時知諌院上哲宗乞罷修京城范祖禹臣伏聞開修汴京城濠日役三四千人雖和雇夫力調發不及民其錢不屬戶部然財出於民一也豈可不計校愛惜而枉費用之臣聞開濠深一丈五尺闊二百五十一步廣於汴河三倍自古未聞有此城池也新城周世宗所築太祖因之建都于此百二十年無山川之險可恃所恃者在修德在用人在得民心此三者纍聖所以遺後嗣子孫也神宗時宋用臣提舉修京城大興土功版築過當小人之情惟欲廣用民力多費國財上則徼幸爵賞次則隱盜官物故役無有不大費無有不廣此姦臣之所利非先帝意也陛下始政散遣修城役夫百姓皆歡呼鼓舞今欲終成前功但全之而已可也何必廣作無益以害有益乎又京城外門正門即為方城偏門即為甕城其外門皆用純鐡褁之此祖宗時所無也甕城乃邊城之制非所以施於京師今東西南三面偏門亦欲為甕城臣不知大臣何見而為此謀必以為威北敵也使北敵果渝盟南向大臣將坐守此以受敵乎春秋時囊瓦為令尹城郢沈尹戍曰子常必亡郢茍不能衛城無益也古者天子守在四夷天子卑守在諸侯諸侯卑守在四鄰四鄰卑守在四境固其四境結其四援民狎其野三務成功民無內憂而入無外懼國焉用城今民是懼而城於郢守已小矣卑之不獲能無亡乎昔梁伯溝其公宫而民潰民棄其上不亡何待今大臣不修德政而急於城池此囊瓦城郢之計也唐神龍中張仁願為朔方總管築三受降城不置甕門或曰邊城無守備可乎仁願曰兵貴攻取賤退守寇至當併力出拒敢回望城者斬何事守備退忸其心哉後常元楷代為總管始築甕門議者益重仁願而輕元楷今於京城為受矢石之備是不如張仁願之守邊城也自修城浚池以來議者皆以為無戎而城無寇而溝公宫此言不可不畏其北門甕城已就改之重勞臣欲乞降指揮東西南三面偏門止為方城其濠廣闊可減三分之二稍正王城之體以惜民力以省國用元祐四年五月上時為右諌議大夫按范文正公之奏深切事情為當時社稷之慮甚周可謂有特見者余范二公之論亦是一説然以靖康之禍觀之則文正之言若筮龜矣上真宗乞罷營玉清昭應宫王曾臣伏聞朝廷設諫諍之官防政治之闕非其官而言者蓋表其忠况當不諱之朝復忝非常之遇茍進思之無補懼竊祿以貽譏臣伏覩國家誕受殊祥薦膺祕籙祚洪圖於萬葉超盛烈於百王陛下寅畏寶符陟封名嶽功垂不朽澤浸無垠奉若之心斯為至矣而清衷濬發成命亟行就嚴城之北隅啓列真之祕宇式昭丕應特建嘉名自經始以來庀徒斯廣輦他山之石相屬於道途伐豫章之材逺周於林麓纍土陶甓揮鍤運斤功極彌年費將巨萬掩祈年之舊制踰槩日之前聞輟貴近以董臨假使權而領護如此則國家尊奉靈文之意不為不厚矣崇飾臺觀之規不為不壯矣然而臣之愚懇或異於斯既有見聞安敢緘默臣以為今之興作有不便之事五焉雖鳩僝巳行未可悉罷茍或萬一采芻蕘之説省其功用抑其制度亦及民之大惠而憂國之逺圖也所謂五者之目請為陛下陳之且今來所創立宫規制宏大凡用材朩莫非楩楠竊聞天下出産之處收市至多般運赴宫尤傷人力雖云只役軍匠寧免煩擾平民况復軍人亦是黎庶此未便之事一也邇者方畢封崇頗煩經費今兹興造尤耗資財雖府庫之中貨寶山積畚築之下工徒子來然內帑費積代之蓄藏百物盡生民之膏血散之孔易斂之惟難雖極豐盈尤宜重惜此未便之事二也夫聖人貴於謀始智者察於未形禍起隱微危生安逸今雙闕之下萬衆畢臻暑氣方隆作勞斯甚所役諸雜兵士多是不逞小人其或鼠竄郊鄽狗偷都市有一於此足貽聖憂此未便之事三也王者撫御寰區順承天地舉動必遵於時令裁成不失於物宜靡崇奢侈之風罔悖隂陽之序臣謹按月令孟夏無發大衆無起土功無伐大朩今肇基卜築衝冒鬱蒸俶擾厚坤乖違前訓矧復旱暵卒虐雷電迅風拔木飄瓦溫沴之氣比屋罹災得非以失承天地之明效歟此未便之事四也臣竊聆中間符命之文有清淨育民之戒今所修宫閣蓋本靈篇而乃過興剖掘之功廣務雕鎪之巧雖屢殫於物力恐未協於天心此未便之事五也伏望遵祖宗之大猷察聖賢之深戒遷思回慮懲往念來詔將作之官息勤苦之衆輯寧羣品對越高穹如此則遐邇宅心人祗快望必若光昭大瑞須建靈宫將相畢勞聿爰成績則臣敢效愚計亦可必行但能損彼規模減其用度止崇朴素無取瑰竒惟將之以誠明仍重之以嚴潔名數之際加等是宜實費之資節儉為要俾四海之內知陛下愛重民力之意豈不美歟昔太宗皇帝建太一上清等宫亦不使窮極壯麗臣請陛下宜遵而行之取為法制示不敢踰即鳴謙大德光於千古矣奈何特欲過先帝之制作乎并覩西京造太祖影殿東嶽置會真之宫計其工庸亦皆不啻中人百家之産然於尊祖禮神則盛矣其於邦國大計猶未足為當時之急務也臣料陛下必為海內承平邊隅清晏人康俗阜時和年豐縱或築宫無損於事臣復謂其不然方今疆場甫定敵廷有姑息之虞民俗茍安倉箱無紅腐之積况關輔之地流亡素多近甸之氓農桑失望雖令有司安慰亦恐未復田廬秋冬之間飢歉是懼亟經營於神館慮稍鬱於輿情且往古廢興之端前王得失之事布在方册足為商鑒者陛下覽之詳矣試觀自昔人君崇尚土木孰若清靜無為者之安全乎願陛下留神埀聽無忽臣言則天下幸甚今雖上下之人皆知事理如此而人人自愛莫敢輕黷冕旒至於左右大臣則慮計之不從致見踈之悔中外百執則慮言之難達招妄動之尤使忠讜之謀未盡良為此也惟臣出自幽隱遭遇文明特受聖知度越流輩官為侍從身服簮裳粗識安危之機未申補報之效捐軀思奮今也其時又安敢循默茍容不為陛下别白而論之乎是以輒率庸妄輕冒宸嚴感發於中無所顧避陛下寬其鼎鑊之罪矜其螻蟻之誠深監古先試垂採擇無謂增建靈宫為一細事而弗恤臣以為興役動衆尤繫事機不可不察也當使鄉校之中豪姦之黨無所開竊議之口則微臣之望也天下之幸也大中祥符二年六月上時為知制誥上仁宗論玉清宫災蘇舜欽臣聞烈士不避鈇鉞而進諫明君不諱過失而納忠是以懷䇿者必吐上前蓄寃者無至腹誹則上下之情不鬱教令之出悅隨然言之之難不如容之之難容之之難不如行之之難有能言之則必容之容之則必行之如此則欲治之主三代之迹也願陛下留意焉臣伏覩今歲自春徂夏霖雨隂晦未嘗少止農田被災者幾於十九民情嗸嗸如昏墊焉臣謂近位之失人政令之多僻賞罰弗公之所速也天之降災欲悟陛下陛下反謂刑獄濫寃之致故肆赦天下以救之殊不念如此則殺人者不死傷人者不抵罪其為濫寃則又加甚古者決留獄斷滯訟以平水旱不聞用赦也故赦下之後隂霾及今前志曰積寃生隂積隂生陽陽生則火災見焉乖戾之氣發泄於玉清宫震雨雜下烈熖四起樓觀萬疊數刻而盡誠非慢於禦備乃上天示戒也陛下當降服減膳避正寢責躬罪已下哀痛之詔罷非業之作拯失職之民在輔弼無禆國體者去之居左右竊弄威權者去之精心念政刑之失虛懷收芻蕘之言庶幾變災以答天意辰浹之間不聞有此告諭竊知陛下將計功役再謀興修都下之人聞者駭惑往往聚首橫議咸謂非宜皆曰章聖皇帝勤儉十餘年天下富庶帑府流衍無所貯藏乃作斯宫及其畢功而海內為之虛竭陛下即位未及十年數嵗連遭水潦雖征賦咸入而百姓困乏若大興土木之功則費用不知紀極財賦耗于內征役勞于下內耗下勞何以濟矣况天災而已違之是欲競天無省已之意逆天不祥安已難任欲祈厚貺其可得乎豈天譴告而陛下弗悟邪豈知而故為之邪豈再造以祈天之祐邪臣不得不反覆而量也今為陛下計者莫若來吉士去佞人姑務修德以勤至治使百姓足給而寬其征稅則可以謝天意而民情安矣賢君見變能修道以除凶亂君無象天不譴告今幸得天見之變是陛下修道之日豈宜忽哉昔漢宣帝三年茂陵白鶴館災下詔曰乃者火災降於孝武園館朕戰栗恐懼不燭變異罪在朕躬羣有司又不肯極言朕過以至於斯將何悟焉夫茂陵不及上都也鶴館不及此宫也彼尚降詔四方以求巳過是知古帝王急治如此夫火不炎上之罰正為是耳臣謹按前漢五行志云賢佞分别官人有敘率由舊章禮重功勳如此則火得其性矣若信道不篤或耀虛偽讒夫昌邪勝正則火失其性矣自上而降濫熖妄起燔宗廟燒宫室雖興師而不能救故魯成公三年新宫災劉向謂成公信三家子孫之讒逐父臣之應也襄公九年春宋災劉向謂宋公聽讒逐其大夫華弱奔魯之應也今宫災豈得亦有是乎願陛下恭默而內省之省而既知之願陛下悔過而追革之罷再造之勞役行古先之典法非惟大光基業亦天下之幸甚也臣愚妄之言不足益國體之萬一陛下茍容而行之三代兩漢之風指顧可致也宋龔明之中吳紀聞蘇舜欽字子美易簡參政之孫慷慨有大志工為古文聲名與歐陽公相埒天聖七年玉清昭應宫災子美以太廟齋郎詣登聞上疏謂天以此垂戒願陛下恭默自省語甚切直時年方二十登景祐元年進士第俄有詔戒越職言事者子美又上書極論其不可時論韙之按宋史天聖七年六月丁未大雷雨玉清昭應宫災翌日太后對輔臣泣曰先帝力成此宫一火延燔殆盡猶幸一二小殿存爾樞密副使范雍度太后有再葺意乃抗言曰不若燔之盡也太后詰其故雍對曰先朝以此竭天下之力遽為灰燼非出人意如因其所存又復修葺則民不堪命非所以祇天戒也宰相王曾吕夷簡亦助雍言推洪範災異以諫太后默然時舜欽年甚少為太廟齋郎上此奏偉乎壯哉上仁宗論京師土朩勞費歐陽修臣近者為京師土朩興作處多乞行減罷尋準勑差臣與三司公同相度減定續具奏聞次今又聞聖旨下三司重修慶基殿及奉先寺屋宇臣伏見近年政令乖錯綱紀隳頽上下因循未能整緝惟務崇修祠廟廣興土朩百役興作無一日暫息方今民力困貧國用窘急小人不識大計不思愛君但欲廣耗國財務為已利恣侵欺於官物圖酬奬之功勞託名祖宗張大事體况諸處神御殿當蓋造之初務極崇奉棟宇堅固莫不精嚴雖數百年未必損動近年以來不住修換昨開先殿只因一柱損遂換一十三柱前後差官檢計朝廷並不取信只憑最後之言遂至廣張物料蓋緣廣張物料即多酬奬恩澤竊以崇奉祖宗禮貴清淨今乃頻有遷徙輕瀆威靈要其所歸止為小人圖利臣見自古人君好興土朩者自春秋史記厯代以來並皆書為過失以示萬世今小人圖一旦之利黷祖宗之威靈致人主於有過之地誰忍為之臣實痛惜臣因準勑減定於三司略見大槩開先殿初因兩條柱損今所用材植物料共一萬七千五百有零睦親宅神御殿所用物料又八十四萬七千又有醴泉福勝等處物料不可悉數此外軍營庫務合行修造者又有百餘處使厚地不生他物惟産朩材亦不能供此廣費自古王者尊祖宗事神示各有典禮不必廣興土朩然後為能臣切見纍年火災自玉清昭應洞真上清鴻慶壽寧祥源會靈七宫開寶興國兩寺塔殿並皆焚燒蕩盡足見天意厭土朩之華侈為陛下惜國力民財譴戒丁寧前後非一陛下與其廣興土朩以事神不若畏懼天戒而修省其已興作者既不可及則未修者宜速寢停况睦親神御殿於禮不宜作其事甚明别無典禮講求乞更不下太常便行寢罷其慶基殿如的有損漏只令三司差官整補不得理為勞績其奉先寺乞令寺家自修今垂拱殿是陛下常坐之殿近聞為無梁朩且止未修諸皇親自火燒居宅後至今寄寓他所蓋將良材美木俯徇小人並於不急處枉費遂致合行修造處却至乏材伏望陛下追思纍次大火常發於土木最盛處凡國家極力興修者火必盡焚且天厭土朩而焚之又欲興崇土朩以奉之以此福應未臻而災譴屢降也伏乞上思天戒下察人言人言雖狂而實忠天戒甚明而不逺伏惟陛下聖德恭儉不樂遊畋凡所興修皆非嗜好但以難違小人一時之請自取青史萬世之譏實為陛下惜之伏望聖慈廣賜裁擇至和二年上時為翰林學士上仁宗請勿修上清宫包拯臣伏見十一月初二日夜上清宫火謹按春秋傳例曰人火曰火天火曰災漢書五行志曰人火天火同為災異皆以朝廷政令參驗得失而勸戒焉説者曰賢佞分别官人有序則火得其性若信道不篤或耀虛偽則火失其性自上而降濫熖妄起是為火不炎上上清宫者乃祖宗修建以崇無為之德今火燔之者豈焚修之人不務精潔以副陛下嚴奉之旨乎不然其天意埀戒於陛下乎固宜勵精治道謹修人事以答天變可也風聞道路云陛下存留道衆似有繕修之意未辨虛實咸懷危懼况天下多事調發旁午帑藏未實邊鄙未寧豈可先不急之務舉無名之役哉且宫觀興於唐室非古制也若謂先聖真容理當欽奉則景靈宫會靈觀殿宇宏壯可以奉安陛下推仁慈之德念疲敝之民且務安之安之之方豈忍重困之也然外議紛紜頗甚惑衆欲乞特降詔諭以安衆心上仁宗乞罷寶相禪院創建殿宇韓琦臣竊聞右街寶相禪院見在移拆法堂創蓋大悲殿宇特命中官監領其事所役兵匠數千百人假以舟車資其輦運凡百用度悉從官給規模之盛功作甚崇臣計其興建之因恐非陛下之意也臣伏覩近者興國寺雙閣災延及大殿長廊俱為煨燼其寺舊安祖殿俯逼都市衆人之慮再有修葺而陛下亟降旨命悉令停寢任其緣化使自營造斯所以重天戒而愛民力也稽諸載籍事實難行戴履之倫孰不欣幸何乃遽傷治體有損邦用起無名之役為不急之務乎所謂恐非陛下之意斯可明矣又向者陛下崇務本之仁念維城之重即昭應之遺址建睦親之大第諸邸之聚三千餘間常度不充侵用南郊材植又且萬計復令出産州郡供補其闕物役之大從可知矣今者業已成功焯為熙事何則厚宗枝而隆孝治豈無益之所為乎當時言事者猶比上封章願寢斯議蓋亦重改作而節浮費也臣謂此役既終即凡土朩不急之事一切宜停以緩財力夫崇采椽三等之制者唐堯之仁化也惜露臺百金之産者漢文之儉德也煥在方牘所宜規範伏望陛下俯從愚説逺紹前徽悟色相之非求本慈仁之足尚躋民壽域永底太平斯乃奉順祖宗愛養元元之本也其寶相院創蓋殿宇等臣欲乞詔下有司令悉停罷俾其營求施利得自修崇蓋此殿若成則法堂未立加之廊宇制度悉求相稱必於間隙漸次申陳事既垂成理須從許如此則功費之廣倍於初矣利其成而規賞典者其徒亦繁矣且罷興國而營寶相則是休彼役而勞此功廢置雖殊耗蠧豈異臣又慮違陛下重天戒愛民力之本意故昧死陳述冀禆萬一景祐三年七月上時為左司諫上仁宗乞罷迎開寶寺塔舍利余靖臣伏見開寶寺塔為天火所燒五行之占本是災變朝廷所宜戒懼以答天意尋聞遣人於塔基掘到舊瘞舍利內庭看畢送還本寺許令士庶燒香瞻禮者道路傳言舍利在內庭之時頗有光怪臣恐巧佞之人因此推為靈異惑亂視聽先自內庭外及四方抄斂錢物再圖營造臣忝備諫職見此事體不可不言臣聞帝王行事但能勤儉修德感動人心則雖有急難後必安濟臣觀今天下自西陲用兵以來國帑虛竭民間十室九空陛下若勤勞罪巳憂人之憂則四方之民咸蒙其福矣如其不恤民病廣事浮費奉佛求福非所望於當今且佛者方外之教理天下者所不取也割黎民之不足奉庸僧之有餘且以侈麗崇飾甚非帝王之事或有戒臣者曰若有營造必不出於府庫但取內庭無用之物凖其直而與之亦不誅求於民任自僧徒化其願施之者積歲纍月而成之庸何傷哉臣應之曰天下之民皆厭賦役之煩不聊其生至有父子夫婦携手赴井而死者其窮至矣陛下若恤民之病取後宫無用之物內帑有餘之幣出助邊費勿收中民一年田租明降指揮布告中外此則陛下結天下之心感召和氣雖造百塔無以及之若作無用浮侈之事民益怨矣又二年以來減省後宫請給皆言內中煎迫不似往前今一旦捨施則財物無紀何以取信四方哉切緣市井之人有知者少既見內庭崇奉則遽相扇動傾箱竭槖為害滋深若以經火不壞便為神異則本在土底火所不及若言舍利能出光怪必有神靈所憑此妄言也且一塔不能自衛為火所壞又何福可庇於民哉今朽朩腐草皆有光水精及珠之圓者夜亦有光况舍利本西方怪異之物有光亦非今日之瑞昔梁武帝造長塔舍利亦常有光及臺城之敗何能致福視此可以監之矣其開寶寺舍利塔伏乞指揮更不營造上以見陛下不惑之明下以昭國家愛民之意仍乞更不迎入內中供養且僧人軍校皆呼舍利入宫不祥之語尤宜謹之其燃頂爛臂之人亦乞禁絶慶歷四年六月上時為右正言上仁宗乞罷修開寶寺塔蔡襄臣數日聞迎舍利歸開寶寺臣始疑之以為必無此事屢以愚言乞賜寢罷不蒙聽納今又聞民間傳言皆謂陛下欲重修開寶寺塔伏念陛下必以邊事為憂蒼生為意豈有枉費施於無用然慮僧徒妄引靈怪以惑聖聰臣請悉推意而盡言之或以舍利有光引為靈驗臣謂浮屠舍利之所居不能護惜天火所焚一夕而盡豈可謂之神靈枯朽之物灰燼之餘或有光怪亦妖僧之所為也或以此塔太宗皇帝所造理須修復臣謂昭應宫上清宫皆先朝所置天火一空已不復修孰有非議若以禁中共出資財不費於官不擾於民臣謂一塔之費百萬緍一錢之資皆生民膏血當此多事匱之之時豈可虛費若施於土朩果有福利以之助軍須而寬民力此豈獨無福利哉况天火所焚大為警戒陛下當修人事以報之今大興工役是以人力而拒天意也伏惟陛下聖哲聰明必無此意人言不已臣實憂疑所有開寶寺塔如有乞修復者伏望陛下特加深罪以絶欺妄慶歷四年六月上時知諌院上仁宗乞罷修寶相寺何郯臣伏聞朝廷近有指揮以寶相寺昨遭焚蕩許令寺僧緣化修葺蓋朝廷重糜府庫之財又不欲遂廢其寺故有此處分以臣愚心思之其間尚有利害不可不論訪聞寺僧主事者素豪猾善結託今既開端許其緣化彼將假朝廷之命以脅誘民庶多求財貨則京師騷然侵蠧蓋其意不惟以修寺為事將圖財用為奉身恣縱之資或民力不足則將因緣權幸復求朝廷出府庫之財以畢其事此必然之理也假使民力可辦於國家雖無所費亦不可許方今公私財力大屈凡起一事興一役未嘗不取於民外方之民已困數斂惟京師之民幸而未加橫賦緩急有事亦將不免固不可使之輕費家資以奉土朩不急之務朝廷頃年修寺舍佛閣已費纍巨萬一旦遂為煨燼况外議傳云寺僧常以婦人置於佛閣昨火發之際焚死者數人若傳者果信是朝廷廣費財以崇奉佛事適足為羣僧淫戲之所近日主首坐遺火罪止於奪師名紫衣寬假巳甚不可更啓其姦弊重耗民財也臣按春秋或書災或書火其名雖殊然於變異之兆其實同歸定哀之間兩觀桓僖宫災漢儒皆謂天燔其所不當立今寺舍之災豈非以雕靡之過不當立而立天命燔之亦如兩觀等災以示勸戒乎若有重議修之非所以畏上天之譴告伏望陛下追觀前事之監深究異祥之來無興功以答天戒其寺舍佛閣欲乞一切罷修用示聖懷抑畏之美臣以朴愚誤蒙擢進茍有聞見不敢不陳惟聖明不以狂妄廢其言則死生幸甚皇祐元年上時為殿中侍御史乞罷修壽星觀司馬光臣等前者伏覩陛下幸壽星觀奉安真宗御容當是時臣等不知事之本末未敢進言自後方知本觀舊日止有先帝時所畫壽星近因本觀管幹內臣吳知章妄有奏陳稱是先帝御容意欲張大事體廣有興修自為勞效别圖恩賞陛下天性仁孝以為崇奉祖宗重違其請遂更畫先帝御容以易壽星之像改為崇先觀知章既得御容倚以為名姦詐之心不知紀極乃更求開展觀地别建更衣殿及諸屋宇將近百間制度宏侈計其所費踰數千萬向去增益未有窮期臣等竊以祖宗神靈之所憑依在於太廟朩主而已自古帝王之孝者莫若虞舜商之高宗周之文武未聞宗廟之外更廣為象設然後得盡至誠也惟高宗祭祀親廟微為豐數故傅説曰黷于祭祀時謂弗欽禮煩則亂事神則難祖已曰祀無豐于昵蓋規之也後至漢氏始為原廟當時醇儒達禮者靡不譏之况畫御容於道宫佛寺而又為壽星之服其為黷也甚矣且又太祖太宗御容在京師者止於興國寺啓聖院而已真宗御容已有數處今又益以崇先觀是亦豐于昵也無乃失尊尊之義乎原其所來止因知章妄希恩澤乃敢恣為誣罔興造事端致陷朝廷於非禮今既奉安御容難以變更若只就本觀舊來已修屋宇固足崇奉所有創添屋宇伏乞一切停寢止令有司以時侍奉所有知章誣罔聖聰依託御容妄有干請廣興力役乞下所司取勘窮治姦狀明正其罪取進止嘉祐七年十二月三日上乞罷修感慈塔司馬光臣伏聞感慈塔巳有聖旨坼修五層竊以開封府界京東京西河北河東陜西西川等路自去冬少雪今春少雨麥田已無所收昨得五月十三日雨方種秋田自後又經一月無雨萌芽始生隨復焦稿農民嗷嗷大率無食棄去鄉里流離道路雇妻賣子以接餱糧縣官倉廪素無蓄積贍給軍衆猶恐不足固無贏餘可以賑貸陛下當此之際所宜側身刻意降服損膳以救其患而更修此佛塔以費國財臣竊以為失緩急先後之務矣且此塔傾欹為日已久借使更經數年不修於僧徒有何大害若百姓飢窮朝不及夕而國家不能收恤則老弱轉死溝壑壯者散為盜賊當是之時雖有千塔將安用之夫府庫之財皆生民膏血茍非事不得已安可輕費今有司既諂諛茍且曾不為陛下愛惜陛下又不以介意一皆聽之使四海蒼生將何所依仰臣愚欲望陛下親發德音宣諭有司以今嵗旱災且罷修此塔及其餘不急之費有似此類者皆令有司條奏以聞一切寢罷候他年豐稔帑藏有餘然後徐議其事於聖政之初亦足以彰愛民之意為盛美之一事也取進止治平元年五月十五日上乞停寢京城不急修造司馬光臣伏見近日以來修造稍多只大內中自及九百餘間以至皇城諸門并四邊行廊及南薰門之類皆非朝夕之所急無不重修者役人極衆費財不少此蓋陛下纘極之初禁庭之中誠有破漏不可居者陛下略命整葺理亦宜然而左右之臣便謂陛下好興土朩之工遂廣有經度雖不至損壞之處亦毁拆重修務以壯麗互相誇勝外以希旨求知內以營私規利萬一陛下更因此賞之則營造之端猝無窮已國財必竭民力必殫臣竊惟陛下新臨天下惠澤未孚於民而以好治宫室流聞四方非所以光益聖德也修造勞費不可勝數臣請且言諸州買朩一事擾民甚多衙前皆厚有産業之人每遇押竹木綱散失陪填無有不破家者先帝躬履節儉宫室苑囿無有增飾故諸場朩材皆有羡餘屢因赦恩放免買朩以寬民力自頃修造倍多諸場材朩漸就耗減有司於外州科買百端營致尚恐不足而工匠用之賤如糞土昔漢文帝惜十家之産罷露臺而不作今諸場前後所積竹朩何啻十家之産陛下至仁若察其所從來得不為之愛惜乎况即今在京倉庫踈漏甚多皆以上件數處興工占使匠人物料未暇修葺致粟帛之類大有損敗古者將營宫室宗廟為先廄庫為次宫室為後今之所修緩急先後無乃未得其宜乎又皇子生而富貴年未及冠所宜示以朴素端其所習今聞所修三位規摹侈大又復過於祖宗之時皇子所居漢明帝曰我子何得比先帝子此恐非所以納之於義方也臣愚伏望陛下特降聖旨一應大內裏外舍屋即目不至大段損壞之處及不至要切如南薰門之類並罷興修其皇子位只因舊屋夾截修整早令畢工不得過為宏壯且令那減匠人物料修倉庫之損壞者所司諸處監修之官自是本職更不與減年磨勘及轉官酬賞以塞泰侈之源使天下皆知陛下去奢從儉仁民愛物不亦美乎取進止治平二年五月十一日上乞罷修太乙宫文彥博臣伏見修建太乙宫為民祈福臣聞太乙天神之貴者天道貴質凡所營繕理宜簡質不務雕鏤之巧不事金碧之華不重費不太勞不日成之神明安之虔潔之誠內充天人之心交感神應之福其理必然臣又見纍年以來禁中營造不已般運木石鳩集丁匠殆無虛日既有專切提舉修內司復置都大提舉內中修造司誠恐所司各以宏麗取悅上心一作未畢一作復興新舊相形不極不已國財民力豈易支供臣伏見陛下督責水官以利農畝必思夏禹卑宫室盡力乎溝洫勵精庶政勤恤民隱必思漢文罷露臺思百家之産臣伏願陛下亟勑中外不急營造一切權罷即國用無窮民力稍寬臣又見繼聖堂祖宗燕射之地今為造弩樁所運斧斤置爐煆喧煩褻瀆理恐非宜詩云維桑與梓必恭敬止况祖宗之舊迹乎乞將製造弩樁移置他所或歸之有司則重明麗正之廷加之嚴潔奉先孝思之心益以光顯臣職在樞管主調兵匠義當獻納區區下誠伏望采察熙寧四年上上徽宗止建火星觀以􅓙赤氣任伯雨臣聞天人之交不啻影響災祥之來必有象類故格主先正厥事而聖人惟能畏天嘗聞修德以弭災未有因祈禳而消變者也六經所載百世可知臣風聞近日內臣打量太乙宫側欲建火星觀以禳赤氣之異臣始聞之中心不信亦既纍日傳者益衆臣為諫官當救其源聞雖未詳敢不先事犬馬之心誠不能已竊惟陛下即位以來災異屢降蓋天之於人君猶父之於其子愛之深則教之至數有災異或者欲陛下戒懼以謹厥初歟陛下固宜小心修德克已正事謹按洪範以五事配五福説者謂視之不明是謂不哲時則有赤祥陛下當益廣聰明判别賢佞攬權綱以信賞罰專威福以察功罪使皇明赫赫事至必斷則乖異之象轉為休祥昔太戊有桑楮之妖高宗有鼎雉之異皆能寅畏克正厥事成中興之功延過厯之年未聞勞人費財留心土朩也若使修德之效不及祈禳則聖人六經何獨不載又或祈禳有感修德不應則無私之上天顧可以私禱乎陛下必若建此臣竊計其費不下萬金將取之有司邪則帑藏空虛取之內庭邪則括刷巳迫河北一路物貴人飢前年至今流移滿道與其捐所急以事無用孰若緩所用以恤所急如此則所費有名所惠成德人人鼓舞天下相慶皆謂陛下損已便民道光前古人心恱而天意得矣赤氣之異豈不轉而為祥哉臣伏願陛下逺稽格王仰測天意畏之以心謹之於事不泥世俗之論罷去祈禳之役則人情自孚上穹昭答矣建中靖國元年正月上汴京遺迹志卷十四
