body:
  text: 汴京遺迹志卷七明李濂撰河渠三附京畿溝洫暨堤閘渡口潭泊蔡河蔡河貫京師為都人所仰兼閔水洧水潩水以通舟楫閔水自尉氏歷祥符合於蔡是為惠民河洧水自許田注鄢陵東南歷扶溝合於蔡潩水出鄭之大隗山注臨潁歷鄢陵扶溝合於蔡凡許鄭諸水悉會焉猶以其淺涸故植朩橫棧為水之節啓閉以時建隆二年四月太祖命中使浚蔡河設斗門節水自京師距通許鎮三年詔發畿甸陳許丁夫數萬浚蔡河南入潁川其自尉氏北流至汴京戴樓門東廣利水門入城名西蔡河接閔水繚繞城內其從陳州門西普濟水門出城流經通許復接舊蔡河名東蔡河即所謂惠民河也又至陳州東南蔡河口入於沙河以通陳蔡汝潁諸州之漕運元世祖至元二十七年黃河決祥符之義唐灣而西蔡河上源由是湮塞其汴河下流亦皆淤塞而不能東達淮泗其水亦入蔡河焉後以其水淺不能行舟乃立閘以積水洪武初自裏城東南置小朩閘一十有九以行舟楫洪武三十二年黃河泛溢而河及閘俱被湮廢今南薰門內東西有河積水弗涸不復通舟楫矣是河之上有東西二橋見存東曰小橋直對南薰門西曰雷家橋在今南察院前即巡撫治所也金水河金水河一名天源本京水導自滎陽黃堆山其源曰祝龍泉太祖建隆二年春命左領軍衛上將軍陳承昭率水工鑿渠引水過中牟名曰金水河凡百餘里抵都城西架其水橫絶於汴設斗門入浚溝通城濠東匯於五丈河公私咸利焉乾德三年又引貫皇城歷後苑內庭池沼水皆至焉開寶九年帝步自左掖按地勢命水工引金水由承天門鑿渠為大輪激之南注晉王第真宗大中祥符二年九月詔供備庫使謝德權決金水自天波門並皇城至乾元門歷天街東轉繚太廟入后廟皆甃以礲甓植以芳朩車馬所經又纍石為間梁作方井官寺民舍皆得汲用復引東由城下水竇入於濠京師便之神宗元豐五年金水河透水槽阻礙上下汴舟遣宋用臣按視請自板橋别為一河引水北入于汴後卒不行乃由副堤河入于蔡以源流深逺與永安青龍河相合故賜名曰天源先是舟至啓槽頗滯舟行既導洛通汴遂自城西超字坊引洛水由咸豐門立堤凡三千三十步水遂入禁中而槽廢然舊惟供灑掃至徽宗政和間容佐請于七里河開月河一道分減此水灌溉內中花竹命宋升措置導引四年十一月畢工宣和元年六月復命藍從熙孟揆等增堤岸置橋槽壩閘濬澄水導水入內內庭池籞既多患水不給又於西南水磨引索河一𣲖架以石渠絶汴南北築堤導入天源河以助之見諸宋史者如此自金元以來淤塞不存矣五丈河五丈河在安逺門外唐武后時引汴水入白溝接注湛渠以通曹兖之賦因其濶五丈名五丈河即白溝河之下流也唐末湮塞周世宗顯德四年疏汴水入五丈河自是齊魯舟楫皆達于汴宋太祖建隆二年正月遣使往定陶規度發曹單丁夫數萬以浚之嵗漕上供米六十二萬石太祖曰勞民奉已朕不忍為今浚河不獲已也三月幸新水門觀放水入河先是五丈河泥淤不利行舟詔左監門衛將軍陳承昭於京城之西夾汴水造斗門引京索蔡河水通城濠入斗門俾架流汴水之上東進於五丈河以便東北漕運公私咸利三年正月遣右龍武統軍陳承昭護修五丈河車駕臨視賜承昭錢二十萬乾德三年京師引五丈河造西水磑太宗太平興國三年正月命發近縣丁夫浚廣濟河其河自汴城西則名白溝由善利水門東北則名五丈其實一河也宋又更名廣濟河金元以來纍經黃河泛溢淤塞王文正公筆録國初方隅未一京師儲廩仰給惟京西京東數路而已河渠轉漕最為急務京東自濰密以西州郡租賦悉輸沿河諸倉以備上供清河起青淄合東阿歷齊鄆涉梁山濼濟州入五丈河達汴都嵗漕百餘萬石所謂清河即濟水也而五丈河常苦淤淺每春初農隙調發衆夫大興力役以是開濬始得舟楫通利無所壅遏太祖皇帝素知其事尤所屬意至嵗中興役之際必輿駕親臨督課率以為常先是春夫不給口食古之制也上惻其勞苦特令一夫日給米二升天下諸處役夫亦如之迄今遂為永式六丈河六丈河在封丘門外相傳宋時恐河水為患開鑿此河以殺其勢諺曰爾有三丈水我有六丈河即此河也洪武二十四年及三十二年兩遭黃河泛溢淤塞太黃寺河太黃寺河一名掃頭河在城東北三十五里即黃河之支流也伯俞河伯俞河在城西南三十里八角保伯俞村古孝子伯俞居此故名下流南經朩魚寺北合汴水至通許清水口入黃河蓋其河自中牟界東流至八角保則名伯俞河下至新倉則名安家河至鄭店則又名魯溝河隨地而異名其實一河也掣水河掣水河有二一在城南戴樓門外東流一在城東揚州閂外南流二流奔至東南合而為一南至赤倉保鍾家岡入于黃河其河之名古未有也永樂二年因河水為患城之內外積水不涸有司督率軍夫始開導以利民是後河雖溢流而水不復入城矣沙海沙海在城西北一十二里按戰國策齊欲發卒取周九鼎顔率説曰夫梁之君臣欲得九鼎謀于沙海之上為日久矣蓋謂此也隋文帝疏鑿舊迹引汴水習舟師平陳後立碑其側以紀功纍經河水淤平莫詳其處白溝白溝無山源每歲水潦甚則通流才勝百斛船踰月不雨即竭至道二年三月內殿崇班閻光澤國子博士邢用之上言請開白溝自京師扺彭城吕梁口凡六百里以通長淮之漕詔發諸州丁夫數萬治之以光澤護其役議者非之會宋州通判王矩上表極陳其不可且言用之田園在襄邑嵗苦水潦私幸渠成遂罷其役咸平六年用之為度支員外郎又令自襄邑下流治白溝河導京師積水而民田無害神宗熙寧六年都水監丞侯叔獻請儲三十六陂及京索二水為源倣真楚州開平河置閘則四時可行舟因廢汴渠帝曰白溝功料易耳第汴渠嵗運甚廣河北陜西資焉又京畿公私所用良材皆自汴口而至何可遽廢王安石曰此役茍成亦無窮之利也當别為漕河引黃河一支乃為經久馮京曰若白溝成與汴蔡皆通漕為利誠大恐汴河終不可廢帝然之詔劉璯同叔獻覆視八月都水監言白溝自濉河至于淮八百里乞分三年興修其廢汴河俟白溝畢功别相視仍請發穀熟淤田司并京東汴河所𨽻河清兵赴役從之七年正月都水監言自盟河畎導汴南諸水近者失於疏浚為害甚大於是輟夫修治而白溝之役廢初王安石欲罷白溝修汴南水利帝曰人多以白溝不可為而卿獨見可為安石曰果不可為罷之誠宜若可為即俟時為之何必計校人言也徽宗政和二年十月都水監丞孟昌齡言開濬含暉門外白溝河開堰放水仍舊通流京畿溝洫汴都地勢廣平賴溝渠以行水潦真宗景德二年五月詔開京城濠以通舟楫毁官水磑三所三年分遣入內內侍八人督京城內外坊里開濬溝渠先是京都每嵗春疏濬溝瀆而勢家豪族有不即施工者帝聞之遣使分視自是不復有稽遲者以至雨潦暴集無所壅遏都人賴之大中祥符三年遣供備庫使謝德權治溝洫導太一宫積水抵陳留界入亳州渦河五年三月帝宣視宰臣曰京師所開溝渠雖屢鈐轄仍令內侍分察吏擾仁宗天聖元年八月東西八作司與內殿承制閣門祗候劉永崇等言內外八廂創置八字水口通流兩水入渠甚利慮所置處豪富及勢要阻抑乞下令巡察從之二年七月內殿崇班閣門祗候張君平等言凖勑按視開封府界至南京宿亳諸州溝河形勢疏決利害凡八事一商度地形高下連屬開治水勢依尋古溝洫浚之州縣計力役均定置籍以主之二施工開治後按視不如元計狀及水壅不行有害民田者按官吏之罪令償其費三約束官吏毋斂取夫衆財貨入已四縣令佐州守倅有能勸課部民自用功開治不致水害者敘為勞績替日與家便官功績尤多别議旌賞五民或於古河渠中修築堰堨截水取魚漸至澱淤水潦暴集河流不通則致深害乞嚴禁之六開治工畢按行新舊廣深丈尺以校工力以所出土於溝河岸一步外築為堤埒七凡溝洫上廣一丈則底廣八尺其深四尺地形高處或至五六尺以此為率有廣狹不等處折計之則畢工之日易於覆視八古溝洫在民田中久已淤平今為賦籍而須開治者據所占地步為除其賦詔令頒行神宗熙寧元年三月都水監言畿內溝河至多而諸縣各役人夫開淘十才二二須二三年方可畢工請令府界提點司選官與縣官同定緊慢工料據合差夫數以五分夫役十分工依年分開淘提點司通行點校從之二年閠十一月詔以府界道路積水妨民輸納命都水監差官溝畎元豐五年詔開在京城濠闊五十步深一丈五尺地脈不及者至泉而止徽宗大觀元年七月以京城霖雨水浸居民道路不通遣官分督疏導是月又詔自京至八角鎮積水有妨行旅轉運司選官疏導修治橋梁毋使病涉李綱論都城積水為害疏臣伏覩陛下以積水暴集淹浸民居迫近都城纍降御筆處分遣官固護隄防拯濟漂溺仰見陛下聖慮焦勞曲盡防患之理臣竊謂國家都汴百有六十餘年未嘗有變故今事起倉卒逺邇驚駭誠大異也臣嘗躬謁郊外竊見積水之來自都城以西漫為巨浸東拒汴堤停蓄深廣湍悍浚激東南而流其勢未巳以宗廟社稷之靈恃雉堞防守之固萬無他虞然或浸淹旬時因以風雨有不可不慮者此誠陛下寅畏天戒博詢衆謀之時而群臣竭智效力捐軀報國之秋也纍日以來傾耳以聽缺然未聞臣竊怪之夫變異不虛發必有感召之繇災害非易禦必有銷去之䇿周官於國危則有大詢之禮臣愚伏望陛下斷自淵衷特詔廷臣各具所見以聞擇其可採者非時賜對特加施行因衆智協衆力濟危圖安上以答天地之戒下以慰億兆之心天下不勝幸甚臣仰荷陛下天地父母之恩親加識擢得侍清光常思奮不顧身以徇國家之急輒有已見急切利害事須面奏伏望聖慈降旨閣門許臣來日因侍立次直前奏事庶幾得盡狂瞽仰禆聖意之萬一宣和元年六月上時為起居郎李綱論都城積水第二疏臣近嘗奏請以水潦為患乞賜燕間敷陳利害今月十四日崇政殿侍立閣門傳旨令臣先退惶懼戰栗居家待罪不敢供職聖恩寬厚未奉誅責日夕惴恐局踳無地伏念臣愚憃孤立惟知仰事陛下以國家為心比見積水暴集逼浸都城私憂過計輒貢狂瞽情迫意切言皆不倫自干雷霆之威死有餘罪自非陛下恕其愚直天地父母矜而憐之誰復為臣言者竊以水旱之災雖堯湯有所不免惟聖人為能遇災而懼側身修行博詢衆謀以銷去之故堯於洪水方割之時有疇咨之言湯於旱既太甚之日有六事之責皆轉災以為福易沴以為和此古聖人之明驗也今者水患之來起於倉猝人心惶懼逺邇震驚仰賴宗社之靈陛下睿算之審屢降御筆處分疏導巳漸退落雖畿甸旁近皆罹其災而都城無虞人心漸定臣竊謂水災既退之後朝廷未可以為無事正宜謀究利害增其固防寅念天戒益以修省不可忽也臣愚戅不揆輒復昧死上便宜六事一曰治其源二曰弱其勢三曰固河防四曰恤民隱五曰省煩費六曰廣儲蓄惟陛下留神幸察臣恭惟國家卜世定鼎建都大梁平原沃野彌望千里非有高山峻嶺為之險阻而都城以西京索交流陂澤相接自西徂東地勢傾下加以雨淹不能吞納則決溢東注俯灌都城其勢然也為今之計莫若相視陂塘疏導京索增卑培薄固以隄防節以斗門旱則水有所泄雖經霖雨其勢不能接連城下可以為萬世之利此則治其源之策也臣觀自昔善捍水患者必為長堤以制其衝意謂以數仞之城而拒方至之水風濤之所鼓薄亦已危矣限以長隄殺其怒勢然後人力可施而城益堅今積水之來自都城之西浩如江湖東抵汴岸南阻新隄雖停蓄深廣而卒不能至城下者有隄以為之阻也由隄而行散漫湍激至都城之南則徑抵護龍河者無隄以為之阻也為今之計莫若拒城數里之外因高地勢繚以長隄使雖有積水決溢之患循隄四瀉不能薄城可以禦一時之急此則弱其勢之䇿也國家都汴處大河之下流其所恃以為固者掃岸堅而法制嚴也比年以來玩習茍簡護衛之卒散於抽差備禦之儲耗於轉易河嚙隄防日朘月削恬不加恤如廣武掃其距清汴才百餘步去東危亦屢矣其不決溢者特幸耳使夏秋之交乘霖雨湍暴之勢果能保其無虞乎夫以陂澤積水暴集之患猶可驚駭况大河之勢可不為之深慮哉臣愚願擇深知河事者相地形回清汴使與大河相逺仍詔有司遵守法制存留兵卒儲積材用敢有抽差轉易者必正典刑此則固河防之策也今茲積水之來衝白沙蕩中牟迫都城散漫畿甸之邑淹浸屋廬漂溺民畜損傷苗稼不可計數今又決其南以注於陳蔡之郊決其北以注於相衛之境疏汴渠之下流於陳留則數千里之內悉被其患矣陛下惻怛憂勞降詔拯濟德意甚厚臣猶竊慮州縣監司未能悉意奉行也願詔諸路災傷地分今年秋租並與蠲免水過之後安集民居借貸賑濟務令復業無使失所以副陛下之意此則恤民隱之策也臣竊惟去嵗江淮泛溢東南之民悉皆流移賴陛下聖慈以六路上供米斛廣加賑濟民得無死德至渥也然州縣蕭條帑廪匱乏逮今未復今畿甸旁近又有積水之患矣何以堪之臣愚願陛下斷自淵衷凡營繕工役花石綱運有可省者悉令減罷數年之間民力漸復國用稍足然後惟陛下之所命且裕民豐財莫此為大臣所謂罷不急之務者此也臣又惟古者九年耕必有三年之蓄二十七年必有九年之蓄然後無旱乾水溢之患教化行習俗美而頌聲興是為太平治之至也祖宗以來舊有封樁米斛以千萬計所以為兵民之備宗社之本也比年以來工役浸多仰食者衆嵗以侵耗遂以殫竭今國計所仰者獨東南六路轉輸嵗額耳假使一方水旱嵗額不登將胡以自給靜以思之可為寒心臣愚願陛下明詔有司裁冗食者幸嵗豐登自朝廷多降糴本委強幹官吏廣行收糴别項上供以充封樁之數嵗嵗一如祖宗舊額而後止此朝廷之所優為何不留意而獨為此凛凛也養兵足國莫是為急臣所謂廣國計之儲者此也凡此六者皆當今之要務顧臣智識淺陋文字荒踈言不足以達意惟陛下裁擇下臣章宰執議其可否如可採録望與施行臣比者嘗獻愚計伏蒙聖慈寬假未賜鈇鉞之誅輒復自竭冒昧天聽庶幾芻蕘之言有補萬一宣和元年八月上堤閘渡口潭泊諸迹堤隋堤一名汴堤在汴河之上隋煬帝大業元年命尚書左丞皇甫誼復西通濟渠作石陡門引河水入汴汴水入泗以通于淮築堤樹柳御龍舟行幸以達于江都人稱其堤曰隋堤護城堤離城三里一名三里堤西北接金村繞城圍抱東南直抵蘇村蓋前代築以防水者後被河水衝圯國朝正統間巡撫侍郎于謙因河逼汴城乃築東西圮三面以禦之範鐡犀勒銘其背以鎮永逺景泰二年巡撫都御史王暹補築南面與東西相接凡四十餘里號大堤焉天順五年侍郎薛逺因河入汴城乃於麗景門置石閘以泄內外積水落藜堤在固子門外西北其地方生落藜故名髙門堤在固子門外西北西連落藜堤因在梁惠王古城髙門之北故名金村堤在城西北西接髙門堤因在金村之側故名十八里堤離城一十八里西北接封丘縣界東南抵窑務保太平岡前代築以防水後被河水衝圯夾堤在固子門外宋時所築以夾護金水河西接中牟東抵外城後圯于河掃頭堤在城東北馬尾墻保元時所築以防河患東接陳留縣境西抵陳橋接岡堤在城西永安保西接沙岡橫堤在鄭門外南接大堤北抵接岡堤婁堤在城東婁堤保南北約十里餘汴護堤在城西舊汴河北岸金水堤在裏城外西至固子門東抵城濠閘小木閘在裏城外之東南惠濟閘在陳州門外獨樂閘在城東南白墓子岡之東赤倉閘在城東南赤倉保之西萬龍閘在城東南赤倉保之南以上諸閘俱為蔡河而設元末廢壞洪武初重修二十四年黃河南徙蔡河及閘皆為淤塞不復可見矣渡口杏花營渡在城西南十五里八角渡在城西南三十里俱路通中牟縣白墓子岡渡在城東南十五里赤倉渡在城東南三十里俱路通通許縣梁家淺渡在城南十五里路通尉氏縣以上五渡俱濟黃河以河徙而廢陳家口渡在城東南二十里善善李渡在城南二十五里俱通尉氏縣清水河渡在城南三十里以上三渡俱濟黃河之支流亦以河徙而廢潭蓮花潭在城東十里清水潭在城西三十五里龍潭在城外四十里南北堤口有左右二潭嵗旱禱雨輒應赤倉潭在城東南四十五里泊刺史泊在城東南鄭店保南楊子岡泊在城東北霍赤岡保楊六郎宅水泊在裏城內西北龔家泊冉家泊牛家泊俱在城西南八角保以上諸迹俱湮于河水無復存者矣汴京遺迹志卷七
