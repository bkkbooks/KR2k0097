body:
  text: 汴京遺迹志卷二十明李濂撰藝文七賦皇畿賦宋楊侃有賦家者流欲馳名於當世思著詠於神州忽念前古深懷景慕誦二京於張衡覽兩都於班固於是輟卷意慙閣筆心伏讓而謂臣請書簡牘臣辭不獲已而謂之曰子讀二子之賦而知兩漢都邑之制宮殿之麗而未知大宋畿甸之美政化之始也豫幸得職採風謠官參儒雅千里之郊圻是巡八使之軺車斯假若夫大邑名城神臯沃野畫地可記濡毫可寫至於宮禁之深嚴豫未聞也都城之浩穰衆所覩也是故彼述其內子言其外蓋萬分之舉一難盡述而備載昔者唐綱不振國鼎將遷俄梁室之革命啓浚都而應天既觀法於左崤右隴亦取則於西澗東瀍大矣雄圖昭然聖謨謂陳留天下之衝要謂大梁海內之膏腴漢祖得之則齊楚之敵敗亡相繼咸就擒而即誅梁王守之則七國之師不敢西向盡為馘而為俘實王氣之長在宜萬世而作都也莫不廣封溝設險固襄平割宋之美田戴邑裂曹之沃土滑分屬邑之二城陳減太康之萬户潁川之鄢陵扶溝滎陽之中牟陽武咸命落編民於州籍升地圖於天府故得雄臨九州陋視三輔經營歷於五代法則垂於萬古皇宋之受命也太祖以神武獨斷太宗以聖文誕敷平江表破蜀都下南越來東吳北定并汾南取荆湖是故七國之雄軍諸侯之陪臣隨其王公與其士民小者十郡之衆大者百州之人莫不去其鄉黨率彼宗親盡徙家於上國何懷土之不聞甲第星羅比屋鱗次坊無廣巷市不通騎於是有出居王畿挂户縣籍興産樹業出賦供役者矣豈比夫秦選户口於咸陽漢徙豪傑於陵邑魏將實於河南驅冀民而是入也今聖上之在東宮也尊以皇儲尹兹京邑視政之初民訟雲集莫不察之以情偽辨之以曲直發伏禁姦親剸繁劇既而桴鼓不鳴豪右斂迹吏不敢欺民用懷德若乃龍樓曉出奉法謹身教民以事父也親拜師傅降禮國儲教民以事師也公退則侍講在前出入則四賔是翼尚老尊學與民為則是時王畿之內易俗移風以至正南靣居域中由內及外化行令從是君上德惠素立而正教早崇也若乃鋭旅百營髙城千雉孫武教陳吳起撫士其齊如林其猛如虎手擊利劍足張強弩躍馬奪槊投石拔距入則訓練出無征戰身間賞厚家有餘羡是故擁強兵衛近甸如大郡雄藩為屏為翰者且有九縣尉氏咸平陳留雍丘襄邑太康考城東明陽武也天設二渠曰蔡曰汴通江會海縈畿帶甸千倉是興萬庾是建杜預主計劉晏司漕何貢何輸吳粳楚稻月致百萬猶責其少漢之太倉積粟紅腐使彼粒而計之未及我斗量之數成王之庾萬箱以供未若我千艘往來運江淮而無窮是故備九年之儲充六軍之給當津處要山積雲入者復有五邑陳留雍丘襄邑尉氏咸平也若乃總戎者貴領專城宰邑者上應列星簿既資髙尉亦秩清率兵守戍者五鎮建雄義聲園城馬欄萬勝鎮皆置甲士防守有使臣掌領之統騎分巡者兩路府界東西兩路各置都同巡檢二人城隍之外遊徼四布京城四靣巡檢各一人桓桓八臣是警是護謂東西兩路洎京城四靣巡檢使臣共八人也郊原膴膴春草萋萋邊烽不警牧馬爭嘶廄空萬櫪野散千蹄陂間牧南汴河已南縣邑長陂廣野多牧放之地沙平走西中牟已西地廣沙平尤宜牧馬一飲空川一齕空原去如霧散來若雲連地廣馬多古未有焉若乃任土出於民心獻芹比於古俗園茄早實時果先熟瓜重南門笋宜修竹鬻於市兮利既兼倍進於君兮恩必霑沐時或戴勝降桑螻蟈未鳴野人登麥以先至蠶婦貢絲而已成别有襄陵之桃楊夏之柿朱櫻宜於谷林丹杏出於尉氏其或陽鄉千樹之梨扶樂千樹之栗比封千户之侯亦何讓於昔日鹹壤宜北鄉之羊野蓑美東邑之豕魚鱉鳬鴈之盛西有陂兮萬頃菱芡蓮藕之美東沿堤兮百里其或仲冬之月禮尚進鮮介麋素出於逢澤狡兔復多於梁園乃命萊田於虞人選徒於司馬四校畢陳六飛夙駕何千乘萬騎之馳騁滿四通五達之郊野西或過於圃田之藪東或出於平臺之下乃有孟賁之徒烏獲之類袒裼而來叱吒而至搏虎兕擊熊豕玄豹逆曳白狐生致復有負羽從獵之人控弦伏獸之士落孤鴈於馬首貫雙雕於雲裏然猶示之以三驅之仁寬之以一靣之網不使獸殫於下禽盡於上何長楊之獵自謂於禽多雲夢之畋敢誇其地廣哉圖書載詳境土斯見開封則漢志之名邑今二赤之首冠祥符則天書之降年易新名於舊縣秸之入斯為近甸若乃百萬衆之分營十二市之環城囂然朝夕異彼郊坰其東則有汴水之陽宜春之苑向日而亭臺最麗迎郊而氣候先暖鶯囀何早花開不晚曕太一之清宮壯先朝之命工構宇煙霞之外出俗囂塵之中效仙人之樓居慕老氏之玄風青青道邊千畝何田端拱之初藉于此焉黛耜一執青史千年登蓼隄以東望見髙臺之百尺居道之南在岡之北下有廣場可馳可逐我皇帝初即寶位大閲軍旅親乘戎輅習戰于此士馬秋徑甲胄晨整止憑軾以將觀衆無譁而是聽列八陳之形申三令之語肅將帥嚴部伍頗牧授之以方略韓彭進之以旗鼓失軍容者戮以徇衆有勇敢者賞而裂土彼上林之馳射驪山之講武豈可同日而語哉其南則有崇崇清壇肅肅齋宮卜是吉土龜從筮從永奉禋祀郊見昊穹燔柴展禮萬世無窮别有景象仙島園名玉津珍果獻夏竒花進春百亭千榭林間水濵珍禽貢兮何方怪獸來兮何鄉郊藪既樂山林是忘則有麒麟含仁騶虞知義神羊一角之祥靈犀三蹄之瑞狻猊來於天竺馴象貢於交趾孔雀翡翠白鷴素雉懷籠暮歸呼侶曉去何毛羽之多竒罄竹素而莫紀也忽斷苑墻又連池籞介族千狀沙禽萬類盡遊泳而往來或浮沈而出處柳籠隂於四岸蓮飄香於十里屈曲溝畎髙低稻畦越卒執手吳牛行泥霜早刈速春寒種遲舂紅粳而花綻簸素粒而雪飛何江南之野景來輦下以如移雪擁冬苗雨滋夏穗當新麥以時薦故清蹕而親至輦從千官郊陳萬騎既觀穫以云罷亦宴犒而後已其西則有池鑿金明波寒水殿鷁首萬艘而壓浪虹橋一道而通輦太液無濫湯之深靈沼有潢汙之淺時或薰風微扇晴瀾始暖命樓船之將軍習昆明之水戰天子乃駐翠華開廣宴憑欄檻於中流瞰渺茫於四靣俄而旗影霞亂陳形星羅萬棹如風而倏去千鼓似雷而忽過則有官名佽飛將號伏波驤江中之龍避船下之戈黃頭既衆文身之卒且多類虬龍而似蛟蜃駭鯨鯢而走黿鼉勢震動於山嶽聲沸騰於江河别有浮泛傀儡之戲雕刻魚龍之質應樂鼓舞隨波出沒鑾輿臨賞以盡日士庶縱觀而踰月波池之南有苑何大既瓊林而是名亦玉輦而是待其或桂折天庭花開鳳城則必有聞喜之新宴掩杏園之舊名於是連鑣上苑列席廣庭蓋我朝之盛事為士流之殊榮一𣲖如飛通漕架虛越廣汴湍流之上轉皇城西北之隅貫都注御溝之口轉漕通廣濟之渠京索導源而于彼金水名河而在兹其北則瑞聖新名含芳舊苑四方異花於是乎見百囀好鳥於是乎聞十洲移景三島分春延廄之設是名天駟伐大宛以新求涉渥窪而逺致群驅八騎隊數十驥雖挽粟之千車乃嘗秣之一費彼沙臺之崔嵬聳佛剎之千尺岡阜連延於西南原田平坦於東北何沙海之飛揚忽到此而止息莫不地多賢士代出異人何干旄之孑孑向浚郊而雲臻雖梁多於長者非安國而不聞過信陵之祠宇想英風而若存何侯嬴之白首尚抱關於夷門遇公子之好賢忽枉駕而咨詢既同載而過市謁隱屠而駐輪果嘉謀之斯得救邯鄲而義伸奪晉鄙之十萬終自將而却秦設守冡而奉祀值漢皇之東巡若乃過陳留之故邑訪地名之所因蓋二留之分别彼彭城而此陳昔赤帝之起義會子房而于此始錫賢於上天終受封於兹地既萬户以建侯亦千年而崇祀千屯北縣之郛郭三月南河之鄽市何飛梁之新遷患橫舟之觸柱今之雍丘古曰杞國民厚風俗土繁貨殖縣之西郊山曰谷林其或花迎野望煙禁春深景當妍麗俗重登臨移市景日傾城賞心幄幕蔽野軒蓋成隂暮而忘歸樂不絶音既同歡於萬室罔惜費於千金厥篚織文出於襄邑池濯錦以為名蜀有江而焉及復有咸平大縣我宋新建因紀年以命號詔將作而營繕公宇之制甲于畿甸中有大川通闤帶闠貫都邑而北來走江湖而南會何客棹之常喧聚茶商而斯在千舸朝空萬車夕載西出玉關北越紫塞徵尉氏之名本大夫之邑蓋鄭國之上田俾獄官而世襲何彼樂郊今為畿地爰有仁朩應乎嘉瑞二棠合生雙榆連理槐獨秀而通枝木異類而同氣良宰畫圖而來聞大尹飛章而奏異莫不召虎殿之宿儒集麟閣之名士驗彼祥經考乎信史表六合之一家而帝德之光被也加以地多藪澤利有蒲魚晴澗望皛陂之色山水觀惠民之渠乃有楫師炭商交易往復素衣化緇漆身同色行舟則憂瞻雲雨售貨則冬禱雪霜經宋樓而關征既薄歷朱曲而市稅有常潺潺洎溝渙渙洧水入鄢陵而碧截原田過扶亭而清映閭里珍貨奔馬欄之道豪俠聚建雄之市彼東昏之舊城易美號於新室似興廢之有時而圖讖之預出何以明而代昏符作畿於聖日考城之人舊俗剛毅鄉出勇夫里多壯士椎埋為姦任俠尚氣睚眥必報杯間刃起今為畿民禮束化被暴虎之徒聞義則畏南徂太康淮陽甚邇地宜琅玕家有蒼翠城過兩扶溝踰二備地既成於工田人不趨於末利桑成隂而春繁棗結實而秋美問中牟之耆民歎魯恭之仁宰何三異之善政有千年之遺愛遇我后之盛明西朝拜於園陵瞻路隅之靈廟想前史之嘉名祭以上公之禮爵以太師之榮若夫八澤圖經有八澤清口澤管澤鴈澤蓼澤淳澤卑澤龍澤滑澤九溝九溝謂醋溝鸛鳥溝青陽溝泥蓼溝渡沒溝丈八溝浮家溝白馬溝也二池青陽蓮藕三固潘固朱固鄭固也按圖經取髙阜堅固也周流原野表界境上宿萬勝以遙觀見斗門之雙注吸驚浪以橫來絶長隄而可懼其始也患彼決溢利其填閼溉萬頃之陂澤變千古之舄鹵盡若膏腴咸通耒耜有若決漳灌鄴旁之田鑿涇沃關內之土然後疏導入白溝之流會同為漕渠之助彼梁固之在東亦𣲖分於波勢梁固斗門在萬勝鎮東三十里景德四年置沿流有一舍之遙則水無寸差之異何一啓而一閉常若合於符契始注陂而雷聲終入渠而駟逝散濁浪以澄沙廣良田而濟世指陽武以北邁涉博浪之長沙岡斷續以千疊塵飛揚而四遮人迷途而莫辨鳥投樹以何賒策不進兮我馬輪欲埋兮何車過户牖之名鄉乃曲逆之舊里何分社之稱平已宰國而有志經計相之里中思張蒼之善算屈柱史以事秦榮列侯而佐漢宜二賢之靈祠歷千古而輝煥西望河流經帶二邑髙岸山立回灣箭急蟻壤夏漏衝決莫救基根相扶萬柳千榆輿稍畚土常設備禦建營置卒轉粟實庾堅彼金隄鑒乎前古秋防夏扞守以朝暮冬計春修役均編户岸艤連航兵屯兩渡阻浩浩之波抳憧憧之路北棹謳晨南帆落暮惟姦是防非利是務右倚太行橫絶雲霧夫雍阻二崤之險洛憑九河之固方之於是彼若平路過濮水之長渠經封國之舊域寥落兮桐牢之亭湮沒兮黃池之迹何昔也明誓重重諸侯於此以會同今也京邑翼翼四方於此以取則涉長垣之塗歷古衛之境城有婦姑之名人恭孝慈之行嘉孔子之入蒲先宰豫以觀政美大家之東征復農田而發運若乃南瞻潘里北指蘭岡樹新文於二碑易美號於兩鄉因東封之行幸感瑞應之非常忽有鳴唳降于穹蒼丹頂未辨於煙際玉羽己穿於仗旁九其數象君道之體陽再而降符帝運之重光何德動於上天而道盛於前王也如是哉客既聞臣之説而知漢以宮室壯麗威四夷宋以畿甸風化正萬國彼尚侈而務奢此歌道而詠德乃曰使孟堅可作平子再生讀子之賦不敢復談于漢京也汴都賦周邦彥臣邦彥頓首再拜曰自古受命之君多都於鎬京或在洛邑惟梁都於宣武號為東都所謂汴州也後周因之乃名為京周之叔世統微政缺天命蕩杌歸我有宋民之戴宋厥惟固哉奉迎鑾輿至汴而止是為東京六聖傳繼保世滋大無內無外涵養如一含牙帶角莫不得所而此汴都髙顯宏麗百美所具億萬千世承學之臣弗能究宣無以為稱伊彼三國割據方隅區區之霸言餘事乏而三都之賦磊落可駭人到于今稱之矧皇居天府而有遺美可不愧哉謹拜手稽首獻賦曰發微子客遊四方無所適從既倦遊乃﨑嶇邅回造於中都觀土木之妙冠蓋之富煒􅏎煥爛心駴神悸䁨而不敢進於是夷猶於通衢倣徨不知所屆適遭衍流先生目而招之執其袪局局然嘆曰觀子之貌神采不定狀若失守豈非蔽席隱茅未遊乎廣厦誅草鉏棘未擷乎蘭蔎披褐挾蘊未曳乎綺縠微邦陋邑未覩乎雄藩大都者乎發微子姡然有赧色曰臣翺翔乎天下東欲究扶桑西欲窮虞淵南欲盡反户北欲徹幽都所謂天子之都則未嘗歷焉今先生訊我誠有是也然觀先生類辨士其言似能碎崑崙而結溟渤鏤混沌而形罔象試移此辨原此汴都可乎臣固不敏謹願承教先生笑曰客知我哉於是申喙據牀虛徐而言曰噫子獨不聞之歟今天下混一四海為家令走絶徼地掩鬼區惟是日月所會隂陽之中據要總殊揭鍵制樞拱衛環周共安乘輿而此汴都禹畫為豫周封鄭地觜觽臨而上直實沈分以為次惟逢澤之固境昔合縻之所至芒碭渙渦截其靣金隄玉渠纍其脊雷夏灉沮繞其脅罍丘訾婁夾其胰梁周帝據而麋沸唐漢尹統而寧一故此王國襲故不徙恢圻甸域尊崇天體司徒制其畿疆職方辨其土地前千官而會朝後百族而為市分疆十同提封萬井舟車之所輻輳方物之所灌輸宏基融而壯址植九鼎立而四嶽位仰營域而體極立土圭而測晷蜀險漢坌荆惑閩鄙推此中峙不首不尾限而不迫華而不侈環睎睋於郡縣如岣嶁之迤邐觀其髙城萬雉埤堄鱗接繚如長雲之方舒屹若崇山之䃳􅼇坤靈因贔屓而局蹐土怪畏榨壓而妥貼靡胥不可縋而登爵鼠不可噣而穴利過百二嶮踰四塞鄙秦人之踐華陋荆州之却月須捷步與超足矧蹣跚與蹩躠闞城為門二十有九瓊扉塗丹金鏞鏤獸列兵連卒呵夜警晝異物不入詭邪必究城中則有東西之阡南北之陌其衢四達其塗九軌車不理轚互人不爭險易劇驂崇期蕩夷如砥雨畢而除糞夷茀穢行者不馳而安步遺者惡拾而恣棄跨虹梁以除病涉列佳木以安怵惕殊異羊腸之詰曲或踠蹄而折轊顧中國之闤闠叢資而為市議輕重以奠賈正行列而平肆竭五都之瓌富備九州之貨賄何朝滿而夕除蓋趨贏而去匱萃駔儈於五均擾販夫於百隧次先後而置敘遷有無而化滯抑強賈之乘時摧素封之專利售無詭物陳無窳器欲商賈之阜通乃有廛而不稅銷卓鄭猗陶之殖貨禁乘堅策肥之擬貴道無遊食以無為矧敢婆娑而為戲其中則有安邑之棗江陵之橘陳夏之漆齊魯之麻薑桂藳穀絲帛布縷鮐鮆鯫鮑釀鹽醯豉或居肆以鼓爐槖或鼓刀以屠狗彘又有翳無閭之珣玕會稽之竹箭華山之金石梁山之犀象霍山之珠玉幽都之筋角赤山之文皮與夫沉沙棲陸異域所至殊形妙狀目不給視無所不有不可殫紀若夫帝居安麗人所未聞南有宣德北有拱辰延亘五里百司雲屯兩觀門峙而竦立罘罳遐望而相吞天河群神之闕紫微太一之宮擬法象於穹昊敞閭閻而居至尊朴桷不斫素題不枅上圓下方制為明堂告朔朝歷頒宣憲章謂之太廟則其中可以敘昭穆謂之靈臺則其髙可以觀氛祥後宮則無非員無録之女佞幸滑稽之臣陋甘泉與楚宮繆延夀與阿房信無益於治道徒竭民而怠荒故今上林仙籞不聞乎鳴蹕瓴甋嵗久而苔蒼其西則有寶閣靈沼巍峩泛灧繚以重垣防以回隄雲屋連簃瓊欄壓墀池水則溶溶沄沄洋洋湜湜涵浼滉漾瀟淨浩溔微風過之則瀾泦瀺灂漫散洄淀㵫㵫漣漪大風過之則汨湧湁潗􅡶渿湢㳁掀鼓渼溢不見津儛櫩景以斷續漾金碧而陸離恍湡浯與方壺帝令鬼鑿而神移其中則有菰蒻萑蘆菡蓞蓮蕸薲蘋蘮蒘其魚則有鱣鯉鯊鮀鮤鮅鰋鮧魴鱒鰼鰝鱖鯞王鮪科斗魁陸蛙鼉鱉蜃含螿巨螯容與相羊蔭藻衣蒲其鳥則有鵯鵊鵜鶘鵝鷺鳬鷖􅤛􅧗鵁鶄鶤鴸鷴鶴鶬鶊楚雀鸛揮霍雥雥群􅟀孴喙其木則有檆檟栟櫚楩楠栴樅櫺橒檳榔檿柘桑楊梓杞豫章句科扶疏蔽芾竦尋集弱椅施拿枝刺條條幹蟠根矯躩鱗其下則有申葉蘭茝藝芝荃蓀髮布絲勻馥郁清芬其氣襲人上方欲與百姓同樂大開苑圃凡黃屋之所息鸞輅之所駐皆得窮觀而極賞命有司無得彈劾也於是則有絶世之巧凝神之技恍人耳目使人忘疲是故宮旋室浮􅫲艦移也蛟螭蜿蜒千橈渡也虓虎䖜角抵戲也曐流電掣弄丸而揮劍也鸞悲鳳鳴纖麗歌也鴻驚燕居綽約舞也霆震雷動鈞天作也奔驫䮋驋群馬闖也輷􅣗萬車轍也灑天翳日揚𡋯􅙟也杭山蕩海歡聲同而和氣浹也震委蛇而唬罔象出鮫人而舞馮夷者濳靈幽怪助喜樂也若乃豐廩貫廥既多且富永豐萬盈廣儲折中順成富國星列而棊布其中則有元山之禾清流之稻中原之菽利髙之黍利下之稌有虋有芭有秠有秬千箱所運億廩所露入既夥而委積食不給而紅腐如砥如京如岡如阜野無菜色溝無損瘠攟拾狼戾足以厭鰥夫與寡婦備凶旱之乏絶則有九年之預又將敦本而勸稼開帝藉之千畝良農世業異物不覩播百榖而克敏應三時而就緒跖鏄鎧鬨灌畷雨霔孰任其力侯強侯以千耦其耘不怒自力疏遫其理狼莠不植奄觀堅早與與薿薿溝塍畹畦亘萬里而連繹醜惡不毛磽狹荒瘠化為好畤轉名不易惟彼汴水貫城為渠並洛而趨昔在隋葉祀丁大業欲為流連之樂行幸之遊故鑿地導水南抵乎揚州生民力盡於畚鍤膏血與水而爭流鳳榻徒見於載籍玉骨已朽於髙丘顧資治世以為利迄今抗筏而浮舟桃花候漲竹箭比駛洶湧淈㶠㵯渱沸揈防嶏岸湱瀥迅邁匪江匪海而朝夕舞乎滂湃掀萬石之巨比坳堂之一芥舵櫓不時而相值篙師鼯拱而俟敗智者不敢睥睨而興作綿千祀而為害豈積患切病待聖人而後除邪厥有建議導河通洛引宜禾之清源塞擘華之渾濁蹙廣隄而節暴紆直行而殺虐其流舒舒經炎涼而靡涸於是自淮而南邦國之所仰百姓之所輸金榖財帛嵗時常調舳艫相銜千里不絶越舲吳艚官艘賈舶閩謳楚語風帆雨楫聯翩方載鉦鼓鏜鉿人安以舒國賦應節若夫連營百將帶甲萬伍控弦貫石動以千數其營則龍衛神勇飛山雄武奉節拱聖忠靖宣效吐渾金吾擲揚萬勝渤海廣備雲騎武肅材能蹶張力能挾輈投石超距索鐵伸鉤水執黿鼉陸拘羆貅異黨之寇大邦之讎電鷙雷擊莫不繫纍而為囚於是訓以鸛鵝魚麗之形格敵擊刺之法剖微中虱貫牢徹札揮匜擲鏼舉無虛發人則便捷器則犀利金角丹漆脂膠竹木以時取之遴棄惡弱割蛟革以連函剫兕觡以為弭剸魚服以懷鍔百工備盡鋥磨鍥削其成鑒鋼而鋹鏸植之霜凝而電爍故有強衝徑弩雲梯䡴車修鍛延鏦銛戈兊殳繁弱之弓肅慎之矢溪子之弩夫差之甲龜蛇之旐鳥隼之旟軍事蚤正用戒不虞其次則有文昌之府分省為三列寺為九殊監為五左選為文右選為武曰三十房二百餘案二十四部黜隋之陋更唐之故補弊完罅剔朽焚蠧人夥地溥事若織組滋廣莫治亹亹成蠱纖弱不除將勝戕斧雖離婁之明目迷簿書而莫覩豪胥倚文以鬻獄庸吏瘝官而受侮各懷茍且以逃責孰肯長慮而却顧官有隱事國有遺利紛訟牘於庭戺縶纍囚於囹圄此浮彼沉甲可乙否操私議而軋沕各矛盾而齟齬於是合千司之離散儼星羅於一宇千梁負棟萬楹鎮礎誅喬松以為煤空奧山而斸楮官有常員取雄材偉器者以充其數上維下制前按後覆譬如長蛇扶其脊膂而首尾皆赴闔户而議飛檄乎房闥應答乎秦楚披荒榛而成徑繹䋦而得緒崇善廢醜平險除穢纖悉不遺乎一羽於是宣其成式變亂易守者刑之所取貽之後昆永世作矩至若儒宮千楹首善四方勾襟逢掖褒衣博帶盈仞乎其中士之匿華鏟采者莫不拂巾袵褐彈冠結綬空巖穴之幽邃出郡國之遐陋南金象齒文旄羽翮世所罕見者皆傾囊鼓篋羅列而願售咸能湛泳乎道實沛然攻堅而大叩先斯時也皇帝悼道術之沉鬱患詁訓之荒繆諸子騰躪而相角群言駘蕩而莫守黨同伐異此妍彼醜挈俗學之蕪穢詆淫辭而擊掊滅突之熒燭仰天庭而覩晝同源共貫開天發蔀於是俊髦並作賢才自厲造門闈而臻壼奧騁辭源而馳辨囿術藝之場仁義之藪溫風扇和儒林發秀宸眷優渥皇辭結糾榮名之所作慶賞之所誘應感而格駒行雉詬磨鈍為利培薄為厚魁梧卓行鋒露穎不驅而自就復有珮玉之音籩豆之容絃歌之聲盈耳而溢目錯陳而交奏煥爛乎唐虞之日雍容乎洙泗之風誇百聖而再講曠千載而復覯又有律學以議刑制算學以窮九九舞象以道幼稚樂德樂語以教世胄成材茂德隨所取而咸有若夫會聖之宮是為原廟其制則般輸之所作其材則匠石之所掄萬指舉築千夫運斤揮汗飛霧吁氣如雲鼛鼓弗勝靡有諗勤赫赫大宇有若山踊而嶙峋下盤黃壚上赴北辰蘂珠廣寒黃帝之宮榮光休氣朣朧往來蔥蔥鬱鬱而氤氲其內則簷橑榱題杗檻楹栭閍拱闈闥屏宇閽聳張矯踞龍征虎蹲延樓跨空甬道接陳黝堊備昈燦爛詭文菱阿芙蕖之流漫驚波回連之瀷淢飛仙降真之縹眇翔鵷鶠之􅵜􅦷地必出竒土無藏珍球琳琅玕璠璵瑤琨流黃丹砂玳瑁翡翠垂棘之璧照夜之蠙鵠象觷角剒犀剫玉鍥刻雕鏤其妙無倫焜煌煥赫璀錯輝映繁星有爛彤霞互照軒廡所繪功臣碩輔書太常而銘鼎彞者環列而趨造龍章鳳姿瑰形瑋貌文有伊周武有方召猶如蹇諤以立朝圖寧社稷指斥利害踟蹰四顧而不撓其殿則有天元太始皇武儷極大定輝德熙文衍慶美成繼仁治隆之名重瞳隆準天日炳明皇帝步送百寮拜迎九卿三公挾輈扶衡儀仗衛士填郛溢城于時黔首飇集百作皆停地震嶽移波翻海傾足不得旋耳不得聽神既安止窮閭微巷惟聞咨嗟嘆異之聲於是山罍房爼犧樽竹篚踐列於兩楹瞽史陳辭宰祝行牲案芻豢之肥臞視物色之犁騂登降祼獻百禮具成至於天運載周甲子新歷受朝萬方大慶新闢于時再鼓聲絶按稍收鏑儼三衛與五仗森戈矛與殳戟探平明而傳點趣校尉而唱籍千官騖列以就次然後奏中嚴外辨也撞黃鐘以啓樂合羽扇以如翼佽飛導駕以臨座千牛環帝而屏息爐煙既升寶符奠瑞聆乾安之妙音仰天顔而可覿羌夷束髮而蹈舞象胥通隔而傳譯宣表章以上聞奏靈物之充斥群臣乃進萬年之觴上南山之夀太尉升奠尚食酌酒樂有嘉禾靈芝和安慶雲舞有天下大定盛德升聞飲食衎衎燔炙芬芬威儀孔攝而中度笑語不譁而有文故無族談錯立之洞衆躐廣布武之紛紜蓋天子以四海為宅有百姓而善群廷內不灑掃而行禮則天下雲擾而絲棼故受玉而惰知晉惠之將卒執幣以傲知若敖之不存聞樂而走者為金奏之下作雖美不食者為犧象之出門賦湛露彤弓而武子不敢答奏肆夏大明而穆子不敢聞蓋禮樂之一缺則示亂而昭昏是以宣王享士貴以殽蒸而刑三晉之法髙祖因叔孫之制而知為帝之尊豈治朝之禮物尚或展翳而沉湮此所以舉墜典而定彛倫者也其樂則有咸池承雲九韶六英采齊肆夏簫韶九成神農之瑟伏羲之琴倕氏之鐘無句之磬鏗鏗鍠鍠和氣薰蒸于以致祖考之格于以廣先王之聲昔王道既弱淳風變澆樂器遭鄭衛而毀矇瞽適秦楚而逃朝廷慢金石之雅正諸侯受歌管之敖嘈文侯聽淫聲而忘倦桓子受齊樂而輟朝季子始無譏於鄶仲尼乃忘味於韶故使制度無考中聲浸消非細則摦非庳則髙惟今也求器得耕野之尺吹律有聽鳳之簫或灑或離或鼖或毊或鏞或棧或䇾或筊衆器俱舉八音孔調鸑鷟離丹穴而來集鳴嗈喈而舞修又有寶旅巴渝之舞僸狄鞮之倡逺人面內而進技踰山海而梯航故納之廟者周公所以廣魯觀之庭者安帝所以喜其來王若其四方之珍以時修職取竭天産發窮人迹砥其逺邇陳之藝極厥材竹木厥貨龜貝厥幣錦繡厥服絺綌斿貢羽毛祀貢祭物嬪貢絲枲物貢所出器貢金錫礪砥砮丹鉛松怪石惟金三品惟土五色泗濵浮磬羽畎夏翟龍馬千里神茅三脊方箱隋棐肆陳乎殿陛豐苞廣匱亟傳乎騎驛連檣結軌川咽塗塞邪歈終嵗而不息至於羌氐僰翟儋耳雕腳獸居鳥語之國皆望日而趨纍載而至懷名琛拽馴獸以致於闕下者旁午乃有帛㲲罽氍蘭干細布水精琉璃軻蟲蚌珠寶鑑洞膽神犀照浦山經所不記齊國所不覩者如糞如壤軨積乎內府或致白雉於越裳或得巨獒於西旅非威靈之遐暢孰能出瑰竒於深阻蓋徼外能率夷種來以修好則中土當有聖人出而寧寧然皇帝不寶逺物不尚殊觀抵金於嶄巖之山沉玉於五湖之川洞鄂之劒乃入騎士之鞘齧膝之馬或服鼓車之轅至於乾象表貺坤維薦址靈物仍降嘉生屢起暈適背鐍􅛆霓抱珥鳴星隕石怪飇變氣垂白鮐背者不知有之况能言孺倪豈獨此而己也復有穹龜負圖龍馬載文汾陽之鼎函德之芝肉角之獸簫聲之禽同穎之禾旅生之榖遊郊栖庭充畦冒畤非煙非雲蕭索輪囷映帶乎闕角蔥蔚乎城壘鷙鳥不攫猛獸不噬應圖合牒窮祥極瑞史不絶書嵗有可紀發微子於是言曰國家之有若是歟意者先生快意於吻舌而及此邪先生曰國家之盛烏可究悉雖有注河之辨折角之口終日危坐抵掌而談猶不能既其萬一此特汴都之治迹耳子亦知夫所以守此汴都之術古昔之所以興亡者乎客曰願聞之先生曰繄此寰宇代狹代廣更張更弛黃帝都涿鹿是為幽州少昊都窮桑乃今魯地伏羲都陳帝嚳都亳堯都平陽乃若昊天而授人時舜都蒲阪乃覲群后而輯五瑞公劉處豳而兆王業之所始太王徙邠以避狄人之所利文王作酆方蒙難而稱仁武王治鎬復戎衣而致乂蓋周有天下三百餘年而刑措不用及其衰也亦三百餘年而五伯更起星離豆割各據榖兵以專列強侯脅帶於弱國不領人君之經費天下日蹙而日裂中國所有者無幾當時權謀為上雌雄相噬孰有長距孰有利觜兵孰先選糧孰夙峙孰有翹關之卒孰有憑軾之士孰有素德孰有強倚孰欲報惠孰欲雪恥或奉下邑以賂讎或舉連城而易器骸骨布野介胄生蟣肘血丹輪馬鞍銷髀勢成莫格國墟人鬼噫彼土宇凡幾吞而幾奪幾完而幾弛秦中形勢之國加兵諸侯如髙屋之建瓴水神臯天邑以先得者為上計其他或左據函谷右界褒斜號為百二之都東有成臯西有崤澠定為王者之里以至置舂陵之俠客興泗上之健吏扼襟控咽屏藩表裏名城池為金湯役諸侯為奴隸拓境斥地輮轥荒裔東包蟠木西卷流沙北繞幽陵南裹交趾厥後席治滋永泰心益侈或慢守以啓戎或朋淫而招宄橫調無藝而垂竭遊役不時而就斃盧令日縱而不紲鷺翿厭觀而常值睚眥則覆尸而流血愈恱則結纓而珮璲粉墨雜糅賢才逆曵腫微狧而竊肉食賊臣回穴而圖大器郡國制節侯伯方軌或為大尾而不掉或為重膇而屢踕室有丹楹城有百雉朝廷無用於揚燎冠冕不杌於執贅天維披裂地軸杌􅑾群生㸐而殄瘁雖有城池周以鄧林縈以天漢曵輦可以陟崇巘設泭可以濟深水故武侯浮西河而下自哆其地而進戒於吳起蓋秕政肆於廟堂之上則敵國起於蕭墻之裏奚問左孟門而右大行左洞庭而右彭蠡發微子曰天命有德主此四方如輻之拱轂如桷之會極其硈鞏者天與之昌其砢者天與之亡且非易之所能壞亦非險之所能藏非愚之所能弱亦非賢之所能強故將吞楚也白蛇首斷於大澤將繼劉也雄雉先雊於南陽龍漦出櫝而檿弧隱亡周之語蓐收襲門而天帝貽刑虢之殃人力地利信不能偃植而支仆而皆聽乎彼蒼故鯨鯢㔥解決一死於吻血兕虎踐巍嶽為平岡蹂生靈如踏塊簸天下如揚粳其敗也抉目而扸骨其成也頂冕而垂裳由此觀之土地足以均沛澤而施靈光而己易險非所較賢否亦未可議也先生曰以易險非所較者固己乖矣以賢否非所議者烏乎可哉客不聞王公設險以守其國有德則昌者乎地欲得險勢欲參德迫隘卑陋則無以容萬乘之扈從供百司之廩餼據偏守隅則無以限四方之貢職平道理之逺邇膴原申區割宅制里走八極而奔走正南面而負扆舉天下於康逵力士䪆缺而不敢取貪夫汗縮而不敢睨者恃德之險也襟馮終南太華之固背負清渭濁河之注扼人之吭而拊人之脊一日有變而萬卒立具然而布衣可以窺隙而試勇匹夫可以爭衡而號呼彼天府之衍沃適為人而保聚此以地為險者也地嚴德暢然後為神造之域天設之阻大哉炎宋帝眷所矚而此汴都百嘉所育前無湍激旋淵呂梁之絶流後無太行石洞孤飛句望浚深之岩谷豐樂和易殊異四方之俗兵甲士徒之須好賜匪頒之用廟郊社稷百神之祀天子奉養群臣稍廩之費以至五榖六牲魚鱉鳥獸闔國門而取足甲不解纍刃不離韣秉鉞胸奴而單于奔幕抗旌西僰而冉駹蟻伏南夷散徒黨而入質朝鮮畏菹醢而修睦解編髮而頂文辨削左袵而曵華服逆節躑躅而取禍者折簡呼之而就戮耽耽帝居如森匙利鏃之外向死士逡巡而莫觸仁風冒於海隅頌聲溢乎家孰伊昔天下阽危王猷失度皇綱解紐嘷豺當路帝懷寶歷未知所付可受方國莫越藝祖圖緯協期謳謠扇孺赤子雲望而風靡英雄螽躍而蠅附玉帛駿奔者萬國冠冕充塞乎寰宇絶塞稅鎧而免胄障壘熄􅥂而摧櫓拜檻神威有此萬旅奕世載德蔑聞過舉髮櫛禾耨子携稚哺擊果懋穗拔惡鑒嫵鈋觚角之磣刻刜欃槍而牧圉爰暨皇帝粉飾朴質稱量纖矩鍠鍠奏廟之金玉璨璨夾楹之簠簋訓典嚴密財本豐阜刑罰糾虔布施優裕田有願耕之農市有願藏之賈草竊還業而斂迹大道四通而不􅩹車續馬連千百為群肩輿捆載前卻而後阻搏壤歌咢者萬井未聞欭嚘而告愈雖立壝為界其誰敢㩱膊以批捭况此汴都者乎抑又有天下之壯客未嘗覩其奧也且宋之初營是都也上睇天時下度地制中應人欲測以聖智建以皇極基以賢傑限以法士垣以大師屏以大邦扞以公侯城以宗子以義為路以禮為門鍵鑰以柄開闔以權掃除以政周裹以恩乃立室家以安吾君有庭其桓社稷臣也有梴其桷衆材會也有闈孔張通厥明也有牖孔陽達厥聰也其檻如衡前有憑也其壁如削後有據也其陛則崇止陵踐也其極則隆帝居中也邑都既周宮室既成於是上意自足乃駕六龍乘德輿光警蹕由黃道馳騁乎書林下觀乎學海百姓欣躍莫不從屬車之塵而前邁妙技皆作見者膽碎乃使力士提挈乎隂陽摶捖乎剛柔應乎成器方圓微碩或粉或由隨意所裁上方咀嚼乎道味斟酌乎聖澤而意猶未快又欲浮槎而上窮日月之盈昃尋天潢之流𣲖操執北斗之柄按行二十八曐之次奪雷公之枹收風伯之鞴一瞬之間而甘澤雱霈囚孛彗於幽獄敷景雲而黯靄統攝隂機與帝唯諾而無閡如此淫樂者十有七年疲而不止諫而不改吾不知天王之用心但聞夫童子之歌曰孰為我已孰釐我載茫茫九有莫知其界客乃覤覤然驚拳拳然謝曰非先生無以刮吾之矇藥吾之聵臣不能究皇帝之盛德謹再拜而退按黃文獻公曰周都官為汴都賦至使人不能讀雖以樓宣獻公之博洽而為之音釋其弗知而闕焉者蓋多矣余觀是篇鈎竒托隱誠如黃公之言讀者細考韻書可也汴京遺迹志卷二十
