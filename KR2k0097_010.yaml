body:
  text: 汴京遺迹志卷十明李濂撰寺觀寺相國寺在縣治東本北齊建國寺天保六年創建後廢唐為鄭審宅園睿宗景雲初遊方僧慧雲睹審後園池中有梵宫影遂募緣易宅鑄彌勒佛像高一丈八尺值睿宗以舊封相王初即位因賜額為相國寺玄宗天寶四載建資聖閣東塔曰普滿西塔曰廣願宋奭宗咸平四年增建翼廊三門前樓迎取潁川郡銅羅漢五百尊置于閣上神宗元豐中增建東西兩廂又立八院東曰寶嚴寶梵寶覺慧林西曰定慈廣慈普慈智海金元兵燬國朝洪武初重修改賜額為崇法禪寺置僧綱寺於內而併南北大黃景福三寺入焉後纍經黃河入城廊廡僧舍多被淹塌今所存者聖容殿結構竒絶蓋舊殿也陳后山談叢相國寺樓門唐人所造國初朩工喻浩曰他皆可能惟不解卷簷爾每至其下仰而觀焉立極則坐坐極則卧求其理而不得門內兩井亭近代朩工亦不解也寺有十絶此為二耳沈括夢溪筆談相國寺舊畫壁乃高益之筆有畫衆工奏樂一堵最有意人多病擁琵琶者誤撥下絃衆管皆發四字琵琶四字在上絃此撥乃掩下絃誤也余以為非誤蓋管以發指為聲琵琶以撥過為聲此撥掩下絃則聲在上絃也益之布置如此其心匠可知郭若虛圖畫見聞志治平乙已歲雨患大相國寺以汴河勢高文進等畫惟大殿東西走馬廊西對門廡不能為害東門之南王道真畫給孤獨長者買祗陀太子園因緣東門之北李用及與李象坤合畫牢度義鬬聖變相西門之南王道真畫志公變相十二面觀音像西門之北高文進畫降魔變相今並存之皆奇迹也其餘四面廊壁皆重修後復集同時名手李元濟等用內府所藏副本小樣重臨倣者然其間作用各有新意焉又曰大相國寺碑稱寺有十絶其一大殿內彌勒聖容唐中宗朝僧慧雲於安業寺鑄成光照天地為一絶其二睿宗親感夢於延和元年七月二十七日改故建國寺為大相國寺睿宗御書牌額為一絶其三匠人王溫重裝聖容金粉肉色并三門下善神一對為一絶其四御殿內有吳道子畫文殊維摩相為一絶其五供奉李秀刻佛殿障日九間為一絶其六明皇天寶四載乙酉歲令匠人邊思順修建排雲閣為一絶其七閣內西頭有陳留郡長史乙速令狐公為功德主時令石抱玉畫護國除災變幻相為一絶其八西庫有明皇先勑車道政往于闐國傳北方毗沙門天王樣來至開元十三年封東嶽時令道政于此依樣畫天王像為一絶其九門下有瓌師畫梵王帝釋及東廊障日內畫法華經二十八品功德變相為一絶其十西庫北壁有僧智嚴畫三乘因果入道位次圖為一絶也宋次道東京記亦載相國寺十絶乃是後來所見事迹此不具録宋朝燕翼詒謀録東京相國寺乃瓦市也僧房散處而中庭兩廡可容萬人凡商旅交易皆萃其中四方趨京師以貨物求售轉售他物者必由于此太宗至道二年命重建三門為樓其上甚雄麗宸墨親填書金字額曰大相國寺五月壬寅賜之王君玉國老談苑王嗣宗為御史中丞真宗一日幸相國寺回自北門嗣宗上言曰天子行黃道豈可由後門臣任當風憲詎敢廢職乎上恱其直給內帑三千緡以自罰由是北門不常開程大昌演繁露世傳相國寺門舊扁題云相國之寺凡四字或以之字為贅遂命除之别添大字其文曰大相國寺於體既該於文無贅最為可傳然扁題字數竒不偶者往往皆增之字不知起自何時漢武帝太初元年改正朔易服色色尚黃數用五故印文必五如丞相之印章則是四字外添一之字以應五數下及諸卿守相印文凡不及五者亦皆加一之字以足之後世但見太初嘗增之字遂倣效之凡印文以及門堂扁額槩增一之字以求合于古殊失本意周密癸辛雜識相國寺佛殿後壁有咸平四年翰林高待詔畫大天王尤雄偉殿外有石刻東坡題名云蘇子瞻子由孫子發秦少遊同來觀晉卿墨竹申先生亦來元祐三年八月五日老申一百一歲又片石刻坡翁草書哨遍石色皆如玄玉蔡絛鐵圍山叢談藝祖始受命久之隂計釋氏何神靈而患苦天下有欲廢其教之意一日微行至相國寺將昏黑俄至一小院户旁望見一髠大醉吐穢于道左右方惡罵不可聞藝祖隂怒適從旁過忽不覺為髠攔胸抱定曰莫發惡心且夜矣懼有人害汝汝宜歸內可亟去也藝祖默心動以手加額而禮焉髠乃捨之去藝祖還內密召忠謹小璫爾行往某所覘此髠在否且以其所吐物狀來及至則已不見小璫獨爬取地上所吐狼籍至御前視之悉御香也釋氏教因不廢王銍默記李後主手書金字心經一卷賜其宫人喬氏喬氏後入太宗禁中聞後主薨乃自內庭出是經捨於相國寺之西塔院以資冥薦且自書於後曰故李氏國主宫人喬氏伏遇國主百日謹捨昔時賜妾手書般若心經一卷於相國寺之西塔院伏願彌勒尊前持一花而見佛云云其後江南僧持歸故國置之天禧寺塔相輪中寺後被火相輪自火中墮落而經不損為金陵守王君玉所得君玉卒子孫不能保之以歸寧鳳子儀家喬氏書在經後字甚整潔而辭甚愴惋所記止此徐鍇集南唐制誥有宫人喬氏出家誥豈斯人邪余少時嘗讀書相國寺僧舍中見大殿前有古碑二十餘多可觀者今四十餘年矣昨偶至寺遊覽止見三二碑剝落漫漶皆不可誦餘不知所在徘徊其下久之重為之憮然上方寺在城之東北隅安遠門裏夷山之上即開寶寺之東院也一名上方院宋仁宗慶厯中開寶寺靈感塔燬乃於上方院建鐵色琉璃磚塔八角十三層高三百六十尺俗稱鐵塔寺舊有漆胎菩薩五百尊并轉輪藏黑風洞洞前有白玉石佛後殿內有銅鑄文殊普賢二菩薩騎獅象蓮座前有海眼井世謂七絶元末燬于兵海眼井亦久失其處國朝洪武十六年僧祖全募緣重建周密癸辛雜識光教寺在汴城東北角俗呼為上方寺有琉璃塔十三層鐵普賢獅子像甚高大座下有井以銅波斯蓋之泉味甘謂通海潮旁有五百羅漢殿又云五百菩薩像皆是漆胎粧以金碧窮極精妙上方寺塔前有行書碑一題曰大宋東京右街重修等覺禪院記乃咸平戊戌尚書職方郎中賜紫金魚袋王嗣宗撰隴西彭太素書字體流暢頗類西安聖教序汴城石刻惟此為最耳開寶寺舊名獨居寺在上方寺之西北齊天保十年創建唐開元十七年玄宗東封還至寺改曰封禪寺宋太祖開寶三年又改曰開寶寺重起繚廊朵殿凡二百八十區太宗端拱中建塔極其偉麗初釋迦佛舍利塔在杭州佛書所謂阿育王七寶塔也及吳越王錢俶歸宋太宗遣供奉官趙鎔取置寺內度龍地瘞之時木工喻浩有巧思超絶流輩遂令造塔八角十三層高三百六十尺其土木之宏壯金碧之炳耀自佛法入中國未之有也真宗大中祥符六年有金光出相輪車駕臨幸舍利乃見因賜名靈感塔仁宗慶厯四年塔燬于火其殿宇廊廡僧舍俱燬于金兵矣歐陽修歸田録開寶寺塔在京師諸塔中最高而制度甚精都料匠預浩所造也塔初成望之不正而勢傾西北人怪而問之浩曰京師地平無山而多西北風吹之不百年當正也其用心之精如此國朝以來朩工一人而已至今朩工皆以預為法有朩經三卷行于世世傳浩惟一女年十餘嵗每卧則交手於胸為結構狀如此踰年撰成朩經三卷今行於世者是也楊文公談苑帝初造塔於開寶寺得浙東匠人喻浩浩性絶巧乃先作塔式以獻每建一級外設帷帟但聞椎鑿之聲凡一月而一級成其有梁柱齟齬未安者浩周旋視之持巨槌撞擊數十即皆牢整自云此可七百年無傾動人或問其北面稍高浩曰京城多北風而此數十步乃大河潤氣津浹經一百年則北隅微墊而塔正矣浩素不茹葷求度為僧數月死世頗疑其異喻浩或作預浩未知孰是僧文瑩玊壺清話郭忠恕畫樓閣重復之狀梓人較之毫釐無差太宗聞其名詔授監丞時將造開寶寺塔浙匠喻浩料一十三層郭以浩所造小樣末底一級折而計之至上層餘一尺五寸收殺不得謂浩曰宜審之浩因數夕不寐以尺較之果如其言黎明扣其門長跪以謝道山清話元祐癸酉九月一日夜開寶寺塔表裏通明徹旦禁中夜遣中使齎降御香寺門已閉既開寺僧皆不知也寺中望之無所見去寺漸明後二日宣仁上仙按宋史端拱中開寶寺塔成侍御史田錫上疏曰衆謂金碧熒煌臣以為塗膏釁血帝亦不怒繇是觀之太宗輕用民力以作無益固不能免千古之譏然能容受讜言不罪諌者抑亦可謂賢已寶相寺在大梁門外世傳古鎚和尚證果之處五代唐明宗長興元年創建晉高祖天福三年賜額內有慈尊閣與彌勒佛大像俗名大佛寺寺之內又有羅漢洞及羅漢塑像五百尊元末俱為兵燬洪武二十年都綱善春因故址重建周密癸辛雜識汴城寶相寺俗呼為大佛寺有五百羅漢塑像甚竒古又噀水石龍鐫刻甚精皆故宫物也孝嚴寺在城之西北隅舊金水門內即宋太尉楊業之家廟也雍熙丙辰五月業死節朔方其子請改家廟為寺以薦其父太宗嘉其孝乃俞其請賜額曰孝嚴宋鼎南遷燬于兵火國朝洪武二十二年已已僧本福重建三十一年戊寅黃河入城淪于水正統十二年丁卯僧祖習修葺完整天王寺在安逺門外前代創建無考後殿畫壁乃張世祿筆極竒絶歲久剝落盡矣惜哉天清寺在陳州門裏繁臺上周世宗顯德中創建世宗初度之日曰天清節故名其寺亦曰天清寺之內磚塔曰興慈塔俗名繁塔宋太宗太平興國二年重修元末兵燹寺塔俱廢國朝洪武十九年僧勝安重建永樂十三年僧禧道等復建殿宇塑佛像王銍默記藝祖初自陳橋推戴入城周恭帝即衣白襴乘轎子出居天清寺天清世宗節名而寺其功德院也國相寺在天清寺南即天清寺之前樓三間國朝洪武十七年僧勝安因樓廢址改建佛殿名曰國相二十一年僧淨慈增建觀音堂方丈廊廡三門白雲寺在天清寺西北即天清寺之白雲閣廢址也國朝洪武十九年僧勝安圎真於其址重建殿宇佛像仍其舊名曰白雲寺李夢陽撰國相寺記國相寺繁臺前寺也臺三寺後曰白雲中曰天清塔斷而中立有鸛巢其上戛戛鳴按夢華録繁臺寺一耳亦不言其地之盛嘗問之老長曰寺一耳而三其教中教之講僧玉色褊衫後教之禪深褐褊衫前教瑜伽淺褐褊衫而寺遂三後有白雲閣於是號白雲寺中有天清殿於是號天清寺前有國相門於是號國相寺寺分勢孤時遷世殊於是崇者頽而下者蕪僧闒教汙庸師惡徒於是樹石盜亡損破鳥鼠穢之往來羊豬寺非若能主矣又國初剷王氣塔七級去其四崩囓幽窟狐狸魑魅昏嘯隂啼僧席未暖業逃去而善彬者國相僧也乃奮然興曰寺時世廢邪僧廢之邪於是守一清修年七十餘步詣戒壇受戒持之於是寺得不土平者彬之力也汴城以水湮故諸古迹茫然蕩然獨斯臺巋然存峻峙可遊遊者挈醪榼載吟筆花晨月夕雪驢風馬無不扣彬之門者斯足知彬也正德間彬葺其寺殿暨伽藍閣山門鐘樓僧房等而睢陽衛百戶趙鉞等實助之涅塑其像設按舊碑寺宋太平興國二年建今洪武初僧古峯者新之相去四百餘年逮彬又百五十年餘矣而空同山人為之記觀音寺在城東南萬龍岡元至正元年僧了空建國朝宣德五年僧德廣重修萬夀寺在城北周八寨國朝洪武元年僧德淨建天順二年僧真賢重修隆興寺在城東北董盆鋪國朝天順元年僧德忠建成化十年僧真果重修清涼寺在城東梳頭岡國朝景泰元年僧本朗建天順八年僧真能重修一軒寺在巨盈庫西北元末兵燬雲老寺在儒林街北元末兵燬其遺址今為祥符縣儒學興國寺有二一在馬軍橋東北宋太平興國間創建金季兵燬元改為文濟王府國朝洪武初為宋國公馮勝宅一在城西西和保宣德元年僧覺慧建成化十六年僧德來重修楊文公談苑太平興國寺舊龍興寺也周世宗廢為龍興倉國初寺主僧屢擊登聞鼓求復為寺上遣中使持劒以諭之曰此寺前朝所廢為倉厫以貯軍儲汝何故煩瀆帝庭朝命斷取汝首仍戒之曰倘偃蹇怖畏即斬之或臨劒無懼即未可也既諭神色自若引頸就戮上聞之感嘆復命為寺宋朝會要興國寺乃唐龍興寺也開寶二年詔重修太平興國元年賜今額明福寺在雷家橋西南武成王廟之西金宣宗時展城廢燬慈孝寺在雷家橋西北故駙馬都尉吳元扆宅也天聖二年十二月詔建寺奉真宗神御初議名慈聖時太后號有此二字改賜今名戒壇院本寺園寶元初僧文旦創建戒壇慶厯五年賜額戒壇院金末兵燬報慈寺在鐘樓東北後巷燬于金兵龜兒寺在相國寺西北洪武四年改為兵馬指揮司而寺隨以廢安業寺在鼓樓東北釘稱巷燬于金兵乾明寺在安業坊席箔巷西燬于金兵廣福寺在廣福坊上方寺之西南後廢為大梁衛營惠安寺在上方寺之西南俗名破塔寺元末兵燬鐵佛寺有二一在大梁門外西北金水河堤之南今廢一在相國寺東相傳亦本寺禪院今見存顯聖寺在大梁門外西北白溝河之南俗名菩提寺周顯德四年創建金末兵燬巴樓寺在城西金水河南元末兵燬鴻福寺有二一在城西金水河北元末兵燬一在城東北沙窩岡宋崇寧元年建國朝成化十六年僧本資重修地湧佛寺在鄭門裏之南元末兵燬法雲寺在南薰門外雲驥橋之西元末兵燬景德寺在麗景門外迤東周世宗顯德五年以相國寺僧多居隘詔就寺之蔬圃别建下院分處之俗呼東相國寺顯德六年賜額天夀寺宋真宗景德二年改名景德寺後有定光釋迦舍利磚塔纍經兵燹河患今為平地惠明寺在仁和門北周太祖廣德中創建金季兵燬乾寧寺在仁和門外金季兵燬太師寺在縣治西北元太師伯顔宅也後改為寺今為大梁驛華嚴寺在鄭門外西南金兵燬之兩浙寺在城西金水河側金兵燬之奉聖寺在城南鳳城岡之上金季兵燬朩魚寺舊名興國寺在城南閙店保宋時建金季兵燬元僧滿講主擊朩魚化緣重建因名朩魚寺密邇朱仙鎮亦名寺也旌德寺在城東南神岡上元末兵燬母寺一名保福寺在城北母寺保元于氏子母二人修建後淪于河水奉先寺在城西金明池之西宋建以祭宫人之所金兵燬之十八聖寺在封丘門外之東因有白塔又名白塔寺元末兵燬清鐘寺在大梁門外蓮花池之後顯靜寺在陳州門裏周世宗顯德二年創建金兵燬之普求寺在白墓子岡西北以上皆僧寺或存或廢然亦有湮沒無可考者矣慶夀寺在大梁門外建隆廂元至正間尼僧普謙創建後廢國朝洪武五年尼僧洪心等重修永寧寺在大梁門外慶夀寺西元至正間尼僧普義創建後廢國朝洪武三年尼僧盛得重修打瓦寺在土市子街東北惠和坊始建無考元末兵燬國朝洪武二十年尼僧義果等重修觀音寺在上方寺前周府創建文殊寺在鼓樓東北釘稱巷之東信國公湯和宅舊基也國朝永樂十三年尼僧悟善創建彌陀寺在大寧坊朩場街之東南國朝洪武二十年尼僧義慶等創建以上皆尼寺慶夀永寧打瓦三寺俱廢而觀音文殊彌陀三寺見存北太黃寺在城東北陳橋南宋仁宗曹太后勑修元末兵燬國朝洪武二十年僧法玉重建南太黃寺在城東北母寺保張耳冢之西元末兵燬國朝洪武十五年僧本受重建景福寺在城東北馬尾墻保始創無考元末兵燬國朝永樂十年僧福寶重建以上三寺俱歸併於相國寺觀延慶觀在城內汴河之北浚儀橋之西舊為朝元萬夀宫齋堂今軍儲倉即朝元萬夀宫之遺址也元世祖時盤山棲雲道人王志謹建元末偽宋太保劉福通廢之惟存齋堂耳國朝洪武初為寶泉局鑄錢之所後移局於蔡河灣而齋堂悉已頽毁洪武六年設道紀司於內十年都紀邵惟真副都紀鄭德柔等改建正殿奉安三清又建左右高真之殿及東西兩廡永樂十年都紀趙德信又建三門煥然一新內有宋時諸名公石刻甚多今悉散失無復存者矣陳頎間中今古開封趙宋建都之處豫每追訪古迹故老僅能道其一二形似而已府學中諸碑刻多宋太學中石經皆磨滅破碎罕有完者間有徽廟時詩文亦首尾弗全周視齋廡見石礎俱斷碑隱然文字在上學子言不特此耳為在位之人取為它用者甚衆後於延慶觀東偏道士房見一石刻乃蘇子美所作詩瓜果浮沈酒半醺滿牀書史亂紛紛北軒涼吹開疏竹卧看青天行白雲因録於此以見當時士大夫其所著述何可勝數如此詩者不過一時口占尚刻之於石則其他大述作而為世所珍重者不為後人柱下之石能幾何哉又曰成化間黃河邊有龍生一卵在葦泊中大如升許漁者得焉一商人以布易之送於官置諸延慶觀居民異之觀者如堵時盧龍周斌知開封府以其惑亂人心擊碎之中包碧水餘無所有數日後俄有大風自觀中起拔庭前兩朩從東北去拔都司前一大朩又拽去左布政章繪衙內樓後半間未幾繪被原傑侍郎考黜斌擢陜西參政去禍福有定不可惑也併記之佑聖觀有二一在城內西南隅馬軍衙橋之西觀前有積水夙著靈異正德初改為大道宫一在陳州門裏普濟水門西北金季兵燬三清觀在安逺門內東南始創未詳永樂三年建天順五年淪于水成化十四年重修余少遊是觀見壁上有李獻吉詩云二十年前走馬地三清臺殿肅清高重來無限春風思不似劉郎為看桃今空同集中不載玉陽觀有二一在大梁門內即楊六郎宅址也一在城隍廟後近西街北乃金章宗時汴京之永豐倉也金季兵燬元世祖時盤山棲雲道人王志謹于其處建觀以居全真道人蛻塵子陳志寶元末改為忠襄王察罕特穆爾祠堂國朝洪武初又改為河南布政司巨盈庫建隆觀初名太清觀在大梁門外西北周世宗所建宋太祖以建隆改元遂更名為建隆觀重修殿宇廊廡總一百四十有九區後取杭州昊天上帝銅像奉安于中真宗大中祥符元年以唐祕書監賀知章七代孫道士某住持是觀加葺昊天上帝殿其後皆燬于金兵會靈觀在南薰門外東北普濟水門西北宋大中祥符五年創建內設延真獻殿祝禧齋殿西則崇元殿以奉靈寶天尊二夾殿則奉中茅小茅真君東西列五嶽聖帝五殿左右二夾殿則奉五嶽之儲副佐命之山羅浮括蒼霍山抱犢少室武當等十山真君初名五嶽觀觀成賜名會靈李若谷罷參知政事留京師以資政殿大學士提舉會靈觀事宫觀置提舉自此始觀南有奉靈園觀東有凝祥池中有崇禧殿觀西壖有小池中亦建崇禧殿奉扶桑大帝暘谷神王洞淵龍王等神續又增置明麗及臨水二殿後皆燬于金兵宋朝會要大中祥符八年五月詔會靈觀池以凝祥為名園以奉靈為名觀以奉五嶽帝仁宗時觀火既重建改名曰集禧祥源觀在繁臺東南宋初有人於此地見龜蛇因建真武堂真宗天禧二年泉湧堂側汲之靡竭人有疾疫者飲之輒愈乃就其地建觀總殿廡神厨鐘經樓齋堂道院廨舍凡六百一十三區其正殿曰靈真以奉真武像加號靈慈真君東聖藻殿以安御製贊西靈淵殿湧泉之所前廣聖殿西開祥齋殿南有靈禧園東有凝碧池乃唐汴牧睪改為池後皆燬于金兵纍經河溢淤平宋朝會要醴泉觀本拱聖營地也天禧二年閏四月詔拱聖營醴泉所宜立觀以祥源為名仁宗時觀火既重建改名曰醴泉東水門裏亦有醴泉觀興此不同萬夀觀在景龍門西北本玉清昭應宫東偏别殿也天聖七年夏六月玉清昭應宫災燔爇殆盡惟存長生崇夀二殿并章獻太后本命殿後稍修葺改崇夀殿名太霄殿徙奉玉皇銅像增繕寶慶延聖二殿及膺福齋殿崑玉池亭又葺章懿太后御容殿改名萬夀觀後皆燬于金兵宋朝燕翼詒謀録萬夀觀本玉清昭應宫也宫為火所焚惟長生崇夀殿存殿有三像聖祖真宗各用金五千餘兩昊天玉皇上帝用銀五千餘兩仁宗天聖七年詔玉清昭應宫更不復修以殿為萬夀觀蓋明肅太后尚有修營之意宰臣猶帶使領至是始去之示不復修營也真宗朝盛禮縟儀屢舉費金最多金價因此頓長人以為病仁宗明道二年正月癸未詔册寶法物凡用金者並改用銀而以金塗之自此十省其九至今惟寶用金餘皆金塗也林希兩朝寶訓天聖七年七月紀年通載云六月玉清昭應宫災上以所存長生崇夀殿為萬夀觀天慶觀大中祥符二年十月詔天下州府軍監關縣皆建道觀一所以天慶為名醴泉觀在東水門裏宋真宗大中祥符元年五月泰山醴泉出詔於其地建醴泉觀後復建觀於京城金季兵燬西五嶽觀在南薰門外街西宋時建以奉五嶽之神國朝洪武二年夏五月為震電雷火所燬南山觀在安逺門裏街西三皇廟之南始建無考元末兵燬四聖觀在相國寺橋之南始建無考金季兵燬延真觀在南薰門裏西南始建無考元末兵燬玉霄觀在大梁門外今三聖堂之北始建無考元末兵燬以上諸觀皆道士居之自建隆觀而下俱久廢無一存者馬端臨文獻通考宋自真宗興崇道教置玉清昭應宫景靈宫會靈觀使以宰相為之副使判官都監及集禧觀醴泉觀東西太一宫提舉則以兩省兩制丞郎及防禦諸司使副為之掌奉齋醮之事又有譯經潤文使亦以宰相為之熙寧以後增置祠祿之官以佚老優賢而時相欲以宫觀之祿處不奉行新法之人遂無限貟亦無執事而釋老之事則如歷代領之祠部郎官又屬鴻臚寺至徽宗時改𨽻祕書省洞源觀在大梁門外大佛寺迤西宋仁宗景祐二年冨平郡王姑施氏願入道為女冠乃以崔懷道私第八十間改為道觀賜名洞源後燬于金兵遇仙觀在仁和門內街南元時建國朝洪武三十二年淪于河水永樂十年女冠李雲山重建逍遙觀在仁和門內街南元英宗至治三年創建國朝洪武十八年女冠李妙方等重建以上三觀皆女冠居之俱久廢無一存者汴京遺迹志卷十
