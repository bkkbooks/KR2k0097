body:
  text: 汴京遺蹟志卷三明李濂撰官署二學士院即翰林院宋學士院在樞密宣徽院之北表其深嚴宥密又謂之北扉在浴堂之南便於應詔至和三年詔學士院從官兩員掌管勾編録國朝以來所撰制詔文字承㫖不常置以學士久次者為之馬端臨文獻通考學士掌內庭書詔指揮邊事曉達機謀天子機事密命在焉不當預外司公事蓋防纖微間或漏省中語故學士院在金鑾殿側號為深嚴自藝祖以來藉其才用始令判三銓及知太常禮院事開寶二年以李昉盧多遜並直學士院直院之名始此六年以知制誥張淡權直翰林院宋翰林學士無定員凡他官入院未除學士謂之直院學士俱闕他官暫行文書謂之權直宋率以從官兼直院若左右史少監類止稱權天聖元年詔學士遇隻日至晚出宿蓋故事以雙日鎖院隻日降麻也沈括夢溪筆談唐翰林院在禁中乃人主燕居之所玉堂承明金鑾殿皆在其間應供奉之人自學士以下工技群官司𨽻籍其間者皆稱翰林如今之翰林醫官翰林待詔之類是也惟翰林茶酒司止稱翰林司蓋相承闕文唐制自宰相而下初命皆無宣召之禮惟學士宣召蓋學士院在禁中非內臣宣召無因得入故院門别設復門亦以其通禁庭也又學士院北扉者謂其在浴堂之南便於應召令學士初拜自東華門入至左承天門下馬待詔院吏自左承天門雙引至閣門此亦用唐故事也唐宣召學士自東門入者彼時學士院在西掖故自翰林院東門赴召非若今之東華門也至如挽鈴故事亦緣其在禁中雖學士院吏亦止于玉堂門外則其嚴密可知如今學士院在外與諸司無異亦設鈴索悉皆文具故事而巳又曰學士院玉堂太宗曽親幸至今惟學士上日許正坐他日皆不敢獨坐故事堂中設視草臺每草制則具衣冠據臺而坐今不復如此但存空臺而巳玉堂東承㫖閣子窗格上有火燃處太宗嘗夜幸玉堂時蘇易簡為學士巳寢遽起無燭具衣冠宫嬪自窗格引燭入照之至今不欲更易以為玉堂一盛事又曰舊翰林學士地勢清切皆不兼它務文館職任自校理以上皆有職錢惟內外制不給楊大年久為學士家貧請外表詞千餘言其間兩聨曰虛忝甘泉之從臣終作若敖之餓鬼從者之病莫興方朔之饑欲死京師百官上日惟翰林學士敇設用樂他雖宰相亦無此禮優伶並開封府㸃集陳和叔除學士時和叔知開封府遂不用女優學士院敇設不用女優自和叔始葉少藴石林燕語唐翰林院在銀臺之北乾封以後劉禕之元萬頃之徒時宣召草制其間因名北門學士今學士院在樞密之後腹背相倚不可南向故以其西廊西向為院之正門而後門北向與集英相直因榜曰北門兩省樞密院皆無後門惟學士院有之學士朝退入院與禁中宣命往來皆行北門而正門行者無幾不特取其便事亦以存故事也又曰學士院正㕔曰玉堂蓋道家之名初李肇翰林志末言居翰苑者皆謂凌玉清遡紫霄豈止於登瀛洲哉亦曰登玉堂焉自是遂以玉堂為學士院之稱而不為榜太宗時蘇易簡為學士上嘗語曰玉堂之設但虛傳其說終未有正名乃以紅羅飛白書玉堂之署四字賜之易簡即扃鐍置堂上每學士上事始得一開視最為翰林盛事紹聖間蔡魯公為承㫖始奏乞摹就杭州刻榜揭之以避英廟諱去下二字止曰玉堂云又政和五年御書摛文堂榜賜學士院又曰祖宗用人多以兩省為要而翰林學士尤號清切由是登二府者十嘗六七杜正獻公以清節名天下然一生多厯外職五為使者遍典諸名藩在內惟為三司戶部副使御史中丞知開封府遂至為樞密副使范文正公自諫官被謫召還以天章閣待制判國子監遷知開封府復謫晚乃自慶州亦入為樞密副使二公皆未嘗厯兩省而文正之文學不更文字之職世尤以為歉也又曰俗稱翰林學士為坡蓋唐德宗時嘗移學士院於金鑾坡上故亦稱鑾坡唐制學士院無常處駕在大內則置於明福門在興慶宫則置於金明門不專在翰林院也然明福金明不以為稱不常居之爾洪邁容齊隨筆翰苑故事今廢棄無餘惟學士入朝猶有朱衣院吏雙引至朝堂而止及景靈宫行香則引至立班處公文至三省不用申狀但尺紙直書其事右語云咨報尚書省伏候裁㫖月日押謂之咨報此兩事僅存又曰治平以前謂翰林學士及知制誥為兩制自翰林罷補外者得端明殿學士謂之換職熙寧以後乃始為龍圖紹興以來愈不及矣修起居注者序遷知制誥其次及辭不為者乃為待制趙康靖馮文簡曽魯公司馬公吕正獻公是也學士闕則次補或為宰相所不樂者猶得侍讀學士劉原甫是也在職未久而外除者為樞密直學士韓魏公是也亦為龍圖直學士歐陽公是也後來褒擢者僅得待制王時亨是也餘以善去者集英修撰而止耳李心𫝊朝野雜記國朝自建隆至熙寧在翰苑者一百八人而入端揆者二十一人太祖九人一相太宗二十三人四相真宗十五人四相仁宗五十二人九相神宗十人三相學士久次者眺文元迥十六年王文恭圭十三年王文忠堯臣十二年宋文安白章文獻得象趙清獻抃楊內翰偉皆十一年陶尚書穀丁文簡度皆十年扈尚書䝉蘇參政易簡賈參政黃中李昌武宗諤孫文懿抃胡文公宿皆九年徐常侍鉉楊文公億皆八年歐陽常侍迥宋宣獻綬歐陽公修皆七年梁給事周翰李相州維晏元獻殊馮章靖元皆六年熙寧後學士率一二年即遷久次者三四年而巳崇文院即三館按李文簡公燾長編云梁遷都汴正明中始於今右長慶門東北設屋數十間謂之三館蓋昭文集賢史館也初極湫隘才蔽風雨周廬徼道環於其側太宗即位因臨幸周覽顧左右曰若此之陋豈可蓄天下圖書延四方賢俊邪即詔有司於左升龍門裏舊車輅院地别建三館輪奐壯麗甲于內庭二月甲辰朔詔賜名為崇文院西序啓便門以備臨幸盡遷舊館之書以實之院之東廊為昭文書南廊為集賢書西廊有四庫分經史子集四部為史館書六庫書籍正副本分八萬卷册府之文煥乎一變矣馬端臨文獻通考祖宗藏書之所曰三館祕閣在左升龍門北是為崇文院自建隆至大中祥符著録總三萬六千二百八十卷八年館閣火移寓右掖門外謂之崇文外院借太清樓本補寫天聖三年成萬七千六百卷歸于太清九年冬新作崇文院館閣復而外院廢時巳增募寫書史専事完緝景祐初命翰林學士張觀知制誥李淑宋郊編四庫書判館閣官覆視録校二年上經史八千四百二十五卷明年上子集萬二千三百六十六卷差賜官吏器幣就宴輔臣兩制館閣官進管勾內侍官一等詔購求逸書復以書有繆濫不完始命定其存廢因倣開元四部録為崇文總目慶厯初成書凡三萬六百六十九卷然或相重亦有可取而誤棄不録者嘉祐四年右正言充祕閣校理吳及言內臣監館閣久不更書多亡失補寫不精請選館職分吏編寫重借書法求訪所遺事並施用令陳襄蔡抗蘇頌陳繹編定四館書不兼它局二年一代遂用黃紙寫印正本以防蠧敗又選京朝官州縣官四人編校二年遷館職闕即隨補嵗餘詔曰國初承五代之後簡編散落三館聚書僅才寓卷其後平定列國先收圖籍亦嘗分遣使人屢下詔令訪募異本校定篇目聽政之暇無廢覽觀然比開元遺逸尚衆宜加購賞以廣獻書中外士庶並許上館閣闕書卷支絹一匹五百卷與文資官明年冬奏黃本書六千四百九十六卷補白本二千九百五十四卷賜宴如景祐自是編寫不絶收獻書二百一十七部千三百六十八卷合崇文總目除前志所載刪去重復訛謬定注一千四百七十四部八千四百九十四卷熙寧四年集賢院學士史館修撰宋敏求言前代崇建冊府廣收典籍所以備人君覽觀以化成天下今三館祕閣各有四部書外經史子集其書類多訛舛纍加校正尚無善本蓋逐館幾四萬卷校讎之時務存速畢每帙止用元寫本一冊校正而巳更無兼本照對卷數既多難得精密故藏書雖富未及前代欲乞先以前漢書藝文志所載者廣求真本令在館供職官校正畢然後校後漢時諸書竊緣戰國以後及于兩漢皆是古書文義簡奧多有脫誤須得他本參定乞依昨來十七史例於京師及下諸路藏書之家借本謄寫送官俟其巳精方及魏晉次及宋齊至唐則分為數等取其堪𫝊者則校正之庶幾祕府文籍得以全善事雖不行然補寫校定訪求闕遺未嘗廢也七年命三館祕閣編校所看詳成都府進士郭友直及其子大亨所獻書三千七百七十九卷得祕閣所無者五百三卷詔官大亨為將作監主簿自是中外以書來上凡增四百四十部六千九百三十九卷元豐三年改官制廢館職以崇文院為祕書省刋寫分貯集賢院史館昭文館祕閣經籍圖書以祕書郎主之編緝校定正其脫誤則校書郎正字主之嵗於仲夏曝書則給酒食諫官御史及待制以上官畢赴崇寧中詔兩浙成都府路有民間鏤板奇書令漕司取索上祕書省大觀二年詔大司成分委國子監太學辟雍等官校本監書籍候畢令禮部覆校四年祕書監何志同言漢書七略凡為書三萬三千九百卷隋所藏至三十七萬卷唐開元間八萬九千六百卷慶厯間嘗命儒臣集四庫為籍名曰崇文總目凡三萬六百六十九卷慶厯距今未逺也按籍而求之十才六七號為全本者不過二萬餘卷而脫簡斷編亡散缺逸者浸多宜及今有所搜採視舊録有未備者頒其名數於天下選文學博雅之士求訪總目之外别有異書並借傳寫或官給劄即其家𫝊之就加校正上之冊府政和七年校書郎孫覿言太宗建崇文院為藏書之所景祐中仁宗詔儒臣即祕書省所藏編次條目所得書以類分門賜名崇文總目神宗以崇文院為祕書省釐正官名獨四庫書尚循崇文舊目頃因臣僚建言訪求遺書今纍年所得總目之外凡數百家幾萬餘卷乞依景祐故事詔祕書省官以所訪遺書討論撰次增入總目合為一書乞别製美名以更崇文之號乃命覿及著作佐郎倪濤校書郎汪藻劉彥通撰次名曰祕書總目宣和初提舉祕書省官建言置補寫御前書籍所於祕書省稍訪天下之書以資校對以侍從官十人為參詳官餘官為校勘官進士以白衣充檢閲者數人及年皆命以官四年四月詔曰朕惟太宗皇帝底寧區宇作新斯文屢下詔書訪求亡逸冊府四部之藏庶幾乎古厯嵗浸久有司玩習多致散缺私室所閟世或不𫝊可令郡縣諭㫖訪求許士民以家藏書在所自陳不以卷帙多寡先具篇目申提舉祕書省以聞聽㫖遞進可備收録當優與支賜或有所祕未見之書有足觀采即命以官議加崇奬其書録竟給還若率先奉行訪求最多州縣亦具名聞庶稱朕表章闡繹之意又詔曰三館圖書之富厯嵗滋久簡編脫落字畫訛舛校其卷帙尚多逸遺甚非所以示崇儒右文之意乃命建局以補全校正文籍為名設官總理募工繕寫一置宣和殿一置太清樓一置祕閣俾提舉祕書省官兼領凡所資用悉出內帑毋費有司庶成一代之典三詔同日而下四方竒書自是間出五年二月提舉祕書省言有詔搜訪士民家藏書籍悉上送官參校有無募工繕寫藏之御府近與三館參校榮州助教張頥所進二百二十二卷李東一百六十二卷皆係闕遺乞加褒賞詔頥賜進士出身東補迪功郎七年提舉祕書省又言取索到王闡張宿等家藏書以三館祕閣書目比對所無者凡六百五十八部二千四百一十七卷及集省官校勘悉善本比前後所進書數稍多詔闡補承務郎宿補迪功郎然自熙寧以來搜訪補緝至宣和盛矣至靖康之變散失莫考今見於著録往往多非曩時所訪求者惜哉僧文瑩玉壺清話興國中太宗建祕閣選三館書以置焉命參政李至専掌一日李昉宋琪徐鉉三學士扣閣求書一觀至性畏慎曰扃鑰誠某所掌籖函巾幕嚴祕難啓奈諸君非所職窺不便三人笑曰請無慮主上文明吾輩苟以觀書得罪不猶愈他咎乎因强拉祕鑰啓窺至密遣閣使聞奏上知之亟走就閣賜飲盡出圖籍古畫賜昉等縱觀昉上言請升祕閣于三館之次從之仍以飛白閣額賜之沈括夢溪筆談內諸司舍屋惟祕閣最宏壯閣下穹窿高敞相𫝊謂之朩天集賢院太平興國二年始建崇文院昭文館集賢院皆總為崇文院紹聖二年勑改集賢院為直祕閣集賢院學士為集賢殿修撰馬端臨文獻通考宋集賢院大學士一人以宰相充學士以給諫卿監以上充直學士不常置修撰以朝官充直院校理以京官以上充皆無常員凡昭文史館集賢亦謂之三館皆以兩省五品以上官一人判之沈括夢溪筆談集賢院記開元故事校書官許稱學士今三館職事皆稱學士用開元故事也葉少藴石林燕語集賢院學士故事初不分高下但以為名而品秩自從其官故吳正肅公以前執政資政殿大學士劉原甫以從官翰林侍讀學士皆以疾換授蓋不為要職也然在學士之列視待制則為優故元厚之以天章閣待制知南京仁宗即位亦特換授是嵗遷龍圖閣直學士知廣州蘇子容罷知制誥知亳州再遇赦遂復此職嘗請别其品秩不報故其謝表云惟麗正圖書之府盛開元禮樂之司在外館之地則為間正學士之名則巳重先朝著令或自二府公台而踐更近例遷官皆由兩省丞郎而兼領又云惟其恩數之優當有官儀之别亦嘗自言於公府豈敢取必於僉諧趙與時賔退録集賢殿修撰舊多以館閣久次者為之有自常僚超授要任未至從官者亦除修撰時人遂有冷撰熱撰之目近世士夫以集英為熱撰右文祕閣為冷撰非也右文即集賢政和五年改國史院宋國史院在宣徽北院之東謂之編修院按東京記云編修院俗呼為史院天聖初修真宗史欲重其任降勑宰相為提舉參知政事樞密副使為修史其同修史則以殿閣學士以上為之編修官以三館祕閣校理以上及京官充史畢即停元豐改官制日厯𨽻國史院每修前朝國史實録則别置國史實録院以首相提舉翰林學士以上為修國史餘侍從官為同修國史庶官為編修官實録院提舉官如國史從官為修撰餘官為檢討元祐復置國史院𨽻門下省明年又置國史院修撰兼知院事紹聖復以國史院歸祕書省洪邁容齊三筆本朝國史凡三書太祖太宗真宗曰三朝仁宗英宗曰兩朝神宗哲宗徽宗欽宗曰四朝雖各自紀事至於諸志若天文地理五行之類不免煩復元豐中三朝巳就兩朝且成神宗專以付曽鞏使合之鞏奏言五朝舊史皆纍世公卿道德文學朝廷宗工所上凖裁既以勒成大典豈宜輒議損益詔不許始謀纂定㑹以憂去不克成其後神哲各自為一史紹興初以其是非褒貶皆失實廢不用淳熙乙巳邁承乏修史丙午之冬成書進御遂請合九朝為一夀皇即以見屬嘗奏云臣所為區區有請者蓋以二百年間典章文物之盛分見三書倉卒討究不相貫屬及纍代臣僚名聲相繼當如前史以子係父之體類聚歸一若夫制作之事則巳經先正名臣之手是非褒貶皆有据依不容妄加筆削乞以此奏下之史院俾後來史官知所以編纂之意無或輒將成書擅行刪改上曰如有未穩處改削無害邁既奉詔開院亦修成三十餘卷矣而有永思攢宫之役才歸即去國尤袤以高宗實録為辭請權罷史院於是遂巳祥符中王旦亦曽修撰兩朝史今不傳葉少藴石林燕語國史院初開史官皆賜銀絹筆墨紙巳開而續除者不賜宣徽院宋宣徽院在嚴祗門外尚食局之東掌總領內諸司及郊祀朝㑹宴饗供張之儀一應內外進奉悉檢視其名物舊制左右宣徽使同掌院事共院異㕔止用南院印開寶九年以潘美依前山南東道節度使充宣徽北院使節度領宣徽自此始又以樞密副使楚昭輔權宣徽南院使以右衛大將軍判三司王仁瞻權宣徽北院使至和元年趙抃言近非次除宣徽使節度使頗為煩數今後文臣須曽厯兩府德望為人推服武臣曽經邊鄙建立功業者方許除拜兼宣徽使從之馬端臨文獻通考按樞密宣徽院皆始於唐然唐之職官志及㑹要略不言建置本末蓋因肅代以後特設此官以處宦者初亦無甚司存職業故史所不載及其後宦者之勢日盛則此二官日尊自五代以迄于宋皆以大臣為之然樞密既専掌兵事繁任重故其官不可一日廢而副二屬官亦不容不備宣徽位尊而事簡故常以樞密院官兼之或以待勳舊大臣之罷政者及官制行而事各有所𨽻則愈覺贅厖故遂廢罷云朝集院朝集院在朱雀門外咸平四年四月癸丑創建以待士大夫之聽除授者宋朝燕翼詒謀録真宗以朝官注擬于堂貧者留滯逆旅無以為資乃置朝集院于朱雀門外院既成詔升朝官以上到闕並館于院中官給公券出入則乘馬開封府差兵士隨直惟可至廟堂省部銓曹官㕔而巳雖欲出入市㕓不可得也故升朝官以上造朝則先匿於親戚故舊之家俟所幹置悉備方敢報閣門放見蓋閣門即日關報朝集院開封有人馬即至迎入院中雖不可出入而同院中士大夫日夕遊從情如兄弟或商確文字或彼此詢問風土或因而結交互相推薦其况味與栖栖逆旅者大不侔矣景祐二年十月辛亥詔復增置以士大夫之來者日多故也太常寺按宋敏求春明退朝録云太常寺舊在興國坊今三班院是也景祐初燕侍郎肅判寺㕔事畫寒林屏風時稱絶筆其後為判寺好事者竊取之嘉祐八年徙寺於福善坊其地本開封府納稅所英宗在藩邸判宗正寺建為廨舍既成而巳立為皇子遂為太常所請焉馬端臨文獻通考太常寺國初以來皆禁林之長主判而禮院自有判院同判院大中祥符中符瑞繁縟别建禮儀院輔臣主判而兩制為知院天禧末罷知院天聖中省禮儀院而寺與禮院事舊不相兼康定元年置判寺同判寺並兼禮儀事近有至六七人者元豐正名始専其職焉元祐初除吕純禮為太常少卿御史論門䕃得官不可任奉常於是外補按宋治平修禮書成百卷名曰太常因革禮初歐陽修同判太常寺奏禮院文字散失請差官編修嘉祐張洞奏用姚闢蘇洵編纂至是始成書云太學即國子監建隆中藝祖於南宫城立太學後為國子監真宗以書庫迫隘易其鄰錢俶居第中隙地十步以益之設齊凡二十每齊有爐亭仁宗慶厯六年詔以錫慶院益之大中祥符五年建閣藏太宗御書東有禮賢宅徽宗崇寧初又建辟雍于城南外圓內方為屋千八百七十二楹金貞祐時以其地當改築汴城徙之東南城下廢缺為多至元改為汴梁路太學之規制盡廢國朝洪武三年改為開封府儒學後圯于水永樂五年乃遷府學于麗景門內西北而宋太學諸碑刻皆移置其中馬端臨文獻通考周顯德二年以天福普利禪院建國子監宋初增修國子監學舍修飾先聖十哲像畫七十二賢及先儒二十一人像于東西廊之板壁又曰慶厯四年判國子監王拱辰等言首善自京師漢太學二百四十房千八百餘室生徒三萬人唐學舍亦千二百間今國子監才二百楹不足以容學者請以錫慶院為太學從之明年三司言更造錫慶院乏財費多而北使錫宴之所不可闕乃復以太學為錫慶院宋朝燕翼詒謀録國初凡事草創學校教養未甚加意皇祐三年七月壬子詔太學生舊制二百人如不足止百人為限其簡如此元豐二年十二月乙巳神宗始命畢仲衍蔡京范鏜張璪詳定於太學創八十齊三十人為額通計二千四百人內上舍生百人內舍生三百人外舍生二千人崇寧元年徽宗創立辟雍增生徒共三千八百人內上舍生二百人內舍生六百人教養于太學外舍生三千人教養于辟雍廢太學自訟齊太學之不率教者移之辟雍以祭酒總治兩學辟雍别置司業丞各一人博士十人正録各五人分為百齊講堂凡四所其後王黼反蔡京之政奏廢之而辟雍之士太學無所容矣周密癸辛雜識汴學曰文學武廟即昔時太學武廟舊址文廟居汴水南面城背河柳堤蓮池尚有璧水遺意太學與首善門五大字石刻皆蔡京奉勑書先聖之右為孟左為顔作一字位置不可曉北方學校皆然先聖先師各有片石鐫宋初臣所為贊獨先聖贊太祖御製也講堂曰明善藏書閣曰稽古有古碑數種如宋初翰苑題名開封教授題名九經石版堆積如山一行篆字一行真字又有大金登科題名女真進士題名其字類漢人而不可識又曰汴京天津橋上有奇石一大片上有自然華夷圖山青水緑河黃路白粲然如畫真異物也近聞移置汴京文廟中作拜石矣今不知所在開封府治開封府在宋為京兆舊治在京城內浚儀街西北即唐舊汴州也五代梁都汴號為東京置開封府後唐復為汴州晉漢周皆為東京開封府宋因之元改府為路曰汴梁路徙于行省之東以府治為河南道肅政廉訪司國朝洪武初罷司改路仍為開封府馬端臨文獻通考五代都汴為開封尹宋朝牧尹不常置太宗真宗皆嘗尹京後親王無繼者權知府一人以待制以上充掌正畿甸之事中都之獄訟皆受而聽焉小事則裁決大事則稟奏若承㫖巳斷者刑部御史臺無輒糾察典司轂下建隆以來為要劇之任崇寧三年蔡京乞罷權知府置牧尹各一員専總府事牧以皇子領尹以文臣充宋四朝志尹以親王為之號判南衙凡命知府必帶權字以翰林為之翰林學士及雜學士若待制則權發遣而巳嶽珂愧郯録按李燾續通鑑長編載元祐七年正月辛卯禮部侍郎范祖禹言工部乞遷開封府於舊南省夫土朩之工使匠人度之無不言費省而易可了及其作之便見費大臣恐枉勞人力虛費國用珂謂此乃私家通患而官府制度則反是味此奏之言則知當時雇直優厚無刋除而後致匠者之樂役方且隱欺以求用之不暇其不假滕口以蔓引推託也決矣先朝官吏律巳之廉持論之厚又於此乎見之故不以其事之微而遂略之也又曰珂按本朝親王為南衙故實有四建隆二年七月壬申太宗以晉王為開封尹同平章事開寶九年十月庚申魏悼王廷美以齊王為開封尹雍熙二年十月甲辰昭成太子元僖以陳王為開封尹兼侍中淳化五年九月壬申真宗以夀王為開封尹東宫為南衙故實有二至道元年八月壬辰真宗以皇太子判開封府宣和七年十一月戊午欽宗以皇太子為開封牧厯考二端親王為尹東宫為判為牧自有明據然則周必大所行制詞有所謂肆考南衙之故實一新大尹之多儀及名稱未正者皆誤也周密癸辛雜識開封府有府尹題名起建隆元年居潤繼而晉王荆王而下皆在焉獨包孝肅公姓名為人所指指痕甚深後衙有蠟梅一株人以為奇遂創梅花堂北人言河北惟懷孟州號小江南太行障其後地稍暖故有梅且山水清邃似江南云今開封府猶稱古南衙其後堂稱梅花堂皆襲宋之舊也祥符縣治祥符縣在唐為浚儀縣舊在京城內宣化坊晉高祖天福元年徙于崇仁坊周世宗顯德六年復徙城北封丘門外路東宋太祖乾德六年又徙安逺門外旌孝坊街之西真宗景德五年正月天書見于承天門上有大中祥符三篇遂改元曰大中祥符改浚儀縣為祥符縣燬于金季元至治間徙治雲老寺西至正間又為兵燬國朝洪武元年移置按察司東南以元稻田提舉司遺址改建三十二年淪于水遂徙今治于州橋北馬端臨文獻通考建隆元年詔天下諸縣除赤畿外有望緊上中下五等四千戶為望三千戶以上為緊二千戶以上為上千戶以上為中不滿千戶為中下五百戶以下為下總治民政勸課農桑凡戶口賦役錢穀賑濟給納之事皆掌之有孝弟行義聞于鄉閭者申州激勸以勵風俗有戍兵則兼兵馬都監或監押三年始以朝臣為知縣其間復參用京官或幕職為之至元時以縣上中下三等每縣各有達嚕噶齊掌縣印以知縣為縣尹掌判署事又有赤縣達嚕噶齊赤縣尹宋朝燕翼詒謀録今縣邑門樓皆曰勑書樓淳化二年詔曰近降制勑或有釐革刑名申明制度多所散失無以講求論報踰期有傷和氣自今州縣應所受詔勑並藏勑書樓咸著于籍今州縣不聞有勑書樓矣汴京遺蹟志卷三
