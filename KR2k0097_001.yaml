body:
  text: 汴京遺迹志卷一明李濂撰宋京城按宋史地理志舊城周回二十里一百五十五步東二門北曰望春初名和政南曰麗景南面三門中曰朱雀東曰保康大中祥符五年創建西曰崇明西二門南曰宜秋北曰閶闔北三門中曰景龍東曰安逺西曰天波以上宋初仍梁晉舊名至太平興國四年改今名新城周回五十里百六十五步大中祥符九年增築元豐元年重修政和六年詔有司度國之南展築京城移置官司軍營舊城四十八里二百二十三步周顯德三年以其土鹻取鄭州虎牢關土築之俗呼為卧牛城南三門中曰南薰東曰宣化西曰安上東二門南曰朝陽北曰含輝太平興國四年改寅賔後復西二門南曰順天北曰金輝北四門中曰通天天聖初改顯德後復東曰長景次東曰永泰西曰安肅初號衛州門以上皆因周舊名至太平興國四年改今名汴河上水門南曰大通太平興國四年賜名天聖初改順濟後復今名北曰宣澤舊南北水門皆曰大通熙寧十年改汴河下南曰上善北曰通津天聖初改廣津熙寧十年復惠民河上曰普濟下曰廣利廣濟河上曰咸豐下曰善利舊名咸通上南門曰永順熙寧十年賜名其後又於金輝門南置開逺門舊名通逺以上皆太平興國四年賜名天聖初改今名其濠曰護龍河闊十餘丈濠之內外皆植楊栁粉牆朱戶禁人往來城門皆甕城三層屈曲開門惟南薰新鄭新宋封丘正門皆直門兩重以通御路金元以後多湮塞舊有十三門南曰南薰陳州戴樓東曰新宋揚州新曹西曰新鄭萬勝固子北曰陳橋封丘新酸棗衛州今道路所通者惟曹鄭陳州揚州南薰固子封丘七門耳固或作堌非也宋朝會要自朱梁建都以汴州為東京皆因藩鎮舊制但改名額而周顯德初始廣新城周回四十八里二百二十三步趙德麟侯鯖録舊城周回二十里一百五十五步即汴州城唐建中二年節度使李勉重築國初號曰闕城亦曰裏城新城乃周世宗顯德二年四月詔别築新城周回四十八里二百二十三步號曰外城又曰羅城亦曰新城元豐中裕陵命內侍宋用臣重築之宋敏求東京記周世宗顯德二年四月詔京城四面别築羅城三年正月發京畿滑鄭曹之民命薛可言等督之仍命韓通總其事王朴經度凡通衢委巷廣袤之間皆朴定其制踰年而成神宗熙寧中始四面為敵樓作甕城及濬治濠塹周密癸辛雜志汴之外城周世宗時所築宋神宗又展拓之其高際天堅壯雄偉南關外有太祖講武池周美成汴都賦形容盡矣梁王鼓吹臺徽宗龍德宫舊址尚在嶽珂程史開寶戊辰藝祖初修汴京大其城址曲而宛如蚓屈焉耆老相傳趙中令鳩工奏圖初取方直四面皆有門坊市經緯其間井井繩列上覽而怒自取筆塗之命以幅紙作大圈紆曲縱斜旁注云依此修築故城即當時遺迹也時人咸罔測多病其不宜於觀美熙寧乙卯神宗在位遂欲改作覽苑中牧豚及內作坊之事卒不敢更第增陴而巳及政和間蔡京擅國亟奏廣其規以便宫室苑囿之奉命宦侍董其役凡周旋數十里一撤而方之如矩墉堞樓櫓雖甚藻飾而蕩然無曩時之堅朴矣一時迄功第賞侈其事至以表記兩命詞科之題槩可想見其張皇也靖康金人南牧尼堪斡里雅布揚鞭城下有得色曰是易攻下令植炮四隅隨方而擊之城既引直一炮所望一壁皆不可立竟以此失守藝祖沈幾逺睹至是始驗宸筆所定圖宋承平時藏祕閣今不復存和維愚見紀忘汴之外城門名各有意義如云鄭門以其通往鄭州也如云酸棗門以其通往延津即舊酸棗縣也其固子門未知其義近閲宣和遺事內載上清寶籙宫成浚濠水深三丈東則景龍門橋西則天波門橋二橋之下壘石為固引舟相通而橋上人物往來不覺又郡城沿革云西面門從南曰順天門俗名新門次曰利澤水門汴河自此入城次北曰開逺門又名萬勝門次北曰金輝門俗名固子門歐陽公歸田録亦云飲于固子橋然則以壘石為固而名其橋因以名其門也周禮掌固之職掌修城郭樹渠之固以為固所依阻故曰固或曰固作顧視也汴城臥牛之形北視黃河為子而子不敢來害其母此臆度之説無所據今省城即宋之舊裏城周回二十里一百九十步高三丈五尺國朝洪武初重築外包以磚門五東曰麗景南曰南薰西曰大梁北曰安逺東北曰仁和外建月城上各建樓其西舊名望京角樓四敵臺八十四窩鋪八十三東西南門甕城內皆有漢夀亭侯廟而北門甕城內則玄帝廟也皆近時建宋大內宫室按宋史地理志藝祖因周之舊為都建隆三年始廣皇城東北隅命有司畫洛陽宫殿之制按圖修之而皇居始壯麗矣宫城周回五里南三門中曰乾元宋初依梁晉之舊名曰明德太平興國三年改丹鳯大中祥符八年改正陽明道二年改宣德雍熙元年改今名東曰左掖西曰右掖東西面門曰東華西華舊名寬仁神獸開寶三年改今名熙寧十年又改東華門北曰謻門北一門曰拱宸舊名玄武大中祥符五年改今名熙寧十年改門內西橫門曰臨華乾元門內正南門曰大慶東西橫門曰左右升龍左右北門內各二門曰左右長慶熙寧間改左右長慶隔門曰左右嘉肅左右銀臺東華門內一門曰左承天祥符乾德六年賜名大中祥符元年正月天書降其上詔加祥符二字而增葺之西華門內一門曰右承天左承天門內道北門曰宣祐舊名光天大中祥符八年改大寧明道元年改今名正南門內正殿曰大慶東西門曰左右太和宋初曰日華月華大中祥符八年改今名正衙殿曰文德宋初曰文明雍熙元年改今名熙寧間改南門曰端禮兩掖門曰東西上閣東西門曰左右嘉福宋初曰左右勤政明道元年十月改今名大慶殿舊名崇元乾德四年重修改曰乾元太平興國九年改朝元大中祥符八年改天安明道三年改今名北有紫宸殿舊名崇德明道元年改視朝之前殿也西有垂拱殿舊名長春明道元年改常日視朝之所也次西有皇儀殿開寶四年賜名滋福明道元年十月改又次西有集英殿舊名廣政開寶三年曰大明淳化間曰含光大中祥符八年名會慶明道元年十月改今名宴殿也殿後有需雲殿舊名玉華後改瓊華熙寧初改今名東有升平樓舊名紫雲明道元年改宫中觀宴之所也宫後有崇政殿舊名簡賢講武太平興國二年改今名熙寧間改北橫門曰通極閲事之所也殿後有景福殿西有殿北向曰延和便坐殿也大中祥符七年建後苑東門洎北向便殿成賜名宣和門承明殿明道元年改端明二年改今名凡殿有門者皆隨殿名宫中又有延慶舊名萬嵗大中祥符七年改安福觀文舊名集聖明道二年改肅儀慶厯八年改今名清景慶雲玉京等殿夀寧堂清景明道元年改延春閣舊名萬春寶元元年改福寧殿即延慶明道元年改東西有門曰左右昭慶觀文殿西門曰延真其東真君殿曰積慶前建感真閣又有龍圖閣下有資政崇和宣德述古四殿天章閣下有群玉蘂珠二殿後有寶文閣即夀昌閣慶厯元年改閣東西有嘉德延康二殿前有景輝門後苑東門曰寧陽即宣和門明道元年改苑內有崇聖殿太清樓其西又有宜聖化成即玉宸殿明道元年改金華西涼清心等殿翔鸞儀鳯二閣華景翠芳瑶津三亭延福宫有穆清殿延慶殿北有柔儀殿初有殿無名章獻太后名曰崇徽明道元年改寶慈景祐二年改今名崇徽殿北有欽明殿舊名天和明道元年改觀文又改清居治平三年改今名延福宫北有廣聖宫天聖二年建名長寧景祐二年改內有太清玉清沖和集福會祥五殿建流杯殿於後苑明道元年八月修文德殿成是夜禁中火延燔崇德長春滋福會慶延慶崇徽天和承明八殿命宰相吕夷簡為修葺大內使樞密副使楊崇勳副之發京東西河北淮南江東西路工匠給役內出乘輿物左藏庫易緍錢二十萬助其費以故改諸殿名又有慈德殿楊太后所居景祐元年賜名觀稼殿在後苑觀種稻景祐二年創建延羲閣在崇政殿內邇英閣在崇政殿西南蓋侍臣講讀之所也與延羲同景祐三年賜名隆儒殿邇英閣後小殿皇祐三年始賜名慈夀殿皇太后所居治平元年賜名慶夀宫保慈宫熙寧二年建玉華殿在後苑基春殿熙寧七年建在玉華殿後睿思殿八年建承極殿元豐三年建崇慶隆祐二宫元祐元年建睿成宫神宗所居東宫紹聖二年賜名宣和殿在睿思殿後紹聖二年四月殿成其東側别有小殿曰凝芳其西曰瓊芳前曰重熙後曰環碧元符三年廢崇寧初復作大觀三年徽宗製記刻石實蔡京為之聖瑞宫皇太妃所居因以名宫顯謨閣元符元年建藏神宗御集建中靖國元年改曰熙明尋復舊玉虛殿元符初建玉華閣大觀初建在宣和殿後親蠶宫政和元年建燕寧殿在延福北奉安仁宗慈聖光獻皇后御容延福宫政和三年春新作於大內北拱辰門外舊宫在後苑之西南今其地乃百司供應之所凡內酒坊裁造院油醋柴炭鞍轡等庫悉移他處又遷兩僧寺兩軍營而作新宫焉始南向殿因宫名曰延福次曰蘂珠有亭曰碧琅玕其東門曰晨暉其西門曰麗澤宫左復列二位其殿則有穆清成平會寧睿謨凝和崑玉群玉其東閣則有蕙馥報瓊蟠桃春錦疊瓊芬芳麗玉寒香拂雲偃蓋翠葆鉛英雲錦蘭薰摘金其西閣有繁英雪香披芳鉛華瓊華文綺絳萼穠華緑綺瑶碧清陰秋香叢玉扶玉絳雲會寧之北疊石為山山上有殿曰翠微旁為二亭曰雲巋曰層巘凝和之次閣曰明春其高踰一百一十尺閣之側為殿二曰玉英曰玉澗其背附城築土植杏名曰杏岡覆茅為亭修竹為竿引流其下宫之右為佐二閣曰宴春廣十有二丈舞臺四列山亭三峙鑿圓池為海跨海為二亭架石梁以升山亭曰飛華橫度之四百尺有奇縱數之二百六十有七尺又疏泉為湖湖中作隄以接亭隄中作梁以通湖梁之上又為茅亭鶴莊鹿寨孔翠諸柵蹄尾動數千嘉花名木類聚區别幽勝宛若生成西抵麗澤不類塵境初蔡京命童貫楊戩賈詳藍從熙何欣等分任宫役五人者因各為制度不務沿襲故號延福五位東西配大內南北稍劣其東直景龍門西抵天波門宫東西二橫門皆視禁門法所謂晨暉麗澤者也而晨暉門出入最多其後又跨舊城修築號延福第六位跨城之外浚壕深者水三尺東景龍門橋西天波門橋二橋之下疊石為固引舟相通而橋上人物外自通行不覺也名曰景龍江其後又闢之東過景龍門至封丘門景龍江北有龍德宫初元符三年以懿親宅潛邸為之及作景龍江江夾岸皆奇花珍木殿宇比比對峙中塗曰壺春堂絶岸至龍德宫其地嵗時次第展拓後盡都城一隅焉名曰擷芳園山水美秀林麓暢茂樓觀參差猶艮嶽延福也保和殿政和三年四月作九月殿成總為屋七十五間玉清神霄宫政和三年建舊名玉清和陽在福寧殿東七年改今名上清寶籙宫政和五年徽宗因林靈素之言在景龍門對景輝門作上清寶籙宫密連禁署內列亭臺館舍不可勝計命道士施民符藥徽宗時登皇城下視之又開景龍門城上作復道通寶籙宫以便齋醮之事徽宗數從復道上往來是年十二月始張燈於景龍門上下名曰預賞元宵宋朝會要今大內即宣武軍節度使治所朱梁建都遂以衙署為建昌宫晉天福初又為大寧宫但改名號而巳周世宗雖加營繕猶未合古制建隆三年發開封浚儀民廣皇城四年五月太祖命有司畫洛陽宫殿按圖修之自是皇居始壯麗矣趙德麟侯鯖録唐東京宫城東西四里一百八十八步南北二里八十五步周回十三里二百四十一步高四丈八尺宋東京宫城周回五里邵氏聞見録東京唐汴州梁太祖因宣武軍置建昌宫晉改曰大寧宫周世宗雖加營繕猶未如王者之制藝祖得天下之初即遣使圖西京大內按以改作既成帝坐萬嵗殿洞開諸門端直如繩嘆曰此如吾心小有私曲人皆見之矣帝一日登明德門指其榜問趙普曰明德之門安用之字普對曰助語帝曰之乎者也助得甚事普無言葉少藴石林燕語京師大內梁氏建國止以為建昌宫本唐宣武節度治所未暇增大也後唐莊宗遷洛復廢以為宣武軍晉天福中因高祖臨幸更號大寧宫今新城是也其增展外羅城蓋周世宗始為之太祖建隆初以大內制度草創乃詔圖洛陽宫殿展皇城東北隅以鐵騎都尉李懷義與中貴人董役按圖營建初命懷義等凡諸門與殿須相望無得輒差故垂拱福寧柔儀清居四殿正重而左右掖與升龍銀臺等諸門皆然惟大慶殿與端門少差爾宫成太祖坐福寧寢殿令闢門前後召近臣入觀諭曰我心端直正如此有少偏曲處汝曹必見之矣群臣皆再拜後雖嘗經火屢修率不敢易其故處矣按石林燕語與邵氏所記略同又曰大慶殿初名乾元太平興國祥符中皆因火改為朝元天安景祐中方改今名有龍墀沙墀凡正至大朝會尊號則御焉郊祀大禮則駕宿於殿之後閣百官為次宿於前之兩廊皇祐初始行明堂之禮又以為明堂仁宗御篆明堂二字每行禮則旋揭之事巳復去文德殿在大慶殿之西少次舊曰端明後改文明祥符中因火再建易今名紫宸殿在大慶殿之後少西其次又為垂拱殿自大慶殿後紫宸垂拱之兩間有柱廊相通每月視朝則御文德所謂過殿也東西閣門皆在殿後之兩旁月朔不御過殿則御紫宸所謂入閣也月朔與誕節郊廟禮成受賀契丹辭見亦皆御紫宸文德遇受册發册明堂宣赦亦御而不常用宣麻不御殿而百官即庭下聽之紫宸不受賀而拜表稱賀則於東上閣門國忌未赴景靈宫先進名奉慰則於西上閣門亦既庭下拜而授閣門使蓋以閣不以殿也惟垂拱為日御朝之所集英殿舊大明殿也明道中改今名每春秋大燕皆在此太祖嘗御䇿制科舉人故後為進士殿試之所其東廊後有樓曰升平舊紫雲樓也每大燕則宫中登而觀焉皇儀殿舊名滋福咸平太宗明德皇后居之以為萬安宫后崩復舊明道中改今名故常廢而不用以為治后喪之所又曰東華門直北有東向門西與內東門相直俗謂之謻門而無榜張衡東京賦所謂謻門曲榭者也薛綜注謻曲屈斜行依城池為道集韻謻字或作䔟以為宫室相連之稱今循東華門牆而轉東面為北門亦可謂斜行依牆矣凡宫禁之言相承必皆有自也按字訓謻别也東京賦但言别門耳洪邁容齋三筆自漢以來宫室土朩之盛如漢武之甘泉建章陳後主之臨春結綺隋煬帝之洛陽江都唐明皇之華清連昌巳載史册國朝祥符中姦臣導諛為玉清昭應會靈祥源諸宫觀議者固以崇侈勞費為戒然未有若政和蔡京所為也京既柄政招權璫童貫楊戩賈詳藍從熙何欣五人分任其事於是始作延福宫而極其工麗矣周密癸辛雜識汴梁宋時宫殿凡樓觀棟宇窗戶往往題燕用二字竊意必當時人匠姓名耳及金海陵修燕都擇汴京窗戶刻鏤工巧者以往始知興廢皆定數而燕用二字乃先兆也又曰京師有八卦殿八門各有樹朩山石無一相類皆嵌石座亦穿空與石竅相通上欲有所往與所幸美人自一門出宫人仙衣扶輪一聲霹靂則仙樂競奏雲霄間石竅中腦麝煙起如霧楊奐汴故宫記巳亥春三月按部至于汴汴長吏宴于廢宫之長生殿懼後世無以考為纂其大槩云皇城南外門曰南薰南薰之北新城門曰豐宜橋曰龍津橋北曰丹鳯而其門三丹鳯北曰州橋橋少北曰文武樓遵御路而北橫街也東曰太廟西曰郊社正北曰承天門而其門五雙闕前引東曰登聞檢院西曰登聞鼓院檢院之東曰左掖門門之南曰待漏院鼓院之西曰右掖門門之南曰都堂承天之北曰大慶門而日精門左升平門居其東月華門右升平門居其西正殿曰大慶殿東廡曰嘉福樓西廡曰嘉瑞樓大慶之後曰德儀殿德儀之東曰左升龍門西曰右升龍門正門曰隆德曰蕭牆曰丹墀曰隆德殿隆德之左曰東上閣門右曰西上閣門皆南嚮東西二樓鐘鼓之所在鼓在東鐘在西隆德之次曰仁安門仁安殿東則內侍局內侍之東曰近侍局近侍之東曰嚴祗門宫中則曰撒合門少南曰東樓即授除樓也西曰西樓仁安之次曰純和殿正寢也純和西曰雪香亭雪香之北后妃位也有樓樓西瓊香亭亭西曰涼位有樓樓北少西曰玉清殿純和之次曰寧福殿寧福之後曰苑門由苑門而北曰仁智殿有二大石左曰敷錫神運萬嵗峯右曰玉京獨秀太平巖殿曰山莊莊之西南曰翠微閣苑門東曰仙韶院院北曰湧翠峯峯之洞曰大滌湧翠東連長生殿殿東曰湧金殿湧金之東曰蓬萊殿長生西曰浮玉殿浮玉之西曰瀛洲殿長生之南曰閲武殿閲武南曰內藏庫由嚴祗門東曰尚食局尚食東曰宣徽院宣徽北曰御藥院御藥北曰右藏庫右藏之東曰左藏宣徽東曰點檢司點檢北曰祕書監祕書北曰學士院學士之北曰諫院諫院之北曰武器署點檢之南曰儀鸞局儀鸞之南曰尚輦局宣徽之南曰拱衛司拱衛之南曰尚衣局尚衣之南曰繁禧門繁禧南曰安泰門安泰西與左升龍門直東則夀聖宫兩宫太后位本明俊殿試進士之所宫北曰徽音殿徽音之北曰燕夀殿燕夀殿垣後少西曰震肅衛司東曰中衛尉司儀鸞之東曰小東華門更漏在焉中衛尉司東曰祗肅門祗肅門東少南曰將軍司徽音夀聖之東曰太居苑苑之殿曰慶春慶春與燕夀並小東華與正東華對東華門內正北尚廏局尚廏西北曰臨武殿左掖門正北尚食局局南曰宫苑司宫苑司西北曰尚醖局湯藥局侍儀司少西曰符寶局器物局西則撒合門嘉瑞樓西曰三廟正殿曰德昌東曰文昭殿西曰光興殿並南嚮德昌之後宣宗廟也宫西門曰西華與東華直其北門曰安貞二大石外凡花石臺榭池亭之細並不録觀其制度簡素比土階茅茨則過矣視漢之所謂千門萬戶珠璧華麗之飾則無有也然後之人因其制度而損益之以求其稱斯可矣國朝洪武十一年即宋故宫遺址建周王府乃太祖第五皇子諡定始分封之國宗室繁衍甲於它藩城中井水悉苦鹻難飲汴人率於城外汲水飲之惟周府太廟前井水甘蓋宋大內舊井也宋內諸司按東京夢華録內諸司皆在禁中如學士院皇城司四方館客省東西上閣門通進司內弓劒鎗甲軍器等庫翰林司茶酒局也內侍省入內內侍省內藏庫奉宸庫景福殿庫延福宫殿中省六尚局尚藥尚食尚輦尚醖尚舍尚衣諸閣分內香藥庫後苑作翰林書藝局醫官局天章等閣明堂頒朔布政府葉少藴石林燕語太祖初平諸偽國得其帑藏金帛以别庫儲之曰封樁庫本以待經營契丹也其後三司嵗終所用常賦有餘亦併歸之嘗諭近臣欲候滿三五百萬即以與契丹以贖幽燕故土不從則為用兵之費蓋不欲常賦之外橫斂于民故不𨽻于三司今內藏庫是也又曰內香藥庫在謻門外凡二十八庫真宗賜御製七言二韻詩一首為庫額曰每嵗沈檀來逺裔纍朝珠玉寶皇居今辰內府初開處充牣尤宜史筆書洪邁容齋三筆神宗嘗憤北狄崛強慨然有恢復幽燕之志於內帑置庫自製四言詩曰五季失圖獫狁孔熾藝祖造邦思有懲艾爰設內府期以募士曽孫保之敢忘厥志凡三十二庫每庫以一字揭之儲積皆滿又别置庫賦詩二十字分揭于上曰每虔夕惕心妄意遵遺業顧豫不武資何日成戎捷其用志如此國家帑藏之富可知宋外諸司按東京夢華録外諸司左右金吾街仗司法酒庫內酒坊牛羊司乳酪院儀鸞司帳設局也車輅院供奉庫雜物庫雜賣務東西作坊萬全造軍器所修內司文思院上下界綾錦院文繡院軍器所上下竹朩務箔場車營致逺務騾務駝坊象院作坊物料庫東西窑務內外物庫油醋庫京城守具所鞍轡庫養馬曰左右騏驥院天駟十監河南北十炭場四熟藥局內外柴炭庫軍頭引見司架子營樓店務店宅務𣙜貨務都茶場大宗正司左藏大觀元豐宣和等庫編佑局打套所諸米麥等自州東虹橋元豐倉順成倉東水門裏廣濟裏河折中外河折中富國廣盈萬盈永豐濟逺等倉陳州門裏麥倉子州北夷門山五丈河諸倉約共五十餘所日有支納下卸即有下卸指揮兵士支遣即有袋家每人肩兩石布袋遇有支遣倉前成市近新城有草場二十餘所每遇冬月諸鄉納粟稈草牛車闐塞道路車尾相銜數千萬輛不絶沈括夢溪筆談太祖朝常戒禁兵之衣長不得過膝買魚肉及酒入營門者皆有罪又制更戍之法欲其習山川勞苦逺妻孥懷土之戀兼外戍之日多在營之日少人人少子而衣食易足又京師衛兵請糧者營在城東者即令赴城西倉在城西者即令赴城東倉不許傭僦車腳皆須自負嘗親登右掖門觀之蓋使之勞力制其驕惰故士卒衣食無外慕安辛苦而易使宋明堂徽宗政和五年乙未秋八月始作明堂初元豐禮官以明堂寓大慶殿别請建立以盡嚴奉而未暇講求至是下詔內出圖式宣示于崇政殿且以明堂宜正臨丙方近東以據福德之地乃徙祕書省于宣德門東而以省地營之命蔡京為明堂使開局興工日役萬人按宋史是年夏六月作三山河橋役夫數十萬民不聊生秋八月又作明堂然六月八月正農事方殷之時而役大衆如此奪民之時傷民之力為人上者略不少恤可謂失計之甚矣未幾而禍變作亦未聞明堂出一善政也可勝慨哉汴京遺迹志卷一
