body:
  text: 汴京遺蹟志卷十六明李濓撰藝文三碑上清儲祥宫碑宋蘇軾元祐六年六月丙午制詔臣軾上清儲祥宫成當書其事於石臣軾拜手稽首言曰臣以書命待罪北門記事之成職也然臣愚不知宫之所以廢與興凡材用之所從出敢昧死請乃命有司具其事以詔臣軾始太宗皇帝以聖文神武佐太祖定天下既即位盡以太祖所賜金帛作上清宫朝陽門之內旌興王之功且為五代兵革之餘遺民赤子請命上帝以至道元年正月宫成民不知勞天下頌之至慶厯三年十二月有司不戒于火一夕而燼自是為荆棘瓦礫之場凡三十七年元豐二年二月神宗皇帝始命道士王太初居宫之故地以法籙符水為民禳禬民趨歸之稍以其力修復祠宇詔用日者言以宫之所在為國家子孫也乃賜名上清儲祥宫且賜度牒與佛廟神祠之遺利為錢一千七百四十七萬又以官田十四頃給之刻玉如漢張道陵所用印及所被冠佩劔履以賜太初所以寵之者甚備宫未成者十八而太初卒太皇太后聞之喟然嘆曰民不可勞也兵不可役也大司徒錢不可發也而先帝之意不可以不成乃敇禁中供奉之物務從約損斥賣珠玉以巨萬計凡所謂以天下養者悉歸之儲祥積㑹所賜為錢一萬七千六百二十八萬而宫乃成內出白金六千三百餘兩以為香火瓜華之用召道士劉應真嗣行太初之法命入內供奉官陳衍典領其事起四年之春訖六年之秋為三門兩廡中大殿三旁小殿九鐘經樓二石壇一建齊殿于東以待臨幸築道館于西以居其徒凡七百餘間雄麗靚深為天下偉觀而民不知有司不與焉嗚呼其可謂至德也己矣臣謹按道家者流本出於黃帝老子其道以清淨無為為宗以虛明應物為用以慈儉不爭為行合於周易何思何慮論語仁者靜夀之說如是而己自秦漢以來始用方士言乃有飛仙變化之術黃庭大洞之法太上天真木公金母之號延夀赤明龍漢開皇之紀天皇太乙紫微北極之祀下至於丹藥竒技符籙小數皆歸於道家學者不能必其有無然臣嘗竊論之黃帝老子之道本也方士之言末也修其本而末自應故仁義不施則韶濩之樂不能以降天神忠信不立則射鄉之禮不能以致刑措漢興蓋公治黃老而曹參師其言以為治道貴清靜而民自定以此為政天下歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靜民以寧一其後文景之治大率依本黃老清心省事薄斂緩獄不言兵而天下富臣觀上與太皇太后所以治天下者可謂至矣檢身以律物故不怒而威捐利以豫民故不藏而富屈已以消兵故不戰而勝虛心以觀世故不察而明雖黃帝老子其何以加此本既立矣則又惡衣菲食卑宫室陋器用斥其贏餘以成此宫上以終先帝未究之志下以為子孫無疆之福宫成之日民大和㑹鼓舞謳歌聲聞于天天地喜答神祇來格祝史無求福祿自至時萬時億永作神主故曰修其本而末自應豈不然哉臣既書其事皇帝若曰大哉太祖之功太宗之德神宗之志而聖母成之汝作銘詩而朕書其首曰上清儲祥宫碑臣軾拜手稽首獻銘曰天之蒼蒼正色非邪其視下也亦若斯也我作上清儲祥之宫無以來之其肯我從元祐之政媚于上下何修何營曰是四者民懷其仁吏服其亷鬼畏其正神豫其謙帝既子民維子之視云何事帝而瘠其子允哲文母以公滅私作宫千柱人初不知於皇祖宗在帝左右風馬雲車從帝來狩閲視新宫察民之言佑我文母及其孝孫孝孫來饗左右耆耉無競維人以燕我後多士為祥文母所培我膺受之篤其成材千石之鐘萬石之簴相以銘詩震于四海汴梁廟學碑元姚燧自魯哀公十六年當周敬王四十一年壬戌孔子卒厯六國秦漢至孝武即位之年辛丑為三百四十年其聞知者才司馬遷一人而止耳既編其年與夫言行出處之槩為世家又為弟子傳識其居里問對與夫經事何君又考知其少孔子幾何嵗皆孔門弟子與孟氏所未著其有功聖門真非淺淺哉然猶有一二可疑者其說世家弟子蓋三千焉身通六藝者七十二人而弟子𫝊則曰孔子曰受業身通者七十有七人皆異能之士也夫既曰身通六藝矣雖未盡合聖人為教之本然而猶有所指名也其曰受業身通竟不發為所通何業又曰皆異能之士聖人為教于以修叙彛倫而容異能者于其間乎孔子自言七十有七人則七十二人者誰後是五人邪其為傳先顔回曽參而後無繇蒧固己戾於明人倫其甚誤至以闞止子我為宰豫又曰孔子之所嚴事者於周則老子於衛蘧伯玉於楚老萊子於鄭子産於齊晏平仲於魯孟公綽孔子於公綽止稱其不欲與優為趙魏老子産有君子之道四其他不足者亦多也老萊子書今存其為道術尚黃帝老子為聖人所與者不經見子入太廟每事問况老子周守藏室之史問禮則有之使及見其書曰失道而後德失德而後仁失仁而後義失義而後禮夫仁義禮根於人心之固有而視為世降之不同未必不見黜於孔子况為其道乎哉惟蘧伯玉寡過未能為不悖於聖學故與之特深至漢文翁圖石室列之七十二人中亦可灼其非師而實弟子云晏平仲者如遷之言足以暴其人賊聖賢之罪何也夫人既嚴事乎己茍於學術之僻歸宿之差何害於明告當欲封孔子尼溪之田乃說其君景公曰儒者滑稽不可軌法倨傲自順不可為下崇喪遂哀破産厚葬不可為俗游說乞貸不可為國盛容飾繁登降纍世不能殫其學當年不能究其禮非所以移齊俗而先細民也報人嚴事之道者固如是乎哉先儒嘗疑晏子尚儉墨子欲貴其道取必於晏子之言不然何為亦見墨子之書而遷辨之不明也又自叙曰儒者不能通其學當年不能究其理博而寡要勞而少功由是知二語者非必一出晏子乃遷薄儒素定於胸中者也杜預春秋傳叙曰子路欲使門人為臣孔子以為欺天而云仲尼素王丘明素臣又非通論也其享配諸位善乎柳完元序道州廟碑曰從於陳蔡亦各有號言出一時非盡其徒也于後失厥所謂妄意科等坐祀十人以為哲豈夫子志哉况祀無繇蒧鯉於庭其失至於崇子而抑父又非遷之為傳矣夫為是學宫將以明人倫於天下而倒施錯置於數筵之地如此奚以為訓又在在之廟皆泥像其中北史敢以造泥人銅人者門誅則泥人固非中立為主以祀聖人法也後世莫覺其非亦化其道而為之郡異縣殊不一其狀長短豐瘠老少美惡惟其工之巧拙是隨就使盡善亦豈其生盛德之容甚非神而明之無聲無臭之道也曰是溺習之己然若何而變曰人臣有見上布是區區則可若夫議禮也制度也考文也天子司之亦幸一旦遑於稽古之事學禮之臣必有能䇿其一二得所當議者矣至元庚寅汴梁新廟成學録劉元佐為狀以其府諸公之意求記其由故燧首之以此河南省城修五門碑明李夢陽河南省城者宋之內京城也是城也起自五代至宋而益飭神宗時則更築新城於外今曰土城者是也宋亡入金厯元外城毁而內城存我髙皇帝定天下也蹕於汴駐焉但遣將北伐於是升汴為京設衛十有六填實之守焉是故是城也繕之視他城堅甃皆磚也然又重磚而城根磚若石入之地又數尺天順辛巳河灌城乃獨其北門陷而是城也自降而為省也置王府三司又調十五衛去遂空其四隅斥鹵水國又今百五十年故其城若門雖大勢巍壯而中損蝕者不少矣嘉靖元年太監吕公來鎮茲土登城躡樓俯仰者久之乃慨然而嘆曰諺有之曰些小不補直至尺五是城也及今修之費猶省也夫門者城之喉樓者門之冕也城修宜自門始於是集三司長暨庶尹羣吏議城事已又謀之撫按之臣乃僉罔協於厥迪於是吕公則毅然任曰天子勑憲之來也若曰城池軍馬汝飭汝核今之舉固費省而功倍者乃僉罔協於厥迪僉曰動大衆者占之人舉大事者審乎時事莫大於城城非大動衆不集今兵饉疫癘我民未和記有之曰因天事天因地事地度時未若占人靡和其何城之為吕公曰嗟天下不有惠而不費勞而弗怨者乎是城也先其五門及西關土城若門計費萬金耳今無礙帑金若干斤更稍稍益之便足矣夫汴舊京也游食者夥饉則歸之盜兵城之役誠計日傭之菜色可活而亡命可收也如是則不動衆而大事集矣僉曰竊又聞之事無巨細人存則行是城也前修之者屢矣然上侵而下漁費倍而效寡又土木之役破除易而稽察難吕公曰嗟利弊由人者耳茍子之不欲雖賞之不竊豫嘗奉命修京之東門矣人無玩心工無耗財是城也舉度不中厥惟豫咎於是巡撫都御史何公巡按御史王公清軍御史喻公暨三司長稔知吕公賢又計帑金得十之六七㑹又有東冦閉城而門之樞朽鐡葉爛脫於是僉議始同而城之役興矣是役也始於東門程能計日經費節力奬勤黜惰勾稽有簿大持小維工傭稱事執信布義聽其自來凡城之材礪鍛磚堊木石槱炭膠角顔采皆公市平取官靡告困民罔知勞一門既一門繼五門既土城若門繼行之有序匪棘匪紓革之仍之各適厥中於是撤朽剜蝕植頽築虛凸凹完齾濬淺疏塞逺而望之樓櫓翬赫粉堞煥如堅者屹屹深者鬱鬱直者嵂嵂橫者翼翼迫而察之石楣鐡樞虹梁臥衝隍塹縈輸蓋一夫當關萬夫莫前者也登而覽之嵩行失險大河奪色俯而視之司府填委倉庫充實旌棨甲胄周廬是嚴足以域民威暴壯氣助武然計之則費省要之則功倍斯何也所謂事無巨細人存則行者也巡撫王公巡按俞公清軍戴公之來頗亦異同於斯城及見吕公賢乃亦咸相于厥成乃吕公則愈心於城事時時出督勞之曰嗟爾官爾工爾傭毋欺毋玩毋自阱爾躬是故一門成則盡徙其餘于他門即拳石塊礫寸鐡尺朩敝杵壞畚無妄棄者汴之為水也出城則甘於是吕公周覽而嘆曰嗟設卒有冦至小門扄大門鑰乘障之士瞭陴之子守麾之吏渴也奚救之矣乃默禱於卜門穿一井五井皆甘是時布政左使劉公右使宋公實經厥費按察使張公都指揮徐公贊畫為力乃僉議伐石為碑樹之南薰門月城亭焉以紀實詔來且張城大修之本也城門故各有廟是役也亦各新之而嚴其祀或問李子曰先王之建邦也必城焉急然孟子則云固國不以山蹊之險何也李子曰斯惡夫專事地者也非天不生非地不形非人不成是故先王之為治也內外交飭本末具修順時豫防設嶮為固人心雖和守戰是憂故曰重門擊柝以待暴客故城者民之扞也障內而嚴外者也雖然詩有之矣赳赳武夫公侯干城又曰宗子維城故不天則悖不地則害不人則空故人者本也孟子所謂地利不如人和者也善為治者本末外內交飭而具修可也禹廟碑李夢陽李子游于禹廟之臺覽長河之防孤城古宫平沙四漫遐睇故流北盡碣石九𣲖湮淤雲草浩浩於是愴然而悲曰嗟乎豫於是知王霸之功也霸之功歡久之疑王之功忘久之思昔者禹之治水也導川為陸易􅑶為寧地以之平天以之成去巢就廬而粒而耕生生至今者固其功也所謂萬世永賴者也然問之耕者弗知粒者弗知廬者弗知寧者弗知陸者弗知故曰王之功忘譬之天生物而物忘之泳者忘其川栖者忘其枝民者忘其聖人非忘之也不知之也不知自忘及其菑也號呼而祈恤於是智者則指之所從來而廟者興矣河盟津東也蹙曠肆悍勢猶建瓴堤堰一决數郡魚鱉於是昏墊之民匍匐詣廟稽首號曰王在吾奚溺而防丁堰夫樁户草門輸築困苦則又各詣廟稽首號曰王在吾奚役斯所謂思也故不忘不大不思不深深莫如地大莫如天王之道也伯者非不功也然不能使之不忘而不能使之不疑何也不忘者小小則近近則淺淺則疑如秦穆賜食善馬肉酒是也夫天下未聞有廟桓文者也故曰豫觀禹廟而知王霸之功也或問湯文不廟李子曰聖人各有其至堯仁舜孝禹功湯義文王之忠周公之才孔子之學是也夫功者切乎菑者也大梁以菑故是故獨廟禹是時監察御史澶州王子㑹按河南登臺四顧乃亦愴然而悲曰嗟乎豫於是而知功之言徴也吾少也覽嘗躡州城眺滄渤南目大梁之墟乃今厯三河攬淮泗極洪流而盡滔滔使非有神者主之桑而海者久矣尚能粒邪耕邪廬邪能􅑶者寧邪川者陸邪嗟乎豫於是而知功之言徴也所謂微禹吾其魚者邪所謂美哉勤而不德者邪於是飭所司葺其廟而屬李子碑焉王子名溱以嘉靖元年春按河南明年秋代去乃李子則為迎送神辭三章俾祭者歌之侑神焉其辭曰天門兮顯闢赫赤赤兮雲吐窈黃屋兮陸離靈總總兮上下羌若來兮倏不見不見兮奈何望美人兮徒怨苦橫四海兮怒波右迎神絙絃兮鏜鼓神不來兮誰怒執河伯兮顯戮飭陽侯兮清路靈靄兮來至風泠泠兮堂户舞我兮我醑尸既飽兮顔酡惠我人兮乃土乃粒日云暮兮尸奈何右降神風九河兮濤暮雲曀曀兮昏雨王駕鳳兮驂文魚龍翼翼兮兩旟悵佳期兮難屢心有愛兮易離愛君兮思君肴芳兮酒芬君歸來兮庇我民兮右送神少保兵部尚書于公祠碑李夢陽開封城馬軍衙橋西故有于少保祠云初公以定傾保大之功居無何而死於是天下人聞公死咸驚而疑而涕泣語曰鷺鷥氷上走何處尋魚嗛而公前巡撫河南時實廨馬軍衙橋西而梁父老於是聞公死則咸涕泣日相率潜謁公故廨為位哭奠焉㑹純皇帝立詔曰少保謙寃宥其家而遣祭其墓乃梁父老則又咸涕泣相率私起祠故廨旁祠公伏臘忌梁父老則把香曵笻趿履若少壯咸翼如不期至稽首祠下哭填門塞户矣㑹又敬皇帝立詔曰少保謙贈特進光祿大夫柱國太傅諡肅愍立祠嵗春秋祠之而曰旌功祠於是梁父老則又咸涕泣相率數百千人詣闕門伏訴少保謙前兵部侍郎時巡撫功云願梁立祠如杭祠不報而梁父老歸伏臘忌嵗仍聚哭公于私祠今三十年餘矣正德十年監察御史巡按張君清軍許君並謁公祠下見其門屋三門僅存堂欹漏欲頽矣鴿雀擾擾栱棟鼠走鴟嘯周垣盡圯羊猪外來於是悄然思俯而悲也已仰而欷曰嗟斯非梁地邪宋不此都哉靖康之事千載銜焉二帝不南矣夫定傾者世保大者食澤流者思故祠之言思也血食使之世者也於是下令曰少保祠撤故易腐扶欹植頽起圮新而繪堊而級而隅而榮而序備矣曰謁者奚止也則重而堂器奚貯也則翼而廊而道士𤣥林守焉西北隅其房也望之栗栗而巉巉枚枚焉嚴嚴是使之世者之道也李夢陽曰豫觀今人論肅愍公事未嘗不酸鼻流涕焉蓋傷為臣不易云夫事莫大於君出敵入排遷主戰四者旦夕之勢而存亡之判也乃今人議則異是或見鮑莊事輒曰夫葵猶能衛其足然獨不思勇士不忘喪其元乎孟子曰所欲有甚於生者故生而有所不用也然將軍蠡留侯良功成身抽天下兩髙焉此又何焉於乎難言乎難言乎豈所謂計免者非忠貪盛者違智歟而方額森擁太上皇大同城下勒降也大同人登城謝曰賴天地宗社之靈國有君矣至宣府城下宣府人登城謝曰賴天地宗社之靈國有君矣至京城下京城人又謝曰賴天地宗社之靈國有君矣於是公揚言曰豈不聞社稷為重君為輕斯言也事以之成疑以之生者歟且太子之易南宫之錮二者有能為公恕者否邪公有不如意輒拊膺忿曰此一腔血竟灑何地聞其言孰非酸鼻流涕者而獨咎豫也於乎傷乎傷乎雖然宗澤嶽飛非下於人者艱難百戰卒愠衄而死若公者死可矣死可矣公巡撫諸所業載傳狀乃今不復述第述其終始若是亦大者云祠修於是年春越夏告成張君名淮南皮人許君名完丹徒人事祠事者開封知府賀君鋭也系之詩曰於鑠旋運曷平不陂康屯傾否哲者斯利於維哲英鑒精含貞匪時曷徴匪猷曷興靡疑靡驚厥伐用成厥育是輕委躬於誠蛇何盤社龍何在野乾樞卼日月易舍蠢爾乃賊乃奰國邑之亂之訌陵廟岌岌公丁其時矢身以殉山仡排議不戁不震僉曰和宜公曰有戰四方之事譬絲游刃帝畀弗疑公泣視師義激六軍如虎如羆惟直斯壯人心干城肅肅我壘悠悠我旌羯奴喙突疆埸載清載清載寧皇歸於京古曰荷難今謂曰癡忠古爰嘉今胡嫉而何讒非名何毁非功孰讒靡和孰毁弗同彼巧彼荏厥膚斯厲古則曰直今曲自為於乎少保時晦時昭古誰無死死有榮褒峩峩廟祠棟隆崇基神之遊之斾斾其旗白馬朱衣有風凄其歘其有光若往若來即而罔見跂望漣洏茲邦哿居氓實爾思𤣥帝廟碑李濓汴城南三十八里曰陶村其地蓋曰陶令公墓云元至正間名大張村仁夀鄉今名木魚寺緣寺建而號厥地也寺之後故有𤣥帝廟土人稱其地曰廟兒岡岡存而廟廢矣正德辛已六月鄉民張鵬募緣王守定倡率重修之乃築崇基起立神殿三間繚以周垣樹以嘉木左碑右鐘兩亭翼然規制視昔加閎焉逾年告成乃屬濓紀其事刻之樂石以垂永久夫𤣥帝者北方之神也傳曰北宫黑帝其精𤣥武是故在天為虛危之宿在地託龜蛇之靈在五行為水在五色為𤣥而其數則一也神理不言應以象類故見其象類神可徴矣夫神之在天下如風之噓谷所觸皆通如水之行地無往弗逹榔梅之蹟五龍之異非其彰彰顯著者乎濓汴人也幼聞長老言宋天禧初有龜蛇見於繁臺之東南因建真武堂於其地無何泉涌堂側汲之靡竭負疾疫者㪺飲輒愈詔建祥源觀凡六百一十餘區以祠神茲地茲廟其建於斯時邪祭法曰聖王之制祭祀也能禦大菑則祀之能捍大患則祀之自唐貞觀以來神之禦菑捍患圖冊不可勝紀若渥雨應姚簡之禱雪晴濟戴䕫之軍其在國朝尤著靈響然則廟而祀之者禮也祀之孔䖍者誠也禮以逹誠誠以歆冥闔境之民將庇神之休雨暘時若百榖嵗登永躋仁夀之域則神有功於民而民非諂於神矣乃若出資修廟者之姓名悉載之碑隂河南省城重修鼓樓碑李濓夫樓奚以鼓稱也貯壺漏戒昏曉嚴晷度敬人時王政之所必先者也古之聖人配天作則仰釐七曜俯順五辰乃建日官俾典壺漏籌無停刻枹無紊舉晝夜聿分節序靡忒是故堯欽厯象舜在璣衡周專挈壺其道一也曽謂更鼓非王政之先務乎河南省城宋之京都也舊有鼓樓傾圮弗治景泰庚午嘗修之適霪雨而罷天順辛已再修之適河决而罷人皆曰無葺鼓樓葺必有水患故日就頽廢久無議修之者嘉靖元年內官監太監陽信吕公憲來鎮是邦矚樓之敝憮然而嘆曰樓以藏鼓鼓以傳漏凡我出作入息之氓咸聽此以從事顧可使傾圮如此哉乃咨於撫按臺臣暨藩臬郡庶尹咸是之或有以雨潦河漲沮者公揚言於衆曰霪雨者隂陽之愆也河决者地道之變也夫何預於樓吾茍役民以時動民以道不侈財不妨稼則隂陽和而地道順矣夫何雨河之慮乎於是選吏董工鳩徒獻力程藝稽勞賞勤作怠公日臨臺趾以勸相之是故財無耗竊工無簡略不踰年而告成亦竟無雨河之患是役也經始於丁亥之春基築於夏臺畢於秋樓完於冬更漏分明四境遐聞形勢岧嶤一方壯觀蓋百餘年因循未舉者而一旦舉之非公識治體重民時得人心服衆口而能若是乎汴之卿大夫里居者謂公排浮議以修廢墜吾民宜百世思之乃買石樹碑謁余文以紀其事余聿嘉厥功之有成也輒敢原王政以為說如此嗚呼登斯樓者其尚知所自哉汴京遺蹟志卷十六
