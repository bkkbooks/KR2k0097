body:
  text: 汴京遺蹟志卷八明李濂撰宫室凡巳見宋大內宫室及艮嶽內諸亭館不重録余聞之故老曰宋九帝都汴其宫室之盛載諸史冊圖志者河考而知也歷嵗滋久兵燹燔爇河流衝淤悉蕩然無遺矣茲志遺蹟姑存其概于此無亦使其湮滅無聞云爾宫太一宫都城太一宫有三處一在城東南之蘇村為東太一宫一在城西南之八角鎮為西太一宫一即五嶽觀之舊址為中太一宫今俱廢宋敏求春明退朝録太宗時建東太一宫於蘇村遂列十殿而五福君綦二太一處前殿冠通天冠服絳紗袍餘皆道服霓衣天聖中建西太一宫前殿處五福君綦大遊三太一亦用通天絳紗之制餘亦道冠霓衣熙寧五年建中太一宫內侍主塑像乃請下禮院議十太一冠服禮院乃具兩狀一如東西二宫之制一請盡服通天絳紗會有言亳州太清宫有唐太一塑像上遣中使視之乃盡服王者衣冠遂詔如亳州之制葉少藴石林燕語太平興國中司天言太一式有五福大游小游四神天一地一直符君綦臣綦民綦凡十神皆天之貴神而五福所臨無兵疫凡行九宫四十五年一易今自甲申嵗入黃室巽宫當吳分請即蘇州建宫祀之已而復有言今京城東南有蘇村可應姑蘇之名乃改築于蘇村京師建太一宫自此始此東太一宫也龔明之中吳紀聞太平興國六年方士言五福太一在吳越分太一天之貴神也行度所至之國民受其福故今蘇州建太一宫後以地逺不便於禱祀遂於京城蘇村建之今天慶觀乃其舊址鄉人尚有以宫巷宫前稱者宋朝會要天聖六年三月司歷言五福太一自雍熙元年甲申及今四十五年太一行綦當入蜀郡之坤宫曰黃庭可於都城西南建祈宫於是詔擇八角鎮地建西太一宫又曰神宗熙寧初即五嶽觀舊址營中太一宫蓋自仁宗天聖六年至熙寧五年壬子四十五年五福太一行綦自黃庭宫移入真室之中下臨京都之中故也景靈宫有二在城內端禮街東西宋大中祥符五年十一月建奉藝祖以下御容在內郭若虛圖畫見聞志治平甲辰嵗於景靈宫建孝嚴殿奉安仁宗神御乃鳩集畫手畫諸屏扆墻壁先是三聖神御殿兩廊圖畫創業戡定之功及朝廷所行大禮次畫講肄文武之事游豫燕享之儀至是又兼畫一應仁宗朝輔臣吕文靖已下至節鉞凡七十二人時張龍圖燾主其事乃奏請於逐人家取影貌寫之鴛行序列歷歷可識其面於是觀者莫不嘆其盛美李心傳朝野雜記景靈有東西宫蓋祖宗以來帝后神御皆寓道釋之館神宗元豐中始倣漢原廟之制即景靈宫之東西為六殿每殿皆有館御前殿奉宣祖以下御容而後殿以奉母后各揭以美名徽宗崇寧初以景靈無隙地乃於馳道之西立西宫以神宗為館御首哲宗次之號舊宫為景靈東宫建炎改元之二日即命有司建景靈宫於江寧帝后異殿然不克成渡江後自聖祖以下神御皆寓溫州天慶宫以祠部郎官兼知州若官使相則兼景靈宫使典奉神御趙忠簡為相議築宫臨安以奉祖宗神御而留聖祖於永嘉後不果紹興十三年二月始遷於臨安然但通為三殿以奉聖容無復東都之制矣或者謂忠簡之議乃王沂公藏天書之意九成宫崇寧元年方士魏漢津請備百物之象鑄九鼎四年三月九鼎成詔於中太一宫之南為殿以奉安各周以垣上施睥睨墁以方色之土外築坦環之名曰九成宫中央曰帝鼎其色黃祭以土王日為大祠幣用黃樂用宫架北方曰寶鼎其色白祭以冬至幣用皂東北曰牡鼎其色白祭以立春幣用皂東方曰蒼鼎其色碧祭以春分幣用青東南曰岡鼎其色緑祭以立夏幣用緋南方曰彤鼎其色紫祭以夏至幣用緋西南曰阜鼎其色黑祭以立秋幣用白西方曰皛鼎其色赤祭以秋分幣用白西北曰魁鼎其色白祭以立冬幣用皂八鼎皆為中祠樂用登歌享用素饌復於帝鼎之宫立大角鼎星之祠寶成宫大觀三年詔以鑄鼎之地作寶成宫總屋七十區中置殿曰神靈以祀黃帝東廡殿曰成功以祀夏后氏西廡殿曰持盈以祀周成王及周公旦召公奭後置堂曰昭應以祀唐李良及隱士嘉成侯魏漢津詔每嵗八月二十五日舉祀事祀黃帝為大祠幣用黃樂用宫架其成功持盈二殿為中祠幣用白昭應堂為小祠並用素饌馬端臨文獻通考按三代之九鼎未聞有神司之而列之祀典也崇寧時用方士魏漢津之說鑄九鼎而各以其方色祭之抑不知司鼎者何神歟至於因采首山銅之說而祀黃帝因貢金九牧之說而祀夏后氏因定鼎郟鄏之說而祀成王周召然此數聖賢之所以當祀者固不以鼎也若魏漢津則當時獻言鑄鼎之方士耳乃亦尸而祝之俾侑食於數聖賢其䙝慢不經亦甚矣朝元萬壽宫在城內汴河之側金兵燬之今延慶觀即朝元萬壽宫之齊堂也周密癸辛雜識朝元宫殿前有大石香鼎二製作髙雅熙春閣前元有十餘座徽宗每宴熙春則用此燒香於閣下香煙蟠結凡數里有臨春結綺之意朝元宫虛皇臺亦上清移來者下有青石礎二刻龍鳳團花極工巧舊時是朱溫椒蘭殿舊物臺上有拜石方廣二丈許光瑩如碧玉四畔刻龍鳳雲霞環繞內留品字三方素地云是宣政內醮時徽廟立於中林靈素王文則居兩旁也玉清昭應宫大中祥符元年初議營是宫安置天書命有司料功須十五年乃就修宫使丁謂令以夜繼晝每繪一壁給二燭至七年十一月宫成凡二千六百二十楹制度閎麗屋宇少不中程式雖金碧已具必令毁而更造有司莫敢較其費初宫之成也時王魏公為首相始命充使宫觀置使自此始天聖七年夏六月丁未夜大雷雨宫內火起至曉宫室幾盡僅存長生崇夀二小殿范雍王曙等以為灾變之來若有警者願除其地罷諸禱祀以答天怒乃下詔不復繕修以長生崇夀二小殿改為萬夀觀罷諸宫觀使宋史真宗大中祥符元年作玉清昭應宫奉天書也知制誥王曾都虞候張旻皆上疏諫不聽孫升談圃玉清昭應宫丁晉公董其役土木之工極天下之巧繪畫無不用黃金四方古名畫皆取至置之壁龕廡下又以其餘材修建五嶽觀世猶謂之朩天則玉清之宏壯可知玉淸宫道院則今萬壽觀是也後玉清五嶽皆焚獨道院在耳葉少藴石林燕語大中祥符五年玉清昭應宫成王魏公為首相始命充使宫觀置使自此始然每為見任宰相兼職天聖七年吕申公為相時朝廷崇奉之意稍緩因上表請罷使名自是宰相不復兼使康定元年李若谷罷參知政事留京師以資政殿大學士為提舉會靈觀事宫觀置提舉自此始自是學士待制知制誥皆得為提舉因以為優閒不任事之職熙寧初先帝患四方士大夫年髙者多疲老不可寄委罷之則傷恩留之則玩政遂仍舊宫觀名而增杭州洞霄及五嶽廟等並依西京崇福宫置管勾或提舉官以知州資序人充不復限以貟數故人皆得以自便上清儲祥宫太宗至道元年上清宫成慶歷三年火其後復修以宫之所在為國家子孫也因賜名上清儲祥宫命蘇軾撰碑文以紀其事宋敏求東京記端拱元年二月太宗詔取晉邸時太祖所賜金帛建上清儲祥宫至道元年八月宫成帝御書額金填其字賜之仁宗慶歷三年十一月火熙寧元豐間靈惠法師王太初再營之元祐初年宣仁太皇太后為出粧粉錢重建孫升談圃上清儲祥宫太宗建之為民祈福神宗以其地屬震欲新之至元祐初落成宦人陳衍領其事凡當用黃金處皆以丹朱代之宫成兩宫臨幸肆赦許有壬上清儲祥宫記略宫始太宗作於朝陽門外蘇碑作內不五十年而火以其地為禁軍營監察御史裏行包拯上疏請勿修故也又三十七年復事修建歷十三年而後成蓋元祐六年也翰林學士承㫖蘇公作碑未幾誣以失實毁之令蔡京别撰金源氏復葺翰林侍讀學士趙秉文有文嵗壬辰元兵下汴宫觀僅存師徒解散時全真之教方興長春公起海濱至西域見上論道以修身治國撫民止殺為對上大恱長春法系之弟為太古郝公太古傳栖雲王公長春以汴重陽觀故基實主教重陽真君升化之地命栖雲主之營建幾三十年是為朝元宫丞相史公復請兼主太一上清諸宫觀事惟上清為潦水所圯規模宏濶力不能復命巨提㸃者購地於惠和坊為畝六十撤故宫材崇三淸之殿于前次列真之宇於後神門壇壝左右雲堂四周接屋餘百楹雖非其地而名不泯也以上十宫今皆不存矣惟城之西南隅有大道宫焉正德初因佑聖觀舊基而修也乃若延福宫玉清神霄宫舊名玉清和陽宫上清寶籙宫俱已載之第一卷大內宫室條下茲不重録樓望京樓即汴城西門樓也樓舊無名唐令狐綯登樓詩有望京字因名遇仙樓在南薰門裏街西有異僧之事趙秉文作滿庭芳詞以紀之明月樓在州橋南街東洪武十五年毁廢其址今為稅課司黑樓子在宣平坊勾欄街之北即金相崔立看街樓寶津樓在城西鄭門外瓊林苑內長慶樓紅翠樓俱在鼓樓北街西玉樓狀元樓俱在新橋東北豐樂樓舊名樊樓和樂樓舊名莊樓得勝樓鐡屑樓慶豐樓楊樓玉川樓欣樂樓潘樓以上俱在土市子街會仙樓在雷家橋北熙熙樓在第三巷東胡樓在南薰門外西南清風樓在裏城外西南宜城樓班樓俱在大梁門外街北看牛樓在仁和門外蜘蛛樓在宋門外劉樓在金梁橋下八仙樓在城北集賢樓蓮花樓俱在鄭門外宋時士大夫于此餞别宴賔樓在金明池之西自遇仙樓而下諸樓俱燬于金兵譙樓一名鼓樓在城內安業坊臺高三丈上建樓下置甕門通東西行路自築建之後敝壞不修俗訛言復修則有河水之患故廢而弗治號破鼓樓嘉靖初鎮守太監吕憲排衆議復修煥乎改觀卒無水患鐘樓在城內新昌坊規制略如譙樓而髙濶宏麗過之上懸巨鐘以警昏曉宣德中左布政使李禎復葺之成化十六年鎮守太監藍忠巡撫都御史李衍重修以上二樓俱非宋建姑附于此閣資聖閣即相國寺之後閣都人夏日于此納凉八景中資聖薰風是也玉皇閣在延慶觀三清殿後近燬于火藏經閣有二一在相國寺一在天王寺俱藏先朝所賜藏經今卷帙殘闕殆盡矣尊經閣在府學明倫堂後以上三閣俱非宋建姑附于此周密癸辛雜識汴城樓閣最髙而見存者惟相國寺資聖閣朝元宫閣登雲樓資聖閣雄麗五簷滴水廬山五百銅羅漢在焉國初曹翰所取者也朝元宫閣即舊日上清儲祥宫移至者岧嶤半空登雲樓俗呼為八大王樓又稱談樓蓋初為燕王元儼所居後為巨璫談積有之其竒峻雄麗皆非東南所有也亭新亭在城內唐汴州刺史令狐楚建劉禹錫記看街亭在南薰門內東南信陵亭在相國寺前魏公子無忌勝遊之地公子亭在麗景門外公子謂無忌也大梁亭在大梁門外之西流杯亭在城西北隅以上諸亭俱燬于金兵今不存矣駐蹕亭在布政司圎堂後洪武元年五月車駕幸汴詔建行宫比去留大旗以鎮中原後因構亭表之今廢此亭非宋建附載于此門夷門在安逺門內夷山之上趙與峕賔退録侯嬴為夷門監者按大梁城門東曰夷門則夷門者大梁之一門耳後人遂直指汴京為夷門非也容齊續筆辨臺城少城類此沙門在縣西東和保沙積深厚其形似門故名小陡門在縣西永安保宋時疊石砌閘以積汴水堂資善堂仁宗肄學之所也在元符觀南大中祥符八年建天禧四年徙御厨北宋朝會要大中祥符九年二月詔元符皇子就學之所宜以資善堂為名繼聖堂在開封府治之東宋主習射之所也今廢宋敏求東京記太宗尹京日官署東建堂習射大中祥符二年閠二月真宗臨幸宰臣請以繼聖為名許之梅花堂在開封府正廳之後即所謂後堂也後改為公生明堂拱奎堂在本府治內宋錢藻尹開封建今廢清虗堂在汴城內之東隅宋王鞏建蘇軾有記今廢三聖堂三聖者祀觀音大士義勇武安王清源妙道真君也在大梁門外半里許即宋都亭西驛以待夏國使臣之所按東京夢華録云都亭西驛在寶相寺東相對都城元末兵廢國朝洪武初周藩即其址創立廟宇乃移白瓦厰之神祀之于內其三聖之像仍舊不改景泰乙亥居民甄義等率衆重修三槐堂在仁和門外宋兵部侍郎王祐手植三槐于庭曰吾後世子孫必有為三公者祜子旦相真宗遂號三槐王氏因扁其堂曰三槐堂蘇軾為銘金季兵燬蘇軾三槐堂銘天可必乎賢者不必貴仁者不必壽天不可必乎仁者必有後二者將安取衷哉吾聞之申包胥曰人衆者勝天天定亦能勝人世之論天者皆不待其定而求之故以天為茫茫善者以怠惡者以肆盜跖之壽孔顔之厄此皆天之未定者也松柏生於山林其始也困於蓬蒿厄於牛羊而其終也貫四時閲千嵗而不改者其天定也善惡之報至於子孫而其定也久矣吾以所見所聞所傳聞考之而其可必也審矣國之將興必有世德之臣厚施而不食其報然後其子孫能與守文太平之主共天下之福故兵部侍郎晉國王公顯於漢周之際歷事太祖太宗文武忠孝天下望以為相而公卒以直道不容於時蓋嘗手植三槐於庭曰吾子孫必有為三公者巳而其子魏國文正公相真宗皇帝於景德祥符之間朝廷清明天下無事之時享其福祿榮名者十有八年今夫寓物於人明日而取之有得有否而晉公修德於身責報於天取必於數十年之後如持左契交手相付吾是以知天之果可必也吾不及見魏公而見其子懿敏公以直諫事仁宗皇帝出入侍從將帥三十餘年位不滿其德天將復興王氏也歟何其子孫之多賢也世有以晉公比李栖筠者其雄才直氣真不相上下而栖筠之子吉甫其孫德裕功名富貴略與王氏等而忠信仁厚不及魏公父子由此觀之王氏之福蓋未艾也懿敏公之子鞏與吾遊好德而文以世其家吾是以録之銘曰嗚呼休哉魏公之業與槐俱萌封植之勤必世乃成既相真宗四方砥平歸視其家槐隂滿庭吾儕小人朝不及夕相時射利遑恤厥德庶幾僥幸不種而穫不有君子其何能國王城之東晉公所廬鬱鬱三槐惟德之符嗚呼休哉葉少藴石林燕語太祖與符彥卿有舊常推其善用兵知大名十餘年有告謀叛者亟徙之鳯翔而以王晉公祜為代且委以密訪其事戒曰得實吾當以趙普所居位命汝面授旨徑使上道祜到彼察知其妄數月無所聞驛召面問因力為辨曰臣請以百口保之太祖不樂徙祜知襄州彥卿竟亦無他祜後創居第於曹門外手植三槐於庭曰吾雖不為趙普後世子孫必有登三公者巳而魏公果為太保歐陽文忠作王魏公神道碑略載此語而國史本傳不書余嘗親至其家聞其子弟言之館柳林館在城東之南神岡保宋時都人逰宴之所後淪于水同文館在大梁門外西北宋時待高麗使臣之所班荆館在封丘門外之東宋待蕃使之所禮賔館舊名畨譯院在金梁橋西南汴河南岸景德三年改為禮賔館以上諸館俱燬于金兵今不存矣臺池園苑洞峽渚沜臺吹臺在城東南三里相傳漢之鼓吹臺一名梁臺一名雪臺俗呼為二姑臺今改為禹王臺祀禹于其上兩廡祀古之善治水者為河患也詳見後禹廟下宴臺在城東北十五里宋帝春耕籍田于東郊祀先農畢享胙宴百官于此迎秋臺在固子門外後唐莊宗築宋人九日于此登高靈臺在城南二十里梁惠王築一名惠王臺百花臺在固子門外宋徽宗築拜郊臺在城南十里其東又有東拜郊臺並宋時築沙元臺在城東南鄭店保臺上有鄭安平廟元季兵燬惟臺存焉奉天臺洪武元年車駕幸汴駐蹕於河南行省以為行宫於圎堂後西北築臺以為奉天之所故名後屢經黃河入城淤平祭封臺在南薰門外洪武元年車駕幸汴時築以祀神者以上二臺非宋建附載于此池蓬池在城東春秋宋之蓬澤也瀰漫逺濶南入尉氏之境其下有溫泉焉漢志引汲冡竹書云梁惠王發蓬忌之藪以賜民浚儀有蓬陂忌澤是也唐𤣥宗更名福源池天實初士大夫禊飲于此後纍經黃河淤平今不見其跡金明池在城西鄭門外西北周回九里餘周世宗顯德四年欲伐南唐始鑿內習水戰宋太平興國七年太宗嘗幸其池閲習水戰徽宗政和中於池內建殿宇池門內南岸西去百餘步有臨水殿北去百餘步有仙橋朱漆欄楯下排㕍柱中央隆起如飛虹之狀橋盡處而殿正在池中四岸石甃南有高臺上有橫觀廣百丈許曰寶津樓樓之南有宴殿殿西有射殿南有橫街牙道柳徑乃都人擊毬之所車駕臨幸觀騎射百戲于此後燬于金兵葉少藴石林燕語金明池龍舟太宗時造每嵗春駕上池必登之紹聖初亦嘗命别造形制有加于前亦號工麗余時正登第在京師初成瓊林賜宴蔡魯公為承㫖中休往登以觀至半輒墜未幾不免相繼哲宗臨幸是日大風晝冥池水盡波儀衛不能立竟不能移跬步自後遂廢不用二事適相似亦可怪也方池圓池在南薰門外玉津園之側宋帝臨幸遊賞之所迎祥池在普濟水門之西宋真宗時鑿蓮花池有二一在城北時和保一在城西北永安保凝碧池在陳州門裏繁臺之東南唐為牧澤宋真宗時改為池曲江池鳳池雁池平池俱在艮嶽夀山之下今廢園梁園在城東南三里許相傳為漢梁孝王遊賞之所李白梁園吟云平臺為客幽思多對酒遂作梁園歌却憶蓬池阮公詠因吟渌水揚洪波一名梁苑孝王築吹臺于苑中芳林園在固子門裏東北宋太宗在晉邸時太祖賜其地為園即位後號潛龍園內有池沼淳化三年帝幸其池謂近臣曰昔尹京日無事常飲池上今池邉之樹巳成喬朩矣因顧教坊使郭守忠等曰汝等前日以樂童從我今亦皓首矣何光隂易過如此因登水心亭習射中的者上親斟滿舉大白詔群臣盡醉後廣其地號奉真園仁宗天聖七年改名芳林園金兵燬之今失其處玉津園在南薰門外下松園在城西鄭門外藥朵園養種園俱在城西水門外一丈佛園在城西南馬季良園在裏城外西南景初園在城南鳳城岡奉靈園在陳州門內西北靈禧園在陳州門之東北同樂園在固子門內東北宋徽宗置以上諸園皆宋時都人遊賞之所今俱廢苑瓊林苑在城西鄭門外俗呼為西青城宋時建苑為宴進士之所與金明池南北相對其中松柏森列百花芬郁苑東南隅政和間創築華觜岡高數丈上有橫觀層樓金碧相射下有錦石纒道寶砌池塘柳鎖虹橋花縈鳳舸又有明池梅亭牡丹諸亭不可勝數迎春苑在麗景門外東北舊名東御苑宋初宴進士之所每嵗迎春于此後改為富國倉宜春苑有二一在固子門外宋人號西御園一在麗景門外號東御園牧苑在陳橋之東北宋牧養馬駝牛羊之所以上諸苑俱為金元兵燬今失其故處洞老君洞在艮嶽壽山之西北徽宗供奉道像之所迷真洞亦在艮嶽壽山之下桃花洞在揚州門內西北即上清宫道士所居之處環植以桃故名桃花洞峽濯龍峽在艮嶽壽山之間金人展城廢之渚蘆渚梅渚並在艮嶽壽山之下徽宗於平池內作兩洲東為蘆渚西為梅渚金人展城廢之矣沜白龍沜在艮嶽壽山之下為金人展城所廢自老君洞以下諸蹟湮廢巳久莫詳其故處矣昔召公告成王曰不作無益害有益功乃成至哉斯言豈非萬世之永監哉汴京遺蹟志卷八
