春霞明兔園積雪有詞賦鳧渚廢榭無歌笙百花雙燕且對飲碧海黃塵空復情落日為誰吟思苦千秋城闕暮雲平夷門即事答童太史李濂十年澤國嘯墟煙黃帽青鞋野興偏踏雪過村緣貰酒隔溪遊寺為參禪信陵亭畔花爭發梁孝臺前月正圎誰念夷門樗散客白頭猶著紫霞編延慶觀李濂曾聞汴水橋邊觀宋代朝元萬夀宮千樹碧桃今絶種九光丹閣舊浮空傷心莫問餐霞事謀國誰攄捧日忠惆悵二龍終不返三清臺殿夕陽中秋日王别駕邀酌天王寺李濂野寺邀賔發斾遲杖藜出郭赴幽期尊開竹院秋聲合袂把松門暝色悲别駕功名君勿薄醉鄉日月我偏宜相逢感慨無窮意盡付東林碧玉卮過汴梁有感王雲鳳霸主荒臺還突兀隋堤殘柳正蕭疏耕夫不識市朝處野寺猶存宮殿餘士慣悲歌豪俠地土含腥血戰爭墟抱城濁浪勞宸慮漢策今慙總不如行經隋堤有感陸深端委猶堪致太平龍舟錦纜竟何成空餘細水緣堤曲别有垂楊帶晚晴社燕歸來如有恨間花開遍不知名行人誰管興亡事但説揚州接汴京汴京遺迹志卷二十三
