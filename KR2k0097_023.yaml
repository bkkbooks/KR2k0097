body:
  text: 汴京遺迹志卷二十三明李濂撰藝文十七言律詩同陳留崔司户早春宴蓬池唐髙適同官載酒出郊圻晴日東馳鴈北飛隔岸春雲邀翰墨傍簷垂柳報芳菲池邊轉覺虛無盡臺上偏宜酩酊歸州縣徒勞那可度後時連騎莫相違黃河羅隱莫把阿膠向此傾此中天意固難明解通銀漢應須曲才出崑崙便不清髙祖誓功衣帶小仙人占斗客槎輕三千年後知誰在何必勞君報太平汴河羅隱當時天子事間遊今日行人特地愁柳色縱饒粧故國水聲何忍到揚州乾坤有意終難會黎庶無情豈自由應笑秦皇用心錯謾驅神鬼海東頭秋日汴河客舍酬友人羅隱梁宋追遊蚤嵗同偶然違别事皆空年如流水催何急道似危途動即窮醉舞且欣連夜月狂吟還聚上樓風煩君更枉騷人句白鳳靈蛇滿袖中隋堤柳李山甫曾傍龍舟拂翠華至今凝恨倚天涯但經春色還秋色不覺楊家是李家背日古隂從此朽逐波疏影向南斜年年只有晴風便遙為雷塘送雪花又秦韜玉種柳開河為勝遊堤前常使路人愁隂埋野色萬條思翠束寒聲千里秋西日至今悲兔苑東波終不返龍舟逺山應見繁華事不語青青對水流下第後夷門乘舟至永城驛題薛能秋賦春還計盡違自知身是拙求知惟思曠海為休處忽喜孤舟似去時連浦一程兼汴宋夾堤千柳雜唐隋從來此恨皆前達敢負吾君作楚辭寄汴州令狐相公王建三軍江口擁雙旌虎帳長開自教兵機鎖惡徒狂寇盡思驅老將壯心生水門向晚茶商閙橋市通宵酒客行秋日梁王池閣好新歌散入管絃聲約張處士遊梁談用之莫學區區老一經夷門關吏舊書生晉朝滅後無中散韓國亡來絶上卿龍變洞中千谷冷劒橫天外八風清好携長䇿干時去免逐漁樵度太平送髙别駕歸汴州韓翃信陵門下識君顔驄馬輕裘正少年寒雨送歸千里外東風沉醉百花前身隨玉帳心應愜官佐銅符勢又全久客未知何計是參差去借汶陽田汴河亭許渾廣陵花盛帝東遊先擘崑崙一𣲖流百二禁兵辭象闕三千宮女下龍舟凝雲鼓震星辰動拂浪旗開日月浮四海義師歸有道迷樓還似景陽樓中秋夕寄大梁劉尚書許渾汴人迎拜洛人留虎豹旌旗擁碧油刁斗嚴更軍耳目戈鋋長控國咽喉柳營出號風生纛蓮幕題詩月上樓應念散郎千里外去年今夜醉蘭舟彭門用兵後經汴路三首吳融長亭一望一徘徊千里關河百戰來細柳舊營猶鎖月祁連新塜已封苔霜飛緑野愁無際燒接黃雲慘不開若比江南更牢落子山詞賦莫興哀二隋堤風物已淒涼堤下仍多古戰場金鏃有苔人拾得蘆衣無土鳥銜將秋聲暗促河聲急野色遙連日色黃獨上寒城更愁絶戍鼙驚起鴈行行三鐵馬雲旗夢渺茫東來無處不堪傷風吹白草人行少月落空城鬼嘯長己見紛爭驚宇宙可憐蕭索絶煙光曾為塞北間遊客遼水天山未斷腸駕幸西太乙宮遇雨宋韓琦曉蹕聲乾下九重西郊岑寂欵琳宮驕陽尚作三春旱多稼期霑一雨豐恤物致虔歸上德應誠為答即神聰從來聖感無旋日不在商巖傅説功從駕過金明池韓琦帳殿深沉壓水開幾時宸輦一逰來春留苑樹隂成幄雨漲池波色染苔空外長橋橫螮蝀城邊真境闢蓬萊匪朝侍宴臨雕檻共看龍艘奪錦回駕幸金明池韓琦西池風景出塵寰春豫方乘禁座間庶俗一令趨夀域從官齊許宴蓬山樓臺金碧交輝外舟楫笙歌浩渺間與衆盡歡宮漏促萬花叢裏屬車還丙午上已瓊林苑賜筵韓琦春光濃簇寶津樓樓下新波漲鴨頭嘉節難逢真上已賜筵榮入小瀛洲仙園雨過花遺靨御陌風長絮滚毬禊飲不須辭巨白清明來日尚歸休西歸日瓊林苑賜宴即席賦此文彥博竊祿叨榮四紀餘退思僥幸亦無如趨朝再覩新宮省解紱還歸舊草廬報國丹心明皎皎戀軒疲足去徐徐群公盡出都門祖盛事光於漢二疏上元夜從駕至集禧觀文彥博順時同樂慰邦民協氣和風應早春斗運帝車遵大路雲從天步絶纖塵民瞻玉色欣逰豫嶽峙琳宮望省巡回御端闈張鎬飲蘭燈桂魄耀星津赴集禧宮祈雪追憶從先皇駕幸泫然有感歐陽修琳闕岧岧倚瑞煙憶陪遊豫入新年雲深曉日開宮殿水濶春風揚管絃千騎清塵回輦路萬家明月放燈天一朝人事淒涼改惟有靈光獨巋然崇政殿試賢良晚歸歐陽修槐柳依依禁籞長初寒人意自淒涼鳳城斜日留殘照玉闕浮雲結早霜老負漁竿貪國寵病須樽酒送年光歸來解帶西風冷衣袖猶霑玉案香車駕朝謁景靈宮歐陽修琳館清晨藹瑞氛玉旒朝罷奏韶鈞緑槐夾道飛黃蓋翠輦鳴鞘向紫宸金闕日髙猶泫露綵旌風細不驚塵自慙白首追時彥行近儲胥忝侍臣景靈宮致齋歐陽修攝事衰年力不強誰憐岑寂臥齋房青苔點點無人迹緑葉隂隂覆砌涼玉宇清風來處逺仙家白日靜中長却視九衢車馬客自然顔鬢易蒼蒼景靈宮奉迎仁宗皇帝御容有感歐陽修行殿峩峩出緑槐琳宮芝闕聳崔嵬管絃飄落人間去幢節疑從天上來基業百年傳聖子黔黎四紀樂春臺孤臣不得同針虎未死心先冷若灰和王景彛學士紫宸早謁梅堯臣朝開閶闔九重深望拜朱旒照玉簪霜氣稍回龍陛峻日光微轉鳳樓隂庭中綵仗穿旗腳案外薰爐對殿心我預千官少裨補欲將歌頌播堯音和宋次道學士紫宸早謁梅堯臣陸生聲譽在雲間來預簪裾謁帝顔冠劒有容夔與卨文章全盛馬兼班耽耽玉宇龍纏棟藹藹金鋪獸齧環却出常衙殿前過戟衣風動自相攀和宋中道觀車駕朝謁景靈宮梅堯臣都人夾望禁槐旁閶闔初來旭日光雕玉翠鞍牽騕裊盤龍朱輦爛文章焚香閟殿開嚴帳汲水寒溝灑廣莊一見天顔萬人喜却回宮禁樂聲長和王景彛正月十六夜省宿過景靈街梅堯臣官街不閉東城月圎影才虧夜色春自躍金羈來宿省從他錦帳欲誇人燈光逺近疑爭晝歌韻髙低競起塵我老都無逰樂意似君清枕睡侵晨愁臺王安石頽垣斷塹有平沙老木荒榛八九家河勢東南吹地坼天形西北倚城斜傾壺語罷還登眺岸幘詩成却嘆嗟萬事因循今白髮一年容易卸黃花金明池王安石宜秋西冠碧參差憶著鄉人禊飲時斜倚水開花有思緩隨風轉柳如癡青天白日春長好緑鬢朱顔老自悲跂馬未堪塵滿目夕陽偷理釣魚絲又王安國霓旌逺逺拂樓船滿地春風錦繡筵三島路深浮閬苑九霞觴滿奏鈞天仗歸金闕浮雲外人望瑤臺落日邊最引平生江海趣波瀾一段草如煙又王立之遊絲隨絮惹行人酒肆歌樓駐畫輪鳳管遏回雲冉冉龍舟衝破浪𥻘𥻘日斜黃繖歸馳道風約青簾認别津朝野歡娛真有象壺中要看四時春遊玉津園蘇軾承平苑囿雜耕桑六聖臨民計慮長碧水東流還舊𣲖紫壇南峙表連岡不逢遲日鶯花亂空想疏林雪月光千畝何時窮帝藉斜陽寂歷鎖雲莊和宋次道大慶殿上元迎駕司馬光鳳律年華到尚新九重氣象已成春曉雲低拂羽林仗宿雨先清紫陌塵玉殿鳴鞘傳警蹕彤庭委珮集簪紳闕前無復魚龍戲自有歡謠億萬人汴岸置酒贈黃十七黃庭堅吾宗端居叢百憂長歌勸之肯出遊黃流不解涴明月碧樹為我生涼秋初平群羊置莫問叔度千頃醉即休誰倚柁樓吹玉笛斗杓寒挂屋山頭幸太學倡和篇什繁多不能盡載略録七八首耳呂大防清曉金輿出建章祠宮轉仗指虞庠三千逢掖裾如雪十萬勾陳錦作行再拜新儀瞻魯聖一篇古訓贊周王崇儒盛世無云補扈蹕空慚集論堂蘇頌聖主恢儒率舊章首冬鳴蹕下膠庠師生褒博趨鱣序文武端嚴列鴈行承詔敷陳商戊甲執經環立晉袁王三千學者多才秀定有同升孔子堂韓忠彥恢崇儒教頓生光天子親來幸上庠星辨煌煌環帝座霜袍密密綴周行廟祠稽首尊先聖書義終篇勸嗣王學道深慙非入室此辰榮事預升堂劉奉世聖典垂精及表章曠儀親舉自宗庠縱觀橋擁浮雲蓋待問庭充振鷺行首舉儒風隆上國增光帝業掩前王太平榮遇慚多幸重見虞歌起廟堂范純禮四十餘年舊典章聖君今復幸虞庠虎賁萬騎森羅列鴈序諸生儼綴行已見重華同舜帝不須無逸戒成王祖宗基構隆三代統業相承是肯堂吳安持翰林墨客奏封章天子欣然幸國庠綵仗六龍初擁路青襟三舍已重行隆儒共慶賢堯舜訪道誰知應帝主附鳳騫淵皆法從獨慙由也亦升堂豐稷鳳幄雲開日月光九霄鳴蹕下虞庠朝元進士鴻成列拱極名臣玉照行問道賈生稱五學乞言戴聖美三王上心夙悟周公戒天下安危自一堂李格非日月天回十二章詔移清蹕幸膠庠六龍穩轉橋門曲多士橫穿錦仗行俎豆威儀瞻闕里東西風教自周王太平誰謂初無象四海形容在一堂過龍德故宮毛麾萬里鑾輿去不還故宮風物尚依然四圍錦繡山河地一片雲霞洞府天空有遺愁生落日可無佳氣起非煙古來國破皆如此誰念經營二百年讀靖康僉言金元好問浚郊沙海浩茫茫河廣才堪一葦航顛沛且當懲景德規模何必罪朱梁滄溟不掩蛟龍窟天地同歸雀鼠鄉三百年間幾降虜長星無用出光芒汴堤懷古王良臣迷仙樓觀鬱連空一日都歸鬼唾中奢則兆亡天聽邇去而不返水流東鎖煙弱柳愁蛾緑閣雨幽花淚臉紅總為錦帆歸不得至今啼鳥怨西風龍德宮雷琯紫簫吹斷碧雲歸十二樓空盡玉梯綵仗竟無金母降仙裾猶憶化人携千年洛苑銅駝怨萬里坤維杜宇啼莫倚危欄供極目斜陽更在露盤西汴梁雜詩三首李汾琪樹明霞五鳳樓夷門自古帝王州衣冠繁會文昌府旌戟森羅部曲侯美酒名謳陳廣座凝笳咽鼓送華輈秦州王粲何為者憔悴囂塵嘆白頭二樓外風煙隔紫垣樓頭客子動歸魂飄蕭蓬鬢驚秋色狼籍麻衣涴酒痕天塹波光搖落日太行山色照中原誰知滄海橫流意獨倚牛車哭孝孫三寥落關山對月明客窗遙夜夢魂驚三年岐下音書絶八月河南風露清冉冉暮愁生草色迢迢秋思入蟲聲誰知廣武英雄嘆老却窮途阮步兵資聖閣登眺李獻甫髙閣凌雲眼界寬野煙碧樹有無間天邊孤鳥飛無盡陌上行人去不還魏國幾回時事改汴堤千古夕陽間愁來重倚欄干望嵩少西頭是故山汴梁懷古元傅與礪汴上荒城繞故宮山頭危石墮秋風夷門市起聞嘶馬梁苑樵歸見斷鴻鬭草尚餘殘後碧進花無復盛時紅欲登髙處腸先斷滿目間愁賦未工又雅勒呼花石岡前麋鹿過中原秋色動關河欲詢故國傷心事忍聽前朝皓齒歌蔓草有風嘶石馬荆榛無月泣銅駝人間富貴皆如夢不獨興亡感慨多又元明善天荒地老禁垣低草滿丹墀徑路迷金水河枯龍已去蓬萊島圮馬空嘶當時何處安青瑣今日無門降紫泥舉目山河增感慨英雄何在日還西朝元宮留宿李準宋家天子朝元閣南內宮中太乙壇五夜星辰金榜動九天風露玉階寒朱衣魚鬛迎笙鶴絳節龍光引佩鸞八駿不歸遼海月步虛空繞紫雲端登汴梁城李準天上曾聞玉輦過金城千里帶黃河鳳凰一去蓬萊苑鴈鶩群飛太液波燈火樓臺空市井風雲冠蓋盡丘阿惟餘畫角聲中調猶是流沙磧裏歌雲驥橋湯鼎橋頭車馬鬧喧闐橋下帆檣見畫船弦管隔花人似玉樓臺近水柳如煙地連秦晉通三市路入淮濠接九天獨倚闌干望宮闕翠微髙映五雲邊汴京懷古李兩山滄海成田艮嶽荒誰能行役不倣徨青城北狩隔萬里花石南來知幾綱土暗塵昏天水碧風輕雨過女真黃無人可語宣和事九些陳留酹一觴登熙春閣王惲封丘門外故宮旁天閣空餘內苑荒瀛海夢空三島沒帝城煙慘五雲蒼石鯨照水鱗猶動金鳳凌雲勢欲翔竒貨梁園當日盡為誰留在閲興亡哀故宮王惲掖庭依約粉垣丹行入荒宮重黯然華表忽驚人世換昆明重見劫灰寒石龍委地埋秋草湖玉臨池倚暮煙滿目悲風吹酒醒東華門外淚闌干宿開封府後堂同陳侯