body:
  text: 汴京遺蹟志巻九明李濓撰岡堆坡陂關梁井墓岡牟駝岡在城西北十五里宋天駟監牧養御馬駝騾之京所靖康時金將斡里雅布統鐡騎南馳攻圍汴屯兵于此後黄河衝激坍塌平夷矣丘濬世史正綱靖康元年春正月癸酉女眞犯京師兵屯牟駝岡按牟駝岡乃宋朝牧馬之所芻豆山積往年郭藥師來朝奉命擊毬于其間至是導金人據之資其芻豆飼馬得以乆屯嗚呼後世積蓄者盍為城守毋為大盗之資乎鳳城岡在城西南三里許舊有奉聖寺號奉聖寺岡後金兵犯汴燬其寺金章宗時有二鳳凰率諸鳥飛落于此人遂稱為鳳城岡亦曰鳳凰岡望牛岡在城西南十里汴京城形勢如卧牛狀登是岡以望之則居然可見故名百岡在城東北三十里有土堆百餘世傳宋文帝元嘉中檀道濟與北魏戰糧盡而返魏軍襲之道濟夜唱籌量沙積至百堆以紿之魏軍見之果退道濟全師而還獨樂岡在城東十五里相傳宋時有一富翁居此男女婚嫁已畢翁不問家事日邀故舊飲酒為樂徽宗微行見之羡曰斯人其獨樂哉後因而名其岡鷂村岡在城南五十里宋時嘗命獵者養鷹鷂于此因名牛尾岡在封丘門外東一里許俗以汴城為卧牛城而此岡則牛之尾也霍赤岡在城東北二十里遼主耶律德光㓕晉嘗屯兵于此狼城岡在城西三十里杏花岡在城西南十五里一名青龍岡藥局岡在城西二十里舊為朝元宫之藥局長腰岡在城東北二十五里一名長葉岡僊遊岡在城東北二十五里一名牽牛岡侯家岡在城南十八里堠子岡在城南六十里井家岡在城西南十五里七里岡在城西南七里八角岡在城西三十里白墓子岡在城南二十里萬龍岡在城東南五十里祝岡在城東南五十五里鍾家岡在城東南五十里赤倉岡在城東南四十五里又名闗頭岡蘇村岡在城東南十里毛岡在城東南二十五里黒岡在城西北二十五里太平岡在城東二十里沙窩岡在城東北二十五里袁家岡在城東北二十五里一名北神岡南神岡在城東北二十里縮頭岡在城東二十五里角橋岡在城東北五里邉村岡在城東五里殷家岡在城東十里白石岡在城東二十五里胡岡在城東二十五里𫝊家岡在城東二十里楊子岡在城東北二十里槐疙疸岡在城東北三十里兎白岡在城東北四十里蘇家岡在城西五里獅子岡在城西二十五里以上諸岡累經黄河衝淤存者無幾而居人猶能指其遺址焉堆青堆有二一在城東窑務保之東北一在城西南毛保之西申家堆在城西永安保大營堆在城西八角保之東王家堆在城西南南毛保之東南坡幕天坡在封丘門外宋將李綱嘗敗金兵于此後為河水淤平胭脂坡在城西北東和保之西朝暮斜暉照之宛若胭脂俗呼為紅沙岡陂夏侯陂好草陂俱在城西南朱僊鎭保葧臍陂在宋門外寒陂在城西南閙店保之北練子陂在城西南閙店保之西北牧兒陂青頭陂俱在城西南閙店保之西關臨蔡關在城東南赤倉保周世宗顯德中浚閘河入蔡河命水軍駕戰艦沿潁入淮以伐南唐置闗于此金季闗廢居人仍呼此為闗頭通津闗在城東北馬尾墻保埽頭周世宗顯德四年䟽汴水入五丈河以通齊魯舟楫于此設闗元時河漲淤塞橋梁天漢橋一名州橋金梁橋浚儀橋龍津橋青暉橋雲驥橋宣化橋白虎橋雷家橋馬軍衙橋以上諸橋在都城内外汴蔡二河故道上陳橋在城東北四十五里即宋藝祖為衆擁立處也井海眼井在安逺門裏上方寺内相傳泉源通海故名元末寺燬于兵而井失其跡義井在城西金梁橋之南相傳元時邑民劉道源因徃來人衆造舍于上設汲水之具遇盛暑時則汲以濟人故名三井在鼓樓東街之北井口一石而三眼故名八角井在城西甘泉井在徐府街洪武末河水入城水皆鹹苦飲之者多感㵼痢之疾永樂癸未夏魏國公徐達宅後忽涌一泉色潔味甘甲于汴中教授滕碩有記府學新井在開封府儒學内名賢祠南正德癸酉秋七月教授榮昌冷宗元開鑿井水清冽飲者甘之以上二井俱非宋井也姑附于此冷宗元撰井記開封郡學文廟東有名賢祠祠南有隙地東為宰牲所每嵗丁祀㓗牲滌噐水必取于他井甚艱焉是嵗秋七月丙子宗元白於方伯楊公給以脩井之直郡守賀侯乃專人以董其役壬午宗元相隙地之西命匠氏鑿之僅仞許中有一石掲其石遂得故井焉深可四仞其泉冽其味甘而甃砌完整如故於是補甃井口作轆轤旁開小渠西通神庖墻以達於泮池㓗滌牲噐者皆資其用而池之魚藻亦藉以溉之八月丁日釋奠于先師丙申藩臬諸公省牲咸飲而甘之嘆曰異哉井乎其學校之徴邪是月壬戌掲榜門生中者五人而李生濂發觧斯亦異也巳提學僉憲劉公命宗元記其事竊聞孔氏以井喻德孟氏以井喻學畫于易咏于詩散記于史籍盖井體有常而應變不窮學者進德之地也然德者致用之本時者用德之幾有其德而弗遇其時井渫之不食孔孟是已有其德而又遇其時井収之勿幕伊周是巳噫德之脩不脩在我也世之用不用在人也時之遇不遇在天也君子亦惟修其在我者其在天在人則靜俟而順受之耳何容心焉二三子來游來歌挹斯泉而味斯味其於聖門體用之學将黙有所悟者矣豈直資夫滌溉而巳哉楊公名子噐慈谿人劉公名玉萬安人賀侯名銳臨汾人陵墓倉頡墓在城北時和保俗呼為倉王塜是也按禪通紀倉頡居陽武而塟利鄉所謂利鄉即時和保之􅇕也梁王墓在城西八角保高三丈廣百餘歩無碑文可考世稱魏陵鄉地名梁固疑即魏梁王之塜也信陵君墓在城東南揚州門之南公子無忌卒塟此朱亥墓在城西南朱僊鎭保俗呼為屠兒墓扁鵲墓在大梁門外西北菩提寺之東原在子城内唐元和十五年宣武軍節度使張𢎞靖徙瘞于此張儀墓在城東北七里儀魏人也為秦相卒塟此趙王墓在城東北母寺保乃漢趙王張耳也靈昭陵在城東北四十五里馬尾墻保其地即春秋宋之黄鄉世傳漢髙祖兵敗于此母因死焉後具梓宫招䰟塟之有丹蛇出水中自躍入于梓宫其躍處有遺髪乃號靈昭陵其地曰小黄園因置小黄縣陵寝累經河水淤平蔡邕墓在城東北四十五里李衞公墓在城西南閙店保唐李靖塟此叚志賢墓在閙店保之王家莊單雄信墓在仁和門内西北隅國初為左䕶衛軍營王文正公墓在城東大邉村宋丞相王文正公旦塟此歐陽脩撰王文正公神道碑至和二年七月乙未樞宻直學士右諫議大夫王素奏事殿中已而泣且言曰臣之先臣旦相眞宗皇帝十有八年今臣素又得待罪侍從之臣惟是先臣之訓其遺業餘烈臣實無似不能顯大而墓碑至今無辭以刻惟陛下哀憐不忘先帝之臣以假寵於王氏而朂其子孫天子曰嗚呼惟汝父旦事我文考眞宗叶德一心克終厥位有始有卒其可謂全德元老矣汝素以是刻于碑素拜手稽首出明日有詔史館脩撰歐陽脩曰王旦墓碑未立汝可以銘臣脩謹按故推誠保順同德守正翊戴功臣開府儀同三司守太尉充玉清昭應宫使上柱國太原郡開國公贈太師尚書令兼中書令追封魏國公謚曰文正王公諱旦字子明大名莘人也皇曾祖諱言滑州黎陽令追封許國公皇祖諱徹左拾遺追封魯國公皇考諱祜尚書兵部侍郎追封晉國公皆累贈太師尚書令兼中書令曽祖妣姚氏魯國夫人祖妣田氏秦國夫人妣任氏徐國夫人邉氏秦國夫人公之皇考以文章自顯漢周之際逮事太祖太宗為名臣嘗諭杜重威使無反漢拒盧多遜害趙普之謀以百口明符彦卿無罪故世多稱王氏有隂德公之皇考亦自植三槐于庭曰吾之後世必有為三公者此其所以志也公少好學有文太平興國五年進士及第為大理評事知臨江縣監潭州銀塲再遷著作佐郎與編文苑英華遷殿中丞通判鄭濠二州王禹偁薦其材任轉運使驛召至京師辭不受獻其所為文章得試直史館遷右正言知制誥知淳化三年禮部貢舉遷虞部員外郎同判吏部流内銓知考課院右諫議大夫趙昌言參知政事公以婿避嫌求解職太宗嘉之改禮部郎中集賢殿脩撰昌言罷復知制誥仍兼脩撰判院事召賜金紫乆之遷兵部郎中居職眞宗即位拜中書舍人數日召為翰林學士知審官院通進銀臺封駮事公為人嚴重能任大事避逺權勢不可干以私由是眞宗益知其賢錢若水名能知人常稱公曰眞宰相噐也若水為樞宻副使罷召對苑中問誰可大用者若水言公可眞宗曰吾固已知之矣咸平三年又知禮部貢舉居數日拜給事中知樞宻院事明年以工部侍郎參知政事再遷刑部侍郎景德元年契丹犯邉眞宗幸澶州雍王元份留守東京得暴疾命公馳自行在代元份留守二年遷尚書左丞三年拜工部尚書同中書門下平章事集賢殿大學士監脩國史是時契丹初請盟趙德明亦納誓約願守河西故地二邉兵罷不用眞宗遂欲以無事治天下公以謂宋興三世祖宗之法具在故其為相務行故事慎所改作進退能否賞罰必當眞宗乆而益信之所言無不聴雖他宰相大臣有所請必曰王某以為如何事無大小非公所言不决公在相位十餘年外無夷狄之虞兵革不用海内富實羣工百司各得其職故天下至今稱為賢宰相公於用人不以名譽必求其實苟賢且材矣必乆其官衆以為宜某職然後遷其所薦引人未嘗知冦凖為樞宻使當罷使人私公求為使相公大驚曰將相之任豈可求邪且吾不受私請凖深恨之已而制出除凖武勝軍節度使同中書門下平章事凖入見涕泣曰非陛下知臣何以至此眞宗具道公所以薦凖者凖始愧歎以為不可及故參知政事李穆子行簡有賢行以將作監丞居于家眞宗召見慰勞之遷太子中允初遣使者召之不知其所止眞宗命至中書問王某然後人知行簡公所薦也公自知制誥至為相薦士尤多其後公薨史官脩眞宗實録得内出奏章乃知朝廷之士多公所薦者公與人寡言笑其語雖簡而能以理屈人黙然終日莫能窺其際及奏事上前羣臣異同公徐一言以定今上為皇太子太子諭德某見公稱太子學書有法公曰諭德之職止於是邪趙德明言民饑求糧百萬斛大臣皆曰德明新納誓而敢違請以詔書責之眞宗以問公公請勅有司具粟百萬於京師詔德明來取眞宗大喜德明得詔書慚且拜曰朝廷有人大中祥符中天下大蝗眞宗使人於野得死蝗以示大臣明日它宰相有袖死蝗以進者曰蝗實死矣請示于朝率百官賀公獨以為不可後數日方奏事飛蝗蔽天眞宗顧公曰使百官方賀而蝗如此豈不為天下笑耶宦官劉承規以忠謹得幸病且死求為節度使眞宗以語公曰承規待此以瞑目公執以為不可曰他日將有求為樞宻使者奈何至今内臣官不過留後公任事乆人有謗公於上者公輙引咎未嘗自辨至人有過失雖人主盛怒可辨者辨之必得而後巳榮王宫火延前殿有言非天災請置獄劾火事當坐死者百餘人公獨請見曰始失火時陛下以罪巳詔天下而臣等皆上章待罪今反歸咎於人何以示信且火雖有迹寜知非天譴邪由是當坐者皆免日者上書言宫禁事坐誅籍其家得朝士所與往還占問吉凶之說眞宗怒欲付御史問狀公曰此人之常情且語不及朝廷不足罪眞宗怒不解公因自取嘗所占問之書進曰臣少賤時不免為此必以為罪願并臣付獄眞宗曰此事已發何可免公曰臣為宰相執國法豈可自為之幸於不發而以罪人眞宗意解公至中書悉焚所得書既而眞宗悔復馳取之公曰臣已焚之矣由是獲免者衆公累官至太保以病求罷入見滋福殿眞宗曰朕方以大事託卿而卿病如此因命皇太子拜公公言皇太子盛德必任陛下事因薦可為大臣者十餘人其後不至宰相者李及凌策二人而已然亦皆為名臣公屢以疾請眞宗不得巳拜公太尉兼侍中五日一朝視事遇軍國大事不以時入參决公益惶恐因卧不起以疾懇辭冊拜太尉玉清昭應宫使自公病使者存問日常三四眞宗手自和藥賜之疾亟遽幸其第賜以白金五千两辭不受以天禧元年九月癸酉薨于家享年六十有一眞宗臨哭輟視朝三日發哀于苑中其子弟門人故吏皆被恩澤即以其年十一月庚申塟公於開封府開封縣新里鄉大邉村公娶趙氏封榮國夫人後公五年卒子男三人長曰司封郎中雍次曰賛善大夫冲次曰素女四人長適太子太傅韓億次適兵部員外郎直集賢院蘇耆次適右正言范令孫次適龍圖閣直學士兵部郎中吕公弼公事寡嫂謹與其弟旭友悌尤篤任以家事一無所問而務以儉約率勵子弟使在富貴不知為驕侈兄子睦欲舉進士公曰吾常以太盛為懼其可與寒士争進至其薨也子素猶未官遺表不求恩澤有文集二十卷乾興元年詔配享眞宗廟庭臣脩曰景德祥符之際盛矣觀公之所以相而先帝之所以用公者可謂至哉是以君明臣賢德顯名尊生而俱享其榮殁而長配於廟可謂有始有卒如明詔所褒昔者烝民江漢推大臣下之事所以見任賢使能之功雖曰山甫穆公之詩實歌宣王之德也臣謹考國史實録至於縉紳故老之傳得公終始之節而録其可紀者輙聲為銘詩昭示後世以彰先帝之明以稱聖恩褒顯王氏流澤子孫與宋無極之意銘曰烈烈魏公相我眞宗眞廟翼翼魏公配食公相眞宗不言以躬時有大事事有大疑匪卜匪筮公為蓍龜公在相位終日如黙問其夷狄包裹兵革問其卿士百工以職問其庶民耕織衣食相有賞罰功當罪明相所黜升惟否惟能執其權衡萬物之平孰不事君胡能必信孰不為相其誰有終公薨于位太尉之崇天子孝思來薦清廟侑我聖考惟時元老天子念公報公之隆春秋從享萬祀無窮作為詩歌以諗廟工洪邁容齋隨筆祥符以後凡天書禮文宫觀祭祀廵幸祥瑞頌聲之事王文正公旦實為參政宰相無一不預公知得罪于清議而固戀患失不能决去及臨終乃欲削髮僧服以歛何所補哉魏野贈詩云西祀東封今已了好來相伴赤松遊可謂君子愛人以德矣歐陽公作神道碑悉隠而不書盖不可書也公持身公清無一可議然獨有此者功名之際人所難耳李駙馬墓在城東北南神岡宋駙馬都尉鎭國将軍節度使贈尚書令許和文公李遵朂塟此葉少藴石林燕語祖宗時駙馬都尉宅主薨例皆復納入官或别賜第曹沂王宅髙懐徳舊第也李和文宅亦王貽永舊第自和文始世有之宏麗甲諸主第園池尤勝號東莊和文好賢樂士以楊文公為師友其子孫多守家法一時名公卿率從之遊宣和間復取以為擷芳園後改寜德宫以居寜德皇后云李留後墓名端懿乃駙馬遵最之子也官至鎮潼軍節度觀察留後附塟于父遵朂墓側歐陽脩撰鎭潼軍節度觀察留後李公墓誌銘嘉祐五年八月某日鎭潼軍節度觀察留後知澶州軍州事隴西李公得暴疾薨于州之正寝其以疾聞也上方宴禁中為止樂命中貴人馳國醫往視未及行而以薨聞詔輟視朝一日賜其家黄金三百兩贈公感德軍節度使巳而又贈兼侍中太常謚曰某即以其年某月某日葬於開封府開封縣褒親鄉先塋之次公諱端懿字元伯開封人也右千牛衛將軍贈太師尚書令兼中書令隴西元靖王諱崇矩之曽孫連州刺史贈太師諱繼昌之孫鎭國軍節度使駙馬都尉贈尚書令兼中書令許和文公諱遵朂之子母曰齊國獻穆大長公主太宗之女眞宗之妹今天子之姑屬親而尊禮秩崇顯其淑德美問彰于内外而和文公好學不倦折節下士喜交名公卿一時翕然號稱賢尉故李氏之盛受寵三朝而天下之士不侈其榮而樂道其德公為冡子於其家法習見安行不待教告少篤學問長而孝友喜為詩工書畫至於隂陽醫術星經地理無所不通七嵗為如京副使歴文思副使供備庫使洛苑使新州刺史康懐二州團練使濟州防禦使坐知冀州失捕妖人降授單州團練使知均州未行改滑州兵馬鈐轄居嵗中遷汝州防禦使蔡州觀察使天子祀明堂推恩徙華州觀察使獻穆大長公主薨起復為鎭國軍節度觀察留後公泣血辭譲願終喪制上不許其譲許其終喪給以全俸服除拜鎮潼軍節度觀察留後累階金紫光禄大夫勲上柱國爵開國公食邑四千四百户實封九百户公為兒時上在東宫眞宗命公侍研席上尤親愛嘗解方玉𢃄賜之稍長出入宫禁禮如家人雖燕見語不及私數為上陳朝廷闕失開說古今治亂多所補益退而未嘗言公既薨得其遺藁之未上者言宋室事甚詳其餘不傳公少自勉勵見士大夫有失節廢義者輙嘆曰士起寒苦以學行自名至牽利欲遂亡其所守况驕佚易習而生長富貴間邪故常惕然痛自刮磨思立名節聞一善士傾身下之而賢士大夫亦樂與之遊以此多得名譽方大長公主在時數欲求外官以自効不可得乆之出知冀州為政循法度檢身束下民以不擾嵗滿召還初在冀捕妖人李校校窮自經死驗得實矣後貝州妖賊王則閉城叛聲言校在以惑衆公坐貶官巳而則誅城開無李校者乃還公防禦使又知鄆州安撫京東之西路是嵗京東水災民饑流亡公為治室廬發倉廩而流人至者如歸咸頼以全活置弓手馬教其馬鬬皆如精兵治汶陽堤百餘里鄆人遂無水患又知澶州發軍吏之姦者去之流其尤者於逺方然後明軍籍均其勞逸軍中稱平而畏其法始下令捕盗有登隣屋取一杓者遽寘之法以徇於市曰是固足以信吾令由是盗賊屏息公雖以公主子自少居京師常領職事其在三班院尤為稱職三班掌諸使臣功過黜陟而主者皆顯官自重或貴家子食俸廩而巳吏得因依為姦而職廢乆不省至公始躬治簿書考覈虗實賞罰必當後人多遵用其法及出為三州又皆有治狀故雖享年不永不究其所施而士君子皆知其非安於富貴者也及聞其喪也莫不痛惜焉公自為鎮潼留後十年不遷上以其乆也以為寜逺軍節度使公懇辭不拜及其薨也遂贈感德軍節度使公享年四十有八娶郭氏封仁壽郡君先公九年卒贈太原郡夫人西京左藏庫使昌州團練使中和之女子男五人長曰詵供備庫副使次曰諲曰詢皆右侍禁次曰諄曰訢尚㓜女四人長適皇姪右屯衛大將軍吉州團練使建安郡公宗保早卒次適秘書丞夏倚次適皇姪左領軍衛大將軍宗景次適皇姪孫右監門衛將軍世逸公平生嘗語其子弟曰吾䝉國厚恩未有以報吾且死宜有遺言毋因以求恩澤及其薨也其家如其言銘曰允矣和文惟時顯人蔚有士譽匪矜帝姻賚其子孫列爵啟國惟公承之克似其德士起寒家驕于滿盈紛其利欲敗節隳名公生盛族赫奕高明都尉之子天子之甥惟謹惟恭其色不懈聞善如貪在得思戒間亦宴見忠言告猷學而從政有惠三州享其多美獨不遐年高旌巨節以賁于泉昌又贈之金璫附蟬寵渥榮名惟有其實刻詩同藏其固其宻呼延賛墓在朱僊鎮之東北原上咸寜三年賛掌䕶元德皇后園陵儀衛還卒葬此丹陽伯墓在城西八角保大營舖南宋丹陽伯葛景先葬于此曹僊姑墓在城南閙店保古之新里鄉也李總管墓在城東南赤倉保元南康路總管李鐸大梁人歸柩葬此游平章墓在朱僊鎭保元江淮行省平章事游顯塟此周令公墓陶令公墓以上二墓俱在閙店保高左丞墓在城東南史胡舖之北元河南行省左丞封梁國武定公高興塟此梁國公墓在朱僊鎮保􅀥林莊元梁國公楊澤葬此程鉅夫撰楊氏先塋記邃古之初不封不樹中古墓而不墳成周之時始以爵等為丘封之度與其樹數設官掌之漢律列侯墳髙四丈自是以降其制益明天禄辟邪之屬亦各有差等所以辨貴賤定民志也聖天子以仁孝治天下加惠臣鄰無有幽顯孝子慈孫之心咸翼然以奮嗚呼教孝勸忠之政不其美歟梁國楊文懿公之墓在大梁祥符縣魏陵鄉伯俞村先是公之二子敬直元直遵禮經廣兆域至於表羡道識𤣥堂猶有竢也二子既受簡知至大三年秋七月詔推恩其祖禰明年夏四月又賜碑墓道遣將作院使野訥傳㫖集賢大學士李謙為之文冬十有一月又加贈賜謚時敬直以轉運使官两淮元直以太醫院使侍禁中皇慶元年夏六月元直請歸脩治先人塜及樹所賜碑不許乞聴兄離職行事乃許敬直承恩奉詔惟謹明年春正月元直復泣請于興聖宫又不許請至二十餘終不許曰爾為爾親吾為吾子孫也且爾兄在豈必爾其命河南行省給費為爾成之元直曰以公給私不可固辭從之乃賜楮幣萬五千緡仍督行省相其役二月復遣刑部郎中楊某賜河南丞相尚醖二壺以申敇之明年三月壬子丞相身率僚佐共建勅賜神道碑于墓右寓公鄉老及四方來觀者萬數莫不咨嗟歎息曰非盛德之後能若是乎改作祠堂三楹秦國公李孟為榜曰致嚴壙未有銘集賢侍講學士趙孟頫銘之墓前有表參知政事賈鈞書之墓南二丈有石門刻御史中丞郝天挺之字曰楊氏先塋塋前石人獸如制又南去二百五十尺華表雙髙國子祭酒劉􅆳題其衡顔曰梁國公神道有碣路左書曰大司徒梁國公墳則鄂國公史弼書也中以畆計者十五垣以甓外以丈計者六百繚以墻樹榆柳栢松數萬欎欝如屯雲翼翼嚴嚴遼遼極目前臨官道過者竦瞻咸曰此非教忠之原發祥之兆乎盖是舉也金工石工朩工土工凡六千有竒其費上賜之外竭家之有猶不足也冬敬直元直乃圖其成請記於所知程某曰兄弟幸頼先訓歴事累朝被遇兩宫隆恩異數顯寵若此非勒之金石何以表君上示子孫且辱知於子餘三十年矣其為我記之某曰余聞仲尼之言封崇矣有若堂者有若防者有若覆厦屋者有若斧者合葬於防從若斧者焉此足以觀聖人愼終之一節也君子不以天下儉其親聖人亦從事之宜而巳故有其位有其財與其時君子莫不盡心焉非以為泰也非以為觀美也所以勸也所以事君事親也昔有身為冡宰乃家廟之不營而祭於寢司冦劾之者有傷其生無以為養死無以為禮聖人非之者適於宜而已若楊氏兄弟之廉敏端惠孝友敬篤其事君也外則于藩于宣而致其理内則夙夜在公而致其勤其事親也生事葬祭咸致其誠則於事君事親之禮講之亦乆矣宜能位並九卿澤及三世軌物備制遂其所俟嗚呼此忠臣孝子之事也至於啓發人之善心使之思教子思立身以及於事君事親之本其得於觀感羡慕者又不知其幾何人也詩云孝子不匱永錫爾類其是之謂乎是宜有記嗟夫楊氏之子子孫孫毋怠毋荒丕念爾先丕敬厥德其克永世哉公諱澤字潤夫凡再被贈恩階曰榮禄大夫官曰大司徒勲曰柱國梁國其封文懿其謚也其行已載所賜碑敬直今為江西等處行中書省參知政事元直昭文館大學士太醫院使掌醫卿延祐二年十月某記周宻癸辛雜識趙松雪云北方多唐以前古塜所謂墓誌者皆在墓中正方而上有盖豐下殺上上書某朝某官某人墓誌此所謂書盖者盖底兩叚用鐡局拘之後人立碑於墓道其上篆額後訛為盖非也今世嵗月志乃其家子孫為之非所謂墓碑也古者初無嵗月志之石自李緫管而下諸墓皆宋以後人姑附于此汴京遺蹟志卷九
