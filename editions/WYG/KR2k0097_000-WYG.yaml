  text: 欽定四庫全書史部十一
  hash: sha256:5f8ab01fbfc809cc911a707e5aa22577e1ed198056f701795ddffcd84b7bc12f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0097_WYG_000-1a, image: WYG0587/WYG0587-0513a.png}
body:
  text: 汴京遺跡志總目地理類七古蹟之屬卷一宋京城宋大内宫室宋内諸司宋外諸司宋明堂卷二官署一卷三官署二卷四山岳卷五河渠一巻六河渠二巻七河渠三附京畿溝洫暨堤閘渡口潭泊巻八宫室宫門樓堂閣館亭臺池園苑洞峽渚沜巻九岡堆坡陂關梁井墓巻十寺觀巻十一祠廟庵院巻十二雜志一巻十三雜志二巻十四藝文一奏議巻十五藝文二記序巻十六藝文三碑巻十七藝文四墓碑墓誌神道碑巻十八藝文五雜文巻十九藝文六賦一巻二十藝文七賦二巻二十一藝文八五言古詩巻二十二藝文九七言古詩五言律詩巻二十三藝文十七言律詩巻二十四藝文十一五言排律七言排律五言絶句七言絶句六言長短句臣等謹案汴京遺蹟志二十四巻明李濓輯濓字川父祥符人舉正徳八年鄉試第一明年成進士官至山西按察司僉事少負俊才嘗作理情賦李夢陽大為嗟賞罷官益肆力於學遂以古文名於時所著嵩渚集采藻甚富而繩削未嚴頗有才多之患巳别存其目是書則以厯代都㑹皆有專志獨汴無之又宋孟元老東京夢華録蕪穢猥瑣無足觀遂摭拾舊聞編次成帙義例整齊殊有體要徵引典核亦俱見根據在輿地書中足稱善本雖其精博辨晰究不及長安志雍録諸書而自朱梁以迄於宋金數百年間建置沿革之由廢興存亡之跡皆為之彚考臚編畧存端緒亦復粲然如指諸掌宋敏求東京記今巳不傳得此書而大梁遺事乃畧備矣乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀汴京遺蹟志原序余未第時讀書吹臺嘗輯宋藝祖而下九帝起庚申至丁未凡一百六十有七年之事為汴宋春秋垂完而輟既叨甲科遂服官政固無暇及此丙戌免歸始得肆力纂述乃於篋笥中檢尋前稿散逸罔存於是追憶舊聞著汴京遺蹟志二十有四巻冠之序曰粤惟秦漢以來天子建都之地曰關中曰洛陽曰建業曰汴梁曰臨安其間遺蹟往事非藉圖籍以傳則蹟與代湮事隨人滅陵谷變易城闕丘墟雖都人遺老有不能道其舊址之所在者矣然則圖籍之在寰宇抑豈可少哉今關中有三輔黄圖吕汲公長安圖記程文簡公雍録葛稚川關中記洛陽有楊佺期洛城圖韋述西京記李格非洛陽名園記王正倫洛陽類事建業有史正志建康志朱舜庸建康續志陳魯南金陵圖考臨安有武林舊事周淙臨安志李心𫝊朝野雜記皆行于世學士大夫一展閱間故都遺蹟宛聚目前不必履壤觀風詢宫問沼躡荒臺矚廢殿而感時懷古之情自不容巳于臥遊之頃矣獨吾汴自五代以迄于宋久為帝都而紀載之書無聞焉幸微有孟元老東京夢華録一帙蕪薉猥瑣無足觀者余丱角時聞先生長者亟稱宋敏求東京記王權夷門記頗為明悉而未之見間嘗徧叩城中藏書之家暨海内博雅之士咸亡有也丙午之夏余避暑于南坰别墅幽居寡營神慮澹爽乃稍親筆研創輯汴京遺蹟志成所愧聞見􅄶陋蒐羅疏畧櫽括靡周詮次無法詎敢曰與吕汲公程文簡諸君子之編並行于世哉聊亦摭故實備考索舒慨惋資譚噱補鄉國之闕文消山林之長日而巳乃若區區刪訂取舍之意備見凡例所謂一代興衰治亂之故亦畧寓于其中讀是編者當自得之嘉靖二十五年夏六月既望前進士大梁李濂書于榆枋小隠汴京遺蹟志凡例一是編本為紀載宋都舊蹟而作顧所謂舊蹟亦有在宋之前者如夷門沙海之類不可不書其在宋後繇金元以來暨國朝所脩建者亦不可遺故間亦附焉一開封無郡志祥符無邑志是故汴京遺蹟都無可考某不自量輒據平日見聞草創成編脩飾潤色以俟後之君子一舊蹟湮廢巳久徒以空名志之者何曰志之者永其蹟也及今弗録將并其名而亡之矣後有好古君子其何以攷見邪此某所以汲汲焉為之也一故都名臣宦業人才物産風謡俗尚不録者何曰吾志其遺蹟而巳矣它何知焉雖然一代興衰治亂之故亦畧寓于其中矣一藝文收載為汴京舊蹟作者居什之九然亦有在宋之前如韓愈汴州東西水門記蕭穎士蓬池禊飲序之類亦大梁事也良弗可遺故亦録之一藝文無關于汴京舊蹟者不録而録之者各以體類每體仍以世代先後為序一朱僊鎮亦汴京城南之古蹟也某業巳有專集傳世兹不入一元楊奐撰汴故宫記見巻一乃金主亮所創後宣宗遷都于汴復脩又奐作絶句詩録汴梁宫人語内有云别殿弓刀響倉黄接鄭王見巻二十四所謂鄭王指崔立也兹雖非宋之遺蹟亦前代事故併録焉志中收載如此者尚多觀者詳之一靖康之變汴京遂不可復而南渡矣此一代之大關繫也故雜志中頗詳載之一荒唐幻怪之説悉黜之間有刪削未盡者闕疑也一故都遺蹟往事考據採訪殊愧精詳且中間不無舛錯尚賴博雅君子是補是正可也
