body:
  text: 汴京遺蹟志巻十九明李濂撰藝文六賦一梁王菟園賦漢枚乗脩竹檀欒夾池水旋菟園並馳道臨廣衍長冗坂故徑於崑崙貇觀相物芴焉子有似乎西山西山隑隑䘏焉㟟􅳾崣􅵣崟巖嵸巍􅲋焉暴熛激揚塵埃蛇龍奏林薄竹逰風踊焉秋風揚焉滿庶庶焉紛紛紜紜騰踊雲亂枝葉翬散摩來幡幡焉谿谷沙石涸波沸日湲浸疾東流連焉轔轔隂發緒菲菲誾誾讙擾昆雞蝭蛙倉庚宻切别鳥相離哀鳴其中若乃附巢蹇之𫝊於列樹也欐欐若飛雪之重弗麗也西望西山山鵲野鳩白鷺鶻桐鸇鶚鷂鵰翡翠鴝鵒守狗戴勝巢枝穴藏被塘臨谷聲音相聞喙尾離屬翺翔群熙交頸接翼闒而未至徐飛翋䎓往來霞水離散而沒合疾疾紛紛若塵埃之間白雪也予之幽㝠究之乎無端於是晚春早夏邯鄲襄國易陽之容麗人及其燕飾子相予雜遝而往欵焉車馬接軫相屬方輪錯轂接服何驂披銜跡蹶自奮增絶怵惕騰躍水意而未發因更隂逐心相秩奔隧林臨河怒氣未竭羽葢繇起被以紅沫濛濛若雨委雪髙冠扁焉長劒閑焉左挾彈焉右執鞭焉日移樂襄逰觀西園之芝芝成宮闕枝葉榮茂選擇純熟挈取含苴復取其次顧賜從者於是從容安步鬬雞走兔俛仰釣射煎熬炮炙極樂到暮若乃夫郊采桑之婦人兮袿裼錯紆連袖方路摩長便娟數顧芳溫往來接神連未結已諾不分縹併進靖儐笑連便不可忍視也於是婦人先稱曰春陽生兮萋萋不才子兮心哀見嘉客兮不能歸桑萎蠶饑中人望奈何按菟園梁孝王之苑名也梁孝王武漢文帝子景帝之同母弟竇太后之少子太后甚愛之賞賜不可勝計孝王築東苑方三百里為複道自宮連屬於平臺二十餘里此賦始終鋪敘苑囿之盛略無規警之辭乗正直人也或非其真筆而子臯素善詼諧為賦疾而不工宋人章樵亦嘗疑此篇為臯作其知言哉忘憂館柳賦枚乗梁孝王逰於忘憂之館集諸逰士各使為賦枚乘為柳賦其辭曰忘憂之館垂條之木枝逶遲而含紫葉萋萋而吐緑出入風雲去來羽族既上下而好音亦黄衣而絳足蜩螗厲響蜘蛛吐絲階草漠漠白日遲遲于嗟細柳流亂輕絲君王淵穆其度御群英而翫之小臣瞽聵與此陳詞于嗟樂兮於是罇盈縹玉之酒爵獻金漿之醪庻羞千族盈滿六庖弱絲清管與風霜而共雕鎗鍠啾唧蕭條寂寥雋乂英旄列襟聨袍小臣莫効於鴻毛空銜鮮而𠻳醪雖復河清海竭終無增景於邊撩邊撩言栁之邊梢也自喻無細微之補報徒竊飲食而巳大河賦晉成公綏覽百川之宏壯兮莫尚美於黄河潛崑崙之峻極兮出積石之嵳峩登龍門而南逰兮拂華隂與曲阿凌砥柱而激湍兮踰洛汭而揚波體委蛇於后土兮配靈漢於穹蒼貫中夏之畿甸兮經朔狄之遐荒歴二周之北境兮流三晉之南鄉秦自西而啟壤兮齊據東而畫疆殷徒涉而永固衞遷濟而遂强趙决流而却魏嬴引溝而滅梁思先哲之攸歎何水徳之難量雪賦宋謝惠連嵗將暮時既昏寒風積愁雲繁梁王不恱逰於菟園乃置㫖酒命賓友召鄒生延枚叟相如末至居客之右俄而微霰零宻雪下王乃歌北風於衞詩詠南山於周雅授簡於司馬大夫曰抽子秘思騁子妍辭侔色揣稱為寡人賦之相如於是避席而起逡巡而揖曰臣聞雪宮建於東國雪山峙於西域岐昌發詠於來思姬滿申歌於黄竹曹風以麻衣比色楚謠以幽蘭儷曲盈尺則呈瑞於豐年袤丈則表沴於隂德雪之時義逺矣哉請言其始若乃𤣥律窮嚴氣升焦溪涸湯谷凝火井滅溫泉冰沸潭無湧炎風不興北户墐扉裸壤垂繒於是河海生雲朔漠飛沙連氛累靄掩日韜霞霰淅瀝而先集雪紛糅而遂多其為狀也散漫交錯氛氲蕭索藹藹浮浮瀌瀌弈弈聯翩飛灑徘徊委積始縁甍而冒棟終開簾而入隙初便娟於墀廡末縈盈於帷席既因方而為珪亦遇圓而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵似連璐庭列瑤階林挺瓊樹皓鶴奪鮮白鷴失素紈袖慙冶玉顔掩嫮若乃積素未虧白日朝鮮爛兮若爥龍銜燿照崑山爾其流滴垂冰縁霤承隅粲兮若馮夷剖蚌列明珠至夫繽紛繁騖之貌皓汗皦潔之儀迴散縈積之勢飛聚凝曜之竒固展轉而無窮嗟難得而備知若乃申娛翫之無已夜幽靜而多懐風觸楹而轉響月承幌而通暉酌湘吳之醇酎御狐狢之兼衣對庭鵾之雙舞瞻雲鴈之孤飛折園中之萱草擿陌上之芳薇踐霜雪之交積憐枝葉之相違馳遙思於千里願接手而同歸鄒陽聞之懣然心服有懐妍唱敬接末曲於是乃作而賦積雪之歌歌曰携佳人兮披重幄援綺衾兮坐芳縟燎薰鑪兮炳明燭酌桂酒兮揚清曲又續而為白雪之歌歌曰曲既揚兮酒既陳朱顔酡兮思自親願低帷以昵枕念解珮而褫紳怨年嵗之易暮傷後㑹之無因君寧見階上之白雪豈鮮耀於陽春歌卒王乃尋繹吟翫撫覽扼腕顧謂枚叔起而為亂亂曰白羽雖白質以輕兮白玉雖白空守貞兮未若兹雪因時而滅𤣥隂凝不昧其潔太陽曜不固其節節豈我名潔豈我貞憑雲升降從風飄零值物賦像任地班形素因遇立汚隨染成縱心皓然何慮何營此賦本惠連作而假梁王鄒枚司馬以為辭其曰授簡於司馬大夫葢設言也抑亦賦之變體者歟學梁王菟園賦梁江淹或重古輕今者僕曰何為其然哉無知音則已矣聊為古賦以奮枚叔之製焉碧山倚巘﨑兮象海水碣石朝日晨霞兮赩紅壁仰望泬寥兮數千尺􅹳嵺􅲟汨淈成岫􅢋呼而窟竇哮碻􅲙確紫蕪丹駮苔㸃綺縟若斷若續如此者百有十處奔水激集瀴溟絜渠潏湟吐吸跳波走浪濺沫而相及漾長驚澆灌遠注無時息焉青樹玉葉彌望成林亦有輪囷磥硊一枝百頃萬葉共隂縹草丹蘅江離蔓荆酷郁交布原滿隰平於是金塘􅊺演緑竹被坂繚繞青翠近而復逺白砂如積雪者焉碧石如圓玦者焉水鳥鴐鵝􅡝鳿鶵鴈上飛衡陽下宿沅漢十十五五忽合而復散乃有綺雲之館頳霞之臺其樂足以棄國釋位遺死忘歸也若夫墨翟商瞿之倫學兼師術才叅道真方駕連軫于沼之濵乃射宿餌魴前繳鷫鷞青黏黄粱曤鼈胾羮臑㹠柘漿窮嬉極娛雲翺兮煙翔超然左覽蒼梧右睨鄧林崩石梧岸崱屴藏隂逮至山頂丹壁四平靈木夾道神草列生俯瞰太一下視流星既投冠而棄劒亦扤魄而盪靈於是大夫之徒稱詩而歸春陽始映朱華未希卒逢邯鄲之女蕙色玉質命知其麗攢連映日綺裳下見錦衣上出雖復守禮令人意失遂謠曰碧玉作椀銀為盤一刻一鏤化雙鸞乃報歌曰美人不見紫錦衾黄泉應至何所禁妃因别曰見上客兮心歴亂送短詩兮懐長歎中人望兮􅁞既饑躞蹀暮兮思夜半明堂賦宋范仲淹臣聞明堂者天子布政之宮也在國之陽于已之方廣大乎天地之象髙明乎日月之章崇百王之大觀揭三宮之中央昭壯麗於神州宣英茂於皇猷頒金玉之宏度集人神之丕休故可祀先王以配上帝坐天子而朝諸侯者也粤自蒼牙開極黄靈耀徳巢穴以革棟宇以植徹太古之弊明大壯之則風雨攸止宮室斯美將崇髙乎富貴之位統和乎天人之理乃聖大造明堂肇起明以清其居堂以髙而視壁廓焉而四達殿巋焉而中峙禮以潔而儉必表之以茅教以清而流故環之以水暨二帝之述焉合五府而祭矣逮夫夏禮秩秩奉以世室商祀穆穆制以重屋神禹卑宮階以一尺之崇成湯受命革以三尺之盛赫赫周堂制度景彰七筵兮南北之廣九筵兮西東之長堂并包於五室室辨正於五方左青陽而右總章靣明堂而背北室耽然太室儼乎中黄都徽名之在南取盛徳之向陽或謂厥堂惟一厥室惟九闢闔其三十六户疏達兮七十二牖亦規上而天覆復矩下而坤厚近郊之宮廣而能受通天之宇髙而弗偶八方象其幅貟九陛參其前後肅肅焉聽政之廟應辰而周彰趪趪焉承天之柱列宿而相望環林兮葱葱圎海兮泱泱既方舟而經梁復素飾其迴墻陳位序以有嚴議法象而必臧示邦域之景鑠期人神之樂康左有辟雍天子學宮墳籍浩以明備文物森其㑹同奉三夀以朂天下之孝設三乏以勸諸侯之風右有靈臺庶民子來若經始於神明廼占候於昭回天之道也惟黙黙以有象聖之心也葢惕惕而無災此三雍之大者故百世以欽哉若夫約周之禮禀夏之正天子升青陽之位體大徳之生彼相協謀有司奉行慶賜必均歴象必明布農事於準直習舞徳於和平止伯益之伐木禁蚩尤之稱兵惟倉廪兮賑天之窮惟幣帛兮禮邦之英無隱不彰無濳不亨蒙蕩蕩之至仁浸灝灝之醇精此明堂之春也萬物為之榮又若炎以繼天羲以永日始於仲呂之管復于清宮之律天子乃登諸明堂暨夫太室命盛樂以象徳致大雩以祈實升髙明而有豫定心氣而無逸靜百官之事驅五榖之疾無縈於關無難於門止北伐之威以助養於生生導南風之和以飾喜於元元此明堂之夏也萬物為之繁爾乃象正火位徳王金行羽漸于以南嚮穀萬斯而西成天子乃居總章之奥奏清商之聲圖有功而專任詰不義而徂征脩法制以謹收藏之令養衰老以惻搖落之情同我度量平予權衡人社以崇厚兆民報本之志神倉以秘示萬邦致孝之誠此明堂之秋也天下為之清及夫蟲介時分虎威夕永詩人發其凉之詠日官賔可愛之景天子乃北堂以居南靣而省錫飲烝之慶從祀寒之請於是戒門閭備邊境勞三農於休息警百辟於恭靖關市必易宮室必整無用之器斯徹無事之官必省飭國典以俟來嵗之宜講武經以肅萬邦之屏此明堂之冬也天下為之靜斯乃順其時與物咸宜適其變使民不倦者也稽夫宗祀之文大享之辰上儀乎皇皇盛節兮彬彬比於郊也我則取文之勝方其廟也我則取質之純損益其禮尊嚴其親五天之座􅁮􅁮以陳五帝之席弈弈而倫惟太室之位乃上帝之神作配者先王從祀者五臣樽斚離離玉幣莘莘牲牢之舉既遵於夏后蔬果之薦復本於周人禮無不當誠無不臻聖人於是出齋宮而肅肅被法服而循循酌一獻以從質躬百拜以表寅司儀實相樂正攸賔進爼豆之吉蠲羅簨虡之輪囷六樂咸在統美乎列皇八風相盪同和乎大鈞下舞上歌蹈德詠仁非常之祭駿及者萬國莫大之孝蟻懐者兆民於是神醉其徳人樂而極太史書於策大夫頌於國頌曰明堂崇之明王祀之禮以成之樂以歌之光天之下教以化之若夫元朔㑹同群后對越穆穆乎舜門之闢晰晰乎宣燎之發帝時待旦而久求衣以先紆黄組冠通天建日月服乾坤佩干將升崑崙進山嶽之圭當雲龍之軒正聖人之大寶示天下之有尊巍巍焉負扆而立濟濟焉辨色而入太常正其等衰九賔序其名級中階之前三公屹然應門之外九采察焉阼階之東諸侯以同西階之西諸伯以齊門東北靣者子之位門西東上者男之次東門之外則有樂浪蟠木九夷之國西靣而北上西門之外則有蒙氾大秦六戎之屬南上而東向南門之外則有朱垠越裳八蠻之族惟北是望北門之外則有葷粥幽陵五狄之種惟東是尚於是兟兟旅進鏘鏘肆覲嚮明者盖取諸離觀光者受之以晉君臣之位定禮樂之道振雅韶以奏文鐸以狥皆望雲而就日必歌堯而頌舜上和而下樂金聲而玉潤况乎晨光赫曦天顔弗違冕紱兮霞集玉帛兮川歸盛乎王庭之聲明煥乎天象之光輝若北辰之㑹衆星咸粲粲而在共如太陽之臨多露普湛湛而將晞莫不君三揖于上臣載拜于下行典禮揚風雅訪俊良議窮寡人曷幽而覆盆賢曷惻而遺野于以盛名器于以休宗社署聖法於圎闕馳神教於方夏皇哉耀今昔之榮觀至哉敷億兆之純嘏故曰揖讓而治天下者明堂之謂也惜乎三代以還智者間間諸儒靡協議者喋喋而皆膠其增損忘禮樂之大本泥於廣狹廢皇王之大業使朝廷茫然有逾逺之嘆惘然有中輟之議殊不知五帝非沿樂而興三王豈襲禮而至為明堂之道不必尚其奥行明堂之義不必盡其制適道者與權忘象者得意大樂同天地之和豈匏竹而己矣大禮同天地之節豈豆籩之云爾自漢魏之下暨隋唐之際堂或三五之上道非三五之世葢不取其厚而取其薄不得其大而得其細享配之文或然未分政教之烈斯焉弗聞是則帝道不施胡取乎總期皇德不隆胡取乎合宮故夫明堂之設也天子居之日敬日思思之何也萬微存乎消息敬之何也兆靈繋之安危繇是惟克念以作聖思堯舜之齊名懼巍巍之弗逮廼孜孜於雞鳴惟至平之休代思阜財於吾民懼四維之有艱尚瘡痍而百辛故聖人之寶儉弗下剥而上侈思寡費薄索民庻㡬于格耻惟下武之太寧亦省躬于干戈取諸豫於四方慨風雲以長歌惟知人其古難思濟濟乎賢者葢舉一於臯陶廼連茹于天下惟好生之至徳思與物而為春懼幽陋之靡及常咨命于仁人惟及人之一徳始若晦而彌彰故三五之君子騰茂實而無疆惟皇極之大範思天下而與平懼萬物之或差持我心於誠衡然後見天下齊於無體和於無聲厖眉而夀吾何仁之有含哺而嬉吾何力之為但淵淵綿綿無反無偏浸淳澤以咸若樂鴻化於自然此明堂之道也葢無徳而稱焉我國家凝粹百靈薦馨三極東升禋於岱首西展琮於汾側未正天神之府以讓皇人之徳祖考來格俟配天之儀諸侯入朝思助祭之職豈上聖之謙而愚臣之惑也臣請考列辟之明術塞處士之横議約其制復其位儉不為其陋奢不為其肆斟酌乎三王擬議乎簡易展宗祀之禮正朝㑹之義廣明堂之妙道極真人之能事以至聖子神孫億千萬期登於斯念於斯受天之禧與天下宜而已乎圓丘賦宋祁若夫天地之區既奥而腴王者所以作京焉神明之隩匪攻而築上帝所以定位焉我朝之擁歸運也譏函鎬保界之陋鄙周雒渟瀯之淵乃据梁之芒芒偵河之渾渾畫邦畿之千里于以宅天子之尊然後翼翼乾乾作邦孚先禘其祖之所自出兮遂有事乎昊天占國南之七里得髙丘之崛然自乾㝢之初闢保坤靈而不遷藏偉兆於遐葉震元符於兹年此烈祖所以裒神之對神宗所以旅物之蠲真考之所陟降丕后之所周旋藹列聖以烝衎總萬靈而賔筵翕降鑒之厚福焯巍巍而亡原則晉考卜乎委粟漢肹飾乎甘泉曾不得望我之末光絶炎况並驅而齊肩哉敢問圓丘之狀也其何如矣廣矣大矣畧可詳矣上崔嵬以鬱律兮外博敞而神麗遡朱鳥以髙蟠兮槩瑤魁而邪峙休氣回復乎其椒兮滎泉滋滲乎其止魑魅不若泯伏於其逺兮神明肅然離衞乎其邇於是攘之辟之其菑其翳脩之平之其坎其畷上三陔以積髙外四門而疏陛列道糊頳重營界紫無縮板以作勞不藉罽而昭侈因天質之自然非人力之攸致崒兮似髙山之在周邦嶻焉若隆脽之亘汾澨及夫涓日肇祀于郊之宮陶匏尚質金石有容璧奠褥以蒼蒼兮鼎歊雲而隆隆百神服食蔓衍乎坎間兮有司守燎粲爛乎壝中穆穆天子相維辟公咸盛氣以彊力相升降兮穹崇披大紫之莫莫招翠黄之雍雍合蕭薌於欽柴曳髙煙乎璇穹塞天淵以隤祉奮光明於亡窮踆乎已事罔有不恭若乃自内出者無匹不行自外至者無主不止故我率乎祖而推本正乎位而升配使禮動乎上則神饗樂交乎下而人喜畢九州以獻力罄一純以盡意君子曰觀天下之物無以稱其徳所以因天事天取至誠之為貴則斯丘也實國家集福之清場事神之寶畤國聽之所馮厚靈心之所翔㑹駐魄寶於飈歘賁黄圖之方志彼草棲列僊之館像設梵王之廬豚蹄種祠之託鱗長九淵之居皆祠官之細祀族之餘尚且落成者鼓吻而極嘆乞靈者䑛筆而争書叛宣父以語恠溺丘明而好巫獨圓丘巋而遺美寧儒者佁儓而未之思歟遂作頌曰屹圓壇赫昈昈大盤盤兮君之升帝是饗鞏而安兮禮無違福不回委如山兮聖繼聖萬斯年長監觀兮右史院蒲桃賦宋祁癸酉之仲夏予授詔脩書寓於右史院紬繹多暇裴回堂除有蒲桃一本延蔓疎瘠垂實甚寡予且玩且唶以為省户凝切禁廷敞閑人不夭摧禽不棲啄與平原槁壤有間匪灌叢宿莽所干而條悴葉芸不為時珍何邪得非地以所宜為安根以屢徙為危封殖浸灌信美非願因為小賦代其臆對云昔炎漢之遣使道西域而始通得蒲桃之異種偕苜蓿以來東矜所從以至逺遂徧殖乎離宮去葱雪之寒鄉託崤函之福地並萬寶以均載歴千古而舒粹玩之可使蠲煩食之足以平志不由甘而取壊廼因少而獲貴鄙柚苞之輕賤蔗境之塵滓粤何人斯殖我於兹託深嚴之秘署切轇轕之文榱培孤莖以膏壤引柔蔓乎褾枝泉石渠以蒙浸露金莖而泫滋布凉影於月宮獵重葩於禁颸蔽風廬之岑寂隱肅唱而逶遲彼得地而逢辰宜欣欣以茂遂奚敷華而委質反慘慘而兹瘁乏磊砢於當年讓紛華於此世是必野荄非曾掖之翫菲實異太官之味困枳橘之屢遷嘆匏𤓰之徒繋亦猶鬱柳有性不願桮棬之華海鳥取容非榮觴酒之饋胡不放之巖際歸之壠隂上敷榮於樛木外結庇於緇林蒙煙沐霧跨野彌岑豐茸大徳之谷棲息無檎之禽保深根以庇本誡繁實之披心窮天年以善育奚斤斧之可尋亂曰階藥衒華堂萱争麗枝以萬年為名木以五衢稱瑞是皆託中涓以進熟荷鈎盾之為地結賞心以自如非孤生之所冀五鳳樓賦梁周翰伊京師之權輿也遐哉邈乎驗河圖之象按輿地之書宅禹貢豫州之域距天文辰馬之墟因四履建侯之地為六代興王之居城浚而都𣲖河而渠結坤之絡振乾之樞星甍櫛堵我民之廬海漕山廥我田之租勢雄跨胡氣王吞吳茫茫萬國魚貫而趨惟聖皇之受命應期運而握符光潛躍於龍徳踐元亨於帝衢道徳何師尊盧赫胥揖讓何比陶唐有虞英略神武威殫八區封豕必誅長鯨盡刳虎皮包刃鵠板搜儒墜典皆索闕政咸鋪成天下之大務若雷奮而風驅乃顧京室時行聖謨陋宸極之非制稽紫垣之舊圖且曰不壯不麗豈傳萬世禹之卑宮葢勿暇之計堯之茅茨非經久之制矧象魏之縣法伊億兆之所視况我力如天我貲如地不漁爾民不牟爾利一毫之費差足為易乃詔共工度景之中因舊謀新庀徒僝功臺卑者豐棟易而隆椽斵而礱去地百丈在天半空五鳳翹翼若鵬運風雙龍蟠首若鼇載宮丹楯霞繞神光何融朱楹虹植晴文始烘繡楣焜燿彫栱玲瓏椒壁塗赭綺窓暈紅雙闕偶立突然如峰平見千里深映九重奔星墜而交觸靈景互而相逢門呀洞缺若天之裂縱舉百武横駕六轍金鋪爍人光景明滅舞陽之力莫得而排叔梁之力胡可以抉其下則冠葢葳蕤劒佩陸離車如流水待漏而馳駕肩排踵兼蠻渾夷萬衆紛錯魚龍尊卑咸去來之由此競奔湊於玉墀亶皇風之無外豈朝盈之有時三事庶尹乃拜表蕭墻謁帝未央以落大壯登謌永昌曰元聖明兮帝道昌威四海兮君萬方峙髙闕兮冠百常赫宋徳兮垂無疆瞻天顔兮獻夀觴願君王兮長樂康帝曰俞哉爾觴且置當聽朕言庻曉朕意頃於戎馬之暇詳窺歴代之紀乃知乎夏徳之衰璇室自庇商政之壊瓊宮太侈楚王章華一身何寄秦皇阿房二世而棄漢武栢梁孽火隨熾陳后三閣義師尋至豈非乎禍生於漸欲起於恣亦如崇飲不已必至昏醉嗜色不已必至乏瘁遷怒不己必絶人祀窮兵不己必暴人胔甘諛不已必杜忠義溺讒不已必斥賢智亡國之君未嘗不爾朕皆知之得以趨避淫於土木雅不如是美其成功良以為愧不舉君觴恐驕朕志其大者天地所重者神器尾虎足冰終日惴惴當共重之勿使顛墜謹謝公卿無忘納誨群臣乃退咸呼萬嵗汴京遺蹟志卷十九
