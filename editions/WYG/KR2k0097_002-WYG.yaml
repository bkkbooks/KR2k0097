body:
  text: 汴京遺蹟志巻二明李濂撰官署一宋襲五代之舊建都于汴中外官署雖多改革而因循仍舊者寔多遺址湮没莫可攷見間嘗詢諸耆宿父老皆謝以不知嗟乎宋去今不逺而濂又汴人巳無所稽如此使及今弗録其所可知者後愈亡所考矣暇日聊據見聞以志宋之官署然亦畧舉一二而巳惜不能盡知也中書省宋中書省在左掖門之東宰相之所莅稱東府焉掌進擬庶務宣奉命令行臺諫章疏群臣奏請興創改革及中外無法式事應取㫖事凡除省臺寺監長貳以下及侍從職事官外任監司節鎮知州軍通判武臣遥郡横行以上除授皆掌之李心𫝊朝野雜記丞相秦官也自漢末改為大司徒厯代不能正國初循唐制以三公至列曹侍郎同平章事為宰相首相帶昭文舘大學士亞相帶監修國史末相帶集賢殿大學士神宗新官制於三省置侍中中書尚書二令虛而不除以尚書左右僕射兼門下中書侍郎為兩相然中書揆而議之門下審而復之尚書承而行之則是首相不復與朝廷議論矣元祐初司馬公相乃請令三省合班奏事分省事事自紹聖以後皆因之時議者謂門下相凡事既同進呈則不應自駮巳行之命是省審之職可廢也政和中蔡京以太師總領三省號公相乃廢尚書令改侍中中書令為左輔右弼亦虛而不除改左右僕射為太宰少宰仍兼兩省侍郎靖康中何文縝將拜相夜夢人持弓矢射中其僕乃先乞復太少宰為僕射吳正仲當制請更為丞相不從建炎三年吕元直初相議者請併三省為一於是元直解中書侍郎改同中書門下平章事乾道八年孝宗稽古改左右僕射為左右丞相去侍中兩令之名遂為定制云又曰國朝宰相自建隆至嘉泰凡一百有二人蓋自建隆元年至元祐五年一百三十年凡五十人自元祐五年至紹興六年四十六年凡二十八人兩倍於前矣自紹興七年至今嘉泰二年六十六年其間宰相或席不暇煖而纔二十有四人蓋秦檜獨相十八年故也陳后山談叢國朝宰相趙普吕䝉正張士遜吕夷簡皆三入王旦為相十一年王珪十年趙普沈倫韓琦曽公亮九年薛居正向敏中八年王曽章得象七年盧多遜李沆富弼六年李昉五年宋敏求春明退朝録國朝宰相趙令盧相文潞公四十三登庸寇萊公四十四王沂公四十五賈魏公四十八參知政事蘇侍郎易簡三十六王沂公三十九又曰國初范魯公王祁公魏僕射三相罷趙令獨相始置參知政事自是一相或二相至咸平中始有吕文穆李文靖向文簡三相又至至和中文潞公劉丞相富鄭公三相洪邁容齋三筆太祖登基仍用周朝范質王溥魏仁浦三相四年皆罷趙普獨相越三月始創參知政事之名而以命薛居正吕餘慶後益以劉熈古是為一相三參及普罷去以居正及沈義倫為相盧多遜參政太宗即位多遜亦拜相凡六年三相而無三參自後頗以二相二參為率至和二年文彦博為昭文相劉沆為史舘相富弼為集賢相但用程戡一參惟至道二年吕端以右僕射獨相而吏部侍郎温仲舒兵部侍郎王化基工部尚書李至戸部侍郎李沆四參政前後未之有也楊萬里揮麈録本朝宰相兼公師者范晉公王文獻趙韓王薛文惠王文貞丁晉公馮文懿王文公吕文靖韓忠獻曽宣靖富韓公文潞公吕正獻蔡師垣秦師垣陳魯公而巳餘皆罷政後拜近日惟張魏公自外以少傅再拜右揆本朝三入相者趙韓王吕文穆文靖張鄧公文潞公蔡元長雖四入而不克有終國朝自外拜相者文潞公韓康公章子厚近年陳魯公亦曠典也樞密院宋樞密院在闕門之西南與中書省對持文武二柄號為二府東府掌文事參政佐之西府掌武事副使佐之宋初魏仁浦以宰相兼樞密使建隆三年以樞密副使兵部侍郎趙普為檢校太保充樞密使不帶正官自普始太平興國四年以石熈載為樞密直學士以簽書院事簽書之名始此淳化三年以張遜知院事温仲舒寇凖同知院事同知院之名始此治平中以郭逵同簽書院事同簽書之名始此時陳升之三至樞府神宗欲稍異其禮乃以為知院元豐改官制議者欲廢密院歸兵部神宗曰祖宗不以兵柄付有司故専命官統之互相維制不從然以密院聨職輔弼非出使之名乃定置知院同知院二人專以兵機軍政為職洪邁容齋三筆樞密使之名起於唐本以宦者為之蓋内諸司之貴者耳五代始以士大夫居其職遂與宰相等自此接於本朝又有副使知院事同知院事簽書同簽書之别雖品秩有高下然均稱為樞密明道中王沂公自故相召為檢校太師樞密使李文定公為集賢相以書迎之於國門稱曰樞密太師相公予家藏此帖紹興五年高宗車駕幸平江過秀州執政從行者四人在前者傳呼宰相趙忠簡也次呼樞密張魏公也時為知院事次呼參政沈必先也最後又呼樞密則簽書權朝美云予為檢校時葉審言黄繼道為長貳亦同一稱而二三十年以來遂有知院同知之目初出於典謁街卒之口久而朝士亦然名不古雅莫此為甚葉少藴石林燕語樞密使唐書五代史皆不載其創始之因蓋在唐本宦者之職唐中世後宦人使名如是者多殆不可勝記本不繫職官重輕而五代時因唐舊名益増大之故史官皆不暇詳考據續事始云代宗永泰中以中人董秀管樞密因置内樞密使續事始偽蜀馮鑑所作也又曰樞密院既専總兵柄宰相非兼領殆不復預聞慶厯初元昊用兵富公為諫官乃請宰相如故事兼院事時吕文靖為相不欲兼富公爭之力遂兼樞密使自是相繼為相者初授除皆帶兼使八年文潞公自參知政事相始不帶兼使於是皇祐初宋莒公龎潁公相皆不兼蓋元昊巳納欵故也又曰本朝樞密院官既備學士之職浸廢然猶㑹食樞密使㕔每文徳殿視朝則升殿侍立亦不多除人官制行乃與學士皆為職名為直學士之冠不𨽻樞密院升殿侍立為樞密都承㫖之任每吏部尚書補外除龍圖閤學士戸部以下五曹則除樞密直學士相呼謂之密學林駉論兩府國朝兩府之職其周之冢宰司馬歟漢之丞相太尉歟然周以冢宰統司馬故兵民有相通之意漢太尉重於丞相而武職往往偏失焉觀此則國朝之或分或合其得失有不難知者且冢宰司馬周之六卿其職適相等耳然調發之權不歸之司馬而歸之天官豈固畀以職而復奪其權邪蓋兵為重事身為大臣邈不相通則國事暌矣故吕伋掌兵若無與於太保而太保實俾之程伯出師若無與於尹氏而尹氏實命之夫以掌兵出師之事一屬大臣則脉絡貫通又安有疑貳之意哉丞相太尉漢之三公其職亦相維耳然漢承秦舊官制益紊文不足以勝武兵有以異乎政事權偏重無以為統御防閑之道其事不可勝弔矣故諸吕兆禍勢亦亟矣丞相平至以五百金交歡太尉勃而左袒之功僅濟擁昭立宣事亦重矣丞相敞至不敢發一語而大將軍以國家之權自任夫以丞相之重而下聽命於掌兵之將况望其能振職哉愚嘗推兩府之分合矣且中書主民密院主兵其事相埓也中書降麻密院降宣其權相等也將分任其事之為當邪則軍國大務不當専委未免如富鄭公之議抑併其職為中書邪則兵柄相維有關大體又非所以知祖宗建樞之意嗚呼分其事固非也併其職尤非也必於分之中而有合之理存於判然不相為謀之際而實有相貫通者寓然後可與論設官之深㫖蓋自范質王溥免相之後而二府之事權裂矣獲繼遷母之議非細事也密院知之而中書初未知之興兵薊門之役非末故也密院謀之而中書不預聞之此田公錫抗言密院公事宰相不得預聞中書政事樞密不得預議不能無憾於咸平之時也迨夫景徳間真宗每得邊奏必送中書於是有共參利害之意澶淵百萬之師寇公親扶日轂尺箠笞之而北兵㡬無隻輪匹馬之返此非景徳相通之驗歟自寇公免相之後而二府之事權又裂矣戎酋之降非末節也而中書初不預知元昊之叛非小警也而邊奏皆不關中書此丁度力言二府分政若措置乖異則天下無適從不能無激於康定之初也迨夫慶厯間仁宗因張方平之議於是宰相有兼樞之職西邊陸梁之賊吕章二公分命名帥戮力平之而卒致骨寒膽破之謠此非慶厯兼領之效歟自賈昌朝陳執中免相之後而二府之事權又益裂矣趙明與西人戰密院賞功而中書降約束郭逵脩堡柵密院方詰責而中書巳降褒詔此滕達道深嘆熈寧戰守異議之非也迨夫元豐詔大事三省與密院同議矣元祐詔除授諫官三省密院同進呈矣然是時邊事利害尤未甚相通者至建炎間高宗乃以宰臣張浚兼樞密而趙鼎亦以左僕射兼之是時也國步尚艱敵勢方張剗亂而治支危而安再植巍巍中天之業者皆左扶右持之力此非建炎兼領之功歟噫自國初以至中興其分其合不知其㡬大抵合之則文武相通分之則兵政異情咸平景徳康定慶厯熈寧建炎之得失可知也可不審哉雖然主民而知兵此固關天下之大計密院而不預中書亦非大臣相維之意是故樞使而同平章事君子以為慶厯之善謀密司不與三省之差除議者為元符惜之沈括夢溪筆談舊制中書省樞密院三司使印並金近制三省樞密院印用銀為之塗金餘皆鑄銅而巳御史臺宋御史臺在京城内東澄清街北國初改為察院三區一居東巡按御史居以莅政正統間改為巡撫都御史治所今遷巡撫都御史居新置院遂為公使寓所一居西清軍刷巻御史互居以莅政正統間改為巡按御史治所一居中成化元年建為清軍刷巻御史治所亦以寓公使云葉少藴石林燕語京師省寺皆南向惟御史臺北向蓋自唐以來如此說者以為隋建御史臺取其與尚書省便道相近故唐因之或云御史彈治不法北向取肅殺之義未知孰是然今臺門上獨設鴟吻亦非他官局所有也宋朝燕翼詒謀録仁宗重臺諫之選景祐元年四月癸丑詔御史臺置殿中侍御史監察御史裏行又詔舉三丞以上嘗厯知縣人除御史裏行二年除御史又二年除三司開封判官自清要而厯繁劇選任既重一時號稱得人曽肇重修御史臺記元祐三年新作御史臺成詔臣肇為之記臣肇伏惟自念幸得備位從官以文字為職此大手筆雖非所克堪然義不得辭謹拜手稽首而記之曰惟御史見於周掌賛書受法令而巳戰國以致執法亦記事之職也至秦漢始置大夫位亞丞相副曰中丞督部刺史受公卿奏事舉劾按章其屬有侍御史出討奸猾治大獄於是専繩糾之任厥後政事歸尚書而御史與尚書謁者並為三臺大夫更為三公而中丞為臺率與尚書令司𨽻校尉朝㑹皆専席為三獨坐隋唐復置大夫天下有寃而無告者得與中書門下省詰之謂之三司自是御史益為雄峻其屬則有殿中監察并侍御史為三院侍御史一人知雜事横榻而坐謂之南牀皆専彈劾不言事本朝因之至真宗皇帝増置言事御史其後皆得言事大則御史相率廷辨小則人得自達故其任視前世為尤重非但謹朝㑹聽獄訟而巳列聖相繼皆假以寛仁使得自竭是以風采所加百寮震肅朝廷倚而益尊奸邪望而知畏初本朝雖因唐制然以大夫為兼官不治臺事以郎中員外郎兼侍御史知雜事以貳中丞以太常博士以上為三院未至者則為御史裏行監察故事内察尚書六曹外巡按郡縣久之亦廢至神宗皇帝大正官名始歸大夫職以侍御史治雜事罷御史裏行而復六察官分守既定乃相官府蓋御史臺建於宣化坊自開寶五年纔有東西獄七年雷徳驤分判三院事請於上而大之屋不及百楹天禧二年復詔増廣遂至三百六十楹訖于元豐垂七十年寖以圮壊神宗皇帝伻圖程工以授有司舊闕大夫㕔事踵鄴都制度闢門北鄉取隂殺之義又形勢痺下無以重威至是命置大夫㕔事闢門東鄉増痺為崇培下為高其視規撫宏遠矣今上即政之初務先慈儉土朩之勤咸詔勿事惟臺之建實遵先訓猶以大夫虚員姑省營築闢門北鄉仍故不改經度損益㫁自聖心以元祐二年六月巳亥始事三年八月庚辰卒功用人力十萬五千為屋三百五十一楹門闥耽耽堂室渠渠長貳佐屬視事燕休翼翼申申各適所宜吏舍囚圄深靚嚴固案牘簿書棲列有序所以觀示都邑表正憲度揆諸典章於是為稱昔周人考室見於風雅魯國作門記諸春秋後世傳誦為載籍首恭惟神宗皇帝受命承序十有九年建立經常皆應古義好惡無私賞罰不僣而綱紀是張宫室弗營池籞苟完而府寺是崇故能垂情風憲之司以啓後嗣之意二聖恭巳開闢言路聰無不聞明無不燭士有以言獲福不聞忠以取禍耳目之地寵遇莫抗故能新是棟宇以成前人之志是宜著在文字刻之金石以度越周魯垂休無窮顧臣之愚何足以發揚聖徳稱明昭之萬一哉雖然臣嘗聞之責人非難責巳惟難御史責人者也將相大臣非其人百官有司失其職天下之有敗法亂紀服讒蒐慝者御史皆得以責之然則御史獨無責乎哉居其位有所不知知之有所不言言之有所不行行之而君子病焉小人幸焉此御史之責也御史雖不自責天下得以責之惟其不難於責巳則施於責人能稱其任矣能稱其任然後危冠盛服崇墉峻宇游焉息焉可以無媿茍異於是得無餒於中哉臣故不自揆輒因承詔誦其所聞以告在位者使有以仰稱列聖褒大崇顯之意焉諫院明道元年七月辛夘陳執中為諌官以諫官無治所屢請置院乃以門下省為諫院而别創門下省於右掖門之西宋置諌院自此始宋名臣言行録慶厯増諫員取敢言士歐陽文忠公首被選以太常丞知諫院賜五品服又曰包孝肅公拯知諫院數論斥大臣權倖請罷去内降曲恩又列上唐魏鄭公三疏請置石以為龜鑑司馬光諫院題名記古者諌無官自公卿大夫至于工商無不得諫者漢興以來始置官夫以天下之政四海之衆得失利病萃於一官使言之其為任亦重矣居是官者當志其大捨其細先其急後其緩専利國家而不為身謀彼汲汲於名者猶汲汲於利也其間相去何逺哉天禧初真宗詔置諫官六員責其職事慶厯中錢君始書其名於版光恐久而漫滅嘉祐八年刻著于石後之人將厯指其名而議之曰某也忠某也詐某也直某也回嗚呼可不懼哉胡寅寄政府書古者人臣皆得進諌於其君後世專設一職既巳乖繆居是職者又多以立異為心撓亂政事人君難於盡從故員多不備難於盡廢故姑設一二人比諸餼羊方祖宗時充臺諫之選者皆天下名士或中外踐更巳久無所不知故能有補後世乃以新進利口之人為之宜其觀望喋喋而莫可遏也然事有隨時官與世建方漢光武唐太宗馬上經營之日與齊小白秦苻堅專任一相以成霸業之時未聞有臺諫官喋喋於其旁者誠以三軍五兵之運伐人制勝之謀不可以告人亦非人所能與也及平定之後法制既立則必設置臺諌使糾違犯指闕失時勢當然耳今宜以給事中兼諫大夫中書舎人兼司諫左右史兼正言政事下省便可救正而御史臺只宜彈擊官邪貞肅憲度若夫四方訴訟自有州縣監司臺省節次又不得直則有登聞檢鼓兩院存焉如此則治有體統朝廷増重國勢不摇可以言治汴京遺蹟志巻二
