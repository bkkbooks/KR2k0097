body:
  text: 汴京遺蹟志卷二十四明李濂撰藝文十一五言排律天章閣觀御書飛白十韻宋韓琦内閣開清曉中天對邇臣唐虞遺典在河洛奥書陳二聖勤勞舊千齡矩法新帝暉方咫尺宸翰復躬親鸞拂宮綃舞花隨御筆春奎光連璧府劒影動龍津今古神功絶頒宣上意均玉峯羅爼豆黼座拱星辰魚藻符亨㑹蓬瀛寄此身流霞僊飲罷又賜一杯醇黄河八韻寄呈聖俞歐陽脩河水激箭險誰言航葦逰堅冰馳馬渡伏浪捲沙流樹落新摧岸湍驚忽改洲鑿龍時退鯉漲潦不分牛萬里通槎漢千帆下漕舟怨歌今罷築故道失難求灘急風逾響川寒霧不收詎能窮禹迹空欲問張侯和歐陽永叔黄河八韻梅堯臣少本江南客今為河曲遊嵗時憂漾溢日夕見奔流齧岸侵民壤飄槎閣鴈洲峻門波作箭古郡鐵為牛目極髙飛鳥身輕不及舟寒冰狐自聽源水使嘗求宻樹隨灣轉長罾刮浪收如何貴沉玉川興是諸侯金明池遊梅堯臣三月天池上都人袨服多水明搖碧玉岸響集靈鼉畫舸龍延尾長橋霓飲波苑花光粲粲女齒笑瑳瑳行袂相朋接游肩與賤摩津樓金間采幄殿錦文窠挈榼車旁綴歸郎馬上歌川魚應望幸㡬日翠華過七言排律汴州令狐相公新於郡内栽竹百竿坼壁開軒旦夕對翫偶題七言五韻唐白居易梁王脩竹舊傳名久廢年深竹不生千畝荒涼尋未得百竿青翠種新成墻開乍見重添興窓靜時聞别有情煙葉蒙蘢侵夜色風枝蕭颯弄秋聲更登樓望尤堪重十萬人家無一莖五日蔡河廢津泛舟眀李夢陽當年錦纜帝王州此日荒津競渡遊賔客未銷梁苑氣江山聊寫汨羅愁流金赤日偏輸浪似葢輕雲故翼舟漁聽歌鐘沉復躍燕窺舞袖去還留調冰雪藕佳人並斷艾分蒲上客酬出溜只疑天上轉泝洄真在鏡中浮隂隂暝色鳧鷖岸嫋嫋風香杜若洲醉裏驚聞催住漿别船追進夕筵羞早春相國寺雪集李濂冒雪尋幽入梵宮凍雲臺殿暫停驄飛花撲面諸天外素影侵盃浩刼中亂㸃袈裟堪作畫宻隨錫杖故翻風飄殘柳絮春猶淺開遍梅花景不同郢客歌腔知獨妙梁園賦筆許誰工寒天拉友瞻龍象塵世勞生嘆蓼蟲酒半詼諧嘲佛印詩成匆遽和天童自憐淨社攢眉客元是康衢鼓腹翁坐濕巾袍吟更苦起登樓閣興何窮須臾席上雙缾盡轉覺人間萬事空清逼塔光還􅉡􅉡潤宜麥秀定芃芃無須泛艇尋安道且聽鳴鐘謁逺公日暮醉歸誇勝㑹青蓮回首玉玲瓏五言絶句倉頡造字臺唐岑參野寺荒臺晚寒天古木悲空堦有鳥跡猶似造書時登相國寺閣劉商晴日登臨好春風各望家垂楊夾城路客思逐楊花都門路宋司馬光紅塵晝夜飛車馬古今迹獨憐道旁柳慘淡少顔色汴上送客梅堯臣朝辭都城裏暮止汴堤頭滿目非相親寂黙對河流舟中夜聽汴河水聲梅堯臣夏雨漲黄流夜鳴隣舩柁乗危冒險人不識西山餓過廢牧苑元趙子昂一片中原地紛紛㡬戰爭至今將不去留與後人耕録汴梁宮人語十首楊奐一入深宮裏經今十五年長因批帖子呼到御牀前二嵗嵗逢元夜金蛾鬧簇巾見人心自怯終是女兒身三殿前輪值罷偷去賭金釵怕見黄昏月殷勤上玉階四仁聖生辰節君王進玉巵夀棚兼夀表留待北還時五邊奏行臺急東華夜啟封内人催步輦不候景陽鐘六駕前雙白鶴日日候朝回自送鑾輿去經年更不來七為道圍城久粧奩犒鬭軍入春魂斷絶饑苦不堪聞八别殿弓刀響蒼黄接鄭王尚愁宮正怒含淚强添粧九一向傳宣喚誰知不復還來時舊鍼線記得在窓間十北去遷沙漠誠心畏從行不如當日死頭白若為生上方寺明李夢陽飲罷塔廊坐塔深蘿葉垂欲枕石頭臥待有清風吹繁臺書院李夢陽書院今人蹟繁臺古代名樓花翻入燕塔樹不巢鶯夷門懐古二首王廷相鬭雞纏紫羅彈箏住流水不見盛時人重過繁華市二華園明積雪上客艷新詞何處梁王苑秋風蔓草迷汴州懐古五首李濂落日夷門道惟餘古堞雲猶懐抱關叟談笑卻秦軍二鄒枚不可見辭賦至今傳何處偏懐古梁臺日暮煙三出郭翠煙重遙聞野寺鐘堤邊逢父老閒說宋仁宗四近郭無山水春遊上吹臺平蕪猶自迥載酒獨徘徊五花石今何在孤城涕淚中金梁橋上月偏照宋遺宮七言絶句汴口懷古唐杜牧錦纜龍舟隋煬帝平臺複道漢梁王遊人還起前朝念折柳孤吟斷殺腸夷門胡曾六龍冉冉驟朝昏魏國賢才杳不存惟有侯嬴在時月夜來猶自照夷門汴河胡曾千里長河一旦開亡隋波浪九天來錦帆未落干戈起惆悵龍舟更不廻又羅鄴煬帝開河鬼亦悲生民不獨力云疲至今嗚咽東流水似向清平怨昔時又二首皮日休萬艘龍舸緑絲閒載到揚州盡不還應是天教開汴水一千餘里地無山二盡道隋亡為此河至今千里賴通波若無水殿龍舟事共禹論功不下多楊柳枝詞劉夢得煬帝行宮汴水濵數枝殘柳不勝春晚來風起花如雪飛入宮墻不見人汴河曲李益汴河東流無限春隋家宮闕已成塵行人莫上長堤望風起楊花愁殺人汴州聞角武元衡何處金笳月裏悲悠悠逺客夢先知單于城上關山曲今日中原總解吹黄河宋邵雍誰言為利多于害我謂長渾未始清西至崑崙東至海其間多少不平聲集禧宮謝雨歐陽脩十里長街五鼓催泥深雨急馬行遲臥聽竹屋蕭蕭響却憶滁州睡足時初春登興國寺塔司馬光雨過風清露氣勻林花變色柳條新為君作意登髙處試望皇州表裏春九日賜宴瓊林苑作王安石金明馳道柳參天投老重來聽管絃飽食大官還惜日夕陽臨水意茫然題中書壁王安石夜開金鑰召詞臣對御抽毫布帝綸須信朝家重儒術一時同榜用三人樊樓即豐樂樓汴京酒樓也在城内劉子翬梁園歌舞足風流美酒如刀解斷愁憶得承平多樂事夜深燈火上樊樓玉津園劉敞垂楊冉冉籠清籞細草茸茸覆白沙長閉園門人不入禁渠流出雨殘花過朱亥墓黄庻枯林寒草墓丘墟等是當年一丈夫地下若知應笑死衣冠今日有屠沽和江鄰㡬送客回同過金明池二首梅堯臣送别西亭車馬塵天池回傍欲迷津畫舩龍尾何時發丹杏稍頭漏泄春二風光猶未老於人獸口泉聲瀉碧津一洗塵襟無俗慮柳條開眼共看春京師逢賣梅花三首梅堯臣北土只知看杏蘂大梁亦復賣梅花此心還似庾開府不惜金錢買取誇二驛使前時走馬迴北人初識越人梅清香莫把荼􅐘比只欠溪頭月下盃三此去吾鄉二千里不看素蕚兩三年移根種子誰辛苦上苑偷來直㡬錢過仁宗陵劉信叔干戈消弭嵗豐登邊將無功吏不能四十二年􅃚忍說西風吹淚過昭陵梁臺金完顔璹汴水悠悠蔡水來秋風古道野花開行人驚起田間雉飛上梁王鼓吹臺相國寺鐘祝簡寒雞縮頸未鳴晨已聽舂容入夢頻未必佛徒知警悟秖能喚起利名人龍徳故宮辛愿蛇分鹿死已無秦五十年來漢苑春問著流鶯無一語柳條依舊拂墻新梁園春三首元好問雙鳳簫聲隔綵霞宮鶯催賞玉谿花誰憐利澤門前柳瘦倚東風望翠華二暖入金溝細浪添津橋楊柳緑纖纖賣花聲動天街逺㡬處春風揭繡簾三上苑春濃晝景閒緑雲紅雪擁三山宮墻不隔東風斷偷送天香到世間雪香亭雜詠八首亭在故汴宮仁安殿西元好問落日青山一片愁大河東注不還流若為長得熙春在時上髙層望宋州二金縷歌辭金屈巵百年人事鬢成絲重來未必春風在更為梨花住少時三滄海横流萬國魚茫茫神理竟何如六經管得書生下濶劒長鎗不信渠四羅綺深宮二十年更持桃李向誰妍人生只合梁園死金水河邊好墓田五萬户千門盡有名眼中歴歴記經行賦家正有蕪城筆一片傷心畫不成六暮雲樓閣古今情地老天荒恨未平白髮纍臣㡬人在就中愁殺庾蘭成七琵琶心事曲中論曾笑明妃負漢恩明日天山山下路不須回首望都門八爐薰裊裊帶輕隂翠竹髙梧水殿深去去旃車雪三尺畫羅休縷麝香金黄河元陳孚千載金湯擁上流只今惟有荻花秋江南客子笑無語閒看黄河繞汴州朱僊驛陳孚城郭重來事已非南薰不掩柳依依當時大慶蒼虬礎留與田家夜搗衣汴學洪焱祖朝元競詫新宮麗相國猶存古寺雄璧水枯荷人不到石經零落臥秋風題萬嵗山圖元明善萬嵗綱船出太湖九朝膏血一時枯阿誰種下中原禍猶自昂藏入畫圖徽廟走馬溝中得古銅燈盞剥盡金銅土色如㡬經溝底引鑾輿君王無復重逰幸留與山人照讀書汴城士人家翫小石峯天星何代隕虚空化作玲瓏一小峯自是宣和殿中物上頭銘刻護雙龍觀宋徽宗宸翰宋家宗社已丘墟萬里中原百戰餘玉輦不知何處去人間留與瘦金書題宋故宮郝經國是當時已盡非强將商鞅作臯夔莫言天變渾無畏不見雷轟黨籍碑艮岳李孝光一沼何堪役萬民一峯將使九州貧江山假設方成就真箇江山已屬人龍徳宮王惲當年陸海駭珍藏此日繁華墮𣺌茫春草不隨人事換依然分翠入宮墻汴梁故宮寒食王惲人家賣酒繞宮池爭插青旗曲作圍簫鼓漸多寒食近一樽先為典春衣熙春閣王惲傑閣當年宴御頻鼎煙未盡慘兵塵土堦三尺茅茨底人自熙熙物自春梁園對月王惲兒時曾住汴梁城二十年來重此行一片鳳凰池上月向人還似舊時明宿開封後署王惲拂拭殘碑覽徳輝千年包范見留題驚烏繞匝中庭栢猶畏霜威不敢棲詠鎮旗眀顧禄按河南總志國初皇祖駐蹕開封駕回勑留大旗卓于行宮之髙臺以鎮中原禁闕重重鎻不開當年曾駐六龍來鎮旗留在人瞻仰髙颺宮中百尺臺黄河舟中于謙順風吹浪片帆輕頃刻奔馳十數程舵尾吹煙猶未熟船頭已見汴梁城宋宮于謙龍樓髙處綵雲飛艮岳纔成事已非寂寞長門金鎻合中州無復二龍歸春日逰三山陂李夢陽崔嵬艮岳他年笑寂寞三山後代思湖色春光浄滿眼古城風暮㡬人悲登臺李夢陽梁孝臺前白杏花眼看風落散晴沙黄鸝恰恰誰為侶紫燕飛飛自作家夷門十月歌李夢陽小麥青青水半陂半落不落楊柳枝回風忽送天南鴈恰似春江二月時汴中元夕四首李夢陽花燭沉沉動玉樓月明春女大堤遊空中騎吹名王過散落天聲滿汴州二中山孺子倚新粧鄭女燕姬獨擅場齊唱憲王春樂府金梁橋外月如霜三四海煙花逢上元中州行樂競千門大江不辨魚龍夜珊瑚寶玦是王孫四細雨春燈夜色新酒樓花市不勝春和風欲動千門月醉殺東西南北人汴州懐古四首李濂黄河迴繞宋神州聒耳濤聲日夜流堤柳似知朝代改半含煙雨半含愁二宋室南遷王氣收千秋遺恨大河流可憐五國城頭月一片清光照汴州三保甲青苗淚滿衣金陵相業竟全非傷心不見蓬萊殿寂寞春風燕子飛四寒煙漠漠宜春苑孤月朧朧萬嵗峯回首二龍沙塞逺故宮無復六更鐘登吹臺有感二首李濂臺邊草色苑邊雲挈酒來遊白日曛富貴可憐成一夢疎花冷雨信陵墳二五柳先生盡日閒登臺一醉當登山仰天長嘯無人識苦憶夷門老抱關遊大道宮八首李濂塵海茫茫兩鬢霜暫依丹竈惜流光誰堪世上風波惡獨愛壺中日月長二路入蓬萊紫翠多松間雙鶴舞婆娑逢碁莫看僊人著王質當年己爛柯三𤣥都樓觀碧霞明與客登臨坐晚晴緑幘僊童歌勸酒白頭道士臥吹笙四青鳥翩翩去不迴白雲寂寂鎻丹臺閒來讀罷瑤池記始信昆明有刼灰五載酒尋春度石梁陶然酣臥白雲房情知鶴夢非塵夢直把僊鄉作醉鄉六羽客不飡煙火食夜禮瑤壇覲宸極天風吹散步虚聲萬里雲霞分五色七采藥名山志未酬偶來松院愜春逰金丹口訣真難遇㡬向風塵嘆白頭八出世何須躡彩虹扶桑莫問海天東人間要識真僊境汴上來看大道宮于少保祠李濂使君嘉績遍三河汴土遺民墮淚多無限頌勛懐徳意春風吹入降神歌六言四句題西太乙宮壁二首宋王安石楊柳鳴蜩緑暗荷花落日紅酣三十六陂春水白頭想見江南二三十年前此路父兄持我東西今日重來白首欲尋陳迹都迷次介甫韻題西太乙宮壁二首黄庭堅風急啼鳥未了雨來戰蟻方酣真是真非安在人間北看成南二晚風池蓮香度曉日宮槐影西白下長干夢到青門紫曲塵迷詞賀新郎汴京懐古明李濂四野平如掌上荒城憑髙騁望秋容蕭爽廢殿遺宮何處是極目風煙莽蒼艮岳下牧兒來往一代興亡真大夢恨當時京勔貪天賞興土木斥忠讜宋都往事增悲慷更愁聞青城邀駕括金空帑二帝蒙塵沙漠去回首中原板蕩聽滿路胡笳哀響汴水東流還似昔問鑾輿何日還華壤悲舊蹟動遐想沁園春艮岳弔古李濂十里青山百道流泉艮岳巧哉羨芙蓉城闕飛亭灑雪海棠臺榭絶壑鳴雷萬態竒峯百花窈洞一片平原錦作堆真如畫有巖巖紫翠樹樹琪瑰東京舊事堪哀恨誤國姦臣釀禍胎昔道君開苑毒痡四海蔡京入相濁亂三台巢鳳樓前濯龍峽口鉦鼓喧天動地來煙塵起慨鑾輿不返弔古徘徊滿江紅謁于少保祠李濂少保祠堂汴水上千秋廟食紛屢舞鐘鼓娛神英靈降陟遺愛百年留里巷清風兩袖朝京國磨嵩山千丈翠芙蓉書勲徳日正午金輪昃彗忽見鑾輿北獨擎天不墜伊誰之力身後寵褒公論白向來寃憤愁雲黑嘆鷺鷥冰上索魚嗛何由得諺云鷺鷥冰上走何處尋魚嗛臨江僊夷門懐古李濂落日夷門思往事抱關白首侯嬴信陵虚左自來迎側身親執轡賔客四筵驚臥内兵符初入手鐵椎俠客功成邯鄲圍解鼓鼙聲卻秦馳救趙五霸與齊名柳稍青梁苑懐古李濂落日平川梁王廢苑衰草寒煙羅綺香銷歌鐘聲散臺殿春殘當年賔客駢闐賦雪地空留麗篇往事淒其辭人亡矣風景依然西江月汴秋懐古二首李濂公子祠前春草屠兒墓上秋雲偶來堤口坐斜曛往事令人悲憤執轡髙風如在竊符竒策曾聞抱關老叟信陵君百世芳名不隕二五代古城殘角三山廢壘寒葩南薫門外亂啼鴉暝色秋林瀟灑艮岳遺宮荆棘繁臺斷塔雲霞傷心二帝狩龍沙落日平原駐馬浣溪沙汴州元夕李濂火樹嶙峋夜放花一天星斗爛晴霞春城月出樂無涯蕩子陌遊歌不斷諸王輦過鼓頻撾賞心誰忍負年華憶王孫秋日登吹臺二首李濂魏侯城外古時臺雲澹天空載酒來登臨懐古興悠哉醉金罍帽插黄花躍馬迴城南霜樹晚扶疎秋滿荒臺一嘯舒坐待林稍月挂初興何如醉墨淋漓壁上書汴京遺蹟志巻二十四
