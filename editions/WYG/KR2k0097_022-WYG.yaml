body:
  text: 汴京遺蹟志巻二十二明李濂撰藝文九七言古詩夷門唐王維七國雄雌猶未分攻城殺將何紛紛秦兵益圍邯鄲急魏王不救平原君公子為嬴停駟馬執轡逾恭意逾下亥為屠肆鼓刀人嬴乃夷門抱關者非但慷慨獻竒謀意氣兼將身命酬向風刎頭送公子七十老翁何所求古大梁行髙適古城莽蒼饒荆棘駐馬荒城愁殺人魏王宮觀盡禾黍信陵賔客隨灰塵憶昨雄都舊朝市軒車照耀歌鐘起軍容帶甲三十萬國步連營五千里全盛須臾那可論髙臺曲池無復存遺墟但見狐狸跡古地空餘草朩根暮天搖落傷懐抱撫劒悲歌對秋草俠客猶傳朱亥名行人尚識夷門道白璧黄金萬户侯寶刀駿馬填山丘年代淒涼不可問往來惟見水東流梁園吟李白我浮黄雲去京闕挂席欲進波連山天長水濶厭逺涉訪古始及平臺間平臺為客愁思多對酒遂作梁園歌却憶蓬池阮公詠因吟渌水揚洪波洪波浩蕩迷舊國路逺西歸安可得人生達命豈暇愁且飲美酒登髙樓平頭奴子搖大扇五月不熱疑清秋玉盤楊梅為君設吳鹽如花皎白雪持鹽把酒但飲之莫學夷齊事髙潔昔人豪貴信陵君今人耕種信陵墳荒城虛照碧山月古木盡入蒼梧雲梁王宮闕今安在枚馬先歸不相待舞影歌聲散緑池空餘汴水東流海沉吟此事淚滿衣黄金買醉未能歸連呼五白行六博分曹賭酒酣馳輝歌且謠意方逺東山髙臥時起來欲濟蒼生未應晚梁園歌送河南王說判官岑參君不見梁孝王脩竹園頽墻隠轔勢仍存嬌娥曼臉成草蔓羅帷珠簾空竹根大梁一旦人代改秋月春風不相待池中㡬度鴈新來洲上千年鶴應在梁園中有鶴洲鴈池梁園三月梨花飛却似梁王雪下時當時置酒延枚叟肯料平臺狐兔走萬事翻覆如浮雲昔人空在今人口單父古來稱宓生秖今為政有吾兄家兄時宰單父輶軒若過梁園道應傍琴臺聞政聲梁臺古愁李賀梁王臺沼空中立天河之水夜飛入臺前鬭玉作蛟龍緑粉掃天愁露濕撞鐘飲酒行射天金虎蹙裘噴血鮮朝朝暮暮愁海翻長繩繫日樂當年芙蓉凝紅得秋色蘭臉别春啼脉脉蘆洲客鴈報春來寥落野篁秋漫白汴州亂二首韓愈汴州城門朝不開天狗墜地聲如雷健兒爭誇殺留後連屋累棟燒成灰諸侯咫尺不能救孤士何者自興哀二母從子走者為誰大夫夫人留後兒昨日乘車騎大馬坐者起趨乘者下廟堂不肯用干戈嗚呼奈汝母子何按唐史汴州自大歴後多兵劉元佐死子士寧代之無度其將李萬榮逐而代之萬榮死董晉寔代之晉卒軍司馬陸長源總留後八日而軍亂殺長源愈是時已從晉喪出汴四日實貞元十五年也觀愈二詩葢譏當時姑息之政云㑹飲金明池書事宋司馬光日華駘蕩金明春波光浄緑生魚鱗煙深草青遊人少道路苦無車馬塵石渠諸君職事簡載酒擷花畏花晚浮舟逐勝任所之箕踞狂歌叩舷板眼花耳熱氣愈豪擲杯撃案聲嗷嗷驚沙颯颯繞洲渚魚龍遷去避我曹人生大料無百嵗貴賤賢愚同一致在家殽䔩餘㡬何一日風光不宜棄汴河黄庶汴都峩峩在平地宋恃其徳為金湯先帝始初有深意不使子孫生怠荒萬艘北來食京師汴水遂作東南吭甲兵百萬以為命千里天下之腑腸人心愛惜此流水不啻布帛與稻粱漢唐關中數百年木牛可以腐太倉舟楫利今百於古奈何益見府庫瘡天心正欲醫造化人間豈無鍼石良窟穴但去錢榖蠧此水何必求桑羊弔故宮元杜瑛月上觚稜椒壁濕饑烏啄碎琅玕石刼灰飛盡海揚塵廢殿荒臺土花碧洛陽書生汴梁客一夜春風頭欲白尊中賴有酒如泉醉倚寒窓破愁寂信陵公子行王惲春風獵獵吹輕裘聮鑣來作夷門遊令人逺憶魏公子徑上吹臺臺上頭却秦存趙震九土誰憶抱關老吏能此帷幄之良籌饑腸自古出竒策功成何害屠沽流髙皇布衣重公賢大梁城邊㡬遲留一朝龍驤開漢業舉功不復詢來由豈非慕藺承餘休嘗讀太史公今日把酒酹墓周當時朱門滿歌舞此日野草荒山丘醉歌信陵行碧雲日暮寫我憂英雄割據雖已矣髙義凛凛横清秋追攀逸駕那復得落日倚劒看神州大梁行明髙啓大梁四面平如砥西去咸陽一千里魏王此地昔為都宮闕中天碧雲起車聲輷輷夜未休帶甲十萬名蒼頭撞鐘列鼎宴上客奉金走幣連諸侯信陵真是賢公子富貴不驕天下士已訪侯嬴到里門復迎朱亥經屠市傾身折節世莫同緩急竟賴斯人功邯鄲秦軍一椎破七國震動聞英風古城重過為搔首㡬度秋風落楊柳沼上應無鴻鴈來苑中只有狐狸走立馬塵沙日欲昏悲歌感慨向夷門豪華多少同銷歇獨有髙名今尚存題汴城八景總圖于謙天風吹我來中州光隂荏苒春復秋民安物阜公事簡目前景物隨冥搜梁園花月四時好日落夷山映芳草大河滔滔湧地來騰波起浪如奔雷隋堤煙柳翠如織鐵塔摩空數千尺隂晴晦明各異態對此令人感今昔畫圖彷彿得真趣醉墨淋漓寫長句詩成掉筆向蒼空滿袖天風却歸去梁園歌李夢陽朝發金臺門夕度博浪關黄河如絲天上來千里不見淮南山淮南桂樹弄婆娑掛席欲進阻洪波我今亦作梁園歌梁園昔有信陵君名與岱華爭嵳峩三千珠履不動色屠門執轡來相過功成不顯涕滂沱青蠅白璧一何多我為梁園客不登梁王臺錦帆揚州門一去何時迴荒煙白草古城沒登臺望之令心哀令心哀歌且謠迷塗富貴苦不足寧思白骨生蓬蒿人生三十無少年積金累玉空煎熬獨立天地間長嘯視今古城隅落落一堆土千年誰繼白與甫攬淚浮雲灑煙莽灑煙莽風吹卷波濤沉吟投箸不暇食蹴天濁浪何滔滔君不見昔人然諾一相許黄金斗印如秋毫觀燈行詳見夢華録李夢陽宋家累葉全盛帝寬大實皆稱令主百姓牛馬徧阡陌太倉米粟憂紅腐宣和以來遂多事嗚呼爛費如沙土海石江花湧國門離宮别殿誰能數群臣諛佞秖自計天下騷然始怨苦正月十四十五間有勑大駕觀鰲山萬金為一燈萬燈為一山用盡工匠力不破君王顔此時上御宣徳門樂動簾開見至尊奔星忽經於御榻明月初上堆金盆傾城呼譟聲動地可憐今夜鰲山戲窈冥幻巧百恠聚金蛾翠管堪垂淚借問幸臣誰云是李師師外有蔡京與蔡攸夾樓錦幄羅公侯丞相之幄當前頭奚兒腰帶控紫騮如花少女擎綵毬但聞樓上喚樓下黄帕籠盤賜玉羞月髙鳴鞭至尊起幄中環珮如流水爭道齊驅輦路窄寺橋窈窕塵埃白火樹龍燈又一時千光萬焰天為赤常言晏安成禍基從來樂極還生悲君看二帝蒙塵日數月東京荒蒺藜大梁行何景明朝登古城口夕藉古城草日落獨見長河流塵起遙觀大梁道大梁自古號名區富貴繁華代不殊髙樓歌舞三千户夾道煙花十二衢合沓輪騶交紫陌鳴鐘暮入王侯宅紅妝不讓掌中人珠履皆為門下客片言立賜萬黄金一笑還酬雙白璧帶甲連營殺氣寒君王推轂將登壇彎弧自信成功易拔劒􅃚知報怨難已見分符連楚越更聞飛檄救邯鄲一朝運去同衰賤意氣雄豪似驚電楊花飛入侯嬴館草色淒迷魏王殿萬騎千乘空雲屯綺構朱甍不復存夜雨人歸朱亥里秋風客散信陵門川原百代重回首宋寢隋宮亦何有遊鹿時銜内苑花行人尚折繁臺柳繁臺下接古城西春深桃李自成蹊朝來忽見東風起薄暮飛花滿故堤梁苑歌三首王廷相君不見梁王已破六國壘苑中便起文園臺黄金白玉架樓閣綺榻延賔四向開清泠池上三尺雪相如新賦傾鄒枚臨卭美人鬭花朶挑以琴心禮豈􅃚漢庭賣賦得千金白首遊梁計亦左今人空怍古人風抱策為儒嘆不逢嗚呼古來文士不檢豈足病且覽詞彩如長虹二梁苑東連孟諸野舊國山髙水彌下黄金觸斗不作樂徒使千年笑達者君不見漢天子愛弟侈賜空大盈梁王受之不一驚合沓金根車宛轉玻瓈軿突然馳道流日星千乘萬騎敵鹵簿貴熖豪華傾九瀛百年之後君為誰有酒莫惜千金揮不信試看梁王苑狐兔草馳鬼火吹三黄河東來沙填海陳留十山㡬山在梁王古苑九地深嵗嵗龍蛇窟穴改我田在苑苑在東灌園鑿井當其中應門兩黄鶴抱琴雙玉童行歌曳杖如遊龍前身恐是河上公君不見七十二帝如旋蓬惟有堯舜流髙風人生百年電閃閃何必希時釣譽攀援日月獨為功子雲草𤣥恒不調虞卿著書仍固窮我懐欲附沙洲鴻夷門歌李濂秦兵譟振長平瓦趙人肝腦塗原野邯鄲一夕陷圍中魏軍不敢屯城下當時獨有信陵君門前劒舄多如雲不有夷門抱關者誰知屠肆鼓刀人臥内虎符初入手壯士胷中血一斗北救邯鄲西卻秦五霸之功今復有平生志氣何雄豪功成刎頸如拔毛秋風弔古夷門道惆悵荒城空緑蒿五言律詩晚入汴水唐崔顥昨晚南行楚今朝北泝河客愁能㡬日鄉路漸無多晴景搖津樹春風起棹歌長淮亦已盡寧復畏潮波汴路即事王建千里河煙直青槐夾岸長天涯同此路人語各殊方草市迎江貨津橋稅海商因看故宮柳憔悴不成行汴路水驛王建晚泊水邊驛柳塘初起風蛙鳴蒲葉下魚入稻花中去舍已云逺問程猶向東近來雖怨别不與少年同汴上暮秋許棠獨立長堤上西風滿客衣日臨秋草廣山接逺天微岸葉隨波盡沙雲與鳥飛秦城寧有素志意自知歸汴河路有感白居易三十年前路孤舟重往還繞身新眷屬舉目舊鄉關事去惟留水人非但見山啼襟與愁鬢此日兩成斑送開封盧少府韋應物雄藩車馬地作尉有光輝滿席賔常侍闐街獨夜歸關河征斾逺煙樹夕陽微到處無留滯梁園花欲稀春日遊金明池宋李昭玘日有江湖思坐無車馬塵横橋自照水啼鳥不驚人輦路晴飛絮宮墻暗鎻春多情老園吏灑地喜相親宜春苑王安石宜春舊臺沼日暮一登臨解帶行蒼蘚移鞍坐緑隂樹疎啼鳥逺水靜落花深無復增脩事君王惜費金出善利門陳師道十載都城客孤身冒百艱一饑非死所萬里有生還去國吾何意歸田病不關共看雙白鬢似得半生閒夏日汴中作陳師道倚棹望平野低雲宻未收黄鸝度髙柳歸燕拂行舟濁水不堪照清江空憶遊晚晴蒸潤劇喘月見吳牛中書省宿齋偶作二首文彥博齋潔奉祠事深嚴宿禁扃露盤雲表見鈞奏夢中聽慎獨䖍君命清心重禮經顧慚溫室樹忽此集鷦螟二鳳閣容棲集心無外慮侵夜凉秋氣早人靜禁門深大政慚無補微才恐不任欹眠聽宮漏蘭熖照青衾景靈宮宿齋謝雨韓琦邃寂敞僊扃心齋物外清滂沱今應禱肹蠁此通誠月殿栖真境風梧醒睡聲如何謝靈貺至道本難名正月三日與廣淵同出南薰門分趨齋宮塗中成司馬光並轡出都門葱蘢日欲昕野寒餘宿雪樹闇濕春雲稍望郊宮近先愁馬首分一朝猶戀戀可復久離群同樂園元金師拓晴日明華構繁隂蕩緑波蓬丘滄海逺春色上林多流水時雖逝遷鶯暖自歌可憐歡樂極征鼓散雲和登相國寺樓明釋宗泐冬日大梁城郊原四望平雲開太行碧霜落蔡河清欲問征西路兼懐弔古情夷門名尚在無處覓侯嬴繁臺春望李夢陽野曠孤煙靜髙臺獨望時地殘隋氏苑天濶禹王祠晚日雲爭白隂崖花自遲目斷南來鴈蕭然故國思上方寺鐘樓李夢陽臺上一鐘鳴登臺萬里平蒹葭天正逺雲氣暮還生饑雀喧空澤黄蒿斷古城不堪臨眺屢况是感秋情春日大梁東郭李夢陽桃柳清沙晚悵然悲逺春葉明深坐鳥花劇轉愁人少小追歡地乾坤放逐臣已看共如此何惜醉遊頻繁臺歸興李夢陽萬里竟何事三年違此都短墻殘菊在别業古臺孤冬日低簷塔霜風靜野蕪但看頭盡白莫恡酒重沽吹臺訪川父讀書處李夢陽李生梁國彦少小事沉冥落日古臺上獨行楓樹青苔侵映雪壁鳥下草𤣥亭野濶看無際浮雲似洞庭吹臺酬空同子見訪之作李濂古臺讀書處長者命車來偶踐看花約因扳聽雨盃川原餘戰伐文藻憶鄒枚並眺平蕪迥斜陽首重回秋日吹臺讀書酬客過訪李濂斜日梁王苑西風古吹臺閉門秋思苦走馬故人來對酒談丹訣哦詩步緑苔知君有髙興凉夜不須迴古臺秋望李濂何處看秋色城南登古臺憑髙一以望幽思若為裁客昔乗雲去人今聽鴈來浮生易衰白把酒重徘徊春逰繁塔寺二首李濂少小曾逰地重來感慨深稚僧今老大落日更春隂廢殿蒼苔合頽垣紫燕吟空餘舊時塔蔓草故蕭森二古臺白雲寺雲裏塔珠光春日停車客登遊樂未央題詩留竹院醒酒坐松堂浪跡真堪笑招提亦醉鄉登上方寺塔二首李濂寶塔憑虛起登遊但㡬重中天近牛斗平地涌芙蓉牖入黄河氣簷低少室峯妙髙無上境臥聽下方鐘二塔影午氤氳名香八面聞盤梯失白晝絶頂俯層雲外見蓮花色中藏貝葉文髫逰今不倦為喜出塵氛登汴故城有懐宋事李濂無險難為國云何此帝州圖燕真失策徙洛是良謀花石傾邦日金繒啖敵秋二龍生不返故國黍離愁夷門李濂不聽侯生計胡收晉鄙軍卻秦功絶世存趙譽流芬故址留殘礎遺墳鎻暮雲千秋豪俠氣吾愛馬遷文繁臺春望李濂出城融雪盡觸目暖煙饒不到古臺上􅃚知春色遙鄉園仍節序身世且漁樵腸斷南天鴈群飛過洛橋泛黄河陸深淼淼望不極連天送濁流浮沈經塞外淘洗向中州鷗弄千帆雨沙明兩岸秋靈槎頻訊問乘興欲遨遊汴京遺蹟志巻二十二
