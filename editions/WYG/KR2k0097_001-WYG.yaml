body:
  text: 汴京遺蹟志巻一明李濂撰宋京城按宋史地理志舊城周迴二十里一百五十五步東二門北曰望春初名和政南曰麗景南面三門中曰朱雀東曰保康大中祥符五年創建西曰崇明西二門南曰宜秋北曰閶闔北三門中曰景龍東曰安逺西曰天波以上宋初仍梁晉舊名至太平興國四年改今名新城周迴五十里百六十五步大中祥符九年増築元豐元年重修政和六年詔有司度國之南展築京城移置官司軍營舊城四十八里二百二十三步周顯徳三年以其土鹻取鄭州虎牢關土築之俗呼為卧牛城南三門中曰南薫東曰宣化西曰安上東二門南曰朝陽北曰含輝太平興國四年改寅賔後復西二門南曰順天北曰金輝北四門中曰通天天聖初改顯徳後復東曰長景次東曰永泰西曰安肅初號衞州門以上皆因周舊名至太平興國四年改今名汴河上水門南曰大通太平興國四年賜名天聖初改順濟後復今名北曰宣澤舊南北水門皆曰大通熈寧十年改汴河下南曰上善北曰通津天聖初改廣津熈寧十年復惠民河上曰普濟下曰廣利廣濟河上曰咸豐下曰善利舊名咸通上南門曰永順熈寧十年賜名其後又於金輝門南置開逺門舊名通逺以上皆太平興國四年賜名天聖初改今名其濠曰護龍河闊十餘丈濠之内外皆植楊栁粉牆朱戸禁人往來城門皆甕城三層屈曲開門惟南薫新鄭新宋封丘正門皆直門兩重以通御路金元以後多湮塞舊有十三門南曰南薫陳州戴樓東曰新宋揚州新曹西曰新鄭萬勝固子北曰陳橋封丘新酸棗衞州今道路所通者惟曹鄭陳州揚州南薫固子封丘七門耳固或作堌非也宋朝㑹要自朱梁建都以汴州為東京皆因藩鎮舊制但改名額而周顯徳初始廣新城周迴四十八里二百二十三步趙徳麟侯鯖録舊城周迴二十里一百五十五步即汴州城唐建中二年節度使李勉重築國初號曰闕城亦曰裏城新城乃周世宗顯徳二年四月詔别築新城周迴四十八里二百二十三步號曰外城又曰羅城亦曰新城元豐中裕陵命内侍宋用臣重築之宋敏求東京記周世宗顯徳二年四月詔京城四面别築羅城三年正月發京畿滑鄭曹之民命薛可言等督之仍命韓通總其事王朴經度凡通衢委巷廣袤之間皆朴定其制踰年而成神宗熈寧中始四面為敵樓作甕城及濬治濠塹周密癸辛雜志汴之外城周世宗時所築宋神宗又展拓之其高際天堅壯雄偉南關外有太祖講武池周美成汴都賦形容盡矣梁王鼓吹臺徽宗龍徳宫舊址尚在岳珂程史開寶戊辰藝祖初修汴京大其城址曲而宛如蚓屈焉耆老相傳趙中令鳩工奏圖初取方直四面皆有門坊市經緯其間井井繩列上覽而怒自取筆塗之命以幅紙作大圈紆曲縱斜旁注云依此修築故城即當時遺蹟也時人咸罔測多病其不宜於觀美熈寧乙夘神宗在位遂欲改作覽苑中牧豚及内作坊之事卒不敢更第増陴而巳及政和間蔡京擅國亟奏廣其規以便宫室苑囿之奉命宦侍董其役凡周旋數十里一撤而方之如矩墉堞樓櫓雖甚藻飾而蕩然無曩時之堅樸矣一時迄功第賞侈其事至以表記兩命詞科之題槩可想見其張皇也靖康金人南牧尼堪斡里雅布揚鞭城下有得色曰是易攻下令植砲四隅隨方而擊之城既引直一砲所望一壁皆不可立竟以此失守藝祖沈㡬逺睹至是始驗宸筆所定圖宋承平時藏秘閤今不復存和維愚見紀忘汴之外城門名各有意義如云鄭門以其通往鄭州也如云酸棗門以其通往延津即舊酸棗縣也其固子門未知其義近閱宣和遺事内載上清寶籙宫成浚濠水深三丈東則景龍門橋西則天波門橋二橋之下壘石為固引舟相通而橋上人物往來不覺又郡城沿革云西面門從南曰順天門俗名新門次曰利澤水門汴河自此入城次北曰開逺門又名萬勝門次北曰金輝門俗名固子門歐陽公歸田録亦云飲于固子橋然則以壘石為固而名其橋因以名其門也周禮掌固之職掌修城郭樹渠之固以為固所依阻故曰固或曰固作顧視也汴城臥牛之形北視黄河為子而子不敢來害其母此臆度之說無所據今省城即宋之舊裏城周迴二十里一百九十步高三丈五尺國朝洪武初重築外包以磚門五東曰麗景南曰南薫西曰大梁北曰安逺東北曰仁和外建月城上各建樓其西舊名望京角樓四敵臺八十四窩鋪八十三東西南門甕城内皆有漢夀亭侯廟而北門甕城内則𤣥帝廟也皆近時建宋大内宫室按宋史地理志藝祖因周之舊為都建隆三年始廣皇城東北隅命有司畫洛陽宫殿之制按圖修之而皇居始壯麗矣宫城周迴五里南三門中曰乾元宋初依梁晉之舊名曰明徳太平興國三年改丹鳯大中祥符八年改正陽明道二年改宣徳雍熈元年改今名東曰左掖西曰右掖東西面門曰東華西華舊名寛仁神獸開寶三年改今名熈寧十年又改東華門北曰謻門北一門曰拱宸舊名𤣥武大中祥符五年改今名熈寧十年改門内西横門曰臨華乾元門内正南門曰大慶東西横門曰左右升龍左右北門内各二門曰左右長慶熈寧間改左右長慶隔門曰左右嘉肅左右銀臺東華門内一門曰左承天祥符乾徳六年賜名大中祥符元年正月天書降其上詔加祥符二字而増葺之西華門内一門曰右承天左承天門内道北門曰宣祐舊名光天大中祥符八年改大寧明道元年改今名正南門内正殿曰大慶東西門曰左右太和宋初曰日華月華大中祥符八年改今名正衙殿曰文徳宋初曰文明雍熈元年改今名熈寧間改南門曰端禮兩掖門曰東西上閤東西門曰左右嘉福宋初曰左右勤政明道元年十月改今名大慶殿舊名崇元乾徳四年重修改曰乾元太平興國九年改朝元大中祥符八年改天安明道三年改今名北有紫宸殿舊名崇徳明道元年改視朝之前殿也西有垂拱殿舊名長春明道元年改常日視朝之所也次西有皇儀殿開寶四年賜名滋福明道元年十月改又次西有集英殿舊名廣政開寳三年曰大明淳化間曰含光大中祥符八年名㑹慶明道元年十月改今名宴殿也殿後有需雲殿舊名玉華後改瓊華熈寧初改今名東有昇平樓舊名紫雲明道元年改宫中觀宴之所也宫後有崇政殿舊名簡賢講武太平興國二年改今名熈寧間改北横門曰通極閱事之所也殿後有景福殿西有殿北向曰延和便坐殿也大中祥符七年建後苑東門洎北向便殿成賜名宣和門承明殿明道元年改端明二年改今名凡殿有門者皆隨殿名宫中又有延慶舊名萬嵗大中祥符七年改安福觀文舊名集聖明道二年改肅儀慶厯八年改今名清景慶雲玉京等殿夀寧堂清景明道元年改延春閤舊名萬春寶元元年改福寧殿即延慶明道元年改東西有門曰左右昭慶觀文殿西門曰延真其東真君殿曰積慶前建感真閤又有龍圖閤下有資政崇和宣徳述古四殿天章閤下有群玉蘂珠二殿後有寶文閤即夀昌閤慶厯元年改閤東西有嘉徳延康二殿前有景輝門後苑東門曰寧陽即宣和門明道元年改苑内有崇聖殿太清樓其西又有宜聖化成即玉宸殿明道元年改金華西涼清心等殿翔鸞儀鳯二閤華景翠芳瑶津三亭延福宫有穆清殿延慶殿北有柔儀殿初有殿無名章獻太后名曰崇徽明道元年改寶慈景祐二年改今名崇徽殿北有欽明殿舊名天和明道元年改觀文又改清居治平三年改今名延福宫北有廣聖宫天聖二年建名長寧景祐二年改内有太清玉清沖和集福㑹祥五殿建流盃殿於後苑明道元年八月修文徳殿成是夜禁中火延燔崇徳長春滋福㑹慶延慶崇徽天和承明八殿命宰相吕夷簡為修葺大内使樞密副使楊崇勲副之發京東西河北淮南江東西路工匠給役内出乗輿物左藏庫易緍錢二十萬助其費以故改諸殿名又有慈徳殿楊太后所居景祐元年賜名觀稼殿在後苑觀種稻景祐二年創建延羲閤在崇政殿内邇英閤在崇政殿西南蓋侍臣講讀之所也與延羲同景祐三年賜名隆儒殿邇英閤後小殿皇祐三年始賜名慈夀殿皇太后所居治平元年賜名慶夀宫保慈宫熈寧二年建玉華殿在後苑基春殿熈寧七年建在玉華殿後睿思殿八年建承極殿元豐三年建崇慶隆祐二宫元祐元年建睿成宫神宗所居東宫紹聖二年賜名宣和殿在睿思殿後紹聖二年四月殿成其東側别有小殿曰凝芳其西曰瓊芳前曰重熈後曰環碧元符三年廢崇寧初復作大觀三年徽宗製記刻石實蔡京為之聖瑞宫皇太妃所居因以名宫顯謨閤元符元年建藏神宗御集建中靖國元年改曰熈明尋復舊玉虛殿元符初建玉華閤大觀初建在宣和殿後親蠶宫政和元年建燕寧殿在延福北奉安仁宗慈聖光獻皇后御容延福宫政和三年春新作於大内北拱辰門外舊宫在後苑之西南今其地乃百司供應之所凡内酒坊裁造院油醋柴炭鞍轡等庫悉移他處又遷兩僧寺兩軍營而作新宫焉始南向殿因宫名曰延福次曰蘂珠有亭曰碧琅玕其東門曰晨暉其西門曰麗澤宫左復列二位其殿則有穆清成平㑹寧睿謨凝和崑玉群玉其東閤則有蕙馥報瓊蟠桃春錦疊瓊芬芳麗玉寒香拂雲􅅯蓋翠葆鉛英雲錦蘭薫摘金其西閤有繁英雪香披芳鉛華瓊華文綺絳萼穠華緑綺瑶碧清陰秋香叢玉扶玉絳雲㑹寧之北疊石為山山上有殿曰翠微旁為二亭曰雲巋曰層巘凝和之次閤曰明春其高踰一百一十尺閤之側為殿二曰玉英曰玉澗其背附城築土植杏名曰杏岡覆茅為亭脩竹為竿引流其下宫之右為佐二閤曰宴春廣十有二丈舞臺四列山亭三峙鑿圓池為海跨海為二亭架石梁以升山亭曰飛華横度之四百尺有奇縱數之二百六十有七尺又疏泉為湖湖中作隄以接亭隄中作梁以通湖梁之上又為茅亭鶴莊鹿砦孔翠諸柵蹄尾動數千嘉花名木類聚區别幽勝宛若生成西抵麗澤不類塵境初蔡京命童貫楊戩賈詳藍從熈何訢等分任宫役五人者因各為制度不務沿襲故號延福五位東西配大内南北稍劣其東直景龍門西抵天波門宫東西二横門皆視禁門法所謂晨暉麗澤者也而晨暉門出入最多其後又跨舊城修築號延福第六位跨城之外浚壕深者水三尺東景龍門橋西天波門橋二橋之下疊石為固引舟相通而橋上人物外自通行不覺也名曰景龍江其後又闢之東過景龍門至封丘門景龍江北有龍徳宫初元符三年以懿親宅潛邸為之及作景龍江江夾岸皆奇花珍木殿宇比比對峙中塗曰壺春堂絶岸至龍徳宫其地嵗時次第展拓後盡都城一隅焉名曰擷芳園山水美秀林麓暢茂樓觀參差猶艮嶽延福也保和殿政和三年四月作九月殿成總為屋七十五間玉清神霄宫政和三年建舊名玉清和陽在福寧殿東七年改今名上清寶籙宫政和五年徽宗因林靈素之言在景龍門對景輝門作上清寶籙宫密連禁署内列亭臺舘舍不可勝計命道士施民符藥徽宗時登皇城下視之又開景龍門城上作複道通寶籙宫以便齋醮之事徽宗數從複道上往來是年十二月始張燈於景龍門上下名曰預賞元宵宋朝㑹要今大内即宣武軍節度使治所朱梁建都遂以衙署為建昌宫晉天福初又為大寧宫但改名號而巳周世宗雖加營繕猶未合古制建隆三年發開封浚儀民廣皇城四年五月太祖命有司畫洛陽宫殿按圖修之自是皇居始壯麗矣趙徳麟侯鯖録唐東京宫城東西四里一百八十八步南北二里八十五步周迴十三里二百四十一步高四丈八尺宋東京宫城周迴五里邵氏聞見録東京唐汴州梁太祖因宣武軍置建昌宫晉改曰大寧宫周世宗雖加營繕猶未如王者之制藝祖得天下之初即遣使圖西京大内按以改作既成帝坐萬嵗殿洞開諸門端直如繩嘆曰此如吾心小有私曲人皆見之矣帝一日登明徳門指其榜問趙普曰明徳之門安用之字普對曰助語帝曰之乎者也助得甚事普無言葉少藴石林燕語京師大内梁氏建國止以為建昌宫本唐宣武節度治所未暇増大也後唐莊宗遷洛復廢以為宣武軍晉天福中因高祖臨幸更號大寧宫今新城是也其増展外羅城蓋周世宗始為之太祖建隆初以大内制度草創乃詔圖洛陽宫殿展皇城東北隅以鐵騎都尉李懐義與中貴人董役按圖營建初命懐義等凡諸門與殿須相望無得輒差故垂拱福寧柔儀清居四殿正重而左右掖與升龍銀臺等諸門皆然惟大慶殿與端門少差爾宫成太祖坐福寧寢殿令闢門前後召近臣入觀諭曰我心端直正如此有少偏曲處汝曹必見之矣群臣皆再拜後雖嘗經火屢修率不敢易其故處矣按石林燕語與邵氏所記畧同又曰大慶殿初名乾元太平興國祥符中皆因火改為朝元天安景祐中方改今名有龍墀沙墀凡正至大朝㑹尊號則御焉郊祀大禮則駕宿於殿之後閤百官為次宿於前之兩廊皇祐初始行明堂之禮又以為明堂仁宗御篆明堂二字每行禮則旋揭之事巳復去文徳殿在大慶殿之西少次舊曰端明後改文明祥符中因火再建易今名紫宸殿在大慶殿之後少西其次又為垂拱殿自大慶殿後紫宸垂拱之兩間有柱廊相通每月視朝則御文徳所謂過殿也東西閤門皆在殿後之兩旁月朔不御過殿則御紫宸所謂入閤也月朔與誕節郊廟禮成受賀契丹辭見亦皆御紫宸文徳遇受冊發冊明堂宣赦亦御而不常用宣麻不御殿而百官即庭下聽之紫宸不受賀而拜表稱賀則於東上閤門國忌未赴景靈宫先進名奉慰則於西上閤門亦既庭下拜而授閤門使蓋以閤不以殿也惟垂拱為日御朝之所集英殿舊大明殿也明道中改今名每春秋大燕皆在此太祖嘗御䇿制科舉人故後為進士殿試之所其東廊後有樓曰昇平舊紫雲樓也每大燕則宫中登而觀焉皇儀殿舊名滋福咸平太宗明徳皇后居之以為萬安宫后崩復舊明道中改今名故常廢而不用以為治后喪之所又曰東華門直北有東向門西與内東門相直俗謂之謻門而無牓張衡東京賦所謂謻門曲榭者也薛綜注謻曲屈斜行依城池為道集韻謻字或作䔟以為宫室相連之稱今循東華門牆而轉東面為北門亦可謂斜行依牆矣凡宫禁之言相承必皆有自也按字訓謻别也東京賦但言别門耳洪邁容齋三筆自漢以來宫室土朩之盛如漢武之甘泉建章陳後主之臨春結綺隋煬帝之洛陽江都唐明皇之華清連昌巳載史冊國朝祥符中姦臣導諛為玉清昭應㑹靈祥源諸宫觀議者固以崇侈勞費為戒然未有若政和蔡京所為也京既柄政招權璫童貫楊戩賈詳藍從熈何訢五人分任其事於是始作延福宫而極其工麗矣周密癸辛雜識汴梁宋時宫殿凡樓觀棟宇牕戸往往題燕用二字竊意必當時人匠姓名耳及金海陵修燕都擇汴京牕戸刻鏤工巧者以往始知興廢皆定數而燕用二字乃先兆也又曰京師有八卦殿八門各有樹朩山石無一相類皆嵌石座亦穿空與石竅相通上欲有所往與所幸美人自一門出宫人僊衣扶輪一聲霹􅋬則僊樂競奏雲霄間石竅中腦麝煙起如霧楊奐汴故宫記巳亥春三月按部至于汴汴長吏宴于廢宫之長生殿懼後世無以考為纂其大槩云皇城南外門曰南薫南薫之北新城門曰豐宜橋曰龍津橋北曰丹鳯而其門三丹鳯北曰州橋橋少北曰文武樓遵御路而北横街也東曰太廟西曰郊社正北曰承天門而其門五雙闕前引東曰登聞檢院西曰登聞鼓院檢院之東曰左掖門門之南曰待漏院鼓院之西曰右掖門門之南曰都堂承天之北曰大慶門而日精門左昇平門居其東月華門右昇平門居其西正殿曰大慶殿東廡曰嘉福樓西廡曰嘉瑞樓大慶之後曰徳儀殿徳儀之東曰左升龍門西曰右升龍門正門曰隆徳曰蕭牆曰丹墀曰隆徳殿隆徳之左曰東上閤門右曰西上閤門皆南嚮東西二樓鐘鼓之所在鼓在東鐘在西隆徳之次曰仁安門仁安殿東則内侍局内侍之東曰近侍局近侍之東曰嚴祗門宫中則曰撒合門少南曰東樓即授除樓也西曰西樓仁安之次曰純和殿正寢也純和西曰雪香亭雪香之北后妃位也有樓樓西瓊香亭亭西曰涼位有樓樓北少西曰玉清殿純和之次曰寧福殿寧福之後曰苑門由苑門而北曰仁智殿有二大石左曰敷錫神運萬嵗峯右曰玉京獨秀太平巖殿曰山莊莊之西南曰翠微閤苑門東曰僊韶院院北曰湧翠峯峯之洞曰大滌湧翠東連長生殿殿東曰湧金殿湧金之東曰蓬萊殿長生西曰浮玉殿浮玉之西曰瀛洲殿長生之南曰閱武殿閱武南曰内藏庫由嚴祗門東曰尚食局尚食東曰宣徽院宣徽北曰御藥院御藥北曰右藏庫右藏之東曰左藏宣徽東曰㸃檢司㸃檢北曰祕書監祕書北曰學士院學士之北曰諫院諫院之北曰武器署㸃檢之南曰儀鸞局儀鸞之南曰尚輦局宣徽之南曰拱衞司拱衞之南曰尚衣局尚衣之南曰繁禧門繁禧南曰安泰門安泰西與左升龍門直東則夀聖宫兩宫太后位本明俊殿試進士之所宫北曰徽音殿徽音之北曰燕夀殿燕夀殿垣後少西曰震肅衞司東曰中衞尉司儀鸞之東曰小東華門更漏在焉中衞尉司東曰祗肅門祗肅門東少南曰將軍司徽音夀聖之東曰太居苑苑之殿曰慶春慶春與燕夀並小東華與正東華對東華門内正北尚廏局尚廏西北曰臨武殿左掖門正北尚食局局南曰宫苑司宫苑司西北曰尚醖局湯藥局侍儀司少西曰符寶局器物局西則撒合門嘉瑞樓西曰三廟正殿曰徳昌東曰文昭殿西曰光興殿並南嚮徳昌之後宣宗廟也宫西門曰西華與東華直其北門曰安貞二大石外凡花石臺榭池亭之細並不録觀其制度簡素比土堦茅茨則過矣視漢之所謂千門萬戸珠璧華麗之飾則無有也然後之人因其制度而損益之以求其稱斯可矣國朝洪武十一年即宋故宫遺址建周王府乃太祖第五皇子謚定始分封之國宗室繁衍甲於它藩城中井水悉苦鹻難飲汴人率於城外汲水飲之惟周府太廟前井水甘蓋宋大内舊井也宋内諸司按東京夢華録内諸司皆在禁中如學士院皇城司四方館客省東西上閤門通進司内弓劒鎗甲軍器等庫翰林司茶酒局也内侍省入内内侍省内藏庫奉宸庫景福殿庫延福宫殿中省六尚局尚藥尚食尚輦尚醖尚舍尚衣諸閤分内香藥庫後苑作翰林書藝局醫官局天章等閤明堂頒朔布政府葉少藴石林燕語太祖初平諸偽國得其帑藏金帛以别庫儲之曰封樁庫本以待經營契丹也其後三司嵗終所用常賦有餘亦併歸之嘗諭近臣欲候滿三五百萬即以與契丹以贖幽燕故土不從則為用兵之費蓋不欲常賦之外横歛于民故不𨽻于三司今内藏庫是也又曰内香藥庫在謻門外凡二十八庫真宗賜御製七言二韻詩一首為庫額曰每嵗沈檀來逺裔累朝珠玉寶皇居今辰内府初開處充牣尤宜史筆書洪邁容齋三筆神宗嘗憤北狄崛彊慨然有恢復幽燕之志於内帑置庫自製四言詩曰五季失圖獫狁孔熾藝祖造邦思有懲艾爰設内府期以募士曽孫保之敢忘厥志凡三十二庫每庫以一字揭之儲積皆滿又别置庫賦詩二十字分揭于上曰每䖍夕惕心妄意遵遺業顧予不武資何日成戎捷其用志如此國家帑藏之富可知宋外諸司按東京夢華録外諸司左右金吾街仗司法酒庫内酒坊牛羊司乳酪院儀鸞司帳設局也車輅院供奉庫雜物庫雜賣務東西作坊萬全造軍器所修内司文思院上下界綾錦院文繡院軍器所上下竹朩務箔場車營致逺務騾務駞坊象院作坊物料庫東西窑務内外物庫油醋庫京城守具所鞍轡庫養馬曰左右騏驥院天駟十監河南北十炭場四熟藥局内外柴炭庫軍頭引見司架子營樓店務店宅務𣙜貨務都茶場大宗正司左藏大觀元豐宣和等庫編佑局打套所諸米麥等自州東虹橋元豐倉順成倉東水門裏廣濟裏河折中外河折中富國廣盈萬盈永豐濟逺等倉陳州門裏麥倉子州北夷門山五丈河諸倉約共五十餘所日有支納下卸即有下卸指揮兵士支遣即有袋家每人肩兩石布袋遇有支遣倉前成市近新城有草場二十餘所每遇冬月諸鄉納粟稈草牛車闐塞道路車尾相銜數千萬輛不絶沈括夢溪筆談太祖朝常戒禁兵之衣長不得過膝買魚肉及酒入營門者皆有罪又制更戍之法欲其習山川勞苦逺妻孥懐土之戀兼外戍之日多在營之日少人人少子而衣食易足又京師衞兵請糧者營在城東者即令赴城西倉在城西者即令赴城東倉不許傭僦車脚皆須自負嘗親登右掖門觀之蓋使之勞力制其驕惰故士卒衣食無外慕安辛苦而易使宋明堂徽宗政和五年乙未秋八月始作明堂初元豐禮官以明堂寓大慶殿别請建立以盡嚴奉而未暇講求至是下詔内出圖式宣示于崇政殿且以明堂宜正臨丙方近東以據福徳之地乃徙祕書省于宣徳門東而以省地營之命蔡京為明堂使開局興工日役萬人按宋史是年夏六月作三山河橋役夫數十萬民不聊生秋八月又作明堂然六月八月正農事方殷之時而役大衆如此奪民之時傷民之力為人上者畧不少䘏可謂失計之甚矣未㡬而禍變作亦未聞明堂出一善政也可勝慨哉汴京遺蹟志巻一
