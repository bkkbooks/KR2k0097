body:
  text: 汴京遺迹志卷十三明李濓撰雜志二宋四京京大也天子所居謂之京師宋四京者謂東京開封府汴西京河南府洛南京應天府歸德北京大名府魏宋史真宗大中祥符六年以應天府為南京國初因五代之舊以大梁為東京開封府洛陽為西京河南府後以太祖舊藩歸德軍在宋州改宋州為應天府至是建為南京作鴻慶宫以奉太祖太宗御容仁宗慶歷二年五月以大名府為北京契丹聚兵幽薊聲言南下朝議請城洛陽吕夷簡曰此子囊城郢計也使契丹得渡河雖高城深池何可恃邪我聞契丹畏壯侮怯景德之役非乘輿濟河未易服也宜建都大名示將親征以伐其謀帝從之建大名為北京即真宗駐蹕之所城焉識者韙之葉少藴石林燕語唐都雍洛陽在關東故以為東都本朝都汴洛陽在西故以為西都皆謂之兩京祥符七年真宗謁太清宫于毫州還始建應天府為南京慶歷二年契丹會兵幽州遣使蕭英劉六符來求關南北地始建大名府為北京又曰北京舊不兼河北路安撫使仁宗特以命賈文元故文元薦程文簡為代已只領大名一路後文元再鎮固求兼領乃復命之且召昌朝罷則不置及熙寧初陳暘叔守北京遂以文元故事兼領宋畿內十六縣開封赤祥符赤舊浚儀縣也大中祥符初改尉氏畿陳留畿雍丘畿封丘畿中牟畿陽武畿延津畿舊酸棗縣也政和七年改長垣隋匡城縣也建隆元年改為鶴丘後又改今名東明畿本東昏縣也乾德元年改扶溝畿鄢陵畿考城畿崇寧四年與太康縣同𨽻拱州大觀四年廢拱州而二縣復來𨽻云太康畿宣和二年復𨽻拱州六年仍𨽻京畿咸平舊通許鎮𨽻陳留咸平五年置縣宋十衛左金吾衛上將軍右金吾衛上將軍左金吾衛大將軍右金吾衛大將軍左衛上將軍右衛上將軍諸衛大將軍諸衛將軍率府軍率府副軍宋二十三路太宗分天下為十五路仁宗又分為二十三路京東東路京東西路京西南路京西北路河北東路河北西路陜西路秦鳯路河東路淮南東路淮南西路兩浙路江南東路江南西路荆湖南路荆湖北路成都路梓州路利州路夔州路福建路廣南東路廣南西路宋史地理志當是時東南際海西盡巴僰北極三關東西六千四百八十五里南北萬一千六百二十里崇寧四年復置京畿路大觀元年别置黔南路三年并黔南入廣西以廣西黔南為名四年仍舊為廣南西路宣和四年置燕山府及雲中府路天下分路二十六京府四府三十州二百五十四監六十三縣一千二百三十四可謂極盛矣大抵宋有天下由建隆初迄治平末一百四年州郡沿革無大增損逮熙寧始務闢土而种諤王韶章惇輩各為拓斥計矣宋四殿各置大學士以大臣為之觀文殿資政殿端明殿保和殿宋六閣皆纍朝增建以藏宸翰之所龍圖閣藏太宗御筆天章閣藏真宗御筆寶文閣藏仁宗御筆顯謨閣藏神宗御筆徽猷閣藏哲宗御筆敷文閣藏徽宗御筆宋史真宗景德元年冬十月置龍圖閣奉太宗御製文集及典籍圖畫寶瑞之物與宗正所進屬籍并置待制學士官自是每一帝崩則置一閣葉少藴石林燕語祥符中始建龍圖閣以藏太宗御集天禧初因建天章壽昌兩閣於後而以天章閣藏御集虛壽昌閣未用慶厯初改壽昌為寶文仁宗亦以藏御集二閣皆二帝時所自命也神宗顯謨閣哲宗徽猷閣皆後追建之惟太祖英宗無集不為閣宋四園瓊林苑金明池宜春苑玉津園葉少藴石林燕語瓊林苑金明池宜春苑玉津園謂之四園瓊林苑乾德中置太平興國中復鑿金明池於苑北導金水河水注之以教神衛虎翼水軍習舟楫因為水嬉宜春苑本秦悼王園因以皇城宜春舊苑富國倉遂遷于此玉津園則五代之舊也今惟瓊林金明最盛嵗以二月開命士庶縱觀謂之開池至上已車駕臨幸畢即閉嵗賜二府從官燕及進士聞喜燕皆在其間金明水戰不復習而諸軍猶為鬼神戲謂之旱教玉津半以種麥每仲夏駕幸觀刈麥自仁宗後亦不復講矣惟契丹賜射為故事宜春俗但稱庶人園以秦王故也荒廢殆不復治祖宗不崇園池之觀前代未有也宋五學國子學太學武學律學算學宋四館驛都亭驛待遼使之所都亭西驛待西蕃阿黎于闐新羅渤海使之所懷逺驛待交址使之所同文館待青唐高麗使之所宋六更初更二更三更四更五更六更禁中更鼓每夜六更和維愚見紀忘前代夜俱五更惟宋朝則用六更馮深居詩云春風吹送笑談香玉酒銀燈破夜涼歸去東華聽更漏杏花落盡六更長又云三十六聲更點長汪水雲序宋亡事如云亂點傳籌殺六更風吹庭燎滅還明侍臣奏罷降元表臣妾簽名謝道清陳剛中詩云羽袍士尚傳三漏絳幘人誰報六更蓋內帳樓五更絶柝鼓便作謂之蝦蟇更禁門方開百官隨入所謂六更者也嘗疑五更古今通用何宋時獨用六更邪近考宋史自太祖建隆庚申至理宗景定元年五庚申又十六年而宋亡蓋符太祖卜世于陳摶睡到五更醒時再來問之説庚更同音以此禁中常打六更而外方只謂之攢點也大梁十迹夷門古城吹臺隋堤上源驛愁臺陳橋艮嶽青城官渡汴城八景鐡塔行雲金池過雨州橋明月大河濤聲繁臺春曉汴水秋風隋堤煙柳相國霜鐘又八景艮嶽春雲夷山夕照金梁曉月資聖薰風百岡冬雪吹臺秋雨宴臺瑞靄牧苑新晴靖康之變按宋史政和後禁苑多為村居野店又聚珍禽野獸麀鹿鴐鵝禽鳥數百實其中至宣和間每秋風夜靜禽獸之音四徹宛若深山大澤陂野之間識者以為不祥之兆宣和末南郊禮畢御郊宫端拱殿天未明百辟方稱賀間忽有梟鳴于殿屋若與贊拜聲相應和聞者駭之時已報女真背盟未踰月內禪而明年有陷城之難政和三年夏至宰臣何執中奉祀北郊有黑氣長數丈出自齋宫行一里許入壇壝繞祭所皆近人穿燈燭而過俄又及於壇禮將畢不見人皆異之政和七年詔修神保觀俗所謂二郎神者汴人素畏之自春及夏傾城男女負土以獻揭榜通衢云某人獻土又有飾形作鬼使巡門催納土者或以為不祥禁之後金斡里雅布圍京師其國謂之二郎君云宣和初收復燕山以歸金民來居京師者其俗有臻蓬蓬歌每扣鼓和臻蓬蓬之音為節而舞人皆喜聞其音而效之其歌曰臻蓬蓬外頭花花裏頭空但看明年春二月滿城不見主人翁本金讖故京師不禁然卒有靖康之變宣和元年夏雨晝夜凡數日及霽開封縣前茶肆中有異物如大犬蹲踞臥榻下細視之身僅六七尺色蒼異其首類驢兩頰作魚頷而色正緑頂有角極長於其際始分兩岐聲如牛鳴與世所繪龍無異茶肆近軍器作坊兵卒來觀共殺食之已而京城大水訛言龍復讐云宣和五六年間上方織綾謂之遍地桃又名急地綾漆冠子作二桃樣謂之並桃天下效之香謂之佩香至金兵犯闕無貴賤皆逃避多為虜去亦此讖也宣和六年都城有賣青果男子孕而生子蓐母不能收易七人始免而逃又有豐樂樓酒保朱氏子之妻可四十餘楚州人忽生髭長六七寸踈秀而美宛然一男子詔度為女道士宣和七年秋有狐由艮嶽直入禁中據御榻而坐詔毁狐王廟宋史筆斷論靖康災異秦公子針曰國於天地有與立焉不數世淫弗能斃也此為諸侯而言也董仲舒曰天人相與之際甚可畏也自非大亡道之世天盡欲扶持安全之此為帝王而言也蓋帝王為天之子為鬼神之主為萬民之父母非有桀紂之敗德煬帝之亂常於其政殆國危之際則天必降災異以警之警之者非所以絶之乃所以愛之也宋之徽宗初無涼德但於即位之始不能率由舊章奉若天命乃信讒説殄行之人用復熙寧紹聖故事廢黜忠鯁登用姦回戎狄之患既萌黨人之獄復起故於建中靖國元年春正月朔有流星光燭地自西南入尾抵距星是夕有赤氣起東北方亘西南方中出白氣二將散復有黑氣在旁此則隂邪致亂之徴夷狄竊發之兆乃天所以先示厥警欲其修德以弭之也惜乎徽宗荒怠弗敬謂天變不足畏謂國政不足修謂任伯雨之言不足信乃以趙挺之為御史中丞以吕希純知瀛州解任伯雨陳祐言職范純禮出知潁昌府安燾陳瓘傳楫眺補之豐稷罷邢恕吕嘉問路昌衡安惇蹇序辰蔡卞並復宫觀與郡召張商英赴闕遼主洪基死孫延禧立女真阿固達亦立崇寧元年以蔡確配饗哲宗廟庭命內侍童貫如杭州監造御前生活仍詔司馬光吕公著等四十四人各奪官有差竄鄒浩于永州超拜蔡京為右僕射嗟乎政之錯亂一至於此而可以弭天變乎然而天之眷祐人君惓惓不已故於大觀四年有星孛于中宫長數丈逆入紫宫退而復掃帝座者再此又天意明示金人之禍必欲徽宗保國而防患也奈何天譴雖切而忽之尤甚乃復大興土木窮索珍竒煥臺館之瓊瑶列綱運之花石舊盟遼主棄之自毁藩籬新結女真養之若招狼虎委童貫而為大將再敗王師封蔡京而為魯公重汙國典方且樂其臺池鳥獸豈思民欲與之俱亡天知其終不悔禍故不復告戒遂生亡國妖孽以詔之也自是火星如月徐徐南行天裂有聲格格且久妖狐升於御榻黑眚遍於京畿敗亡之徴其可遏乎故雖有智將謀臣亦莫能善其後矣嗟乎徽宗之不畏天故至取敗向使其果能監此修德以善鄰尊賢以去佞咨諏治道一循常典則阿固達雖有假途之謀猖獗之勢亦安敢跨遼海而犯東萊越燕雲而侵中國乎由是觀之非天有負於徽宗而徽宗自負於天也書曰天難諶命靡常常厥德保厥位厥德靡常九有以亡詎不信夫宋史筆斷論汴京難守汴京之地內無異産之材外無形勝之固其不可為國明矣然太祖都之而能以弱制強以小敵大遂若周公定鼎洛邑而成百六十餘年之基業者何哉蓋太祖以仁義而為金湯以禮樂而為干盾柔逺能邇推亡固存故能君主華夷而昌大其邦家也徽宗悉反其道色荒于政酒湎于德棄遼主而隳屏障結女真而致干戈金人退兵思避其難故白時中請上南幸或勸上西幸洛陽嗟乎以宗廟之重而言國君當死社稷不可輕委而去以太王避狄人而言則當徙而去邠暫逺其害此則去守之兩途也然以往事而論之昔光武駐兵昆陽莾遣嚴尤等率大兵圍之光武夜與李軼等十三騎突圍而出收衆於外大破莾兵唐玄宗遇安祿山之亂力不能支決意幸蜀乃留太子募兵討賊嗟乎向使光武不出昆陽同受圍困玄宗不幸西蜀坐守孤城則皆為囿中之物而為賊所擒矣又豈能討平寇盜而克復故物哉為欽宗者正宜監此分遣義士衛送上皇南幸已與李綱宗澤等大召援兵嬰城固守雖尼堪斡里雅布至未必有腹背受敵之患都城雖甚危弱亦未必旬月而陷也奈何吳敏李綱執於死社稷之論堅意苦留遂使徽宗父子輿襯蒙塵貽辱千載悠悠蒼天謂之何哉或曰避難出奔策固善矣然不聞李綱有云萬一衛士中道散歸何以能達借使能達而尼堪諸人霆驅電邁雖隔天塹之險可投馬箠而渡事何能濟嗟乎此又無謀之言也蓋金人所長者騎射而已焉知艨艟鬪艦之利以曹操用兵如神猶尚困於赤壁况尼堪之小醜乎觀其於建炎之間尼堪不敢渡江乃遣烏珠南侵則其技術亦可知矣于時李綱適已竄去使其猶在城陷之日不知綱為從行歟將死於敵歟愚故曰李綱雖知報國之忠而不知用兵之略也邵氏聞見後録宣和殿聚殷周鼎鐘尊爵等數千百種國破金人盡取之其下不禁勞苦半投之南壁池中後世三代彛器當出于大梁之墟云和維愚見紀忘徽欽北狩可謂世之大變而詩人感憤見于題詠者皆言其奢縱之過如云萬炬銀花錦繡圍景龍門外軟紅飛凄涼但有雲頭月曾照當時步輦歸此言當時元宵逰賞之樂不恤國政而後人徒見凄涼之月色也如云蒼龍觀闕東風外黃道星辰北斗邊月照九衢天似水何人吹笛內門前此言故宫雖在已為金人據守也如云濯龍江上緑成堆半是宣和舊日栽聞説白頭宫女伴倚欄猶待翠華來此詠栁枝以比中原遺民愛戴不忘望其克復而來也元好問云雙鳯簫聲隔綵霞宫鶯催賞玉溪花誰憐利澤門前柳瘦倚東風望翠華此言太平之時奏樂賞花于龍德宫之玉溪靖康之變君臣妃后囚繫漠北惟有都門之柳日望其歸而不可得利澤門汴之水西門也劉後村云初為御筆行中旨漸取兵權付左璫玉帶解來頒貴幸珠袍脫下賜降羌又云兵來尚恐妨恭謝事去徒知悔夾攻丞相自言芝産第太師頻奏鶴翔空如何直到宣和季始憶元城與了翁蓋言徽欽之失非止奢侈淫佚之極亦由罷黜賢臣任用閹宦崇尚祥瑞賞賚無功以致禍變也元城劉公了翁陳公皆以諫官得罪去何喬新論斡里雅布圍京師斡里雅布之伐宋懸師深入兵家所忌然卒以取宋何也宋之主相非才而不能用善謀也夫完顔氏兵甲之盛雖未易當然張孝純堅守太原金以大衆攻之歷三時而後拔况京師城郭之固師旅之強糧餉之豐非太原比使宋有中材之主得救時之相聞金兵南下亟命良將徑卒固守黎陽彼必不敢渡河就令得渡然金兵僅六萬勤王之兵至城下者已二十萬宜命大軍扼牟駝岡以當其前竒兵屯邢相以截其後青齊之兵攻其左襄鄧之兵擊其右雖使韓彭為將賁育為卒良平為謀主懼將潰敗不可支况斡里雅布輩邪當是時非無善謀也种師道請俟彼惰歸扼而殱諸河李綱請俟其食盡力疲縱其北歸半渡而擊之皆䇿之善者也欽宗舉不之從惟李邦彥割地請和之謀是聽蓋欽宗隂柔之君邦彥隂柔之輔金固有所侮而動也易曰公弋取彼在穴欽宗之於邦彥是巳嗟夫自古以來違善謀而用邪説以取亂亡者多矣豈獨欽宗也哉王亷論李綱請固守京師之非宋徽欽時金人入寇李綱力主固守京師以衛社稷夫死社稷諸侯守土之職非天子之事也李綱不此之悟而欲留二帝固守京師以待勤王之師與金背城一戰以決勝負若綱者賢則賢矣不幾於知常而不知變者乎昔者太王嘗避狄人之逼孟子又嘗以對滕君矣夫太王滕君皆侯國也及其行權聖賢猶許之况於萬乘之尊乎故唐玄宗幸蜀以避祿山之禍代宗幸陜以避吐蕃之難德宗幸奉天以避朱泚之亂卒賴勤王之師再造唐祚使當是時三宗皆如李綱之議則安祿山吐蕃朱泚之慘三宗能不震驚乎綱力主其議二帝從之幸而斡里雅布尋以師退京師賴以無虞及綱罷是後朝臣不建行幸之議至冬金復入寇何栗又執綱議欽宗以足頓地誓死社稷朝臣乃不復言遂至二帝北巡貽宗廟之羞遺人民之禍實皆綱栗知常而不知變之罪也當時之計莫若從太王避狄之謀襲三宗出幸之事命康王為元帥李綱為相權之不撓用之不疑詔徴天下勤王之師以衛王室斯善之善者也即有不虞亦無北遷之禍顧乃為守土臣之計以致二帝身亡國削哀哉丘濬世史正綱論二帝北狩嗚呼宋人以忠厚立國而其敗也受禍乃慘于晉人何哉是非獨天數蓋亦人謀之不臧也所謂人謀之不臧奈何曰方金兵之未渡河也拒禦之計莫急於防扼河津可用汪立信沿江之策及金勢不可遏也自全之計莫切於權行避敵可用唐玄宗幸蜀之䇿若夫車駕既行京城防守之計又莫要於堅壁清野可用周亞夫斃吳之䇿何也自古立國必據險阻宋都汴梁平原之地而與強鄰為敵所以限之者一河耳謀國者不知據險以守境危急之際乃以要害之地付之庸腐閹人金之渡河如履平地既渡笑曰南朝可謂無人若以二三千人守此吾豈得渡邪當時誠有能建䇿如汪立信沿江之守盡出內地之兵以實外禦四五十里而為一屯屯有守將十屯而為府府有總督其尤要害處則參倍其數而命一大將領徑兵數萬往來巡督况河面比江面為不逺用兵不多雖金兵併聚而來然亦可以少延月日而吾之勤王兵日集矣若夫真宗澶淵之役王欽若勸幸江南陳堯叟勸幸蜀當全盛之時為遷幸之説誠為失䇿靖康之際則非景德比矣盍效有唐乎唐玄宗避安祿山之寇而幸蜀肅宗起於靈武遂復唐祚其德宗幸奉天僖宗幸興元皆用此䇿也况女真又非唐三寇比其意在於金幣而不在土地其技長於野戰而不能攻城觀其得汴京既以與張邦昌邦昌不能立又以與劉豫其意蓋可見矣使當時謀國者當金兵尚逺之時先請上皇率六宫以幸江南逼近之際繼擁欽宗領禁兵以巡襄鄧二帝在外號召四方之兵以為救援京師之舉京城之守則付之大臣如李綱者使之內堅城壁外清草野屯重兵而不動閉重門以自居彼欲縱兵以逺追慮吾扼其歸路彼欲肆暴以劫掠則又野無所得其勢自然不能久居而有畏散之心矣然後遣使與之通好或增嵗幣或邀重盟縱有屈抑不至受禍如此之慘矣説者徒以人君死社稷為言且謂天下城池豈復有如都城者嗚呼此老生之常談爾盍量其君曰彼能死社稷否乎都城雖堅孰能守之乎吾之言彼能始終聽之不移乎茍不能然孰若委任一人如漢人之用周亞夫者以守都城雖以九重宣命三軍夜驚略不少動如是則號令出于一人持守定而事功易集以俟機便使凡彼之所以令其下尅期以取效者皆過期而不應其徒衆自然解體後有所言皆不之信而主謀者亦且持議不固矣其心不能以不離其勢不能以不散計不出此乃苦留車駕又併其已出者而返之遂使九族六宫盡遭荼毒嗚呼誰之咎歟逮夫高宗之中興也父母兄弟盡在他人手中為所劫質一舉手動足輒有妨礙遂致不能復不共戴天之讎以貽千萬古之笑恨嗚呼天乎人乎劉定之史論徽宗失道致寇事已迫矣而付諸子當是之時非雄才不能有為也况欽宗之孱庸乎父子塊然剪為囚虜父之罹此也宜而子亦可謂不幸已前乎宋者父致寇而付諸子有若唐之玄肅然父尚能西奔至蜀不為人所魚肉子尚能北奔至靈武內挾俶倓二雛為心膂外任郭李諸傑為爪牙以返斾于舊都而徽欽不能焉非獨才愧于玄肅而宋都汴亦不若唐都關洛山河險固可憑仗以緩其傾危可前郤以圖其興復耳夫汴非可都之地宋因五代之舊而都之山河險固不足恃而恃兵以為命然邊敵之兵強中國之兵弱其俗不同也創業之兵強守成之兵弱其時不同也今以邊敵為鄰國以守成期子孫則兵不可恃而宜資于山川之險固明矣宋之都汴豈非失計邪王鏊震澤長語宋世人才誠非我朝可及然其謀國之踈則不及我朝逺甚靖康之變尼瑪哈以孤軍深入為宋謀者當堅壁清野勿與戰絶其歸路斷其糧道內用李綱外用种師道俟天下勤王之師四集彼自救之不暇何乃遽自張皇不敢發一矢二帝自幸其營為人席卷而去誠可恨也誠可笑也汴京遺迹志卷十三
