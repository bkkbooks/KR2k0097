body:
  text: 汴京遺蹟志巻十七明李濓撰藝文四墓碑清邊郡王楊燕竒碑文唐韓愈公諱燕竒字燕竒𢎞農華隂人也大父知古祁州司倉烈考文誨天寶中實為平盧衙前兵馬使位至特進檢校太子賔客封𢎞農郡開國伯世掌諸蕃互市恩信著明夷人慕之禄山之亂公年幾二十進言於其父曰大人守官宜不得去王室在難某其行矣其父為之請於戎帥遂率諸将校之子弟各一人間道趨闕變服詭行日倍百里天子嘉之特拜左金吾衛大将軍員外置賜勲上柱國寶應二年春詔從僕射田公平劉展又從下河北大厯八年帥師納戎帥勉于滑州九年從朝于京師建中二年城汴州功勞居多三年從攻李希烈先登貞元二年從司徒劉公復汴州十二年與諸将執以城叛者歸之于京師事平授御史大夫食實封百户賜繒綵有加十四年年六十一五月某日終于家自始命左金吾大将軍凡十五遷為御史大夫職為節度押衙右廂兵馬使兼馬軍先鋒兵馬使階為特進勲為上柱國爵為清邊郡王食虚邑自三百户至三千户真食五百户終焉公結髪從軍四十餘年敵攻無堅城守必完臨危蹈難歔欷感發乗機應㑹捷出神怪不畏義死不榮幸生故其事君無疑行其事上無間言初僕射田公其母隔於冀州公獨請徃迎之經營賊城出入死地卒致其母田公徳之約為父子故公始姓田氏田公終而後復其族焉嗣子通王屬良禎以其年十月庚寅𦵏公于開封縣魯陵岡隴西郡夫人李氏祔焉夫人清夷郡太守祐之孫漁陽郡長史獻之女柔嘉淑明先公而殂有男四人女三人後夫人河南郡夫人雍氏某官之孫某官之女有男一人女二人咸有至性純行夫人同仁均養親族不知異焉君子於是知楊公之徳又行於家也銘曰烈烈大夫逢時之虞感泣辭親從難于秦維茲爰始遂勤其事四十餘年或禆或專攻牢保危爵位已隮既明且慎終老無隳魯陵之岡蔡河在側烝烝孝子思顯勲績斵石于此式垂後嗣墓誌故貝州司法㕘軍李君墓誌韓愈貞元十七年九月丁卯隴西李翺合𦵏其皇祖考貝州司法㕘軍楚金皇祖妣清河崔氏夫人于汴州開封縣某里昌黎韓愈紀其世著其徳行以識其𦵏其世曰由梁武昭王六世至司空司空之後二世為刺史清淵侯由侯至于貝州凡五世其徳行曰事其兄如事其父其行不敢有出焉其夫人事其姒如事其姑其於家不敢有專焉其在貝州其刺史不悦於民将去官民相率讙譁手瓦石胥其出擊之刺史匿不敢出州縣吏由别駕己下不敢禁司法君奮曰是何敢爾屬小吏百餘人持兵仗以出立朩而署之曰刺史出民有敢觀者殺之朩下民聞皆驚相告散去後刺史至加擢任貝州由是大理其𦵏曰翺既遷貝州君之喪于貝州殯于開封遂遷夫人之喪于楚州八月辛亥至于開封壙于丁已墳于九月辛酉窆于丁卯人謂李氏世家也侯之後五世仕不遂藴必發其起而大乎四十年而其兄之子衡始至户部侍郎君之子四人官又卑翺其孫也有道而甚文固於是乎在徐文質墓誌銘宋穆脩進士徐孝山喪其父執喪之三日以其友張生道卿所録父事拜且泣復授之張生并繼以語俾來請曰孝山未即殞生尚惟喪事不可緩将卜𦵏以某日期日且廹敢迹其實託銘於先生用刻而納之以光永幽穸予既受而閲其始卒乃謂曰是𦵏也葢得其禮矣比是今貴家富族将𦵏其先必惑𦵏師説拘以嵗月畏忌大至違禮過時久而不克𦵏者多矣生能𦵏以其道正合士禮踰月之制此獨可尚又安得拒請而勿銘也按君諱文質字處中其先祖父嘗寓籍并土之文水逮君之考氏既而復㑹朝廷以兵取太原太原平大徙并民入處之京輔考於時與其族來至京師遂家焉自是得遊太學為生徒治春秋經傳前後四舉有司竟不及禄而終考始娶潁川陳氏女亡再娶清河張氏生男子二人女子二人次子文蔚少卒獨君為前室陳氏所生二女子今皆適京師良族由君而下始為京師里人凡并人其俗剛厚而勤嗇能節損以立衣食諸來徙之户初雖貧極者居久而皆為富室矧其宿有齎者葢可知故考亦用是而殖其家考之歿貽其規法於君君於此益為之善守者也君嘗念陳氏早世又傷父之不逮故事後親彌盡其力無何數年母張氏又終初君亦嘗授經於儒官馬龜符有慕仕進心至悼親之繼喪顧門中時無彊子弟可任懼覆先人遺業則為不肖子因刻力事生於家非時慶弔大事不出門如此者葢有年天聖八年適五十忽得疾醫累月弗愈以是年七月十七日卒於居君凡四娶室輒有喪有四男五女初室李氏無子長子孝山出次室李氏景山徳山皆未及娶五女子亦幼在室孝山有諸弟妹合族謀𦵏得其年八月之二十一日藏君於東京之祥符縣開封鄉西韓村先墓之次以次室李氏為合初李氏次苗氏李氏三室皆同穴而異棺斯實禮也銘曰惟古之𦵏等殺異宜日月有數舉無越斯末代不然惑於𦵏師隂陽拘忌率常過時其孰警此伊徐氏子以時而𦵏順禮之軌既合既祔有銘有紀如君之藏民亦鮮矣張子野墓誌銘歐陽脩吾友張子野既亡之二年其弟充以書來請曰吾兄之喪将以今年三月某日𦵏于開封不可以不銘銘之莫如子宜嗚呼予雖不能銘然樂道天下之善以傳焉况若吾子野者非獨其善可銘又有平生之舊朋友之恩與其可哀者皆宜見於予文宜其來請於予也初天聖九年予為西京留守推官是時陳郡謝希深南陽張堯夫與吾子野尚皆無恙於時一府之士皆魁傑賢豪日相徃來飲酒歌呼上下角逐爭相先後以為笑樂而堯夫子野退然其間不動聲氣衆皆指為長者予時尚少心壮志得以為洛陽東西之衝賢豪所聚者多為適然耳其後去洛來京師南走夷陵並江漢其行萬三四千里山砠水厓窮居獨遊思從曩人邈不可得然雖洛人至今皆以謂無如嚮時之盛然後知世之賢豪不常聚而交游之難得為可惜也初在洛時已哭堯夫而銘之其後六年又哭希深而銘之今又哭吾子野而銘於是又知非徒相得之難而善人君子欲使幸而久在於世亦不可得嗚呼可哀也已子野之世曰贈太子太師諱某曽祖也宣徽北院使樞密副使累贈尚書令諱遜皇祖也尚書比部郎中諱敏中皇考也曽祖妣李氏隴西郡夫人祖妣宋氏昭應郡夫人孝章皇后之妹也妣李氏永安縣太君子野家聨后姻世久貴仕而被服操履甚於寒儒好學自力善筆札天聖二年舉進士厯漢陽軍司理參軍開封府咸平主簿河南法曹參軍王文康公錢思公謝希深與今參知政事宋公咸薦其能改著作佐郎監鄭州酒税知閬州閬中縣就拜秘書丞秩滿知亳州鹿邑縣寶元二年二月丁未以疾卒于官享年四十有八子伸郊社掌坐次從次㓜未名女五人一適人矣妻劉氏長安縣君子野為人外雖愉怡中自刻苦遇人渾渾不見圭角而志守端直臨事敢决平居酒半脱冠垂頭童然秃且白矣予固已悲其早衰而遂止於此豈其中亦有不自得者邪子野諱先其上世愽州髙堂人自曽祖已來家京師而𦵏開封今為開封人也銘曰嗟夫子野質厚材良孰屯其亨孰短其長豈其中有不自得而外物有以戕開封之原新里之鄉三世于此其歸其藏集賢院學士劉公墓誌銘歐陽脩公諱敞字仲原父姓劉氏世為吉州臨江人自其皇祖以尚書郎有聲太宗時遂為名家其後多聞人至公而益顯公舉慶厯六年進士中甲科以大理評事通判蔡州丁外艱服除召試學士院遷太子中允直集賢院判登聞鼓院吏部南曹尚書考功於是夏英公既薨天子賜謚曰文正公曰此吾職也即上疏言謚者有司之事也且竦行不應法今百司各得守其職而陛下侵臣官䟽凡三上天子嘉其守為更其謚曰文荘公曰姑可以止矣權判三司開圻司又權度支判官同脩起居注至和元年九月召試遷右正言知制誥宦者石全彬以勞遷宫苑使領觀察使意不滿退而愠有言居三日正除觀察使公封還詞頭不草制其命遂止二年八月奉使契丹公素知敵山川道里敵人道自古北口囘曲千餘里至柳河公問曰自松亭趨柳河甚直而近不數日可至中京何不道彼而道此葢敵人常故迂其路欲以國地險逺誇使者且謂莫習其山川不虞公之問也相與驚顧羞媿即吐其實曰誠如公言時順州山中有異獸如馬而食虎豹敵人不識以問公曰此所謂駮也為言其形狀聲音皆是敵人益歎服三年使還以親嫌求知揚州嵗餘遷起居舎人徙知鄆州兼京東西路安撫使居數月召還糺察在京刑獄脩玉牒知嘉祐四年貢舉稱為得人是嵗天子卜以孟冬祫既廷告丞相用故事率文武官加上天子尊號公上書言尊號非古也陛下自寶元之郊止羣臣毋得以請迨今二十年無所加天下皆知甚盛徳奈何一旦受虚名而損實美上曰我意亦謂當如此遂不允羣臣請而禮官前祫請祔郭皇后於廟自孝章以下四后在别廟者請毋合食事下議議者紛然公之議曰春秋之義不薨于寝不稱夫人而郭氏以廢薨按景祐之詔許復其號而不許其謚與祔謂宜如詔書又曰禮於祫未毁廟之主皆合食而無帝后之限且祖宗以來用之傳曰祭從先祖宜如故於是皆如公言公既驟屈廷臣之議議者已多仄目既而又論吕溱過輕而責重與臺諫異由是言事者亟攻之公知不容于時矣㑹永興闕守因自請行即拜翰林侍讀學士充永興軍路安撫使兼知永興軍府事長安多富人右族豪猾難治猶習故都時態公方發大姓范偉事獄未具而公召由是獄屢變連年吏不能决至其事聞制取以付御史臺乃决而卒如公所發也公為三州皆有善政在揚州奪發運使冒占雷塘田數百頃予民民至今以為徳其治鄆永興皆承旱歉所至必雨雪蝗輒飛去嵗用豐稔流亡來歸令行民信盗賊禁止至路不拾遺公於學愽自六經百氏古今𫝊記下至天文地理卜醫數術浮圖老荘之説無所不通其為文章尤敏贍嘗直紫微閣一日追封皇子公主九人公方将下直為之立馬却坐一揮九制數千言文辭典雅各得其體公知制誥七年當以次遷翰林學士者數矣久而不遷及居永興嵗餘遂以疾聞八年八月召還判三班院太常寺公在朝廷遇事多所建明如古渭州可棄孟陽河不可開樞密使狄青宜罷以保全之之類皆其語在士大夫間者若其規切人主直言逆耳至於從容進見開導聰明賢否人物其事不聞于外廷者其補益尤多故雖不合於世而特被人主之知方嘉祐中嫉者衆而攻之急其雖危而得無害者仁宗深察其忠也及侍英宗講讀不專章句解詁而指事據經因以諷諫每見聴納故尤竒其材己而復得驚眩疾告滿百日求便郡上曰如劉某者豈易得也復賜以告上每宴見諸學士時時問公少間否賜以新橙五十勞其良苦疾少間復求外補上悵然許之出知衛州未行徙汝州治平三年召還以疾不能朝改集賢院學士判南京留司御史臺熈寕元年四月八日卒于官舎享年五十嗚呼以先帝之知公使其不病其所以用之者豈一翰林學士而止哉方公以論事忤於時也又有構為謗語以怒時相者及歸自雍丞相韓公方欲還公學士未及而公病遂止於此豈非其命也夫公累官至給事中階朝散大夫勲上輕車都尉開國彭城爵公邑户二千一百實食者三百曽祖諱琠贈大理評事祖諱式尚書工部員外郎贈户部尚書考諱立之尚書主客郎中贈工部尚書公再娶論氏皆侍御史程之女前夫人先公早卒後夫人以公貴累封河南郡君子男四人長定國郊社掌座早卒次奉世大理寺丞次當時大理評事次安上太常寺太祝女三人長適大理評事韓宗直二尚幼公既卒天子推恩録其兩孫望旦一族子安世皆試将作監主簿公為人磊落明白推誠自信不為防慮至其屢見侵害皆置而不較亦不介于胷中居家不問有無喜賙宗族既卒皆無餘財與其弟攽友愛尤篤有文集六十巻其為春秋之説曰𫝊曰權衡曰説例曰意林合四十巻又有七經小𫝊五卷弟子記五卷而七經小𫝊今盛行於學者二年十月辛酉其弟攽與其子奉世等𦵏公於祥符縣魏陵鄉祔于先墓乃為之銘曰嗚呼惟仲原父學彊而愽識敏而明坦其無疑一以誠見利如畏義必爭觸機履險危不傾畜大不施奪其齡惟其文章粲日星雖欲有毁知莫能惟古聖賢皆後亨有如不信考斯銘神道碑銘馬正惠公神道碑銘王安石推忠保順同徳翊戴功臣彰徳軍節度觀察留後特進檢校太尉使持節相州刺史兼御史大夫正柱國扶風郡開國公食邑六千六百户食實封二千二百户正惠馬公以天禧三年十月戊戌𦵏開封祥符縣某鄉某里至嘉祐七年公孫慶崇始來請銘以作公碑序曰馬氏故扶風人至公髙祖而徙處雲中贈太師諱某者於公為曽祖贈太師中書令諱某者於公為祖龍㨗左廂都指揮使江州防禦使贈太師中書令尚書令蔡公諱某者於公為父蔡公從太祖定天下力戰有功當是時雲中已為契丹所得故馬氏又徙處浚儀今開封府祥符縣也公諱知節字子元蔡公之終也年七歳太祖召見禁中有司言例當補殿直特授西頭供奉官而賜以名開寶五年年十八監彭州兵馬以嚴飭見憚如老将太平興國三年領兵戍秦州清水姦人李飛雄乗驛稱詔捕公及秦隴廵檢劉文裕等将繫之秦州因盗庫兵以反公辨其詐與文裕執飛雄治殺之五年監潭州兵馬改東頭供奉官雍熈二年又監愽州兵馬劉延讓敗於君子驛而契丹歸矣公方紏丁壮集芻糧繕城治械如冦至吏民初不悦其生事也已而契丹果至度不可攻乃去四年改西京作坊副使将屯于冀州端拱元年移知定逺軍時議發河南十三州之民轉饟河北公告轉運使樊知古此軍聚兵少而積粟多簸其腐尚可得十七知古用此得粟五十萬斛以罷河南之役事聞朝廷太宗嘉之二年深州新蹂於契丹城郭廬舎多壞而流民衆乃移公知深州公至數月則壞者完流者復舉州忘其冦戎之故而以公為能撫我㑹保州不治移徃代之淳化二年又移知慶州羗萬人以怨程徳元來冦公誘其渠帥諭以威信即皆引去四年遷西京作坊使知梓州五年李順為亂於蜀之西川以公徃討又以為先鋒平劒州召還至三泉而復以公與王繼恩討賊繼恩怒公抗直使守彭州盡收其軍而與之羸卒三百賊率其衆至號十萬公力戰一日亡其卒大半乃夜獨出招救兵復入賊終不能得城而以敗去除成都府兵馬鈐轄遷洛苑使五年除蜀漢九州都廵檢使已而又兼成都府兵馬軡轄真宗即位改内苑使蜀卒劉旰聚黨數千人為亂所攻數州至輒取之公以卒三百追至蜀州與戰旰走卭州而招安使上官正召公歸成都計事公為正畫曰賊破卭州必乗勝刼掠度江薄我既息而戰我軍雖倍未易敵也不如迎其弊急擊破之必矣遂行次方井與正合殺旰等無噍類真宗賜書奨諭賞以錦袍金帶咸平元年加登州刺史知秦州諸羗質子有三十年不釋者公悉歸之諸羗徳公訖公去無一人犯塞小泉銀坑久不發掌吏盡産以償嵗課而責之不已公奏得釋而歸其産四年就除西上閤門使知成都府兼本州兵馬軡轄有告龍騎士謀為變者所引以千數公捕殺其首七人而置其餘無所問自乾徳後歳漕蜀物以富人為送多坐漂失籍其家公奏釋三班使臣及三司軍大将代之而課其漕事為賞罰至今便之六年移鄜延路駐泊兵馬都總管兼知延州蜀人於公去皆環以泣公至延州羗方以兵覷邊㑹上元開門張燈示以無為而羗卒不能為冦又移知鎮州兼本州兵馬都總管景徳元年契丹入邊民入保城公與之約盗一錢者死有盗錢二百者公即殺之於是自澶以北城郭皆晝閉詔使過公輒留之而募人間行送詔皆得其報以聞又以便宜使所至受諸漕輓給邊之物故契丹欲敵掠無所得車駕次澶州大将王超提卒數十萬逗留不赴公屢趣之不為動移書譙讓乃始出師猶辭以中渡無橋至則公先已度材一夕而橋就上聞手詔褒之且知公果可以屬大事也二年移知定州又除東上閤門使樞密院都承㫖三年遂以檢校太保簽書樞密院事祥符元年東封泰山以為行宫都總管自此行幸必以公為都總管而皆許之專殺公部分明約束審出令肅然而未嘗輒戮一人於是邊将言契丹近塞大臣議皆請發兵以備公獨議使邊将移書問状從之契丹解去遷檢校太傅四年加宣徽北院使五年除樞密副使當是時契丹已盟中國無為大臣方言符瑞而公每不然之獨嘗從容極言天下雖安不可忘戰去兵之意及他爭議甚衆真宗多以公言為是七年除潁州防禦使知潞州州之税賦常移以輸邊公為論其害自是所輸不過鄰州而己天禧元年移知大名府兼駐泊兵馬都總管使中貴人勞問賜白金二千兩居頃之遂以為宣徽南院使知樞密院事檢校太尉有足疾時詔内朝别為一班免其蹈舞二年疾病賜告求去位真宗不許而數使中貴人勞問又幸其第賜白金三千兩已而度公實病不可强以事乃罷以為彰徳軍節度觀察留後而公固求外鎮終不許居久之稍間入謁真宗輒使閤門祗候二人伺公至即扶以入因掖其拜起數屏左右問事常聴用三年又求外鎮乃以公知貝州兼本州兵馬都總管将行矣召見又将付以政公固辭謝久之乃已而更以公為本鎮至六月公疾作詔使公子洵美将太醫徃視而魏潞二鎮之人亦皆奔走來問為公請禱已而公疾革真宗又使公弟之子成美馳𫝊召公歸京師而公以八月壬寅不起矣享年六十五真宗為之震悼罷朝詔贈侍中録其子孫賻賜皆加等公前夫人丁氏某郡君後夫人沈氏某郡夫人子男二人洵美終西京作坊使英州刺史之美終内殿承制閤門祗候孫十六人其十四人皆已卒而慶宗今為右班殿直慶崇今為文思使知恩州公少忼慨以武力智謀自喜又能好書賔友儒者所與善必一時豪傑有集二十巻其文長於議論自始仕以至登用遇事謇謇未嘗有所顧憚王冀公丁晉公用事每廷議得其不直輒面詆之真宗初或甚忤然終以此知公而天下至今稱其正直銘曰在浚西南誰封誰樹有宋正惠馬公之墓公當太宗真宗之時暨暨諤諤謀行計施以羸擊强以少捕衆以賤抗貴維公之勇雖貴雖衆雖强必克維公之敏亦維公直帝曰直哉汝予良弼見國而已不知家室内朝十年典掌機密暨予一心綱紀庶物元功宗謀莫汝敢匹公曰孤臣敢曠于榮讒説不用是維帝明士或困窮莫知其有既榮以位正或見醜公於可願兩得其尤不訖大耄天為不謀徳歉於年孰云耉老有賚後世公為夀考刻趺篆首作此銘詩陳之隧道永矣其貽汴京遺蹟志巻十七
