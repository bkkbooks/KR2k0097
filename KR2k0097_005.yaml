body:
  text: 汴京遺蹟志卷五明李濓撰河渠一黃河按宋史河渠志河入中國行太行西曲折山間不能為大患既出大伾東走赴海更平地二千餘里禹迹既湮河并為一特以隄防為之限夏秋霖潦百川奔㑹不免決溢之憂然有司所以備河者亦益工矣自周顯德初河決東平之楊劉宰相李榖監治隄防水患少息然決河不復故道離而為赤河太祖乾德二年遣使按行將治古堤議者以舊河不可卒復力役且大遂止但詔民治遙堤以禦衝注之患五年正月帝以河堤屢決遣使行視發畿甸丁夫繕治自是嵗以為常皆以正月首事季春而畢是月詔開封府大名府鄆澶滑孟濮齊淄滄棣濵德博懷衛鄭等州長吏並兼本州河堤使蓋以謹力役而重水患也開寶四年十一月河決澶淵泛數州官守不時上言通判司封郎中姚恕棄市知州杜審肇坐免五年正月詔曰應緣黃汴清御等河州縣除準舊制種藝桑棗外委長吏課民别樹榆柳及土地所宜之朩仍案戶籍髙下定為五等第一等嵗樹五十本第二等以下遞減十本民欲廣樹藝者聽其孤寡惸獨者免是月澶州修河卒賜以錢鞋役夫給以茶三月詔曰朕每念河渠潰決頗為民患故署使職以總領焉宜委官聨佐治其事自今開封等十七州府各置河堤判官一員以本州通判充如通判闕員即以本州官充五月河大決濮陽又決陽武詔發諸州兵及丁夫凡五萬人遣潁州團練使曹翰護其役翰辭太祖謂曰霖雨不止又聞河決朕信宿以來焚香上禱於天若天災流行願在朕躬勿延於民也翰頓首對曰昔宋景公諸侯耳一發善言灾星退舍今陛下憂及兆庶懇禱如是固當上感天心必不為灾六月下詔曰近者澶濮等數州霖雨薦降洪河為患朕以屢經決溢重困黎元每閲前書詳究經潰至若夏后所載但言導河至海隨山濬川未聞力制湍流廣營髙岸自戰國專利堙塞故道小以妨大私而害公九河之制遂隳歷代之患弗弭凡縉紳多士草澤之倫有素習河渠之書深知疏導之策若為經久可免重勞並許詣闕上書附驛條奏朕當親覽用其所長勉副詢求當示甄奬時東魯逸人田告者纂禹元經十二篇帝聞之召至闕下詢以治水之道善其言將授以官以親老固辭歸養從之翰至河上親督工徒未幾決河皆塞是後又決屢命樞密直學士張齊賢翰林學士宋白乘傳祭白馬津沈以太牢加璧而黃河之患終宋之世迄無寧嵗濵河州縣之民田廬荒圮役調孔亟可謂困苦之甚也已按黃河舊在汴城北四十里自西北汜水縣入境東至虞城縣下達山東濟寧州界洪武二十四年河決原武縣黑洋山下而東南流經汴城之東北五里遂成大河下達於淮洪武三十二年復決衝塌土城水從封丘門流入裏城官廨民廬淹沒傾圮而城內之水久積不涸永樂九年乃於城之西北三十里自大河北岸復開新河導其水於中灤東入黃河故道正統十三年河溢仍循陽武故道直抵張秋入海歷歲滋久今皆淤為平地矣天順五年河復決衝入汴城內宗藩皆避水鄰邑而官民悉移居城上以俟水消自是之後隄防有法黃河不入汴城殆百年矣修堤捍禦之方誠不可不講司其事者所宜留意也治河通考論黃河故道古自陽武北新鄉西南入境東北經延津汲胙城至北直隸濬縣大伾山北入海即禹貢導河東過洛汭至於大伾處地志魏郡鄴縣有故大河在東北直達於海疑即禹之故河也周定王五年河徙則非禹之所穿漢文帝十二年河決酸棗東南流經封丘入北直隸長垣縣界至山東東昌府濮州張秋入海五代至宋兩決鄭州及原武東南陽武南流經封丘于家店祥符金龍口陳橋北經蘭陽儀封入山東曹縣境分為二𣲖其一東南流至徐州入泗其一東北流合會通河自國朝洪武七年至十八年二十四年陽武原武祥符凡四度淹沒護城堤又決陽武西南東南流經封丘陡門祥符東南草店村經府城北五里東過焦橋南過蘇村至通許西南分九道名九龍口又南至扶溝太康陳項城諸州縣境入南直隸太和縣合淮正統十三年河溢仍循陽武故道直抵張秋入海今皆淤為平地其自滎陽縣築堤至千乘海口千餘里名金堤自河內北至黎陽為石堤激使東抵東郡為平岡西北抵黎陽觀下東北抵東郡津北西北至魏郡昭陽又自汲縣築堤東接胙城抵直𨽻滑縣界西接新鄉獲嘉縣界東南接延津縣界名護河堤在滎陽縣東南二十里中牟縣東北境名官渡即曹操與袁紹分兵相拒處築城築臺皆名官渡在汲縣東南境名延津置關亦名延津又置關名金堤在新鄉南境有八栁渡皆因河徙而廢至國朝於祥符置河清巡檢司清河大梁陳橋三驛陳橋遞運所封丘縣置中灤巡檢司中灤新莊二驛儀封縣置大岡驛大岡遞運所通許縣置雙溝驛太康縣置義安驛長嶺遞運所扶溝縣置崔橋驛陳州置宛丘驛淮陽遞運所項城縣置武丘驛皆因河徙而革王回水議古者之治五行也必有五行之官其去民用尤近而逆其理則有敗害之端莫甚於水故官得其任則不憂乎水之敗害誠其勢也是以舜命益作虞以掌山澤周有川澤之禁而後世修之未嘗廢也由秦漢以來使任其事而為之水官則莫若都水之職其主灌溉陂池保守河渠自太常及三輔皆有其官至武帝之時尤增重之於是又有左右使者使統其任而居其事者莫不明於禹貢之學而習於知水之性故劉向以治書為三輔都水都尉平當以明禹貢領護河堤蓋其任職之人未嘗不修其事而又有水工之徒以佐知其利害是以秦漢之際言水事於書尤著而魏晉以來至於隋唐其官亦未嘗廢於魏則有都尉水衡之號晉宋齊皆曰都水臺或為水衡令及梁天監中始改曰太舟卿而主治舟航河堤隋唐之時又皆為都水使者或改曰監而舟楫河渠二署隸之然於水事或領或否矣故天下不喻於水而失其水之性使以憂中國者起矣國家比嵗之間水之為害亦甚矣自京城之中民被其苦亦有暴而衍溢者歷月不知所以泄之今國家懲前日之患而求於秦漢之故為之都水之任專其有司欲以知水之性此慮患之本也夫以患而設備求其功效而使之不為虛位則天下宜有明於水性若秦漢之間所謂水工者出矣茍得其水工而又以知水者居其任使之專其職而行於天下就視其水之利害得以循其故而治之不使數遷其任責之課最而信其黜陟則官得其人而分定則事益修矣故為今之慮水莫若如此朱光庭論治河當專責水官臣竊以君論一相相擇百官各任其職而天下治古今不易之道也今日朝廷內外無事惟治河為大役竊緣河之所以可治朝廷難以遙度責在水官任職而已其所用物料所役兵夫水官既任責則朝廷自合應副將來成功則當不惜重賞設或敗事亦當必行重責如此則上有所取信而不致過舉下不敢欺罔而以實從事臣今日所聞則異於此朝廷只知河之當竭財力以應副而水官不任其責僥幸成功則自稱已力以冀重賞以至敗事則推過朝廷茍免重責此不可之甚者也伏見此役非小役也其所責物料所役兵夫萬數不少若水官自不任責則朝廷何所取信而興此大役伏乞朝廷指揮下修河司取責水官委實可以回復大河結罪狀庶使身任其責以實從事不至朝廷有所過舉所繫事體甚大伏望聖慈早賜指揮王巖叟乞詔大臣早決河議臣伏以朝廷知大河橫流為北道之患日益以深故遣專使命水官相議便利欲順而導之以拯一路生靈於墊溺甚大惠也臣竊意朝廷默有定論必欲紓患矣然昔者專使未還不知何疑而先罷議洎致專使反命不知何所取信而議復興既敕都水使者總護役事調兵起工有定日矣已而復罷數十日間而變議者再三何以示四方他日雖有命令真不可易誰將信之夫利害之際自古以來不能無二三之說必朝廷之上力主一議斷而必行乃克有濟不容一人言之輒興一人言之輒廢大事大議而易興易奪臣恐天下有以窺朝廷也今有大害者七焉不可不早為計爾北塞之所恃以為險者在塘泊若河堙沒勢雖退流猝不可濬浸失北塞險固之利一也使百萬生靈居無廬耕無田流散而不復二也乾寧孤壘危絶不足道而大名深冀腹心郡縣皆有終不自保之勢三也滄州扼北敵海道自河不東流滄州在河之南直抵京師無有限隔四也并吞御河邊城失轉輸之便五也河北轉運司嵗耗財用陷租賦以百萬計六也六七月之間河流交漲占沒西路阻絶北使進退不能兩朝以為憂七也非此七者之害則委之可也緩而未治之可也且去嵗之患已甚於前嵗今嵗之患又甚焉則將奈何伏惟陛下深拱九重此事之可否必以仰大臣大臣固當為陛下審慮謹發而謹持之以救大患不可坐視而無所處也伏望聖慈亟詔執政大臣早決河議而責成之實廟社生靈之幸臣不勝愚忠范純仁論黃河回復故道之難臣昨日伏覩內降指揮黃河未復故道終為河北之患王孝先所議已嘗興役不可中罷宜接續工料向去決要回復故道者臣聞聖人有三寶曰慈曰儉曰不敢為天下先言此三道人君當保而持之不失者也又曰惟天為大惟堯則之蓋天不言而四時成所以堯舜垂衣拱手而天下大治者用此道也且君心如槃水常使平正無所趨向則免偏側傾覆之患蓋天下大勢惟人君所向羣下競趨如川之流如山之摧不以其道則非一力之可回故居上者不可不審也臣今切詳所降指揮謂決要回復故道似聖意已有所向而為天下先矣臣聞先朝因人建議謂夏國微弱若不早取必為北敵所兼偶先帝不出建議者之名但以御批令邊臣相度而希旨生事之徒以為萬全必勝尅日可得遂興靈武之師後貽永樂之患致先帝獨當其憂羣臣無一人受其責者至今疲耗未復此陛下所親見不可不為深監也乞面諭執政前日降出文字卿等已見但一面商量却使進入若别有所見亦須各自開陳如此則免希合之臣妄測聖意輕舉大役上誤朝廷所有黃河利病乞付之羣臣有司子細商議以求必當如此則聖心不勞而堯舜之治可致矣蘇轍論開河分水之非臣為戶部右曹兼領金倉二部任居天下財賦之半適當中外匱竭不繼之時日夜憂惶常慮敗事竊見左藏見緡一月出納之數大抵皆五十餘萬略無贏餘其他金帛諸物雖小有羡數亦不足賴臣之愚怯常恐天災流行水旱作沴西羌旅距邊鄙繹騷河議失當賦役橫起三者有一大計不支雖使桑羊劉晏復生計無從出矣而況於臣之駑下乎今者幸賴二聖慈仁恭儉天地垂貺諸道秋稼稍復成熟雖京西陜西災旱相接而一方之患未為深憂羌人困窮旋聞欵塞惟有黃河西流議復故道爭之經嵗役兵二萬人蓄聚稍樁等物三十餘萬方河朔災傷困敝之餘而興必不可成之功吏民竊歎勞苦巳甚而莫大之役尚在來嵗天啓聖意灼知民心特召河北轉運司官吏訪以得失近聞回河大議已寢不行臣平日過憂頓然釋去然尚聞議者固執開河分水之策雖權罷大役而兵工小役竟未肯休如此則河北來年之憂亦與今年何異今日小吳決口入地已深而孫村所開丈尺有限不獨不能回河亦必不能分水況黃河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理哉縱使兩河並行不免各立隄防其為費耗又倍今日矣臣聞自古聖人不能無過過而能改善莫大焉故君子之過如日月之食更也人皆仰之朝廷舉動義當如此今議河失當知其害人中道而復本何所愧雖使天下知之亦足以明二聖憂民之深為之改過不吝今乃顧惜前議未肯曠然更張果於遂非難於遷善臣實為朝廷惜之然臣聞議者初建開河分水之策其說有三其一曰御河湮滅失饋運之利其二曰恩冀以北漲水為害公私損耗其三曰河徙無常萬一自敵界入海邊防失備凡其所以熒惑聖聰沮難公議皆以三說藉口夫河決西流勢如建瓴引之復東勢如登屋雖使三說可信亦莫如之何矣況此三說皆未必然臣請得具言之昔大河在東御河自環衛經北京漸歷邊郡饋運既便商賈通行今河既西流御河堙滅失此大利誰則不知天實使然人力何及若議者能復澶淵故道則御河有可復之理今河自小吳北行占壓御河故地雖使如議者之意自北京以南析而東行則御河堙滅已一二百里亦無由復見矣此御河之說不足聽一也河之所行利害相半夏潦漲溢浸敗秋田濵河數十里為之破稅此其害也漲水既去淤厚纍尺粟麥之利比之他田其收十倍寄居丘塜以避淫潦民習其事不甚告勞此其利也今河水在西勢亦如此逺為隄防不與之爭正得漢賈讓治河之意比之故道嵗省兵夫稍芟其數而故道已退之地桑麻千里賦役全復為利不資安用逆天地之性移西流之憂為東流之患哉此恩冀以北漲水為害之說不足聽二也河昔在東自河以西郡縣與敵接境無山河之限邊臣建為塘水以捍胡馬之衝今河既西行則西山一帶胡馬可行之地無幾矣其為邊防之利不言可知然議者尚恐河復北徙則海口出敵界中造舟為梁便於南牧臣聞敵中諸河自北南注以入於海蓋地形北髙河無北徙之道而海口深浚勢無徙移臣雖非目見而習北方之事者為臣言之大略如此可以遣使按視圖畫而知此河入敵界邊防失備之說不足聽三也臣願以此三說質之議者則開河分水之說誠不足復為矣又臣訪聞今嵗四五月間河上役兵勞苦無告嘗有數百人持版築器械訪求都水使者意極不善賴防邏之卒擁拒而散盛夏苦役病死相繼使者恐朝廷知之皆於垂死放歸本郡斃於道路者不知其數若今冬寒凍來嵗春暖復調就便興役則意外之患復當如前臣不知朝廷何苦而不罷此役哉今建議之臣恥於不效而堅持之於上小臣急於利祿不顧可否隨而和之於下上下膠固以罔朝廷其間正言不避權要才一二人耳然事非本職亦不敢盡言臣以户部休戚計在此河若復緘默誰敢言者惟斷自聖心盡罷其議則天下不勝幸甚元祐三年十一月上轍時為户部右侍郎范祖禹論回河成功之難臣聞周靈王之時穀洛水鬬將毁王宫王欲壅之太子晉諌以為不可夫穀洛二水小川也王宫天子所居也小川水鬬以妨王宫太子晉猶深陳禍福之戒言川不可壅壅必有禍以其違天地之性也今大河豈穀洛之比又無王宫之害以何理而欲塞之也六國之時鄰敵相傾則勸人以動衆役民韓聞秦之好興事欲疲之無令東伐乃使水工鄭國為之間以說秦令鑿涇水為渠溉田夫以一渠猶能疲秦使無東伐今回河之役不知幾渠而自困民力自竭國用又多殺人命不可勝言之害此乃西北二敵所幸也是以臣與𫝊堯俞極言論列實以河北數路生民休戚國家安危輕重所係天地血脈已北向九年必非人力所能遏絶今之河流方稍復大禹舊迹入界河趨海初無壅底萬壑所聚其來逺大必無可回之理自古亦無容易塞河之事欲望陛下與執政大臣考臣等言之是非若以臣等所言為是即乞以數路生民為念以國家安危朝廷輕重為急速賜指揮停罷修河今將大冬盛寒宜早降德澤免生民饑凍死亡正李偉等欺罔之罪如以臣等所言為不然方冊中語皆不可信而河有必回之理不於他處決溢為州郡大患不至苦虐數路兵民力役以致逃亡起為羣盜及不至火急收買數千萬物料致非時斬伐林朩殘害天地之所生科擾州縣鄉村坊邑人民鞭笞枷錮星火督責致百姓驚騷流離之苦又免枉費國家不資之計以致公私匱乏倉庫空竭內則姦狡窺伺别致生事外則四夷傳聞萌心作過但令大臣保得必無上件數事回河必有成功則臣等所言顯為謬妄豈可但隱忍而巳須當正臣等所言不當之罪黜責以勵後來乃可以示朝廷典法今不試驗臣等所言是否以救朝廷過舉而章奏才下未及纍日即䝉優加美遷臣不知大臣此謀為國邪為身邪若為國則當公天下之言盡河之利害不當以官職姑息使人不言若為身則是惟欲人之同已而不欲人之異已豈惟國事不當如此為大臣身謀亦未為得也人臣官愈進則當憂國愈深寵益加則當愛君愈切臣聞命遂緘默不言不惟臣心實有所愧有識之士必指臣為貪利無恥忘國不忠之人伏望聖慈宣問大臣臣等所言回河是否如上所陳數件事理别白是非明辨可否則生靈幸甚宗社幸甚元祐四年廟堂用李偉之議再興回河之役復置修河司祖禹時為諫議大夫同傅堯俞各上疏論列未幾除堯俞為吏部尚書祖禹為給事中祖禹遂連上二疏此第二疏也時論以為真諫議云汴京遺蹟志卷五
