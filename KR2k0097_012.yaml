主客戶一千二百九十一萬七千二百二十一口二千九百九萬二千一百八十五神宗熙寧八年天下主客戶一千五百六十八萬四千五百二十九口二千三百八十萬七千一百六十五元豐六年天下主客戶一千七百二十一萬一千七百一十三口二千四百九十六萬九千三百哲宗元祐六年天下主客戶一千八百六十五萬五千九十三口四千一百四十九萬二千三百一十一元符二年天下主客戶一千九百七十一萬五千五百五十五口四千三百四十一萬一千六百六徽宗崇寧元年天下主客户三十萬三千四百九十五口四十萬九千一百六十三而古今戶口之繁無踰于是矣按馬端臨曰古者戶口少而皆才智之人後世生齒繁而多窳惰之輩均是人也古之人方其為士則務學問及其為農則勤稼穡及其為兵則力戰鬭是以千里之邦萬家之聚皆足以世守其國後世之民才益乏而智益劣士拘於文墨而授之介胄則慚農安於犂鋤而問之刀筆則廢以至九流百工釋老之徒食土之毛者日以繁夥不足以增重邦國官既無藉於民之材而徒欲多為之法以征其身戶調口賦日增月益而民益窮苦憔悴秪以丁多為纍矣悲夫宋財賦總數按文獻通考國初以來四河所運粟未有定制至太平興國六年汴河歲運江淮米三百萬石菽一百萬石黃河粟五十萬石菽三十萬石惠民河粟四十萬石菽二十萬石廣濟河粟十三萬石凡五百五十二萬石非水旱大蠲民租未嘗不及其數至道初汴河運米至五百八十萬石自是京城積粟盈溢大中祥符初至七百萬石天禧末京城所積倉粟一千五百六十萬餘石草一千七百萬五千餘圍凡水運自淮南江南荆湖南北路所運粟於揚真楚泗州四處置倉以受其輸既而分調舟船泝流而入京師發運使領之荆湖江淮兩浙以及嶺表金銀香藥犀象百貨亦同之惟嶺表陸運至䖍州而後水運陜西諸州菽粟自黃河三門㳂流由汴河而至亦置發運使領之陳潁許蔡光夀等六州之粟帛由石塘惠民河而至京東十七州之粟帛由廣濟河而至皆有京朝官廷臣督之凡三水皆通漕運而歲計所賴者惟汴流焉河北衛川東北有御河達乾寧軍其運物亦有廷臣主之川陜諸州金帛自劒門列傳置分輦負擔以至租布及官所市布由水運送江陵自江陵遣綱吏運送京師咸平中定歲運六十六萬匹分為十綱天禧末水陸上供金帛緍錢二十三萬一千餘貫兩端匹珠寶香藥二十七萬五千餘斤諸州歲造運船至道末三千三百三十七艘天禧末減四百二十一景德中漕東南粟歲不過四百五十萬石後增至六百萬天聖中發運使請所部六路計民稅一石量糴粟二斗五升歲可更得二百萬石給京師仁宗曰常賦外增糴是重擾民不許時江南穀貴民貧尚書員外郎吳耀卿以為言詔歲減五十萬後是三司奏復增至六百萬然東南災歉輒減歲漕數或百萬或數十萬又轉移以給他路者時有焉慶厯中詔減廣濟河歲漕一十萬石後黃河歲漕益減耗才運菽三十萬石而歲創漕船市材朩役牙前勞費甚廣嘉祐四年詔罷所運菽減漕船三百艘自是歲漕三河而已葉少藴石林燕語皇祐治平天下財賦嵗入皆一億萬以上歲費亦一億萬以上出入略相當景德官一萬餘員皇祐治平加二萬餘員景德郊費六百萬皇祐治平加一千萬以上二者皆倍於景德元豐中曾子固嘗請欲推考所從來悉為裁損使歲入如皇祐治平而祿吏奉郊之費同景德止二者所省已半以類推之歲入以億萬為率歲但省十之一則三十年當有九億萬可以為十五年之蓄議格不行此雖論其大約未必盡然要之言節用似當略倣此可得實效愈於毛舉目前瑣碎徒為裁減之名而訖不能行也沈括夢溪筆談發運司歲供京師米以六百萬石為額淮南一百三十萬石江南東路九十九萬一千一百石江南西路一百二十萬八千九百石荆湖南路六十五萬石荆湖北路三十五萬石兩浙路一百五十萬石通餘羡歲入六百二十萬石汴京遺蹟志卷十二
