body:
  text: 汴京遺蹟志卷十二明李濂撰雜志一汴宋九帝紀年宋太祖姓趙氏諱匡𦙍其先涿郡人庚申以殿前都㸃檢受周禪時年三十三因五代之舊都汴在位十七年丙子崩壽五十改元三建隆三開寶九乾德五太宗諱炅初名匡義太祖之弟賜名光義封晉王丙子嗣立時年三十七在位二十二年丁酉崩壽五十九改元五太平興國八淳化五雍熙四至道三端拱二真宗諱恆初名元侃太宗第三子丁酉嗣立時年二十九在位二十六年壬戌崩壽五十五改元五咸平六天禧五景德四乾興一大中祥符九仁宗諱禎初名受益真宗太子壬戌嗣立時年十二在位四十一年癸卯崩壽五十四改元九天聖九寶元二明道二康定一景祐四慶厯八皇祐五至和二嘉祐八英宗諱曙初名宗實濮安懿王子詔立為皇子癸卯嗣立時年三十三在位四年丁未崩壽三十八改元一治平四神宗諱頊英宗太子丁未嗣立時年十九在位十八年乙丑崩壽三十八改元二熙寧十元豐八哲宗諱煦初名傭神宗太子乙丑嗣立時年十歲在位十五年庚辰崩壽二十五改元三元祐八元符三紹聖四徽宗諱佶神宗第十一子封端王庚辰嗣立時年十九在位二十五年乙已禪位于太子丁未金人陷中原北狩後九年乙卯崩于五國城夀五十四改元六建中靖國一政和七崇寧五重和一大觀四宣和七欽宗諱桓徽宗太子乙已受禪嗣位時年二十五丁未金人陷中原北狩後三十四年庚辰崩夀六十一改元一靖康一一統志宋太祖永昌陵太宗永熙陵真宗永定陵仁宗永昭陵英宗永厚陵神宗永裕陵哲宗永泰陵皆在河南府鞏縣西南周密癸辛雜識徽宗欽宗初葬五國城後數遣祈請使欲歸梓宫凡六七年而後許以梓宫送行在高宗親至臨平奉迎易緦服寓于龍德别宫一時朝野以為一大事諸公論功受賞者幾人費于官帑者大不資先是選人楊煒貽書執政以為真僞未辨左宣義郎王之道亦上奏乞命大臣斫而視之既而禮官請用安陵故事梓宫入境即承之以槨仍納衮冕翬衣於槨中不改斂遂從之近者楊髠盜發諸陵於二陵梓宫內略無所有其一止有朽朩一段其一則朩燈檠一事耳當時已逆料其真僞不可知不欲逆詐亦聊以慰一時之人心耳蓋二帝遺骸飄流沙漠初未嘗還也哀哉王鏊讀宋史宋自建隆至慶厯人主以恭恕為心宰輔以寬厚稱上意天下稱治至神宗狹小宋家制度欲大有為而王安石相之凡祖宗之制一切掃去天下騷然遂基一代之亂元祐初召用司馬光凡新法之不便民者一切掃去紹聖間章蔡得志復取元祐之政一切掃去追奪司馬光等官蔡京繼之而元祐元符諸賢竄徙殆盡又倡為豐亨豫大之說以侈靡蠱惑君心遂致中原淪陷左袵而二帝䝉塵矣悲夫宋官制沿革按宋官制沿革各家紀載互有異同惟黃琦元禮論宋之新舊官制頗為詳密其略曰國朝自太祖設官分職多襲五代之制雖稍有增損大體仍舊唐制省部寺監之官無所職掌别領內外任使省部寺監别設主判官員額惟以侍中中書令同中書門下平章事為宰相乾德二年始置參政為宰相副二初以薛居正吕餘慶為之宰相所居省謂之中書門下國政所出兵政𨽻樞密院承五代之制有使副使太宗朝命石熙載以樞密直學士簽書樞密院事後以張士遜為知樞密院事冦凖溫仲舒同知樞密院事治平中郭逵以檢校太保同簽書樞密院事故樞密有使副使知院同知院簽書院員額與中書號為二府尚書置判尚書都省一員掌百官赴省集議及大祀受䄡戒之事六部各有主判率以學士待制館閣官領之吏部即審官東院掌尚書左選審官西院掌尚書右選吏部南曹掌侍郎左選三班院掌侍郎右選流內銓考功郎官之職也戶部郎三司使尚書之任也其官崇職重久次者為使稍輕則為權使資淺則為權發遣使公事度支副使戶部副使鹽鐵副使各一員此侍郎之任也别置子司判官八員度支判官戶部判官鹽鐵判官各一員所掌本曹郎官之職也判㑹案一員掌造器械唐軍器監職也判修造案一員唐工部將作少府監職也判磨勘司一員掌勾考唐比部職也判闕院一員掌審司出納及審覆百官諸司兵級請俸舊兼禁軍以繁冗别立諸司專計司掌之以分其職判理缺司一員掌催促諸路遺缺禮部有判部及判禮部貢院即尚書侍郎之任內兵部事歸樞府工部事歸三司故此二部不設主判官多以别官兼之刑部則判審刑院及詳議官掌詳覆諸路奏案是其職也翰林學士襲唐制以六員為額其帶知制誥即釐本院職事其别領省府職任即不帶知制誥內年德俱重者一員為承㫖知通進銀臺司兼門下封駁事其任即給事中也而𨽻樞密院知制誥即中書舍人之職也御史臺雖有大夫員而不除以中丞為臺長次侍御史知雜事侍御史裏行殿中侍御史殿中侍御史裏行監察御史監察御史裏行已上為諫官以别官兼領官即為知諫院同知諫院亦有正諫議大夫司諫正言者九寺則判太常寺禮院即卿之任也資輕者為知院同知院兼掌博士之職宗正有判寺一員太僕職屬群牧司有制置使一員以樞府及學士領之有判官一員大理則糾察在京刑獄是其職也鴻臚歸客省四方館光祿司農太府其職皆𨽻三司衛尉無所總轄其職分為金吾銜仗司其環衛之任分𨽻三衙皇城司故此五寺别無置司并主判官員祕書省即昭文館史館集賢院謂之三館與祕閣同𨽻本省有直館直院直閣校理館閣校勘謂之館職初除於本省供職一年出補內外任使昭文史館有直館集賢院有學士修撰直院校理祕閣有直閣校理又有判祕書省祕閣一員專掌省事國子監有判其資淺者為同知或同管即祭酒司業之任博士轉而為直講將作少府軍器三監之職並屬三司而都水無常員遇興役即差官亦係三司差人逮熙寧興役法水利方置判司農寺并司農寺丞員闕建大理寺方置權發遣大理少卿公事二員職掌官外有學士待制等員惟觀文殿大學士仁宗朝以賈昌朝辭使相特建此職仍詔非曾任宰相不除觀文殿學士資政殿大學士資政殿學士端明殿學士翰林侍讀侍講學士龍圖天章寶文閣學士直學士樞密直學士三閣待制皆為侍從清望之選並無職掌多帶職以領在內省府寺監在外藩方任使自資政以上多以授二府舊臣此國朝舊制如此元豐初始命置局詳定官制在內設尚書省置令左右僕射門下省置侍中中書省置令已上為宰相而兩令侍中不除人尚書有左右丞門下中書各有侍郎樞密院有知樞密院事同知樞密院事已上為執政官尚書六部吏部一尚書二侍郎分掌四選吏部司封司勳考功屬焉戶部一尚書二侍郎分左右曹而戶部度支金部倉部屬焉禮部一尚書一侍郎禮部祠部主客膳部屬焉兵部一尚書一侍郎兵部職方駕部庫部屬焉刑部一尚書一侍郎刑部都官比部司門屬焉工部一尚書一侍郎工部屯田虞部水部屬焉每部郎官二員知州已上資序及階官朝議大夫已上為郎官餘員外惟吏部戶部刑部郎官各置四員以其劇曹也左右司郎官各二員通糾六部號都司專佐宰相理省事謂之宰屬翰林學士定以二員為額久次者為承直御史臺官名如舊制而除知雜事及裏行之名門下後省置左散騎常侍而不除人給事中四員起居即一員左諫議大夫左司諫左正言寓焉中書後省置右散騎常侍而不除人中書舍人六員起居舍人一員右諫議大夫右司諫右正言寓焉號兩省官祕書省有監少監丞郎校書郎正字著作郎佐郎寓焉號館職罷直館院校理等員闕惟存修撰直祕閣號貼職而别領在外任使九寺太常宗正光祿衛尉太僕大理鴻臚司農太府有卿少卿丞簿太常復置博士太祝奉禮協律郎大理則置寺正評事司直四監將作少府軍器置監少監丞簿南外北外丞已上為寺監官國子監有祭酒司業丞簿太學有博士正録已上為學官謂職事官罷三司使副及諸主判官而其職分𨽻諸省部寺監群牧司使名不除而不命官其職皆屬太僕寺以太師太傅太保為三師太尉司徒司空為三公皆論道之官無專領之職為宰相兼官以開府儀同三司易節度使同中書門下平章事號為使相以唐文散階換省部寺監官歸釐本職號階官為寄祿官而食其俸以領內外任使以特進易左右僕射金紫光祿大夫易吏部尚書銀青光祿大夫易五曹尚書光祿大夫易左右丞正議大夫易列曹侍郎通議大夫易給舍太中大夫易左右諌議大夫中大夫易祕書監殿中監中散大夫易大卿監朝議大夫易少卿監朝請朝散朝奉大夫易郎中朝請朝散朝奉郎易員外郎承議郎易太常國子博士奉議郎易太常祕書監中丞通直郎易太子中允中舍左右贊善大夫宣德郎易寺丞宣義即易監丞承事郎易大理評事承奉郎易太常寺太祝奉禮郎承務郎易寺監主簿自承務郎至特進為寄祿官大學士至待制其名皆存以為二府罷政省部長二給舍諫議補外之職集賢殿修撰直龍圖閣直祕閣號貼職庶僚領在外繁劇任使者帶之削去憲銜檢校官留勳十二轉自通直郎以上帶入銜此為元豐新制官名即循唐舊典職掌亦倣周禮六官之法也黃履翁論宋官制本朝官制有二曰國初舊制曰元豐新制舊制之善者則官職分治脉絡相統祿秩有階遷轉得序也新制之善者則省部諸司各有職掌郎曹等官不寄虛名也蓋國初懲藩鎮之弊朝官文臣多領外寄九寺三監皆為空官特以是寄祿秩班序位而已向所典之事則别有職存也至元豐八年取唐六典與廷臣博議踰二年而法成本末次第歷歷條舉或正而治之或旁而治之或統而治之向者省部寺監之無職今其職舉矣向者郎曹卿監之虛官今其官定矣此元豐新制不為不善也王鏊震澤長語宋初承五代三省無專職臺省寺監無定員類以它官主判三省長官不預朝政六曹不釐本務給舍不領本職諫議無言責起居不注記司諫正言非特㫖供職亦不任諫諍以登臺閣禁從為顯宦不以官之遲速為榮滯以差遣要劇為貴途不以勳階爵邑為輕重名之不正未有如宋之甚者也至元豐間始以唐六典而定官制又曰宋時兩制皆文學名天下者始應其選雖一甲三人亦出知外任然後召試欲其知民事也其餘應試率皆一時有盛名者所謂制科是也故文學之士不至遺棄又通知民間利病以其曾試於外也我朝翰林侍從亦兩制之類率用高科一甲三人終不外任庶吉士每科或選或不選立法之意本欲使之種學績文以為異日公卿之儲士既預此選自可坐致清要不復苦心於學又不通知民事天下以文學名者不復得預遺才頗多故不若制科之為得也宋登科記總目太祖建隆元年進士十九人榜首楊礪二年進士十一人榜首張去華三年進士十五人榜首馬適四年進士八人榜首蘇德祥乾德二年進士八人榜首李景陽制科一人三年進士一人榜首劉察四年進士六人榜首李肅制科二人五年進士十人榜首劉䝉叟六年進士十一人榜首柴成務開寶二年進士七人榜首安德裕三年進士八人榜首張拱賜十五舉未及第人司馬浦等一百六人本科出身四年進士十人榜首劉寅五年進士十一人榜首安守亮六年進士十一人榜首宋凖再試取十六人落一人諸科九十六人七年停貢舉八年進士三十一人省元王式狀元王嗣宗諸科二十四人九年停貢舉太宗太平興國二年進士一百九人省元闕狀元吕䝉正諸科二百七人十五舉以上一百八十四人凡五百餘人三年進士七十四人省元闕狀元胡旦諸科八十二人四年停貢舉五年進士一百二十一人省元闕狀元蘇易簡諸科五百三十四人六年七年停貢舉八年進士二百