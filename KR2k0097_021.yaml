body:
  text: 汴京遺蹟志卷二十一明李濂撰藝文八五言古詩詠懷詩魏阮籍徘徊蓬池上還顧望大梁緑水揚洪波曠野莽茫茫走獸交橫馳飛鳥相隨翔是時鶉火中日月正相望朔風厲嚴寒隂氣下微霜羈旅無疇匹俯仰懷哀傷小人計其功君子道其常豈惜終憔悴詠言著斯章效阮公體梁江淹昔余登大梁西南望洪河時寒原野曠風急霜露多仲冬正慘切日月少光華落葉縱橫起飛鳥時相過搔首廣川隂懷歸思如何常願反初服閒步潁水阿遣懷唐杜甫昔我遊宋中惟梁孝王都名今陳留亞劇則貝魏俱邑中九萬家髙棟照通衢舟車半天下主客多歡娛白刃讎不義黃金傾有無殺人紅塵裏報答在斯須憶與髙李輩論交入酒壚兩公壯藻思得我色敷腴氣酣登吹臺懷古視平蕪芒碭雲一去鴈鶩空相呼先帝正好武寰海未凋枯猛將收西域長㦸破林胡百萬攻一城獻捷不云輸組練棄如泥尺土負百夫拓境功未已元和辭大爐亂離朋友盡合沓嵗月徂吾衰將焉託存殁再嗚呼蕭條益堪愧獨在天一隅乘黃已去矣凡馬徒區區不復有顔鮑繫舟臥荆巫臨餐吐更食常恐違撫孤按唐書本傳云甫嘗從李白及髙適過汴州酒酣登吹臺慷慨懷古人莫測也公作是詩時髙李已沒末句撫孤蓋謂髙李之後也宋中四首髙適梁王昔全盛賔客復多才悠悠一千年陳跡惟髙臺寂寞向秋草悲風千里來二朝臨孟諸上忽見芒碭間赤帝終已矣白雲長不還時清更何有禾黍遍空山三梁苑白日暮梁山秋草時君王不可見修竹令人悲九月桑葉盡寒風鳴樹枝四登髙臨舊國懷古對窮秋落日鴻鴈度寒城砧杵愁昔賢不復有行矣莫淹留大梁行唐堯客客有成都來為我彈鳴琴前彈别鶴操後奏大梁吟大梁傷客情荒臺對古城版築有陳跡歌吹無遺聲雄哉魏公子疇昔好羅英秀士三千人煌煌象列星金槌奪晉鄙白刃刎侯嬴邯鄲救趙北函谷走秦兵君王暗且昧忠信莫之明間諜忽來及雄圖靡克成千齡萬化盡但見秋水清舊國多狐兔夷門荆棘生蒼梧彩雲沒汳浦緑池平聞有東山去蕭蕭班馬鳴河洲搴宿莽日夕淚沾纓因之唁公子慷慨歌此行汴州離亂後憶韓愈李翺孟郊㑹合一時笑别離三斷腸殘花不待風春晝各飛揚歡去收不得悲來難自防孤門清館夜獨臥明月牀忠直血白刃道路聲倉皇食恩三千士一日為豺狼海島士皆直夷門士非良人心既不類天道亦反常自殺與彼殺未知何者臧寄大梁諸友韋應物分竹守南譙弭節過梁池雄都衆君子出餞擁河湄燕謔始云洽方舟己解維一為風水便但見山川馳昨日次睢陽今夕宿符離雲樹愴重疊煙波念還期相敦在勤事海內方勞師大梁亭㑹李四栖梧作韋應物梁王昔愛才千古化不泯至今蓬池上逺集八方賔車馬平明合城郭滿埃塵逢君一相許豈要平生親入仕三十載如何獨未伸英聲久籍籍臺閣多故人置酒發清彈相與樂佳辰孤亭得長望白日下廣津富貴良可求朅來西入秦秋風旦夕起安得客梁陳汴州别韓愈孟郊不飲濁水瀾空滯此汴河坐見繞岸氷盡為還海波四時不在家敝服斷線多逺客獨憔悴春英落婆娑汴水饒曲流野桑無直柯但為君子心歎息終匪他黃河宋梅堯臣積石導淵源沄沄瀉崑閬龍門自吞險鯨海終涵量怒洑生萬渦驚流非一狀淺深殊可測激射無時壯常苦事隄防何曽息波浪川氣迷逺山沙痕落秋漲槎沫夜浮光舟人朝發唱洪梁畫鷁連古戍蒼崖向浴鳥不知清夕陽空在望誰當大雪天走馬堅冰上汴渠梅堯臣我實山野人不識經濟宜聞歌汴渠勞謾綴汴渠詩汴水源本清隨分黃河支濁流方已盛清𣲖不可推天王居大梁龍舉雲必隨設無通舟航百貨當陸馳人肩牛騾驢定應無完皮茍欲東南蘇要省聚斂為兵衛詎能削乃須雄京師今來雖太平盡罷未是時願循祖宗規勿益群息之譬竭兩川賦豈由此水施縱有三峽下率皆粗冗資慎莫尤汴渠非渠取膏脂劉原甫觀相國寺淨土楊惠之塑像吳道子畫又越僧鼓琴閩僧寫真豫解其詫梅堯臣吾儕來都下將踰三十春不聞此畫塑想子得亦新兹寺臨大道常多車馬塵設如前日手晦昧己惑人曷分今與古曷辨僞與真閩緇圖鳳姿越釋彈龍唇但知五彩爛徒謂五音淳孰識商聲髙孰驚眸子神不能評譜品索玉翻成珉二君才調髙言若羽翮振將令尋常工千嵗傳不泯同次道游相國寺買得翠玉罌一枚梅堯臣古寺老柏下叟貨翠玉罌獸足面以立瓜腹肩而平虛能一勺容色與藍水并我獨何為者忽見目以驚家無半鍾畜不吝百金輕都人莫識寶白日雙眼盲汴堤鶯梅堯臣古堤多長榆落莢鵝眼小其下迅黃流其上鳴黃鳥安知舟中人黑鬢日已少千里歸大梁玉笙聞䆗窕終朝不成曲幽響在林表莫羡沙路行金鞭馳裊裊過開封古城梅堯臣荒城臨殘日雞犬三四家豈復古阡陌但問新桑麻頽垣下多穴所窟狐與蛇漢兵墮銅鏃青血為土花同江鄰幾龔輔之登吹臺有感梅堯臣在昔梁惠王築臺聚歌吹笙簫無復聞黃土化珠翠當時秦兵强今亦歸厚地我與諸賢良舉酒莫言醉曾誰問孟軻空自有仁義聞子美次道師厚登天清寺塔梅堯臣二三君少壯走上浮圖巔何為苦思我平步猶不前茍得從而登兩股應已攣復想下時險喘汗頭目旋不如且安坐休用窺雲煙送逐客王勝之不及遂至屠兒原梅堯臣犯霜出國門送客客已去猶意行未逺策馬過寒戍川長不見人沙沒前岡路始聞雲木深忽逢朱亥墓金鎚一報恩義烈垂竹素何須文學為寄語長沙傅和公達過潘樓觀七夕市司馬光織女雖七襄不能成報章無巧可乞汝世人空自狂帝城秋色新滿市翠帟張僞物踰百種爛熳侵數坊誰家油壁車金碧照面光土偶長尺餘買之珠一囊安知杼軸勞何物為蠶桑紛華不足恱浮侈真可傷牟駝岡閲馬江休復牧馬散近坰閲視乘髙秋駝岡似沙苑堆阜帶川洲坡陀故梁城縈薄西南陬連棚映林樾星羅倚層丘回風吹陳雲奔騰歘來游野性脫羈􅎗飲齕遂所求腹幹頗肥張鬱怒何彪休群驅驟麋鹿逸勢凌蛟虬軍戎選輕捷和鑾御調柔毛物有千名衆美歸驊騮梁王愁思臺佛剎居上頭朅來一憑聎遺墟莽悠悠信陵骨已朽巖穴誰見收當時英豪輩事逐東波流置酒臨風軒聊以紓煩憂介亭孫覺真人昔未起奔鹿駭四方連延天目山兩乳百里長有地跨江海無種生侯王中霄燎穹旻列石表壇場朱旗大梁野英氣吞八荒寥寥百年後故物亦已亡所餘彼巉巖峯巔屹相望主人承明老星斗工文章築亭紫霄上坐客蒼株旁攀雲弄明月曉星生扶桑禹山隔波濤簡書永埋藏願逢希夷使水土還故常朱亥墓蘇軾昔日朱公子雄豪不可追今來遊故國大冢稱屠兒平日輕公相千金棄若遺梁人不好事名字寄當時魯史盜齊豹求名誰復知慎無怨世俗猶不遭仲尼曉放汴舟黃庭堅秋聲滿山河行李在梁宋川塗事雞鳴身亦逐群動霜清魚下流橘柚入包貢又持三十口去作江南夢汴河雨後呈同行馬祕書陳師道雨霽晚虹收河堤淨如掃清隂拂人樹翠色垂流草漢漕走王都華言雜夷獠時方同馬生野泊聊論道汴水斗減舟不能進因寄彥國舍人陳師道朝落幾寸水暮長幾寸沙深灘鰲背出淺浪龍鱗斜秋風忽又惡越舫嗟初閣坐想掖垣人猶如在寥廓八角井劉敞誰鑿八角井不方亦不圓此地饒美水此井獨苦泉泉甘常不渴泉苦更永年浪得世上名對之還慨然信陵館金雷琯閒過信陵館有懷信陵君君去日已逺誰憐抱關人徑携一壺酒往酹公子墳墳科久已平其木幾為薪泉扉鎖長夜千載不復晨昔為賢俊游今為狐兔鄰豪貴竟安在念之心如焚有生㑹歸盡但恐後無聞此意不可必且醉梁園春大梁懷古明劉基昔有信陵君乃在大梁城親為貴介弟位冠諸侯卿傾家待國士倒屣延豪英詣門謁朱亥虗左上侯嬴袖鎚奪兵符救趙蜚英聲河外走蒙驁宗社賴扶傾于今不可見寂寞傷人情二在昔信陵君勞謙實宏度好士天下稀賔客逺傾慕救趙奪兵符掃清邯鄲霧歸來全大梁秦甲讋東顧魏王木偶人朽心自成蠧讒言一以入危石不可據日落西河隂歌章怨零露落日汴隄上汪廣洋落日汴隄上奄忽浮雲馳草樹遍原野茫茫天四垂上有鳥嚶嚶下有冢纍纍世故念衰絶焉知埋者誰孤隋昔撫運恃安忘險危乃以耳目私遂令骨肉疲骨肉日以疲耳目日以虧平陸變滄海中途歌黍離持此鬱冲襟涕下莫能揮青城李禎炎宋尚簡質郊丘布為墻九門謹闔闢萬卒嚴周防暫置弗勞杵權施豈須隍綿延逮宣政驕盈更典章版築易縷制墉壕固金湯衮龍狩沙磧泥馬奔錢塘奢侈諒宜戒播辱尤所傷陶匏薦明水維馨仰前王登大梁故城李夢陽登髙與處卑由來慮多端登髙尚寡悰處卑焉能歡以兹歷荆榛褰衣躡巑岏土壕帶隂風樓櫓危急湍崖岸苦崩奔葭葦何漫漫周望鮮故物俯察多憂嘆濳魚葺其鱗驚鳥無停翰雲浮誠不任淵沉諒何難終附岩穴棲斯地非我安艮嶽十六韻李夢陽城北三土丘揭􅠣對堤口黃蘆莽瑟瑟疾風鳴衰柳云是宋家嶽豪盛今頽朽我聞帝王富東京實罕有鑿池通嵌竇移山媚户牖岌嶪樓觀合歘吸風雷走崖隂翡翠吟海窟蛟鼉吼燕趙矜麗人搜剔充妃后君臣互沉湎斯道詎能久嗚呼花石費銖錙盡官取北風卷黃屋此地竟誰守迢迢五國城二龍回其首向使任忠良邦國得滅否余來值寒暮悲歌坐林藪狐狸竄古壘破瓦沒藜莠孤城峙我前蒼蒼日將酉正德四年七夕上方寺作李夢陽逸人厭囂俗達士樂閒勝乃兹城中林而非車馬徑積雨豁新霽雲石掩秋映微陽下孤塔潦水夾明鏡巳疑塵寰隔况覩蓮方淨豈惟慕真覺亦以叩詮證𤣥蟬共西夕浮雲本無定戊寅早春上方寺李夢陽逾年罔涉兹過之門巷疑匪畏霜露辰肯與春事期徑蘭芊故叢苑松發新蕤陟丘念廢居升危眺回漪抱以幽曠豁情緣悽愴移驚風遞虛塔振振空廊悲得遣復安較勞生良爾嗤梁臺懷古五首李濂晨出南薰門駕言登吹臺鄒枚骨已朽梁王安在哉吁嗟歌舞地樵牧令人哀二世運幾興廢宮殿皆蕪沒汴水無停波嵗月去超忽不見古時人荒臺上新月三梁苑久云廢梁臺亦已頽當日修竹園寂寞狐兔馳秋風吹禾黍異代使人悲四我登梁王臺臺平臨古陌夷門一夜雨秋草滿川碧不聞歌吹聲孤遊旅愁積五柳色古臺煙遺宮今作田梁州三月暮楊花飛白綿載酒登遊日猶疑賦雪天汴京遺蹟志卷二十一
