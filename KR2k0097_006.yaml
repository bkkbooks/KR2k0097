body:
  text: 汴京遺蹟志卷六明李濂撰河渠二汴河汴河在今縣治南三十五步即浚儀渠也源出滎陽縣大周山合京索須鄭四水東經京城內合蔡河名茛蕩渠又名通濟渠自隋大業初疏通濟渠引黃河通淮至唐改名廣濟渠宋都大梁諸水莫此為重其淺深有度置官以司之都水監總察之每嵗自春及冬常於河口均調水勢止深六尺以通行重載為凖嵗漕江淮湖浙米數百萬及運東南之産百物衆寶不可勝計又下西山之薪炭內外仰給焉然大河向背不常故河口屢易易則度地形相水勢為口以逆之遇春首輒調數州之民勞費不資役者多溺死吏又侵漁為奸而京師常有決溢之虞太祖建隆三年十月詔緣河州縣長吏常以春首課民夾岸植榆柳以固堤防太宗淳化二年六月汴水決浚儀縣帝乘步輦出乾元門宰相樞密迎謁帝曰東京養甲兵數十萬居人百萬家天下轉漕仰給在此一渠水朕安得不顧車駕入泥淖中行百餘步從臣震恐殿前都指揮使戴興叩頭懇請回馭遂捧輦出泥淖中詔興督步卒數千塞之日未旰水勢稍定帝始就次太官進膳親王近臣皆泥濘沾衣知縣宋炎亡匿不敢出特赦其罪至道元年九月下詔問侍臣汴水疏鑿之由令參知政事張洎講求其事以聞其後元世祖至元二十七年河決祥符之義唐灣自汴城迤東至陳留杞縣汴河及堤皆為所淤而水則入於蔡河洪武二十四年黃河改徙而蔡河亦淤塞矣今省城延慶觀前有小磚橋汴渠故蹟微存俗名臭河兒張洎論汴水疏鑿之由禹導河自積石至龍門南至華隂東至砥柱又東至于孟津東過洛汭至于大伾即今成臯是也或云黎陽山也禹以大河流泛中國為害最甚乃於貝丘疏二渠以分水勢一渠自舞陽縣東引入漯水其水東北流至千乘縣入海即今黃河是也一渠疏畎引傍西山以東北形髙敝壞堤水勢不便流溢夾右碣石入于渤海書所謂北過洚水至于大陸洚水即濁漳大陸則邢州巨鹿澤播為九河同為逆河入于海河自魏郡貴鄉縣界分為九道下至滄州今為一河言逆河者謂與河水往復相承受也齊桓公塞以廣田居惟一河存焉今其東界至莽梧河是也禹又於滎澤下分大河為隂溝引注東南以通淮泗至大梁浚儀縣西北復分為二渠一渠元經陽武縣中牟臺下為官渡水一渠始皇疏鑿以灌魏郡為之鴻溝茛蕩渠自滎陽出五池口來注之其鴻溝即出河之溝亦曰茛蕩渠漢明帝時樂浪人王景謁者王吳始作浚儀渠蓋循河溝故瀆也渠成流注浚儀故以浚儀縣為名靈帝建寧四年於敖城西北壘石為門以遏渠口故世謂之石門渠外東合濟水濟與河渠渾濤東注至敖山北渠水至此又兼邲之水即春秋晉楚戰于邲邲又音汳即汴字古人避反字改從汴字渠水又東經滎陽北旃然水自縣東流入汴水鄭州滎陽縣西二十里三皇山上有二廣武城二城相去百餘步汴水自兩城間小澗中東流而出而濟流自兹乃絶惟汴渠首受旃然水謂之鴻渠東晉太和中桓溫北伐前燕將通之不果義熙十三年劉裕西征姚秦復浚此渠始有湍流奔注而岸善潰塞裕更疏鑿而漕運焉隋煬帝大業三年詔尚書左丞皇甫誼發河南男女百萬開汴水起滎澤入淮千餘里乃為通濟渠又發淮南兵夫十餘萬開䢴溝自山陽縣至於揚子江三百餘里水面濶四十步而後行幸焉自後天下利於轉輸昔孝文時賈誼言漢以江淮為奉地謂魚鹽穀帛多出東南至五鳳中耿壽昌奏故事嵗增關東穀四百萬斛以給京師亦多自此渠漕運唐初改通濟渠為廣濟渠開元中黃門侍郎平章事裴耀卿言江淮租船自長淮西北泝鴻溝轉相輸納於河隂含嘉太原等倉凡三年運米七百萬石實利涉於此開元末河南採訪使汴州刺史齊浣以江淮漕運經淮水波濤有沉損遂浚廣濟渠下流自泗州虹縣至楚州淮隂縣北八十里合於淮踰時畢功既而水流迅急行旅艱險尋乃廢停却由舊河德宗朝嵗漕運江淮米四十萬石以益關中時叛將李正已田恱皆分軍守徐州臨渦口梁崇義阻兵襄鄧南北漕引皆絶於是水陸運使杜佑請改漕路自浚儀西十里疏其南崖引流入琵琶溝經蔡河至陳州合潁水是秦漢故道以官漕久不由此故填淤不通若畎流培岸則功用甚寡又廬壽之間有水道而平岡亘其中曰雞鳴山佑請疏其兩端皆可通舟其間登陸四十里而已則江湖黔嶺蜀漢之粟可方舟而下由是白沙趨東關經廬壽浮潁涉蔡歷琵琶溝入汴河不復經泝淮之險經於舊路二千里功寡利博朝議將行而徐州順命淮路乃通至國家膺圖受命以大梁四方所湊天下之樞可以臨制四海故卜京邑而定都漢髙帝云吾以羽檄召天下兵未至孝文又云吾初即位不欲出虎符召郡國兵即知兵甲在外也惟有南北軍期門郎羽林孤兒以備天子扈從藩衛之用唐承隋制置十二衛府兵皆農夫也及罷府兵始置神武神策為禁軍不過三數萬人亦以備扈從藩衛而已故祿山犯闕驅市人而戰德宗䝉塵扈駕四百餘騎甲兵皆在郡國額軍存而可舉者除河朔三鎮外太原青社各十萬人邠寧宣武各六萬人潞徐荆揚各五萬人襄宣壽鎮海各二萬人自餘觀察團練據要害之地者不下萬人今天下甲卒數十萬衆戰馬數十萬匹並萃京師悉集七亡國之士民於輦下比漢唐京邑民庶十倍甸服時有水旱不至艱歉者有惠民金水五丈汴水等四渠派引脈分咸㑹天邑舳艫相接贍給公私所以無匱乏惟汴水橫亘國中首承大河漕引江湖利盡南海半天下之財賦并山澤之百貨悉由此路而進然則禹力疏鑿以分水勢煬帝開甽以奉巡遊雖數湮廢而通流不絶於百代之下終為國家之用者其上天之意乎按洎言汴河疏鑿之由最為明悉故備録之以識舊蹟張方平論汴河臣竊惟今之京師古謂陳留天下四衝八達之地者也非如函秦天府百二之固洛宅九州之中表裏山河形勝足恃自唐末朱溫受封於梁因而建都至於石晉割幽薊之地以入契丹遂與强敵共平原之利故五代爭奮敵承其弊其患由乎畿甸無藩籬之限本根無所庇也祖宗受命規模卑狹不還周漢之舊而梁氏是因豈樂是而處之勢有所不獲已者大體利漕運而贍師旅依重師而為國也則是今日之勢國依兵而立以食為命食以漕運為本漕運以河渠為主國初浚河渠三道通京城漕運自後立定上供年額汴河斛㪷六百萬石廣濟河六十二萬石惠民河六十萬石廣濟河所運多是雜色粟豆但充口食馬料惠民河所運止給太康咸平尉氏等縣軍糧而已惟汴河所運一色粳米相兼小麥此乃太倉蓄積之實今仰食於官廩者不惟三軍至於京師士庶以億萬計太半待飽於軍稍之餘故國家於漕事至急至重夫京大也師衆也大衆所聚故謂之京師有食則京師可立汴河廢則大衆不可聚汴河之於京城乃是建國之本非可與區區溝洫水利同言也近嵗已罷廣濟河而惠民河斛斗不入大倉大衆之命惟汴河是賴近嵗陳說利害以汴河為議者多矣臣恐議者不已屢作數更必致汴河日失其舊國家大計殊非小事惟陛下特回聖鑒深賜省察留神逺慮以固基本熙寧六年上時知應天府按方平之言為王安石發也間嘗考求汴河之渠漫不可復今所謂孫家渡河者亦自滎澤而下引河為渠由朱􅋖鎮東南達於淮泗似亦汴渠之遺意特以不近都㑹而轉漕非其所資故任其淺涸而不為之疏濬耳梁燾乞開舊日汴口臣愚嘗求世務之急得諸道路通汴之實始聞其說則可喜及考其事則可懼竊以廣武山之北即大河故道河常往來其間夏秋漲溢每抵山下舊來洛水至此流入於河後欲導洛以趨汴渠乃乘河未漲就嫩灘之上峻起東西堤闢大河於堤北攘其地以引洛水中間缺為斗門以通舟楫其實導河水助洛之淺涸也洛水本清今汴常黃流是洛不足以行汴而所以能行者附大河之餘波也增廣武三掃之備竭京西所有不足以為支費轉運司每每請於朝廷勢不能不為之應副切計自緣清汴之費其夫無慮數百萬計從來上下習於欺罔之姦朝廷惑於安流之說稅屋之利恬不以為慮殊不知新沙疏弱力不能制悍河水勢一則爛熳潰散將使怒波循流而下直冒京師其患豈勝言邪此其大可懼者是甘以數百萬日增之費養異時京師萬一之患亦已誤矣夫嵗傾重費以坐待其患何若折其奔衝以終除其害哉為今日之計宜復為汴口依舊引大河一支啓閉以時還祖宗百年以來潤養生民之賜誠為得策汴口復成則免廣武潰注以長為京師之安省數百萬之費以紓京西生靈之困牽大河水勢以解河北決溢之災便東南漕運以蠲重載留滯之弊時節啓閉以除蹙凌打凌之苦通江淮八路商賈大舶以供京師之饒為甚大之利者六此不可忽也惟拆去兩岸舍屋盡廢僦錢為害者一而不甚大所謂損小費以成大利也臣之所言特其大略爾至於考究本末措置纎悉在朝廷擇通習水利之臣付之無牽浮議責其成功伏望聖慈面詔大臣商擇而施行之事繫國體願留宸心元祐四年上先是元豐元年西頭供奉官張從惠上言去年七月黃河暴漲異於常年水落而河稍北去距廣武山麓七里退灘髙闊可鑿為渠引洛入汴萬世之利也范子淵時為都水監丞畫十利以獻上遣燾行視利害還言不便又命內侍宋用臣往度用臣還言可為於是詔用臣為都大提舉導洛通汴勞民動衆費用不資燾時為御史中丞復上此議云沈括夢溪筆談國朝汴渠發京畿輔郡三十餘縣夫嵗一浚祥符中閣門祗候使臣謝德權領治京畿溝洫權借浚汴夫自是後三嵗一浚始令京畿民官皆兼溝洫河道以為常職久之治溝洫之工漸弛邑官徒帶空名而汴渠有二十年不浚嵗嵗堙澱異時京師溝渠之水皆入汴舊尚書省都堂壁記云疏治八渠南入汴水是也自汴流堙澱京城東水門下至雍丘襄邑河底皆髙出隄外平地一丈二尺餘自汴隄下瞰民居如在深谷熙寧中議改疏洛水入汴余嘗因出使按行汴渠自京師上善門量至泗州淮口凡八百四十里一百三十步京師地勢比泗州凡髙十九丈四尺八寸六分於京城東數里白渠中穿井至三丈方見舊底驗量地勢用水平望尺幹尺量之不能無小差汴渠隄外皆是出土故溝水令相通時為一堰節其水候水平其上漸淺涸則又為一堰相齒如階陛乃量堰之上下水面相髙下之數㑹之乃得地勢髙下之實王文正公筆録汴渠派分洪河自唐迄今皆以為莫大之利然迹其事實抑有深害何哉凡梁宋之地畎澮之利湊流此渠以成其大至隋煬將幸江都遂析黃河之流築左右隄三百餘里舊所湊水悉為橫絶散無所故宋亳之地遂成沮洳卑濕且昔之安流今乃湍悍覆舟之患十有二三昔之漕運冬夏無限今則春開秋閉嵗中漕運止得半載昔之泝沿兩無艱阻今則逆流而上乃重載而行其為難也甚矣沿流而下即虛舟而往其為利也背矣矧自天子建都而汴水貫都東下每嵗霖㴻決溢為慮由斯觀之其利安在然歷世浸逺詎可卒圖異日明哲之士開悟積惑言復曩迹始信兹言之不謬也僧文瑩玉壺清話周世宗顯德中遣周景大濬汴口景知汴口既濬舟楫無壅將有淮浙巨商糧斛萬貨臨汴無委泊之地諷世宗乞令許京城民環汴栽榆柳起臺榭以為都㑹之壯世宗許之景踞汴流中起巨樓十二間方運斤世宗輦輅過因問之知景所造頗喜賜酒犒其工不寤其規利也景後邀巨貨於樓山積波委嵗入數萬計云小人之黷貨罔上如此陳𫝊良論汴河最重本朝定都於汴漕運之法分為四路江南淮南浙東西荆湖南北六路之粟自淮入汴至京師陜西之粟自三門白波轉黃河入汴至京師陳蔡之粟自閔河蔡河入汴至京師京東之粟自五文河歷陳濟及鄆至京師四河所運惟汴河為最重陳霆兩山墨談宿州至靈壁縣循古岸而行問之乃汴堤下即汴河也煬帝鑿此以幸江都世代變遷故道湮塞宋濬之以通運餉而東南舟車之赴汴京者必由於此米芾所謂船頭出浪翠屏間蓋指此河也今嵗久復湮且種藝成畝矣堤間多臥古峯石空嵌秀溜蒼翠可掬亦有甚大者相傳謂宋營艮嶽取石於靈壁綱運未訖而汴都被兵遂棄於此千載尤物撫之可浩歎云汴京遺蹟志卷六
