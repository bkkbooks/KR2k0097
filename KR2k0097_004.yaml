body:
  text: 汴京遺蹟志卷四明李濂撰山嶽夷山夷山在裏城內安遠門之東以山之平夷而得名也亦名夷門山古有夷門乃侯嬴監守之處史記云夷門汴之城東門也而安遠門乃汴之北門今北門內地勢頗髙似是夷山而司馬遷乃云東門意者古今城垣改徙不一今莫可考矣艮嶽壽山艮嶽壽山在汴故城東北隅初徽宗未有嗣道士劉混康以法籙符水出入禁中言京城西北隅地協堪輿倘形勢加以少髙當有多男之祥始命為數仞岡阜巳而後宫生子漸多帝甚喜於是命戶部侍郎孟揆於上清寶籙宫之東築山象餘杭之鳳凰山號曰萬嵗山既成更名曰艮嶽周回十餘里其最髙一峯九十步上有介亭分東西二嶺直接南山山之東有蕚緑華堂書館八仙館紫石岩棲真磴覽秀軒龍吟堂山之南則壽山兩峰並峙有鴈池噰噰亭山之西有藥寮西莊巢雲亭白龍沜濯龍峽蟠秀練光跨雲三亭羅漢岩又西有萬松嶺嶺畔有倚翠樓上下設兩關關下有平地鑿大方沼沼中作兩洲東為蘆渚浮陽亭西為梅渚雪浪亭西流為鳯池東出為鴈池中分二館東曰流碧西曰環山有巢鳳閣三秀堂東池後有揮雪亭後由磴道上至介亭亭左有極目亭蕭森亭右有麗雪亭半山北俯景龍江引江之上流注山澗西行為潄瓊軒又行石間為煉丹凝真觀圜山亭下視江際見髙陽酒肆及清斯閣北岸有勝筠庵躡雲臺消閒館飛岑亭支流别為山莊為回溪又於南山之外為小山橫亘二里曰芙蓉城窮極巧妙而景龍江外則諸館舍尤精其北又因瑶華宫火取其地作大池名曲江池中有堂曰蓬壺東盡封丘門而止其西則自天波門橋引水直西殆半里江乃折南又折北折南者過閶闔門為復道通茂德帝姬宅折北者四五里屬之龍德宫既成帝自為艮嶽記以山在國之艮位故也嶽之正門名曰陽華故亦號陽華宫初朱勔於太湖取石髙廣數丈載以大舟挽以千夫鑿城斷橋毁堰拆閘數月乃至會得燕地因賜號昭功敷慶神運石立於萬嵗山其旁植兩檜一夭矯者名曰朝日升龍之檜一偃蹇者名曰卧雲伏龍之檜皆以玉牌填金字書之巖曰玉京獨秀太平巖峰曰慶雲萬態竒峰又作絳霄樓勢極髙峻盡工藝之巧其後羣閹興築不已於是山林巖壑日益髙深亭榭樓觀不可勝紀四方花竹竒石咸萃於斯珍禽異獸無不畢有矣宣和六年有芝産於艮嶽之萬壽峯改名壽嶽一曰壽山時蔡京子蔡攸有寵於帝進見無時嘗言於帝曰人主當以四海為家太平為娛豈徒自勞苦哉而帝遂數微行因令苑囿多為村居野店每秋風靜夜禽獸之聲四徹宛若山林陂澤之間識者知其不祥之兆帝晚嵗患苑囿之衆國力不能支數有厭惡語由是得稍止及金人再至圍城日久欽宗命取山禽水鳥十餘萬盡投之汴河聽其所之拆屋為薪鑿石為炮伐竹為篦籬又取大鹿數千頭悉殺之以啖衛士云徽宗御製艮嶽記略於是按圖度地庀徒僝工纍土積石設洞庭湖口絲溪仇池之深淵與泗濵林慮靈壁芙蓉之諸山最瓌竒特異瑤琨之石即姑蘇武林明越之壤荆楚江湘南粵之野移枇杷橙柚橘柑榔栝荔枝之朩金蛾玉羞虎耳鳳尾素馨渠那茉莉含笑之草不以土地之殊風氣之異悉生成長養於雕闌曲檻而穿石出罅岡連阜屬東西相望前後相續左山而右水沿溪而傍隴連綿而彌滿吞山懷谷其東則髙峰峙立其下植梅以萬數緑蕚承趺芬芳馥郁結構山根號蕚緑華堂又旁有承嵐崑雲之亭有屋內方外圓如半月是名書館又有八仙館屋圓如規又有紫石之巖祈真之磴攬秀之軒龍吟之堂其南則壽山嵯峨兩峰並峙列嶂如屏瀑布下入鴈池池水清泚漣漪鳧鴈浮泳水面棲息石間不可勝計其上亭曰噰噰北直絳霄樓峯巒崛起千疊萬復不知其幾十里而方廣兼數十里其西則參术杞菊黃精芎藭被山彌塢中號藥寮又禾麻菽麥黍豆粳秫築室若農家故名西莊上有亭曰巢雲髙出峯岫下視羣嶺若在掌上自南徂北行岡脊兩石間綿亘數里與東山相望水出石口噴薄飛注如獸面名之曰由龍淵濯龍峽蟠秀練光跨雲亭羅漢巖又西半山間樓曰倚翠青松蔽密布於前後號萬松嶺上下設兩關出關下平地有大方沼中有兩洲東為蘆渚亭曰浮陽西為梅渚亭曰雪浪沼水西流為鳳池東出為鴈池中分二館東曰流碧西曰環山館有閣曰巢鳳堂曰三秀以奉九華玉真安妃聖像東池後結棟山下曰揮雲亭復由磴道盤行縈曲捫石而上既而山絶路隔繼之以朩棧倚石排空周環曲折有蜀道之難躋攀至介亭此最髙於諸山前列巨石凡三丈許號排衙巧怪巉巖藤蘿蔓衍若龍若鳳不可殫窮麓雲半山居右極目蕭森居左北俯景龍江長波遠岸彌十餘里其上流注山澗西行潺湲為潄玉軒又行石間為煉丹亭凝真觀圜山亭下視水際見髙陽酒肆清斯閣北岸萬竹蒼翠蓊鬱仰不見天有勝筠菴躡雲臺消閒館飛岑亭無雜花異木四面皆竹也又支流為山莊為回溪自山蹊石罅搴條下平陸中立而四顧則巖峽洞穴亭閣樓觀喬朩茂草或髙或下或逺或近一出一入一榮一雕四面周匝徘徊而仰顧若在重山大壑深谷幽巖之底不知京邑空曠坦蕩而平夷也又不知郛郭環會紛萃而填委也真天造地設神謀化力非人所能為者此舉其梗槩焉耳僧祖秀陽華宫記政和初天子命作壽山艮嶽於禁城之東陬詔閹人董其役舟以載石輿以輦土驅散軍萬人築岡阜髙十餘仞增以太湖靈壁之石雄拔峭峙功奪天造石皆激怒抵觸若踶若齧牙角口鼻首尾爪距千態萬狀殫竒盡怪輔以磻朩癭藤雜以黃楊對青竹䕃其上又隨其斡旋之勢斬石開徑憑險則設磴道飛空則架棧閣仍於絶頂增髙樹以冠之搜遠方珍材盡天下蠧工絶伎而經始焉山之上下致四方珍禽竒獸動以億計猶以為未也鑿池為溪澗疊石為隄捍任其石之怪不加斧鑿因其餘土積而為山山骨暴露峯稜如削飄然有雲姿鶴態曰飛來峯髙於雉堞翻若長鯨腰徑百尺植梅萬本曰梅嶺接其餘岡種丹杏鴨腳曰杏岫又增土疊石間留隙穴以栽黃楊曰黃楊巘築修岡以植丁香積石其間從而設險曰丁香嶂又得頳石任其自然增而成山以椒蘭雜植於其下曰椒崖接水之末增土為大陂從東南側柏枝幹柔密揉之不斷葉葉為幢蓋鸞鶴蛟龍之狀動以萬數曰龍柏坡循壽山而西移竹成林復開小徑至百數步竹有同本而異幹者不可紀極皆四方珍貢又雜以對青竹十居八九曰斑竹麓又得紫石滑淨如削面徑數仞因而為山貼山卓立山隂置朩匱絶頂開深池車駕臨幸則驅水工登其頂開閘注水而為瀑布曰紫石壁又名瀑布屏從艮嶽之麓琢石為梯石皆溫潤净滑曰朝真磴又於洲上植芳朩以海棠冠之曰海棠川壽山之西别治園囿曰藥寮其宫室臺榭卓然著聞者曰瓊津殿絳霄樓蕚緑華堂築臺髙千仞周覽都城近若指顧造碧虛洞天萬山環之開三洞為品字門以通前後苑建八角亭於其中央榱椽忩楹皆以瑪瑙石間之其地琢為龍礎導景龍江東出安逺門以備龍舟行幸東西擷景二園西則溯舟造景龍門以幸曲江池亭復自瀟湘江亭開閘通金波門北幸擷芳苑堤外築疊衛之瀕水蒔絳桃海棠芙蓉垂楊略無隙地又於舊地作野店麓治農圃開東西二關夾懸巖磴道隘迫石多峯稜過者膽戰股栗凡自苑中登羣峰所出入者此二關而已又為勝遊六七曰躍龍澗漾春陂桃花閘鴈池迷真洞其餘勝跡不可殫紀工已落成上名之曰陽華宫然陽華大抵衆山環列於其中得平蕪數十頃以治園圃以闢宫門於西入徑廣於馳道左右大石皆林立僅百餘株以神運昭功敷慶萬壽峯而名之獨神運峯廣百圍髙六仞錫爵盤固侯居道之中束石為亭以庇之髙五十尺御製記文親書建三丈碑附於石之東南陬其餘石或若羣臣入侍帷幄正容凛若不可犯或戰栗若敬天威或奮然而趨又若傴僂趨進其怪狀餘態娛人者多矣上既恱之悉與賜號守吏以奎章畫列於石之陽其他軒榭庭徑各有巨石棋列星布竝與賜名惟神運峯前巨石以金飾其字餘皆青黛而已此所以第其甲乙者乃命羣峯其略曰朝日升龍望雲坐龍矯首玊龍萬壽老松棲霞捫參銜日吐月排雲衝斗雷門月窟蹲螭坐獅堆青凝碧金鼇玊龜疊翠獨秀棲煙軃雲風門雷穴玉秀玉竇鋭雲巢鳳雕琢渾成登封日觀蓬瀛須彌老人壽星卿雲瑞靄溜玉噴玉藴玉琢玉積玉疊玉叢秀而在於渚者曰翔鱗立於涘者曰舞仙獨踞洲中者曰玉麒麟冠於壽山者曰南屏小峯而附於池上者曰伏犀怒猊儀鳳烏龍立於沃泉者曰留雲宿霧又為藏煙谷滴翠巖摶雲屏積雪嶺其間黃石仆於亭際者曰抱犢天門又有大石二枚配神運峯異其居以壓衆石作亭庇之置於寰春堂者曰玉京獨秀太平巖置於蕚緑華堂者曰慶雲萬態竒峰括天下之美藏古今之勝於斯盡矣靖康元年閏十一月大梁陷都人相與排墻避敵於壽山艮嶽之巔時大雪新霽丘壑林塘宛若畫本凡天下之美古今之勝在焉祖秀周覽纍日咨嗟驚愕信天下之傑觀而天造有所未盡也明年春復遊陽華宫而民廢之矣張漫艮嶽記略徽宗登極之初皇嗣未廣有方士言京城東北隅地協堪輿但形勢稍下儻少增髙之則皇嗣繁衍矣上遂命土培其岡阜使稍加於舊而果有多男之應自後海內乂安朝廷無事上頗留意苑囿政和間遂即其地大興工役築山號壽山艮嶽命宦者梁師成專董其事時有朱勔者取浙中珍異花朩竹石以進號曰花石綱專置應奉局於平江所費動以億萬計調民搜巖剔藪幽隱不置一花一朩曽經黃封護視稍不謹則加之以罪斫山輦石雖江湖不測之淵力不可致者百計以出之至名曰神運舟楫相繼日夜不絶廣濟四指揮盡以充挽士猶不給時東南監司郡守二廣市舶率有應奉又有不待旨但進物至都計會宦者以獻者大率靈壁太湖諸石二浙竒竹異花登萊文石湖湘文竹四川佳果異朩之屬皆越海渡江鑿城郭而至後上亦知其擾稍加禁戢獨許朱勔及蔡攸入貢竭府庫之積聚萃天下之伎藝凡六載而始成亦呼為萬嵗山竒花美朩珍禽異獸莫不畢集飛樓傑觀雄偉瓌麗極於此矣越十年金人犯闕大雪盈尺詔令民任便斫伐為薪是日百姓奔往無慮十萬人臺榭宫室悉皆拆毁官不能禁也豫頃讀國史及諸傳記得其始末如此每恨其他不得而詳後得徽宗御製記文及蜀僧祖秀所作陽華宫記讀之所謂壽山艮嶽者森然在目也因各托其略以備遺忘云宋史筆斷論花石綱之害徽宗取敗之道固始於蔡京豐亨豫大之對然致天下之騷動敵兵之憑陵而身不能守其宗社者皆由朱勔花石綱之運有以促亡之耳初朱勔因蔡京以進上頗垂意花石勔初致黃楊三四本上已喜之後嵗嵗增加遂至舟船相繼號曰花石綱專置應奉局於平江每一發輒數百萬故花石至京師者一花費數千緍一石費數萬緍此花石綱之始也既而作萬嵗山運四方花竹竒石積纍二十餘年山林髙深千巖萬壑麋鹿成羣樓觀臺殿不可勝紀此花石綱之中也又為苑囿白屋不施五采多為村居野店之景又聚野獸禽鳥於苑囿中每秋風夜靜禽獸之聲四徹宛若川澤陂野之間識者以為不祥之兆此花石綱之末也徽宗於是盡棄國政乃與蔡京等酣歌達旦以燕以遊將為終身之樂焉故太學生鄧肅上十詩諷諫即詔放歸田里至於舟兵苦之羣聚為盜方臘稱亂浙土騷然然後罷花石綱使般運糧道於時雖有罷之之名而實無絶之之意蓋冀盜息而即復之耳故陳過庭乞罷冗官則貶於黃州張汝霖請罷進花果則貶於均州而蔡京等遊樂如故不數年間而尼堪斡里雅布乃引兵大入城邑多陷上心始懼遂欲罷之及罷非泛上供并延福宫西城租課內外製造局嗟乎君子有終身之憂而無一朝之患今冦盜既至禍亂已成乃始懼而修政不亦晚乎向使徽宗早信鄧肅之言誅蔡京戮朱勔竄童貫族王黼絶愈目之竒玩救勞苦之生民則尼堪斡里雅布雖猛如狼虎亦豈敢肆跋扈而蹈我中國哉惜乎徽宗悔悟已晚噬臍無及故雖有改轍之心而莫能為謀矣悲哉洪邁容齊續筆宣和間朱勔挾艮嶽花石之名以固寵利東南部使者郡守多出其門如徐鑄應安道王仲閎輩共濟其惡豪奪漁取士民家一石一朩稍堪玩者即領健卒直入其家用黃封表識或未即取而護視微不謹則加以大不恭罪及發行必撤屋決牆而出人有一物小異共指為不祥惟恐芟夷之不速楊戩李彥創汝州西城所任輝彥李士涣王滸毛孝立之徒亦助之發物供奉大抵類勔而又有甚焉者徽宗患其擾屢禁止之然復出為惡不能絶也偶讀白樂天紫閣山北村詩乃知唐世固有是事謾録於此晨遊紫閣峯暮宿山下村村老見豫喜為我開一樽舉杯未及飲暴卒來入門紫衣挾刀斧草草十餘人奪我席上酒掣我盤中飱主人退後立斂手反如賔中庭有竒樹種來三十春主人惜不得持斧斷其根口稱采造家身屬神策軍主人切勿語中尉正承恩蓋貞元元和間也周密癸辛雜識前代纍石為山未見大顯至宣和間艮嶽之役興連轤輦致不遺餘力其大峯特秀者不特侯封或賜金帶且各圖為譜然工人皆出於吳興謂之山匠蓋吳興北連洞庭多産花石而卞山所出特秀竒故四方之為假山者率於此中取之嘗聞汴京父老云艮嶽之取石也其大而穿透者致逺必有損折之慮乃先以膠泥實填衆竅其外復以麻筋雜泥固濟之日曬極堅實始用大朩為車致於舟中直俟抵京然後浸之水中旋去泥土則省人力而無他慮此法竒甚前所未聞也又云萬嵗山大洞數十其洞中皆築以雄黃及爐甘石雄黃則辟蛇蝎爐甘石則天隂能致雲霧滃鬱如深山窮谷後因經官拆賣有回回者知之因請買之凡得雄黃數千斤爐甘石數萬斤和維愚見紀忘艮嶽舊址無存久矣問之皆曰三山兒坡是也其誤甚矣考之宋史徽宗於宫城東北起景龍門復道禁中每嵗放燈自東華門以北並不禁夜又於次東建寶籙宫後纍石為山以其在艮方也號艮嶽又稱壽嶽夢華録云京城北壁其門有三從東曰舊封丘門中曰景龍門乃大內城東角寶籙宫前也次西曰金水門近見汴之城池沿革一帙云北面三門中曰景龍門太平興國改今名俗名酸棗門東曰安逺門俗名舊封丘門西曰天波門又號太安門至正年間汴人拒守不及遂築塞諸門止留五門然徽宗命侍郎孟揆於上清寶籙宫東築山以象餘杭之鳳凰山周圍十餘里其最髙一峯九十步上有介亭其艮嶽的在宫城東北景龍門內以東之地明矣後金宣宗命尚書珠格髙琪展築汴城就取艮嶽之土搬築以為北面城垣其景龍江改為城濠諸池沼悉皆填平止有龍德宫前土嶺猶在俗名三山兒坡若以為艮嶽遺址實為大謬龍德宫徽宗潛邸也在景龍門西離寶籙宫逺矣嶽珂桯史艮嶽初建諸巨璫爭出新意事土朩既宏麗矣獨念四方所貢珍禽之在囿者不能盡馴有市人薛翁素以豢擾為優場戲請於童貫願役其間許之乃日集輿衛鳴蹕張黃屋以游至則以巨柈貯肉灸粱米翁效禽鳴以致其類既而飽飫翔泳聽其去來月餘而在囿者四集不假鳴而致益狎玩立鞭扇間不復畏矣遂自命局曰來儀所招四方籠畜者置官司以總之一日徽宗臨幸遠聞清道聲望而羣翔者數萬翁輒先以牙牌奏道左曰萬嵗山瑞禽迎駕上大喜命以官賚豫加厚靖康圍城之際有詔許捕馴籞者皆不去民徒手得之以充餐云汴京遺蹟志卷四
