body:
  text: 汴京遺蹟志卷十一明李濂撰祠廟庵院祠三賢祠在吹臺上禹廟之後舊有三龕塑碧霞元君像正德丁丑巡按御史毛伯溫改塑三賢像毛伯溫撰三賢祠記三賢祠者祠唐高李杜三賢於吹臺之上也按唐史高適李白杜甫天寶中聚梁宋間共飲吹臺之上酒酣擊歌俯仰今古旁若無人而杜詩亦云憶與高李輩論交入酒壚兩公壯藻思得我色敷腴氣酣登吹臺懷古視平蕪是時白甫皆以讒嫉去國年各四十餘而適則封丘尉耳三人者固蓋世之豪也顧坎坷徘徊行歌古墟榛莽中使其登臺悲嘯望芒碭數雁䳱嗚呼傷哉白梁園歌適古大梁行豈亦其時詩歟詩李杜尚矣適詩慷慨悲壯為盛唐諸人冠而杜子亦時時推適曰美名吾不及佳句法如何蓋飄然不羣之外推者適一人耳適五十始詩故叙年李杜之上其詩頏二子故並賢之而並祠之吹臺故有禹宫宫之後有空室而棲非其鬼伯溫業令撤其鬼而祠三賢矣今年秋偕蜀張子關西袁子李子謁焉登臺四望曠原孤城日涼雲斷風颯颯起黃蘆末搖軒振櫺豫與三子者灑然驚回思三賢又愴然悲曰適顯矣白甫乃如斯已邪傷哉傷哉包孝肅公祠包拯希仁嘗尹開封有異政厥後汴人思之立祠于府治㕔事之北始建嵗月無考國朝成化間知府孫瑜徙建于府治之東隅隙地胡謐撰包孝肅公祠記開封府故有宋包孝肅公祠蓋祀其知開封時功也前後公知是府者多名人奚獨祀公蓋公其尤也公所歷諸官皆有績奚獨祀公知府功蓋開封京府其功可以該諸績也惟公之在開封也剛毅不阿貴戚宦臣為之斂手猶若居御史諫議之所論斥而且開門聽訟吏不敢欺即廣其知天長時斷割牛古訟之明也劾毁勢家侵惠民河園榭即推其轉運河北時請以牧馬地賦民之惠也自奉儉約無異布衣誡子孫不得犯贓罪即充其知端州時歸不持一硯之操也與夫知瀛州而請罷回易在三司而置場和易以免民供上之物皆由京府以逹諸外郡者也然則公揚歷中外之績舉於是乎該矣故京師為之語曰關節不到有閻羅包老人以其笑比黃河清童稚婦女亦知其名呼曰包待制云比卒太常乃併其親老不赴調親沒廬墓之行諡曰孝肅蓋實法所宜祀者此開封所繇以祀公也而當時知是府者前公如陳文惠康肅兄弟繼尹薛簡肅威嚴如之後公如歐陽文忠吕正獻濟以寬簡然皆為他善所掩其知是府功則莫與公者此開封所以獨祀公也祠在府治㕔事北創始未詳歲月歷金元以迄我朝府列外郡祀事歲修不廢祠則屢葺乃成化癸已前知府孫侯瑜以址隘宇將壓相得府治巽隅隙地遂徙建焉工未就緒而孫侯卒今知府張侯岫至亟繕完之中為屋三間左右翼兩廂各三間前豎門樓周繚以墉肖公像其中黝堊髹漆煥然一新張侯手署其扁曰包孝肅公之祠爰率僚佐落之而告慰公神如禮每春秋用牲醴致祭著為儀且裒公遺事奏議載鋟以廣傳焉其尤知慕公者哉僉謂斯舉不可無記以告將來張侯屢以為請豫因述開封所以祀公之意俾人知公之功不獨在開封也十賢祠即大梁書院之前堂也在繁臺之上舊名九賢祠祀濓溪二程張邵司馬朱吕張後復益以許魯齊為十賢祠莊昶撰十賢祠記大梁書院者祠濓溪康節溫公明道伊川橫渠晦菴東萊南軒魯齊十賢又集天下書以資學者遊學之處也嗟乎書一也有吾心之書有紙上之書吾心之書者吾心之神也吾心之道也而紙上之書者不然不吾之心而吾之心著之於言語也不吾心之道而吾心之道託之於文字也嗟乎聖人貴無言而不貴有言有言則不以心契不以心傳而言徒言矣如六經莫大於易而易言隂陽也方其無言也易具於心渾然而無破及其有言則孰為隂孰為陽而隂陽之授受皆得之紙上而易始散矣易非散也紙上而易者散也四書莫精於中庸中庸言性道教也方其無言也中庸具於心噩然而無名及其有言則孰為性孰為道孰為教而性道教之授受皆得之於口耳而中庸始亂矣中庸非亂也口耳而中庸者亂也至於詩書禮樂春秋論孟無不皆然故善觀六經者不觀六經而觀吾心之六經善觀四書者不觀四書而觀吾心之四書吾心之書果何書哉不楮墨而文也不文字而見也不誦讀講說而明也秦火雖烈而不可以焚也漢儒雖陋而不可以鑿也不河圖不洛書而九疇八卦之象自形也不詩不禮而溫柔敦厚之妙自著也品節防範之等自嚴也不春秋而華衮鈇鉞之賞罰自當也溥之而天地位也推之而萬物育也幽之而鬼神感也微之而神化妙也充之為聖為賢為堯舜為孔孟為周程為張朱也用之為百姓安為禮樂和為人心正為異端息為臣不敢以僭其君為四裔不敢以輕其中國也吾心之書至於如此此豈索之𤣥冥索之象罔之所得哉此以心授而彼以心領也此以心得而彼以心見也往年白沙陳先生過余定山論學余以是質之先生不以余言為謬世之好事者詆陳學為禪夫禪謂之無然無極而太極靜無而動有者吾儒亦不能無無也但吾之所謂無者未嘗不有而不離於有禪之所謂無者未嘗有有而實滯於無禪與吾相似而不同矣嗟夫天下之人豈無真與僞哉天下之事豈無是與非哉惟有以辨之耳然茍不知夫周行之大者惡知曲徑之是非不知吾儒之真者安知他道之有僞遊學於是者其亦以余言為禪否哉將因紙上之書以觀吾心之書而契夫周程張朱諸賢之道則書之所集大矣是役也始於憲副劉公欽謨中於僉憲吳公原明成於開封守張公九雲而唯諾上下則都憲李公文盛趙公守約也既成方伯吳公行驗憲使劉公尚珮暨諸僚佐謂不可無記於是九雲謀之僉憲傅公商佐石公宗海以請於余余於諸公為先進與商佐九雲為同年宗海為同里為同學而又為同年皆余友也余所敬慕而請益者也敢書其所謬學者以復之亦未知其是與否也諸公將亦教我乎哉嶽武穆祠在朱仙鎮武穆舊班師地也居民追思其功立祠祀之成化二十一年河南布政使吳節開封知府張岫始建議恢拓祠宇焉許真君祠舊在上清儲祥宫內真君晉人也為旌陽令夙著靈異之跡政和二年五月賜號曰神功妙濟真君以所遺詩百二十首書諸竹簡載之筒中令人探取以決休咎名曰聖籖祠今廢東嶽張太尉祠在城外東南隅熙寧間百姓共立相傳神姓張氏淮隂人死為神𨽻東嶽主幽冥之事京東州郡往往有祠所謂張舍人者是也皆稱之曰太尉元豐中光獻太皇太后祈請有感始封嘉應侯今廢庇民祠舊在城東北數里南神岡以祀巡撫侍郎于公謙也謙宣德正統間以兵部侍郎巡撫河南有經國裕民之績屬黃河水溢侵迫省城公䖍誠致禱誓以身徇之投以所御公服河遂消縮居民恃公無恐公乃鑄鐵犀二以鎮河自撰銘于犀背云始公之巡撫河南也年才三十有三律身介潔一毫不取諸民性嚴毅不能媚權貴人其入京議事獨不持土物賂當路汴人嘗誦其詩曰手帕蘑菰與線香本資民用反為殃清風兩袖朝天去免得閭閻話短長公坐薦參政孫原貞王來代已謫大理左少卿汴民詣闕乞留乃復命巡撫前後垂二十年汴父老思公之德又於省城西南隅馬軍衙橋西復立一祠以便香火蓋即公巡撫時公廨舊址也汴人呼為于少保祠胡謐撰庇民祠記庇民祠舊在河南開封府城東北數里而近神岡側正統庚申歲黃河徙囓大堤勢薄府城上下驚惶巡撫侍郎于公謙告天誓以身殉投以所御公服躬督築以捍其患遂弭且範鐵為犀勒銘其背以鎮永遠豫民感公之惠以免墊溺為建是祠以與土神河神並祀焉蓋閲四紀于今矣而當時故老定興知縣致仕甄鐸輩百數十人合疏公曩撫中州厥績甚夥匪直弭河患而已請建專祠于府城西南隅公之寓廨故址有若公猶存蒞且便遠近奠謁於是藩臬閫諸僚咸是其請遂給材甓洎百需諏日鳩工經始于成化丁未春二月僅五閲月告成中為屋六楹肖公像其內左右翼兩廂楹各如之前豎中門大門各四楹周繚崇墉扁仍舊曰庇民之祠從民意也藩臬閫諸僚率甄鐸輩落之而告慰公神如禮歲以公誕諱日用牲醴致祭著為儀逺近過謁及有祈禱者聽復祥符縣民二戶守之俾藝其旁隙地若干畝以資香火費甄鐸輩仍具前疏謁余請書其事于麗牲之石按公浙之錢塘人繇進士拜監察御史擢兵部侍郎宣德壬戌以簡命膺兹巡撫重寄始下車㑹官取銀礦將議立課公較得不償費禁採給民孳牧僅用土有芻水十數州縣殺山東北畿什六七境內水可渠可堰者諭民鑿築以資灌溉民多獲利遇歲歉則請寬積逋罷冗征鹻地民苦輸額稅則請折布以紓之存聚倉儲及勸分在在充盈時艱食則平直以糶獲濟甚博教民樹藝田宅桑棗道路榆柳皆蔚然成效興學育材尤加之意其於屬僚務先身率賢者榜其治績以示勸否則按黜不少貸嘗以薦人代已任坐調大理少卿召還朝時豫民千餘人詣闕乞留詔許之尋復原官而所薦之人後皆名位與並人尤服其明於知人云未幾以憂去民復乞留詔公起復蓋公撫蒞中州前後凡十有八稔厥績歷歷可紀而弭河患尤足以見其感動天地此豫民今昔所為以建庇民之祠也嗟乎有官在治而人稱頌之崇奉之固其有以得民然非阿則䁥未必皆誠也惟夫既去而猶思既沒而益慕不忘者然後見其得民之心之誠且篤耳于公之撫蒞中州也兩去而民兩乞留且為建生祠以並祀土河之神冀與相為悠久比既沒數十稔而民慕之如一日又請建專祠以事公若生存焉非其得民之心之誠且篤疇克爾哉甘棠之詠清風之碑殆與是祠異世而同符矣乎抑公昔兼巡撫山西績視河南並偉而自去此還朝擢本部尚書至少保其安內攘外有功于社稷尤大以不繫河南不著雖然朝廷議功方將秩公命祀以配享郊廟獨庇民之祠而已哉胡謐撰祭少保于公文惟公昔以亞卿巡撫河南適值黃河徙溢衝突汴城公為築堤捍禦俾免墊危且範金為犀勒銘其背以固永遠既而公被召入朝而汴氓感公之惠思公之德相率建祠堤旁肖公遺像其內以與土神並祀有年蓋冀公之功與茲土相為無窮焉耳顧有司漫不省所有事誠缺典也仰惟公自去此入擢上卿進位師保以佐聖天子安內而攘外其澤加四海名震四夷既沒而褒恤之典光徹幽壤固非一汴氓之祠為足以崇報我公也然自古名臣碩輔秩諸命祀以配享郊廟者未有不因其播歌頌于閭閻田野之間而致然也若今汴氓祀公治水之一績殆將以基國家秩公命祀于百世矣乎嗚呼公形雖邈澤則永存黃河之水其流源源某等承乏於斯邇因河患薦臻方規遵公餘軌纘公遺緒仰止高山其思曷已爰謁祠下跽薦一尊矢詞以誄公其有聞伏惟尚饗廟三皇廟在城內東北隅艮嶽廢址之上元人吳炳有記見藝文禹廟在城東南三里許吹臺上舊名二姑臺宋都人建廟以祀二仙姑𢎞治中改為碧霞元君祠好鬼者翕然趨之觀風者毁其像改祀神禹稱禹廟焉又增建兩廡祀中古以來治水有功者為河患也余弱冠時讀書臺上猶見兩廡朩主比謝政歸里偶一登覽而朩主無一存者因識于此以俟宦遊君子興復之庶弗沒前人崇祀之意云兩廡分祀歷代治水有功者共二十九人魏鄴令史起秦水工鄭國漢淮陽太守汲黯大司農鄭當時水工徐伯表河堤使者王延世待詔賈讓樂浪王景將作謁者王吳宋潁川團練使曹翰京西轉運使陳堯佐判都水監張鞏戶部副使張燾太師溫國諡文正司馬光內侍省副都知張茂則龍圗閣待制河北都轉運使張商英元河南河北肅政廉訪使尚文尚書諾海御史劉賡太師恆陽王諡文貞額森布哈河南河北道僉事阿嚕托琳榮祿大夫集賢大學士賈魯太史郭守敬丞相托克托國朝工部尚書安然少保太子太傅兵部尚書諡肅愍于謙戶部尚書諡恭定年富都察院右都御史王暹河南右布政使王亮𤣥帝廟有三處一在城西南隅即佑聖觀今改為大道宫祀北方𤣥武之神一在安遠門之甕城內一在朩魚寺之廟兒岡濓有記見藝文樊將軍廟在仁和門外祀漢樊噲今廢漢夀亭侯廟有數處一在安遠門迤南街東廣福坊俗呼為大關王廟一在大梁驛北鄰俗呼為小關王廟一在大梁門城下一在西關金梁橋東今汴城五門皆有關王廟惟安遠門則𤣥帝廟以北方之神故也城隍廟在城內新昌坊元河南路都總管劉福建王秋澗有記見藝文國朝洪武二年誥封為承天鑒國司民顯聖王明年詔天下諸城隍俱革前代封爵各從本府州縣之名而開封府城隍誥命見存洪熙元年道士范景新重修天順五年淪于水道士蕭守正葺完旗纛廟在都司公署之後祀昭烈武成王而下歷代諸名將宣武衛以附都司不置二相廟舊在城內祀子游子夏今失其處皮場公廟在城內東北隅相傳皮場土地主瘍疾之不治者或曰皮場公即鄭大夫子皮也代父子展為上卿執國政鄭饑而未及麥民病子皮以父之命餼國人粟戶一鍾鄭人德之立廟以祀之而汴城距鄭不遠故亦廟祀焉二說未知孰是宋朝燕翼詒謀録京師試於禮部者皆禱於二相廟二相者子游子夏也子游為武城宰子夏聘列國不知何以得相之名也今行都試禮部者皆禱於皮場廟皮場即皮剝所也相傳皮場土地治瘍疾之不治者徽宗建中靖國元年詔封為靈貺侯其後纍封明靈昭惠王今廟在萬壽觀之晨華館館與貢院為鄰不知士人之禱始於何時館因何而置廟也梓潼廟在蔡河灣即宋太學中之桂香祠太學徙而祠存乃稱梓潼廟云舊祀文昌司祿宏仁帝君左右桂祿二籍仙官凡應試士子祈禱有應東嶽廟在城內東隅祀泰山之神祥符元年十月詔封為東嶽天齊仁聖王四年五月尊稱帝號國朝釐正祀典稱東嶽泰山之神焉二郎廟在城南之奉神岡即灌口二郎神也正統十三年戊辰四月汴旱祈雨有感祥符知縣米榮縣丞朱璟重修殿宇煥然一新開封府儒學教授三衢吾用溥撰碣記今尚存火神廟在城內鼓樓東祀祝融之神也初宋徽宗建火星觀于太乙宫側右正言任伯雨有疏止之兹廟不知立于何時無所考德安公廟在城北作坊即夷門山神也景德四年十二月加封德安公詔葺其廟命開封府春秋致祭今廢崔府君廟在城北相傳唐滏陽令死為神主幽冥事廟在磁州淳化初民於此置廟後詔修殿宇賜名護國廟及送衣服供具景德元年重修每歲春秋命開封府致祭後封護國顯應公云今廢石靈公廟在相國寺橋之西汴河南岸相傳汴京之南有周令公墓墓前二石人頗著怪異之蹟人或遇之乃稱魯校書石押衙都人因立廟以祀之故稱之曰石靈公金龍四大王廟在祥符縣治之南汴河北岸州橋之側祀河神也今為居民侵占狹小矣普濟廟在城西南隅景福坊即九龍堂也大中祥符四年夏六月詔令完葺因賜今名今廢三官廟城內外有數處其最著者在西關外二里許宣德間建正統辛已圮于水殿宇廟貌皆壞成化壬辰布政司照磨熊剛管修别工有餘材松木百餘根助葺是廟而開封府知府河東張岫為之記碑刻立于殿前見存宋濓論三官按漢熹平間漢中有張修為太平道張角張魯為五斗米道其法略同而魯為尤盛蓋自其祖陵父衡造符書於蜀之鶴鳴山制鬼卒祭酒等號分領簿衆有疾者令其自首書氏名及服罪之意作三通其一上之天著山上其一薶之地其一沈之水謂之天地水三官而三官之名實昉於此夫至高者天至厚者地水縱大亦兩間一物耳何得與天地抗哉今並稱之為三吾未知其何說也玉皇廟在南薰門外上城內官路之西相傳為玉清昭應宫遺址也天聖七年夏六月丁未宫燬于火僅存長生崇壽二殿詔不復修改為萬夀觀乃以崇夀殿更名太霄殿奉玉皇銅像後燬于金兵成化丁亥道士董道靜募緣興建玉皇廟于此地又移五嶽觀中五嶽四瀆像于中殿蓋五嶽觀在教場之西密邇此地洪武已酉為雷火所燬止存諸像道士董道靜因移置于是廟中今見存庵觀音庵在城內大寧坊朩場街之南國朝洪武三十年尼僧人柏等創建圎通庵在仁和門裏宣平坊國朝洪武二十一年尼僧勝海等創建汴人呼為老君庵曹仙姑庵舊名寶籙堂在金梁橋之西南宋徽宗建以為曹仙姑所棲之處後姑化去遂為女冠所居國朝洪武三十二年黃河入城淹沒圮壞有祠堂記碑乃移置延慶觀內今見存以上三庵皆尼庵也今俱廢鄭昻撰希元觀妙先生祠堂記先生姓曹氏諱道沖字沖之全趙寧晉人贈中書令尚書令保貴之來孫襄悼魏國公利用之族孫也父宗哲故承務郎欽州靈山縣主簿母石氏五代晉之後初魏國公章聖時和戎有大勳賜都城普惠坊第因以居汴奕世忠義冠劒蟬聨同爨者十餘世詔旌其門先生自扶坐能言便解文字五歲賦詩屬文十五歲古今載籍所記博極無遺一經目終身不忘家人患其弄翰墨即登屋賦詠書遍萬瓦諸教洞徹咸得其要妙嘗謂處世居家均在樊籠不願嫁適脫身遁去二十一嵗隱於少室山玉華峯棲神導氣者凡十餘年惟恐一物纍已衣糧不齎人自供給若有神助時二親在堂弟妹滿前弗恤也家人蹤跡之則宛轉濳避齊人張公諫議知其異度為女冠因遙指青州逺遊觀張幾真為師欲受籙無資乃足歷四方貨文于市以寓乎所謂道者既而受籙于閣皂山於是四方始知先生之名矣然天資蕭散放曠物外不就繩檢故毁譽幾半天下而先生終無喜愠時或諧謔形于詞章微著其意而已晚入京師大隱于閶闔門之咸寧坊衣足蔽體食僅充腹廕容膝之地混然與猫犬同迹其鼠壤餘蔬不可嚮邇意欲杜絶勢利焉至貧困者有所告則丏以詩使貨鬻度日都人供饋者肩踵相摩多所不納有不能却尋以施豫不茹葷血但日市以食猫犬或問其故曰無他救其欲殺者而已或謗其肉食者即取以對食曰於道何害但不欲耳謗者慙焉歲時都人遊賞則放傲先至諷詠以歸或嘉節良辰反杜門不出皆所不可曉也上方以道在宥天下異人並出始以徐神翁言得先生於輦轂之下召對無時仍給金牌二聽赴行在與諸池苑無得禁止其延見異數莫與倫比上嘗曰此真仙也文華乃其餘事詔加清虛文逸大師先生初名希藴至是始賜今名又加道真仁靖先生復為起第乃瀝懇牢辭不得已僅受數楹為樓以奉三清晨夕焚修用祝君壽詔復名其室為寶籙堂又為營保慶泰寧宫於其側將落成而先生尸解矣上為之惻然葬於國郊開封縣新里鄉使觀察賈公護其事仍給御府錢齊七作黃籙醮以為資薦贈號希元觀妙先生以誥付其第詔復建宫于順天門瑤華宫中之左方使弟子張居淡以奉其祠居淡清修人也慕道甚堅早辭家師事先生凡二十年始終如一逮先生之化見其疇昔與先生厚者則泣涕沾襟惟恐師後事之不周因請起祠堂于今宫昊天玉皇上帝清都高邈殿之後質不至陋華不至侈戶牖取具務欲垂久居淡謂先生初闕銘志為終身恨僕告以古今名師大士道行天下名流後世詎可泯邪區區銘勒端無重輕了不以僕言為然復泣以告僕久與先生遊且實里人義不得辭因為叙其略先生名播四海久矣初還都邑寓籍于延寧宫而身未嘗往及保慶泰寧宫成遷延不入終以化去則僕前所謂先生自言以處世居家均在樊籠者意謂是也誥命謂凝情冲和混迹民伍蓋盡之矣自遭際未嘗以纎毫私輒冒上聽故恩眷益隆若叙其平生所為則歌辭備矣知者得之無復覼縷至若聲律書畫厯數方技他人盡智力而能之者先生皆優為之其尤長者文詞也初若不經思慮人方見其含毫伏紙轉眸之間掀雷抉電而珠玉已粲然矣人所需索無不如意於闤闠宴席岑寂幽隱之地咸無所擇以一物為題有至百篇者其警策語尤出人意表依隨聲韻立筆賡和愈見其工案無文籍所用事實備無遺謬上至三墳五典八索九丘諸子百家之書下至里巷俳諧方言時謡無不窮貫彼世人徒見先生嘲謔之語而不識先生典麗之文徒見先生典麗之文而不知先生要妙之道吁可怪也如老莊與黃庭西升清淨經注解性命之說則得之者幾希蓋其平生所為文意之所至目之所覩凡天地範圍之間無不模寫而世或能道之至于微妙希夷之語修身盡性之說其和者蓋寡焉矧其起居動靜之間筆端風生著述萬數浩浩如江河沛然莫之能禦頃有詔盡索其篋中所有閣於玉清和陽宫轉輪之藏室既化之日益令收掇其殘稿自是落人間者無幾矣噫先生之遇聖主可謂時矣餘何恤哉嘗謂士子於道未得秋毫之一涸思乾慮於章句之末幸有司一得以取終身之富貴自謂天下莫已若安知先生之所謂浩浩如江河沛然莫之能禦者邪或問先生之道僕嘗見其蓬頭垢面衣結履穿而聲韻清暢眸子瑩徹夷然自得宛若童稚且盡天下無窮之能事而甘舉世不堪之寂寞先生處世之迹概可知矣若先生之道僕又安足以知之姑叙其文詞之能而已矣夫聰明辨知固足以害道而道之至則非聰明辨知之所能害也今有人未嘗與文墨親一有所悟則吐言為辭咸契至理何則道本無為而無所不通聰明辨知者乃道之用而已逮其源流深遠詞藻華麗則又非一世之習也考諸古今能文之士白首而窮一經十年而工一賦者比比如也其至倚馬七步之敏固已無幾雖然此特窮篇短翰爾若先生之落筆萬言聲律無誤小大不拘真解鮮儷也抑聞之昔人以太白為謫仙則文詞之豪非神仙似不能為白玉樓成必待長吉之文則神仙之於文亦云難矣僕是以樂為之書先生享年七十有七生于寶元三年二月二十七日化于政和五年七月二十一日葬以其年十月十五日其化也道院産玉芝一本五莖既葬之日天氣晴霽其祖塋魏國公碑泉潤交下如淚落狀衆謂天寒露潤徐視他塋皆所無有始大驚嘆嗚呼先生間氣所鍾其異事難以毛舉云政和丁酉冬十月十有七日右曹仙姑祠堂記乃宋朝散郎試祕書少監兼編修六典鄭昂筆也中有語涉怪誕者余悉刪之不欲存之以惑世云爾院戒壇院在雷家橋西北舊慈孝寺園宋仁宗寶元二年創建元末兵燬佑聖院在獠劉二隅街之西北元末兵燬寶聖院在蔡河北寺橋之南宋時僧録重珦創建仁宗景祐元年賜額元末兵燬等覺院在安遠門外之西北宋太祖乾德六年創建金季兵燬兜率院舊名旌孝院在安遠門外之西北宋仁宗天聖元年改名兜率金季兵燬萬嵗院在仁和門外之東北周世宗顯德二年創建金季兵燬福田院在仁和門外之東北唐太宗貞觀二年創建後為兵燬三學護國院在南薰門外之西南宋仁宗慶厯三年賜額元末兵燬報恩院在戴樓門裏宋真宗咸平三年創建元末兵燬鴻禧院在戴樓門裏之東北宋太宗端拱二年創建元末兵燬法雲院在固子門裏金水河灣之西南宋真宗大中祥符三年創建金季兵燬開化院在固子門裏金水河之南白鶻橋之東宋大中祥符三年創建金季兵燬黃建院在土市子街東南棺子巷之西元末兵燬淨居院在大梁門外西北寶相寺之北元末兵燬淨慧院在大梁門外西北南唐主李煜歸宋賜第于此煜卒後為寺元末兵燬開聖院在裏城之西南隅宋仁宗天聖間創建元末兵燬道者院在鄭門外五里宋時所建每歲中元節十月朔設大㑹道場焚錢山祭軍陳亡殁孤魂金季兵燬高文虎蓼花洲閒録五代時有僧某卓菴道邊藝蔬丏錢一日晝寢夢一金色龍食所藝萬苣數畦僧寤驚曰必有異人至已而見一偉丈夫於所夢之處取萬苣食之僧視其狀貌凛然遂攝衣延坐餽食甚勤頃刻告去僧囑之曰富貴無相忘因以所夢告之且曰公它日得志願為老僧只於此建一寺足矣偉丈夫乃藝祖也既即位求其僧尚存遂命建寺賜名普安都人稱為道者院啓聖院在大梁門內街北即太宗誕生之地晉護聖營也太平興國六年建院雍熙二年成賜名啓聖元末兵燬宋敏求東京記啓聖院本晉護聖營天福四年宣祖典禁兵太宗誕聖其地興國中建院葉少藴石林燕語啓聖禪院太宗降誕之地太平興國中既建為寺以奉太宗神御太祖降誕于西京山子營久失其處真宗朝嘗遣人訪之或以驍勝營旁馬廏隙地有二岡隱起為是即其地建應天禪院以奉太祖天聖中明肅欲置真宗神御其間而難于言太宗因以殿後齊宫並置二殿曰三聖殿慶厯中始名太祖殿曰興光太宗曰帝華真宗曰昭考定力院在蔡河東水門之北元末兵燬廖瑩中江行雜録太祖之自陳橋還也太夫人杜氏方設齊於定力院聞變王夫人懼杜太夫人曰吾兒平生竒異人皆言當極貴何憂也言笑自若是日太祖即位契丹北漢兵皆退趙葵行營雜録太祖初受周幼主命北討至陳橋為三軍推戴時太后以下眷屬悉在定力院設齊有司來搜捕主僧令登閣而固其扄鑰俄大搜索僧紿云皆散走不知所之矣甲士入寺升梯且發鑰見蛛網布滿其上塵埃凝積若纍年不曾開者乃相告曰是安得有人遂皆去有頃太祖已踐阼矣觀音院在麗景門裏街北元末兵燬四聖院在麗景門南金季兵燬淨因院在金梁橋西汴河之南元末兵燬蘇軾撰宸奎閣記略皇祐中有詔廬山僧懷璉住京師十方淨因禪院召對化成殿問佛法大意奏對稱㫖賜號大覺禪師仁宗與璉答問親書頌詩以賜之凡十有七篇至和中上書乞歸老山中不許治平中再乞堅甚英宗留之不可賜詔許自便璉遂歸老于四明之阿育王山廣利寺四明之人相與出力建大閣藏所賜頌詩榜之曰宸奎時京師始建寶文閣詔取其副本藏焉璉持律嚴甚上嘗賜以龍腦鉢㿻璉對使者焚之曰吾法以壞色衣以瓦鐵食此鉢非法使者歸奏上嘉歎久之興德院在金水門外金季兵燬楊萬里揮麈録英宗以齊州防禦使入繼大統治平二年改齊州為興德軍熙寧八年八月詔潜邸為佛寺以本鎮封之賜名興德禪院仍給淤田三千頃印經院太平興國八年置印經院神宗熙寧末廢其院以諸經印板賜顯聖寺傳法院太平興國五年詔於太平興國寺大殿西度地作譯經院中設譯經堂東序為潤文堂西序為正義堂自是每誕節即獻經也八年改為傳法院按隋有翻經館唐初亦有翻譯之事元和後廢太宗之置兹院亦隋翻經館之遺意也僧惠洪冷齊夜話景祐中光梵大師惟淨住京師傳法院以梵學著聞景靈宫鋸匠解朩朩既分有蟲蠧紋數十字如梵書狀因奏進上遣都知羅宗譯潤經文夏英公竦詣傳法院導譯冀得祥異之語以䜟國淨焚香審視逾刻乃曰天竺無此字不能辨譯右璫恚曰大師宜領上意若稍成文譯館恩例不少而英公亦以此意諷之淨曰幸若蠧紋稍可箋譯誠教門光也異日彰謬妄萬死何補富鄭公每語客曰此人誠可謂佛弟子也使其立朝必能盡節不茍同於人孰謂異教中無人邪以上皆僧院也今俱廢無一存者廣慧院舊名黃姑庵在土市子南街東宣平坊金熙宗皇統初尼僧妙勝創建後燬于火國朝洪武五年尼僧廣元復修興國院在大寧坊第五巷即宋將鄭恩之佛堂施舍為尼寺國朝永樂元年尼僧義和重修崇真院初太宗陳國長公主出家大中祥符二年八月進封吳國號報慈正覺大師賜名清裕九月出居是院初在建初坊後以迫隘徙城西隆安坊即今俗稱七公主院是也以上皆尼院也今俱廢無一存者大梁書院汴舊有麗澤書院在南薰門內蔡河北岸提學副使劉昌建也後因改作巡撫治所乃徙書院于城之東南三里許繁臺之上更名曰大梁書院草創未完成化間提學僉事吳伯通請于巡撫都御史李衍檄開封府知府虞鍾督工繕造明年知府張岫修完按大梁書院乃近時創建者非宋之遺蹟也以造士之所不可遺姑附于此汴京遺蹟志卷十一
