body:
  text: 汴京遺迹志卷十五明李濓撰藝文二記汴州東西水門記并序唐韓愈貞元十四年正月戊子隴西公命作東西水門越三月辛已朔水門成三日癸未大合樂設水嬉會監軍軍司馬賔佐僚屬將校熊羆之士肅四方之賔客以落之士女和會闐郭溢郛既卒事其從事昌黎韓愈請紀成績其詞曰維汴州河水自中注厥初距河為城其不合者誕置聯鎖于河宵浮晝湛舟不潛通然其襟抱虧疏風氣宣泄邑居弗寧訛言屢騰歷載已來孰究孰思皇帝御天下十有八載此邦之人遭逄疾威嚚童噭呼劫衆阻兵凛凛栗栗若墜若覆時維隴西公受命作藩爰自洛京單車來臨遂拯其危遂去其疵弗肅弗厲薰為大和神應祥福五榖穰熟既庶而豐人力有餘監軍是咨司馬是謀乃作水門為邦之郛以固風氣以閈寇偷黃流渾渾飛閣渠渠因而飾之匪為觀遊天子之武維隴西公是布天子之文維隴西公是宣河之沄沄源于崑崙天子萬祀公多受祉乃伐山石刻之日月尚俾來者知作之所始汳水新渠記宋陳師道汳句于蕭其闕如玦水經謂河至滎陽莨蕩渠出焉渠至陽武其下為沙蔡水是也其出為隂溝溝至浚儀其下為渦别為汳汳至蒙别為獲餘波迤于淮陽東厯蕭彭城入于泗注謂鴻溝官渡淄獲丹浚與渠一也禹塞滎澤而通渠于甫田其後河􅏧然入焉即索水也漢書地理志滎陽既有汴水又有莨蕩而受泲蒙有獲水首受淄獲至彭城入泗以余考之河渠書云自禹之後滎陽引河為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會于楚而竹書紀年梁惠成王入河于甫田又引而東明非禹之舊也書曰濟入于河東出于陶丘北者入而復出也溢為滎者濟之别也滎波既豬障而東之也周官又謂豫之川滎洛幽兖之川河泲則河南無濟矣其謂莨蕩受濟禹塞滎澤而用河者皆失之漢志莨蕩無出淄獲無始蓋略之也余謂與經合而滎水諸書皆不載又疑渠汳為二而滎有一焉杜佑以經作于順帝之後詭誕無據而注敘渠源或河或泲或河泲合其説不一次其所引經紛錯悖戾而志亦闕略不具辨始末蓋皆不可考也自漢末河入于汳灌注兖豫永平中導汳自滎陽别而東北至千乘入于海而河復於是故瀆在新渠之南注所謂絶河而受索自此始隋開皇中因漢之舊導河入汳大業初合河索為通濟渠别而東南入于淮而故道竭今始東都受退水為臭河於畿為白溝於宋為長沙於單為石梁於徐為汳而入於南清南清故泗也蓋自三都而東畿宋亳宿單濟之間千里四來而故道淺狹春夏不勝舟秋水大至亦不能受也蕭故附庸之國城小不足居民又列肆於河外每水至南里之民皆徙避之廬舍沒焉率數嵗一逄民以為病紹聖三年縣令朝奉郎張惇始自河西因故作新支為大渠合于東河以導滯而援溺於是富者出財壯者出力日勸旬勞既月而成邑人相與語曰渠議舊矣更數令不決而卒成於吾侯孰有惠而不報者乎於是不謀而同欲紀於石以屬余余謂張侯其居善守行峻而言直以成其名其任善義不畏不侮以登于治然其可紀者多矣而諸父兄獨有見於此者何也夫善為治者人知其善而已至其所善蓋莫得而言也渠之興作有迹其效在今此邑人之所欲書也遂為之書新修東府記陳繹中書政事本也宰相三公官也官不必備惟其人匪其人不居且體貌大臣禮重而莊物采顯庸宜備而稱豈曰私其人哉蓋所與坐而論道不下席而致太平之功者二三執政而已國朝以來尚襲唐故大臣多不及建里第而僦居民間至距城數里之外東西南北回逺不相接也四方奏書緩急報聞吏卒持走遍歷諸第一有漏露稽違失亡其可逮乎而又暑寒雨風晨趨暮還輿衛騶呵導從前後搢紳士大夫造請紛馳于里巷坊曲之隘甚非尊嚴體貌之觀也今禁衛三帥率有公廨庶官省寺亦或有居而獨大臣不列府舍每朝則待漏闕門之次入則議政殿上退即廳事羣有司公見請白可否少休吏史抱文書環几案左右頡頏以進至日下晝數刻始歸夫以王城輦轂之大其制度之闕如此乃出聖畫新創二府親遣中人度地于闕之西南輪廣方制旁皇鈎折繪圖以聞即刋定于禁中申命三司飭吏諸司計工程材役不妨時費不病官自熙寧三年秋七月興作東西府凡八位總千二百楹明年秋八月東府四位成詔知制誥臣繹為之記臣拜手稽首以書十月工實之次謹按三代盛王繇禮義之政至于周而大備文章典刑物采位敘煒然見于朝廷之表公卿內外居有室宅上不為過侈下不為茍納出則寵之淑旗龍章鈎膺之駕入則具之列鼎蒲進粉純之居仰而視其宫則有榱題之襲密俯而攝其衣則有衮舄之嚴麗且謂不如是不足以待其人非其人不足以相天下之政故其取豫屈舒厚薄等衰一謂之天秩先王之澤既竭能道古人之言者起以其私學蔽尚迷謬世俗雖有志之主厭然而所慕者不過耳目之所習詬詬而望其下者益卑西漢去治世未逺開丞相府四出門無闌不設鈴不警鼓深大宏逺無有限節郡國守長吏得以嵗上計事國有大議車駕亦親幸而臨聽焉然其議不過軍功武爵期會督責之故至于東漢仍建公府蒼龍闕東偏其制度雖存而稱號不復於當時蓋用人授位出于一切其煩文虛器隆殺存亡者亦無足以繫政事之重輕宋興之初平定四方烜耀神武遂一宇內頗用戰勳閥閲將帥之人浸久而安生民樂嬉百年之間軌迹運行將臣相臣夜寐夙興罔敢有懈皇帝臨位躬攬權綱顯白訓義圖惟先王治理之實置府設屬大放古制文武弛張名器有等大小尊卑靡不遵序夫名者禮之分也位者處其名之器也名既正然後任責之理得而百事修明名不正則任責之理廢而百事隳必使望其器可以知其職可以知其人書曰股肱喜哉元首起哉百工熙哉是繇天子任大臣以道而率作興事罔不喜樂賡歌卒起乎治功之隆蓋君臣會遇千載之甚盛德也若乃聖作物覩宣耀典訓垂萬世之丕則考不磨之斯文其不在二府之制而在道德之意乎新修西府記陳繹唐初典兵禁中出於帷幄之議故以機密名官開元中設堂後五房而機密自為一司其職祕獨宰相得知舍人官屬無得預也貞元之後藩鎮旅拒重以兵屬人乃中官分領左右神䇿軍而樞密之職歸於北司然嘗寄治省寺廡下延英會議則屏立殿西勢猶厭厭傳道宫省語而已至其盛時其貴者號中尉次則樞密使皆得貼黃除吏唐末既除北司并南北軍于樞密使遂總天下之兵五代以來多以武人領使而宰相知院事國朝復置副二簽書直學士之名大略文武參用間以宰相兼領之故得進退大吏預聞機政其任職蓋重矣古之公卿入則相與謀於朝出則相與謀於家冡宰膳夫之政不至于耳目而天下四方之事每得於燕處之際故其為之不勞而日常若有餘今未明而入進見請決於陛席之前退而百執事叩閣稟事吏持書奏周走閭巷終日不得與二三大臣謀求若古人之舂容有餘勢固不行也熙寧三年詔營兩府于掖城之南其任樞密使者為西府於是有司知上之所以優隆大臣將以修天下之政于堂陛之下莫不率職底功士獻其能工致其才不周嵗而告成臣謹按樞密司馬之職事而周制屬於夏官秦漢曰太尉亦冠將軍之號祿比丞相置官屬掌兵武夫善用兵者使之至於無兵善治兵者治之至於無事然後天子之威刑震耀偃然憺折於萬里之外噫非二三大臣曷以哉若夫仰而登則恩見於榱梠俯而宴則禮見於階陛周旋指顧無非上之致隆於已者是則其所以享寵而居是者可無思乎待漏院記王禹稱天道不言而品物亨嵗功成者何謂也四時之吏五行之佐宣其氣矣聖人不言而百姓親萬邦寧者何謂也三公論道六卿分職張其教矣是知君逸於上臣勞於下法乎天也古之善相天下者自咎夔至房魏可數也是不獨有其德亦皆務於勤爾况夙興夜寐以事一人卿大夫猶然况宰相乎朝廷自國初因舊制設宰臣待漏院於丹鳯門之右示勤政也至若北闕向曙東方未明相君啓行煌煌火城相君至止噦噦鑾聲金門未闕玉漏猶滴撤蓋下車于焉以息待漏之際相君其有思乎其或兆民未安思所泰之四夷未附思所來之兵革未息何以弭之田疇多蕪何以闢之賢人在野我將進之佞臣立朝我將斥之六氣不和災眚荐至願避位以禳之五刑未措欺詐日生請修德以釐之憂心忡忡待旦而入九門既啓四聰甚邇相君言焉時君納焉皇風於是乎清夷蒼生以之而富庶若然則總百官食萬錢非幸也宜也其或私讎未復思所逐之舊恩未報思所榮之子女玉帛何以致之車馬器玩何以取之姦人附勢我將陟之直士抗言我將黜之三時告災上有憂色搆巧詞以恱之羣吏弄法君聞怨言進諂容以媚之私心慆慆假寢而坐九門既開重瞳屢回相君言焉時君惑焉政柄于是乎隳哉帝位以之而危矣若然則死下獄投逺方非不幸也亦宜也是知一國之政萬人之命懸于宰相可不愼歟復有無毁無譽旅進旅退竊位而茍祿備貟而全身者亦無所取焉棘寺小吏王禹稱為文請志院壁用規于執政者河南省左右贊治堂記元許有壬世皇一區宇河南地大民夥闢宣慰司於汴至元壬辰改行中書省國制中書總庶政是為都省幅員際天機務日繁相天下重地立行省而分治焉若稽古制魏晉有行臺齊隋所管置外州稱行臺尚書省唐以諸道事繁準齊分置今行省其遺制也官有平章政事左右丞參知政事丞相則設置不常佐幕有左右司都省分為二行省則合為一設郎中員外郎都事各二貟一省贊畫賴焉左右司名昉乎隋唐改郎中為左右承務趙宋尤重董正六曹彌綸省闥紀綱百司舉正文書之稽失非昔知臺閣故事不在茲選我朝簡擇尤甚內外不殊由是而至執政者班班可紀河南佐幕往者不可悉考今則刑部郎中觀音努員外郎托音陜西省郎中趙中為郎中宣文閣鑒書博士兼經筵譯文官和琳都汴梁路治中拜特穆爾南臺監察御史范勿為員外郎上都留守司都事圖們哈雅檢校官羅吉董守成為都事朝議以用兵供億而溢其貟也其堂舊無扁都事田腹入為禮部郎中請於承旨歐陽公扁曰贊治吉走書相下請記不果作及來承乏鞅掌倥偬亦不暇作一日謁詔使汴梁府署密邇省治有間道可不往適過所謂贊治堂者憩焉吉輩請曰記久未得兹躬履其地其有時乎乃為之説曰字書訓贊曰佐曰助平時之治且資佐助在今日宜何如簿領鈎稽其常職也非贊也贊亦有説乎上官之曲而其直之下情之隱而其豁之刑獄之濫而其平之財粟之出而其節之逃亡未復復不遂農疆域多戍戍不知兵移病流弊萃於省垣治之不力迤邐顛危而扶而持竭誠殫智治效有不著乎且稱人之美亦曰贊世蓋有好諛而樂受欺者茍贊其美不救其惡治何望焉抑昔人有言上䇿莫如自治斯言雖為它設敢斷章為諸君獻惟自治而後有以贊吾之治斯不負堂扁矣汴梁泮宫修復石經記李師聖宇宙之為宇宙造化之為造化皆一實理主之理之所寓則斯文而已矣文之所布則六經而已矣凡天之所以命聖人聖人之所以代天言者方䇿具焉逮吾夫子出從而刪之正之贊之修之集羣聖之大成而萬世之標凖於此乎定其見而知之者若顔若曾若思若孟述夫子之微旨而六經之藴奧於此乎明所謂賢於堯舜而不在禹下者其以埀世立教有功於斯文而為言歟夫文之有六經也尚矣或以五數之蓋合禮與樂而撙其一也或以九數之蓋兼周禮論語孝經而附其三也獨大學中庸則混於禮記諸篇之中孟子一書則雜於荀卿諸子之列於是表裏經緯不相連屬卒使學者不得其門而入於聖賢之域亦獨何哉惟汴梁舊有六經論語孝經石本乃近代辟雍之所樹者陵谷變遷修而復毁其殘缺漫剝不啻十之五六前政巨僚之賢而有文者亦不遑恤將七十餘年於此矣今參政公額森特穆爾一見而病之慨然以完復為已任義聲所激附和者衆不數月而復還舊觀奈何孟子七篇猶闕遺焉公習讀四書而明於大義者也亟欲增置適期會拘迫有司請為後圖公默然蓋有待於後舉也惟四書之著名於世程子朱子之前未之有也無乃為異議乎噫此正斯文之緒所以絶而復續也何則六經成於夫子之手四書出於夫子之徒其同然之與自然殆所謂至妙至妙者歟我世祖皇帝聰明睿智高出前古雅知崇尚四書以其聖學精要在是故也嘗語一後生之不檢者曰曾讀四書否又嘗謂侍臣曰孔子之道三綱也五常也彼綴緝詩賦者皆浮詞耳大哉言乎真與二帝三王異世而同心於六經之大法可謂一言以蔽之矣惜乎不刋之典為業雕蟲者磔裂而腐爛之也相臣大儒許衡亦曰小學四書吾敬信如神明其推尊如此亦猶夫子有從周之語初非外夫二代而不之取也石經既完復學士大夫咸謂是役也所關甚重誠不可以無紀且因而發揮諸經之大義亦不為無益乃以記文屬之不肖竊惟六經與四書之為教不過去人欲以復天理而已夫一氣運行於天地之間清者居上濁者居下明者居內暗者居外芳者居先臭者居後一則主乎生一則主乎殺天理人欲各有攸屬隂陽淑慝之大分然也天以生道而福斯民人以生道而福其身有生之族何莫由斯道也姑即人生日用而觀之如理髮頮面彈冠振衣灑掃室堂滌濯器皿凡以致新致潔附於陽明之會而養之以福耳物之有滓顧所必去而况神明之府得容私欲之偽而為蠱於中邪茍為去之去之卒盡去之則天命之性率性之道不逺復而實有諸已矣是理也中庸一序備言之斯文正傳之統顧不在茲乎此不肖之所與聞者蓋如此覃思纍日於是乎書熙春閣遺制記王惲梓人鈕氏者向余談熙春故閣形勝殊有次第既而又以界畫之法為言曰此閣之大槩也構高二百二十有二尺廣四十六步有竒從則如之雖四隅闕角其方數紆餘于中下斷鰲為柱者五十有二居中閣位與東西耳構九楹中為楹者五每楹尺二十有四其耳為楹者各二共長七丈有二尺上下作五簷覆壓其簷長二丈五尺所以蔽虧日月而却風雨也閣位與平座疊層為四每層以古座通藉實為閣位者三穿明度暗而上其為梯道凡五折焉世傳閣之經始有二子掖醉翁過前將作者曰此即閣之制也取具成體故兩翼旁構俯在上層欄構之下止一位而已其有隆有殺取其縹眇飛動上下崇卑之序此閣之形勢所以有瑰偉特絶之稱也豫因念汴自壬辰兵後故苑蕪沒惟熙春一閣巋然獨存昔嘗與客三至其上徙倚周覽雖悵然動麥秀黍離之感且詫其嶻嶪壯麗如神營鬼構洞心駭目有不可端倪者至不藉井幹不階峻址飛翔突起干青霄而矗上又似夫鰲掀而鳯翥也豫厯考秦漢已來宫殿之制漢不復於秦而唐不及於漢如未央長樂曾何得阿房之萬一含元華清又奚敢跂兩都之規制也蓋天地氣衰國資民力與林林之材不克取盈而尺度不足其數焉故也然熙春遺構亦可為近代之傑觀彼騷人詞客雖稱述賦詠極其偉麗是猶臆説庭章而徒倣像其千門萬戶而已終非梓匠不能知其規模與勝槩之所以然閣廢撤已久及聞鈕氏之説使觚稜金爵上雲雨飛舞空際者盡在吾目中矣然不文之言不足以達逺因作記以遺之鈕氏者斯世工師之良者也至元草三年冬十月記汴梁路城隍廟記王惲汴梁之廟事城隍神其來尚矣壬辰兵後廢撤不存河南路兵馬都總管劉侯福大懼無以妥靈揭虔曰事神治人守吏職也可偏廢乎於是相新昌里爽塏地西南二方界以通衢劉侯私第鄰其東北則抵居民萬氏廣袤餘七畝繚以崇垣中起正殿像設有儼前敞臺門扄閟嚴肅左右則環齋構室敦請女冠孟景禮向妙順朱妙明輩相與住持寅奉香火景禮四元宗獻之女童丱入道以彤管之懿資膺黃冠之妙選享年八十有五無疾而逝妙順亦出名家探索玄理解屬文辭與孟同年仙去景禮臨終貽屬妙明曰汝等祗嚴修潔善守廟祊毋負劉侯付託妙明唯曰敢不敬承誨音嵗甲辰劉侯命侍人周氏韓氏披戴禮棲雲王真人為師訓周曰妙元韓曰妙溫與妙明為徒侣所需衣糧皆出劉侯資給妙溫妙明俱壽臻期頥相繼蟬蛻既而劉侯第四子保定路總尹某卒夫人徒單氏痛伉儷之中暌感榮華之易歇聿來栖迹法號妙真道俗咨嘆祠宇為增重焉妙元洎妙真罄刮粧奩刻苦樽節遂重修正殿臺門創建獻廡子孫司及道衆寮舍齋厨輪奐一新蒙洞明真人稱賞加妙元以純貞素德散人之號今年登七帙日誦五千玄言為課朝夕焚誦祝聖人壽願天下安鶴髮童顔精健不少衰復慮興建本末不能昭晣於後走書幣京師求記於秋澗翁豫宦逰大梁者屢矣故國遺迹亦嘗周覽今雖衰老忍無一言載名其間謹按祀典陽氣升而天神降地道肅而人鬼出自邦國逹於臣庶祭秩切近者社稷五祀而已城隍神初未載也世説秦功臣馮尚見夢於漢高帝曰奉天帝命與王知領城隍隂事雖儻恍不可致詰然自漢訖今遂為天下通祀社與五祀雖有常尊當時用事莫城隍若也况汴梁為六代都會四方輳集城池盤礴衢陌交通人物繁夥精英之萃集晝夜開闔死生變化幽明兩間其有神為之主司也審矣夫城隍地道也古人求神各以其類今俾女冠主其祀事宜矣傳曰西子蒙不潔則人皆掩鼻而過之雖有惡人齋戒沐浴可以事上帝言誠潔可以感通神明也如景禮妙明妙元妙真等式出於詩禮名家薰膏鼎族清修道行敬恭神祗以致廟貌完固闔郡瞻仰雖其誠篤致然亦由神明有以護持者哉而推源本自不忘劉侯經始之勤是可書大德三年十二月吉日記三皇廟記吳炳皇元立制於凡古帝王明聖功德之載祀典者有大詔令則即其所祭之有司擇日行事其祝幣牲牢之數因時損益祭巳即去三皇乃因舊制立廟郡縣有常所祀用莫春之初有常日其祝幣牲牢之數有司恪守不敢有隆殺焉有常禮豈不以勳被天下與一時之澤視開天之聖立極於萬世者廣狹不同而國家所以崇德報功者亦因之有厚薄歟汴梁路去京師千五百里而近治開封尹故地總州縣數十為大府省憲咸在土地人民之廣繭絲保障之任不後旁郡其諸神祀崇樓閟殿峻基宇而凌空虗者逺近相望皆興於私家獨力乘堅良而擅素封者奔走恐後三皇之祭宫不踰畝在艮嶽廢基之顛如無所于託而姑栖焉者主祠配饗合食一堂前後尊卑紊無秩敘几筵爼豆不比於禮拜伏薦祼窘于登陟若是者蓋有年矣所司視為故常不屬于意方以不飭郵傳為大故非所以奉明制而崇聖祀也然土功之興民亦勞止為之以漸人不告病而功倍常是一材之積一甓之用有不可少者是為之兆後將有興起焉若無黍絫之積徒太息于此將無所為計猶病七年求三年之艾茍不畜之終身無所及矣若李侯者其有知于此歟李侯之來也能奉宣上命以惠愛為治首修儒學顧瞻是廟乃謂然歎曰時尹之責其何敢後乃買田以拓故址夫土鉶之啜譏于已陋施之古昔似無大失乃命埏埴之工為登豆簠簋爵坫罍犧象之尊奠池薌鼎無不具者粥銀五流造用器命吏籍之分官田二千五百畝有竒以卑醫學議定代期及之會朝廷有停役之命遂不果就遣掾王國輔請文以記之若有望于後者侯之用意勤矣君子于義所當為者惟力是視成否遲速幾不在我侯為是廟先事儲積而張其本者又豈特一材一甓而巳邪後之來者其才行皆膺選拔而尹是邦方將奉行國家崇德報功之意與夫林然以生羣然以居室處而火食養生以送死與主是廟者仰視几筵俯食土田之入孰非蒙三皇之澤者哉皆將攘臂爭先趨蹶卒事其孰不曰是廟之修自李侯始亦何病其不出於已也侯名信字可復上黨人前為京尹治有能聲今以正議大夫為總管云副之者朝散大夫同知崔阿沙奉議大夫治中劉巨源承務郎推官張君謙贊之者承務郎經歷李獻而董是役者亦王國輔也開封府重修廟學記明于謙夫子之道天之道也天之道亘萬古而不息夫子之道歷萬世而無弊刪述六經昭揭宇宙日月之照臨也教化之澤洽於人心雨露之霑被也所謂生民以來所未有而三代以降君天下者未有不循此而能治者也我國家列聖相承咸用此道內而京畿外而郡邑莫不建立廟學以祀孔子以育才俊所以資化源而崇教本也開封為中州甲郡故有廟學嵗久隳圯儀觀弗稱前郡守黃公瑾有志作新成功僅及一二而以休致去今郡守舒侯下車之初即以興起斯文為已任遂極力為之而方牧諸公咸捐俸資以助經費於是增庫而為崇闢隘而為廣飾陋而為華自禮殿講堂以及諸生肄業會食之所莫不畢備規制宏麗視昔有加郡博士黃宗謂此不可以無記因率諸生來請余言惟夫子之道如天朝廷作人之化亦如天諸士子生際盛時沐浴清化又有賢方牧郡守以作興之廟學之新文化之新也儀觀之盛士風之盛也關係豈偶然哉為師弟子者朝于斯夕于斯絃誦于斯遊息于斯其亦知所本乎茍知所本則涵養本源砥礪素行學必造其根柢而弗專事乎言語文字之末異時出而致用得志則行其道于天下事與志違則求無愧於名節無愧於天地鬼神而後已若然則無負於聖人在天之靈無負於朝廷作養之化而亦無負於天矣其於郡守作興之意豈不重有光邪侯名曈字仲曦浙東姚江人以名進士起家拜黃門郎被薦出守是邦是舉也足以知其善政云祥符縣重修儒學記劉昌祥符即古浚儀縣國朝省開封縣入之其學宫創始無所考河南左布政使廬陵李昌祺云宋置都于此既設國子監則縣無緣更置學今學即雲老寺及祥符縣故址也國朝洪武五年知縣胡聶創建規制粗備而圯於水永樂四年知縣王春始修復之宣德十年教諭沈轔求得鐘樓餘材三百因大為理飾又闢道左右表以文林巍乎煥然士民聳觀暨天順五年蓋已二十有六稔腐蠧相繼比河決郡城遂蕩析無遺矣明年豫以按察副使提學既至則有司巳作禮殿講堂而廊廡齋舍漸亦就緒未甚宏偉豫乃謀於二三寮友寅恭克協僉議維同今按察副使安成王公齊首為之作饌堂於是庖湢庫庾悉還舊列左布政使四明章公繪復即左右故道表以興賢育才而教諭陳禎又率士民之好義者作二門其在禮殿之前者曰櫺星在講堂之側者曰禮門又表其出入所必由曰義路櫺星之南地廣二百弓嘗為汴渠所經渠雖湮而積水如故人頗病涉按察使建安劉公福副使泰和歐陽公熙為作石梁于上稍南臨通衢而王公又作飛樓適視兵商洛不果今按察使關中宋公欽甫蒞任即詣學周覽且曰我不可不任厥功曾未幾時竟登于成所謂巍乎煥然士民聳觀者益有加于昔諸生相率請記夫求道必以學學必有師孔子萬世之師也人所以靈承向慕者宜無所不用其心况學宫乎况浚儀為中州之首邑乎孔子過儀儀封人云天將以夫子為木鐸晉地道記曰儀封人見孔子即此浚儀蓋在當時其邑人已知靈承向慕如此况我朝列聖繼作尊崇孔子檢詳學制諸生之所耳濡而目擊者又生長中州風俗素厚之地惟勤於誦數而務端其本以如諸公之靈承向慕而持之堅焉則於斯道也不幾矣乎皆應曰諾遂書以授之俾刻為記揚州門新造石閘記吕原汴梁元河南行省治所而其地則所謂天下之樞也肆我皇明之初嘗建為北京既乃分封周王於此并置河南都布按三司而附以府縣衛所焉其城周回二十里外則繚以堤當宋時近於城者惟汴蔡諸水而黃河流經城之東北以達於海至元時河始南徙逼城流合汴泗入淮國朝正統戊辰亦嘗分決張秋口東北入海其後復東南入淮如故築堤護城其來蓋已久矣夫土疏固易遷徙而流雜泥沙又易淤澱以其故水載高地堤日增而城以下也天順五年秋七月四日客水暴至河溢踰防土城遂決越六日風激浪擁突北門以入平地水深丈餘王府及官衛儒黌廬井市㕓無慮數萬區盡浸沒摧圯力能結筏者僅以身免而老弱者往往溺死事聞上特命工部右侍郎瓊臺薛公逺往拯治之璽書授以事宜公星馳至汴敷宣帝德綏爰衆戚即移粟以賑其飢躬率三司官僚按視地形商度工用及以緩急詢之故老乃命左布政使侯臣按察使吳中徴集丁夫預調塞治之物於所屬委開封府知府魚侃通判蔡保等管領應役先令右布政使豐慶副使項璁於決口上流督夫下樁捲掃作截水堤二百四十餘丈浹旬堤就決口絶流而水趨故道又令副使張諫參議王鉉於土城東起獨巒岡訖貓兒岡督夫鑿渠二千二百七十八丈引水東注而城中積水日漸耗減又命參議史敏僉事高逵於土城東南曰揚州門浚舊渠之湮塞者起太平岡直抵陳留渠長一萬二千四百八十丈以泄城中積水使下流逹于黃河自是地稍高者咸得修葺舍宇凡王府等廨署亦漸可居而軍民蕩析流離者接踵復業野田堪乂者俱播宿麥矣顧城地最低窪積水莫能盡出則令參議蕭儼李浩僉事王紹督夫車戽參議何升又導而分之閲月水盡乾涸初環城五門俱有潦水河決後水益瀰漫無津畔往來者必藉舟楫一遇風濤莫或敢濟由是米薪之價湧貴數倍則又令項璁等築道路於大梁仁和等三門以通車馬內外莫不便之且令李浩修補城垣缺處及創築各門月堤軍民有貧餒及缺種子者給以粟麥凡八千餘石有屋居漂蕩無存者給以榱檩共一萬三千餘株事將竣因念積水全賴開渠浚導議即揚州門置閘以限外內倘後內水有積啓而泄之或外水欲入閉而塞之庶為永久之利適巡按御史梁公覲董公廷圭至議用克協即委布政司照磨金景輝等於鄭之賈峪山採石煉灰勸客舟如期輸至就令景輝及開封推官劉錡董役未幾閘成蓋首事於是年九月十二日而以明年二月二十六日輟工凡役丁夫三萬八千四百二十一用樁木三萬一百七十四芟稍以束計者一十二萬七千四百犍囤以件計者三千二百麻以斤計者九千七百八十六而閘用石八百餘片磚二萬餘塊灰三萬餘斤是役也諸公開誠勸諭人心咸悅故勞雖久而無怨費雖巨而易完也及薛公已還闔城士庶咸謂其仰體朝廷之心既拯民於昏墊又防患於未然其德宏其慮逺宜有述以告來者而崇明訓導祥符艾俊為書以求豫記嗟夫中原水患惟河為甚而禹之治河也務多其委以分其勢故當大伾而下析為二渠大陸而下播為九河今河失禹道治之固難如能先事為備訪求遺瀆以為委則亦不至臨事而失措矣穿渠置閘蓋知從事於委者然委弗多而泛溢所當虞也因記夫施工次第并贅以是説云序送權秀才之汴州序唐韓愈伯樂之廄多良馬卞和之匱多美玉卓犖瓌怪之士宜乎遊於大人君子之門也怪或作竒相國隴西公既平汴州西下或有董字天子命御史大夫吳縣男為軍司馬門下之士權生實從之來權生之貌固若常人耳其文辭引物連類窮情盡變宫商相宣金石諧和寂寥于短章舂容乎大篇如是者閲之纍日而無窮焉愈常觀於皇都每年貢士至千餘人或與之遊或得其文若權生者百無一二焉如是而將進於明有司重之以吳縣之知其果有成哉於是咸賦詩以贈之送汴州監軍俱文珍序并詩隴西公董晉為宣武軍節度使治汴州俱文珍為監軍愈為觀察推官文珍將如京作序詩送之時貞元十三年也今之天下之鎮陳留為大陳留屬汴州宣武節度使所治汴宋毫潁四州𨽻焉屯兵十萬連地四州左淮右河抱負齊楚濁流浩浩舟車所同故自天寶已來當藩垣屏翰之任有弓矢鈇鉞之權皆國之元臣天子所左右其監統中貴必材雄德茂榮耀寵光能俯逹人情仰喻天意者然後為之故我監軍俱公輟侍從之榮受腹心之寄奮其武毅張我皇威遇變出竒先事獨運偃息談笑危疑以平天子無東顧之憂方伯有同和之美十三年春將如京師相國隴西公飲餞於青門之外謂功德皆可歌之也命其屬咸作詩以鋪繹之詩曰奉使羌池靜臨戎汴水安沖天鵬翅闊報國劔鋩寒曉日驅征騎春風詠采蘭誰言臣子道忠孝兩全難送楊凝郎中使還汴宋詩後序柳宗元談者謂大梁多悍將徑卒亟就猾亂而未嘗底寧控制之術難乎中道蓋以將驕卒暴則近憂且至非所以和衆而乂民也將誅卒削則外虞實生非所以捍城而固圉也是宜慰薦煦諭納為腹心然後威懷之道備聖上於是撫以表臣書立政篇藝人叔臣百司表臣表幹之臣謂董晉為宣武軍節度贊以藝人謂以楊凝檢校吏部郎中汴宋毫潁觀察判官參剛柔而兩用化逆順而同道既去大憝遂室有衆故楊公以謀議之隟對揚王庭不踰時而承詔復命示信于外諸侯時當朝之羽儀凡同官之寮屬皆餞焉容受童孺使在末位子厚時年二十七禮部郎中許公許孟容字公以宏才奧學巳任文字顧唱在席咸斷章而賦焉謂工部郎中崔公崔羣字敦禮文為時雄允宜首序謂小子預離觴之餘瀝俾撰後序編以繼之大凡軍旅之制贊佐之重崔公序之備矣膺命受簡欲默不敢故書談者之辭拜手以獻用充餘篇云蓬池禊飲序蕭頴士禊逸禮也鄭風有之蓋取諸勾萌發逹陽景敷煦握芳蘭臨清川乘和蠲潔用徼介祉厥義存矣晉氏中朝始參燕胥之樂江右宋齊又間以文詠風流遂逺鬱為盛集焉若夫華林曲水萬乘之降也蘭亭激湍專城之踐也而方伯之歡未始前聞以俟乎今辰粵天寶乙未暮春三月河南連帥領陳留守李公以政成務簡方國多暇率府郡佐吏二三賔客暢飲於蓬池備祓除之禮也梁有蓬池尚矣前迄溵潁右匯郛邑渺瀰淪漣蕩日澄天舟楫是臨泛波景從其左則遙原縈屬崇岡傑竦嘉卉異芳雜樹連青即為臺亭登眺斯在爾乃郡曹頒鏹以給費縣吏領徒而修頓先夕以定議詰朝而集事是日方牧乃擁車徒曵旌旃卯出乎北牖辰濟乎南川匪疾匪間翼翼闐闐以稅駕于東焉然後降春流揚綵舟羽觴芳羞緩舞清謳援青蘋駭紫鱗迥回環中汀𬗟望南津飫于已酣于未歌樂只賦既醉坐闌而靡怠日入而未闋陶陶乎有以表勝境佳辰之具美名公好事之厚意下客不敏聞於前載曰夫德洽禮成則詠歌繫之梁故魏也請皆賦詩志焉相國寺維摩院聽琴序宋曾鞏古者學士之於六藝射能弧矢之事矣又當善其揖讓之節御能車馬之事矣又當善其驅馳之節書非能肆筆而巳又當辨其體而明其意數非能布䇿而已又當知其用而各盡其法而五禮之威儀至於三千六樂之節文可謂微且多矣噫煩且勞如是然古之學者必能此亦可謂難矣然習其射御以禮習其干戈於樂則少於學長於朝其於武備固修矣其於家有孰於黨有庠於鄉有序於國有學於教有師於視聽言動有其容於衣冠飲食有其度几杖有銘盤杅有戒在輿有和鑾之聲行有佩玉之音燕處有雅頌之樂而非其故琴瑟未嘗去於前也盡其出入進退俯仰左右接於耳目動於四體逹於其心者所以養之至如此其詳且密也雖然此尚為有待於外者爾若夫三材萬物之理性命之際力學以求之深思以索之使知其要識其微而齊戒以守之以盡其材成其德至合於天地而後已者又當得之於心夫豈非難哉噫古之學者其役之於內外持其心養其性者至於如此此君子所以愛日而自強不息以求至乎極也然其習之有素間之有具如此則求其放心伐其邪氣而成文武之材就道德之實者可謂易矣孔子曰興於詩立於禮成於樂蓋樂者所以感人之心而使化故曰成於樂昔舜命夔典樂教胄子曰直而溫寬而栗剛而無虐簡而無傲則樂者非獨去邪又所以救其性之偏而納之中也故和鑾佩玉雅頌琴瑟之音非其故不去於前豈虗也哉今學士大夫之於持其心養其性凡有待於外者皆不能具得之於內者又亦皆略其事可謂簡且易矣然所以求其放心伐其邪氣而成文武之材就道德之實若豈不難哉此豫所以懼不至於君子而入於小人也夫有待於外者余既力不足而於琴竊有志焉久矣然患其莫余授也治平三年夏得洪君於京師始合同舍之士聽其琴於相國寺之維摩院洪君之於琴非特能其音又能其意者也豫將就學焉故道豫之所慕於古者庶乎其有以自發也同舍之士丁寶臣元珍鄭穆閎中孫覺莘老林希子中而豫曽鞏子固也洪君名規字方叔以文學吏事稱於世云吹臺春逰序明劉醇汴昔輦轂之地名園勝境甲於四方每遇良辰佳節往往為士大夫逰觀之所自中原用武兵燹之餘所存無幾而又河水湮沒若金明池蔡太師湖之類亦泯然無迹可覩惟城東南僅三里有荒臺故基巍然獨存挺出風煙之外高廣數丈可登可眺即古之吹臺也臺西有寺民廬相接竹木蕭然風景可愛又東行六七里臨水有村漁舟牧笛野意超絶比之臺西景物頓殊時方卜已春光駘蕩草朩爭榮鳥哢魚遊欣然自得友人王庭璲邀余暨子山艾公體方黃公輩同往造焉具酒肴設几席列坐于芳樹之間深杯迭進清歌間作衆賔歡飲余亦酣暢恍然如在桃源深處不覺世慮之俱忘也蓋景與時會事與謀諧主既風流賔亦醖藉昔人所謂四美具二難并者實兼而有之矣况又嵗屢豐稔人多間暇不負疇昔所約得與同逰以踵前賢故事何其幸邪既而日暮將歸據吟鞍欹醉帽或語或笑前後相續故老指而嘆曰昔時太平氣象復見於今日矣於是庭璲乃繪以為圖列次衆賔姓名俾余敘其事用傳于將來余謂光隂迅速如駒過隙人生幾何乃終日汨沒於塵埃之中而不知止所謂及時行樂秉燭夜逰者必待何時而可乎詩云今我不樂日月其除斯言也觀者或有取焉吹臺駐節詩序劉昌開封為古蓬池忌澤之藪梁惠王發以賜民因名開封文獻通考云今郡城西古城惠王所築也城南有吹臺世乃言梁孝王臺何邪顧謹中輩至指開封為梁園又何邪夫孝王國于梁自是梁郡在今歸德州睢陽宋城之間李白所作梁園吟正指此開封在漢為陳留郡非孝王封內則吹臺烏得為孝王臺邪豫纂中州勝覽始據梅聖俞詩而訂正之聖俞之詩曰在昔梁惠王築臺聚歌吹笙簫無復聞黃土化珠翠較然有足徴者矣唐杜甫從李白登吹臺慷慨悲歌為一時所慕故後世騷人詩客以不得至開封登吹臺歌嘯為欠事况當明盛之時挾能賦之才有如吾進士陸君建節過從登臺弔古以發千載之遐思于中州之地而揚眉吐氣騁其所欲言者乎此宜見重於開封之大夫士而吹臺駐節詩所由作也周禮言凡通達於天下者必以節無節則不達故當時有玉節角節虎節龍節各用於其所宜漢世用竹今用符以印章合而行事亦即古之所謂璽節也然節不在物而在人人其有毅然不撓之節斯然後達於事而無滯故大易有云安節亨陸君之使於開封也溫乎其恭也秩乎其度也凛乎其所持也其心蓋欲與杜甫李白爭優劣則豈特登高能賦而已其逺且大固有能辨之者而為一時所慕又必由今以及後於是祥符學諭陳君裒今大夫士所作詩將以送陸君以存故事而授豫觀豫推本而敘之欽謨此序謂梁園當在睢陽宋城之間直以吹臺為梁惠王築而取證於梅聖俞之詩按漢書梁孝王築東苑三百餘里疑自開封至睢陽皆其封內也杜甫詩昔我逰宋中惟梁孝王都氣酣登吹臺云云而本傳云甫嘗從李白及高適過汴州登吹臺此又何也中州覽勝序唐寅吾黨袁臣器少年氣逸溫然玉映蓋十室之髦懿也𢎞治丙辰五月忽翻然理篙楫北亂揚子厯彭城漸于淮海抵大梁之墟九月來歸乃繪所經厯山川陵陸并衝隘名勝之處日夕展弄目遊其中豫忝與鄉曲得藉訪道里宛宛盡出指下蓋其知之素而能説之詳也豫聞丈夫之生剡蒿體揉柘幹以麗别室固欲其遠陟遐舉不齷齪牖下也而願慤者懷田里沒齒不窺闉闍曰世與我違甘與災木委灰同棄雖有分寸而人莫之知也后世因莫之建白也是余固欲自展以異而類然青袍掩脛馳騖士伍中而身未易自用也雖然竊亦不能久落落于此臣器新從魏地來今不知廣陵有中散之遺聲歟彭城項氏之都也今麋鹿有幾頭歟黃河故宣房之基在否歟大梁墟中有持盂羔為信陵君祭與無也臣器其為我重陳之余他日當參驗其言汴京遺迹志卷十五
